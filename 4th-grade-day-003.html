{render:()=>'<div class="lesson-page-card content-page"><h2>The Council with the Munchkins (Part 1)</h2><div><p>Dorothy was awakened by a sudden jolt. The house had stopped moving. Bright sunshine streamed through the window, flooding the little room with light so cheerful that Dorothy sat up and blinked in surprise.</p><p>She ran to the door, opened it, and gave a little cry of wonder.</p><p>The cyclone had set the house down gently in a land of extraordinary beauty. Green grass stretched in every direction, dotted with wildflowers of every color — deep reds, brilliant oranges, and purples so rich they looked like they had been painted by hand. Fruit trees heavy with blossoms lined a sparkling brook, and in the distance, she could see rolling hills touched with gold. Birds with bright feathers sang in the branches.</p><p>After gray, flat, dead Kansas, it was like stepping into a painting.</p><p>&quot;Where am I?&quot; Dorothy whispered.</p><p>Toto pressed against her leg and whimpered. He did not know, either.</p><p>As Dorothy stood staring, she noticed a group of small people walking toward her. They were about as tall as Dorothy herself, though they were clearly grown-ups. They wore round hats that rose to a point about a foot above their heads, with tiny bells on the brims that tinkled sweetly as they walked.</p><p>Three of them were men, dressed all in blue. With them was a very old woman, also dressed in white. Her face was covered in wrinkles, but her eyes were kind. She walked stiffly, as if her knees hurt, and the three men followed her with obvious respect.</p><p>The little old woman stopped before Dorothy, bowed low, and said in a sweet voice: &quot;You are welcome, most noble sorceress, to the land of the Munchkins. We are so grateful to you for having killed the Wicked Witch of the East, and for setting our people free from her cruelty.&quot;</p><p>Dorothy stared at her. &quot;I haven&#39;t killed anyone,&quot; she said.</p><p>&quot;Your house did, anyway,&quot; replied the old woman with a gentle laugh. &quot;And that is the same thing. Look!&quot; She pointed to the corner of the house.</p><p>Dorothy looked and gave a little scream. Two feet were sticking out from under the corner of the house, wearing silver shoes with pointed toes.</p><p>&quot;Oh dear!&quot; Dorothy gasped, putting her hands over her mouth. &quot;The house must have fallen on her. What are we going to do?&quot;</p><p>&quot;There is nothing to be done,&quot; the old woman said calmly. &quot;She was the Wicked Witch of the East, as I said. She held all the Munchkins in slavery for many years, making them work for her night and day. Now they are free, and they are grateful to you.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Council with the Munchkins (Part 2)</h2><div><p>&quot;Who are the Munchkins?&quot; Dorothy asked.</p><p>&quot;They are the people who live in this land of the East, where the Wicked Witch ruled. I am the Witch of the North, and I am their friend.&quot;</p><p>Dorothy&#39;s eyes went wide. &quot;Are you a real witch?&quot; she asked, feeling a bit nervous.</p><p>&quot;Yes, indeed,&quot; the woman replied. &quot;But I am a good witch, and the people love me. The Wicked Witch of the East was the bad one. There were four witches in the land of Oz — two good and two wicked. Now that you have killed one wicked witch, there is only one left: the Wicked Witch of the West. But she lives far from here, and I do not think she will bother you.&quot;</p><p>Dorothy thought about this for a moment. &quot;Aunt Em told me that all witches were wicked,&quot; she said.</p><p>&quot;Oh no,&quot; the Witch of the North replied. &quot;That is a great mistake. I know there are no witches at all in Kansas, but here in Oz we have always had them. The Wicked Witch of the East and the Wicked Witch of the West were terribly evil, that is true. But the Witch of the South and I are good witches, and the people know it.&quot;</p><p>Dorothy felt relieved, but she also felt tears coming. &quot;I just want to go home,&quot; she said. &quot;Can you help me find my way back to Kansas?&quot;</p><p>The Munchkins and the Witch of the North looked at each other and shook their heads.</p><p>&quot;Where is Kansas?&quot; the Witch asked.</p><p>&quot;It&#39;s where I live. It&#39;s far away from here. Aunt Em will be so worried. Oh, Toto, we are so far from home!&quot;</p><p>She began to cry, and the Munchkins, who truly were grateful, cried with her. The men pulled out their handkerchiefs and blew their noses loudly. The Witch of the North thought for a moment, then took off her cap and balanced it on the tip of her nose.</p><p>&quot;One, two, three,&quot; she counted.</p><p>The cap changed into a slate with white chalk writing on it. The Witch read the words aloud: &quot;Let Dorothy go to the City of Emeralds.&quot;</p><p>&quot;Where is the City of Emeralds?&quot; Dorothy asked.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Council with the Munchkins (Part 3)</h2><div><p>&quot;Is he a good wizard?&quot; Dorothy asked.</p><p>&quot;He is a good wizard. Whether he is a man or not, I cannot tell, for I have never seen him. But he is more powerful than all the rest of us together. He lives in the Emerald City, and perhaps he can help you find your way home.&quot;</p><p>&quot;How do I get there?&quot; Dorothy asked.</p><p>&quot;You must walk. It is a long journey, through a country that is sometimes pleasant and sometimes dark and dangerous. But I will use what magic I know to protect you.&quot;</p><p>She kissed Dorothy gently on the forehead. Where her lips touched, they left a round, shining mark.</p><p>&quot;No one will dare to hurt someone who has been kissed by the Witch of the North,&quot; she said. &quot;Now, take the silver shoes from the Wicked Witch. They must have some special power, though I do not know what it is.&quot;</p><p>Dorothy looked at the silver shoes. They were just her size. She put them on.</p><p>&quot;The road to the City of Emeralds is paved with yellow brick,&quot; the Witch of the North told her. &quot;You cannot miss it. When you reach the Wizard, do not be afraid. Tell him your story and ask for his help. Goodbye, my dear.&quot;</p><p>The three Munchkins bowed low and wished her a pleasant journey, and the Witch of the North gave her a friendly nod and spun around on her left heel three times, and then vanished completely. Toto barked in surprise.</p><p>Dorothy was alone.</p><p>She looked around at the beautiful land — the flowers, the fruit trees, the blue sky — and thought about gray Kansas and Aunt Em.</p><p>&quot;Come along, Toto,&quot; she said. &quot;We are going to the Emerald City to ask the great Oz to send us home.&quot;</p><p>She looked down and found the road of bright yellow brick. With Toto trotting beside her, Dorothy began to walk.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. What happened to the Wicked Witch of the East?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. Dorothy wants to go home to gray, dull Kansas instead of staying in this beautiful, colorful land. Why? What does this tell you about what &#39;home&#39; means to her?</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
