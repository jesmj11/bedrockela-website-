{render:()=>'<div class="lesson-page-card content-page"><h2>How Dorothy Saved the Scarecrow (Part 1)</h2><div><p>Dorothy walked along the yellow brick road, enjoying the beauty around her. The road was smooth and well-kept, and the countryside was green and lovely. The fences along the sides were painted a cheerful blue, and the houses were also blue, for this was still Munchkin country, and blue was the Munchkins&#39; favorite color.</p><p>After walking for a while, Dorothy sat down on a fence to rest and eat some bread from her basket. There was a great cornfield beyond the fence, and not far away, she saw a Scarecrow, raised high on a pole to keep the crows away.</p><p>Dorothy stared at the Scarecrow curiously. His head was a small sack stuffed with straw, with eyes, a nose, and a mouth painted on in blue to look like a Munchkin. He wore a faded blue suit, old boots, and a pointed blue hat. He was stuffed with straw that stuck out at every seam.</p><p>As Dorothy looked at him, she thought she saw one of the painted eyes wink at her.</p><p>She blinked. Had she imagined it?</p><p>Then the Scarecrow nodded his head in a friendly way.</p><p>Dorothy climbed down from the fence and walked right up to him. &quot;Did you just nod at me?&quot; she asked.</p><p>&quot;Certainly,&quot; answered the Scarecrow. &quot;How do you do?&quot;</p><p>&quot;I&#39;m — I&#39;m fine,&quot; Dorothy said, quite astonished. She had never talked to a scarecrow before. &quot;How are you?&quot;</p><p>&quot;Not very well,&quot; said the Scarecrow with a sigh. &quot;It is very tiresome being stuck up here all day and all night with nothing to do. Would you be so kind as to help me down?&quot;</p><p>Dorothy reached up and lifted him off the pole. He was very light, being stuffed with straw, and he stumbled when his feet touched the ground but quickly steadied himself.</p><p>&quot;Thank you very much,&quot; said the Scarecrow. &quot;I feel like a new man.&quot;</p><p>He stretched his arms and legs and looked around with his painted eyes. &quot;Who are you?&quot; he asked. &quot;And where are you going?&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>How Dorothy Saved the Scarecrow (Part 2)</h2><div><p>&quot;Where is the Emerald City?&quot; the Scarecrow asked. &quot;And who is Oz?&quot;</p><p>&quot;Don&#39;t you know?&quot; Dorothy asked, surprised.</p><p>The Scarecrow shook his head sadly. &quot;No, indeed. I don&#39;t know anything at all. You see, I am stuffed with straw, so I have no brains.&quot;</p><p>&quot;Oh,&quot; said Dorothy. &quot;I&#39;m sorry.&quot;</p><p>&quot;It&#39;s not so bad during the day,&quot; the Scarecrow said. &quot;But at night, when it is dark and I am alone, I have nothing to think about, and that is very hard. If I only had brains, I would know things, and then I would not feel so empty and useless.&quot;</p><p>Dorothy thought about this for a moment. &quot;If you come with me to the Emerald City,&quot; she said, &quot;I will ask Oz to give you some brains.&quot;</p><p>The Scarecrow&#39;s painted face seemed to brighten. &quot;Do you think the Wizard could really do that?&quot;</p><p>&quot;I don&#39;t know,&quot; Dorothy said honestly. &quot;But he is a great Wizard, and the Witch of the North told me he might be able to help me. Perhaps he can help you, too.&quot;</p><p>&quot;Then I will go with you,&quot; the Scarecrow declared. He took a step, then stumbled and nearly fell. Dorothy caught his arm. &quot;I am sorry,&quot; he said. &quot;I am not very steady on my feet. My legs do not always do what I want them to.&quot;</p><p>&quot;That&#39;s all right,&quot; Dorothy said. &quot;You&#39;ll get better with practice.&quot;</p><p>They started down the yellow brick road together, the Scarecrow wobbling at first but growing steadier with every step. Toto sniffed at the Scarecrow&#39;s straw-stuffed legs and barked once, then decided this strange creature was friendly enough and trotted along beside them.</p><p>&quot;Tell me about yourself,&quot; Dorothy said.</p><p>&quot;There is not much to tell,&quot; said the Scarecrow. &quot;I was made only yesterday. A farmer painted my face, stuffed me with straw, and put me on that pole. He said I was to keep the crows away, but the crows were not afraid of me at all. One old crow even landed on my shoulder and said, &#39;Any fool can see that man is only stuffed with straw.&#39; That made me very sad. If I only had brains, even the crows would respect me.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>How Dorothy Saved the Scarecrow (Part 3)</h2><div><p>&quot;It seems to me,&quot; Dorothy said carefully, &quot;that a man who can talk as cleverly as you do ought to have brains.&quot;</p><p>&quot;Do you really think so?&quot; the Scarecrow asked eagerly.</p><p>&quot;I do,&quot; said Dorothy.</p><p>The Scarecrow seemed to walk a little taller after that.</p><p>As they walked, they came to places where the road was rough and broken, and the Scarecrow sometimes tripped over the uneven bricks. But each time he fell, he picked himself right back up without complaining and kept going. He could not feel pain, he explained, because he was only stuffed with straw. But he did not like falling, because it made him feel foolish.</p><p>&quot;Tell me about Kansas,&quot; the Scarecrow said after a while.</p><p>&quot;It is gray and flat and dry,&quot; Dorothy said. &quot;There are no beautiful flowers or green trees like there are here. But it is home, and Aunt Em is there, and that is all that matters.&quot;</p><p>&quot;I cannot understand why you would want to go back to such a gray place,&quot; the Scarecrow said.</p><p>&quot;That is because you have no brains,&quot; Dorothy said gently. &quot;No matter how dull and gray home is, people who have hearts always want to return to it. There is no place like home.&quot;</p><p>The Scarecrow sighed. &quot;Of course, I cannot understand it. If your heads were all stuffed with straw, like mine, you would probably all live in beautiful places, and then Kansas would have no people at all. It is fortunate for Kansas that you have brains.&quot;</p><p>Dorothy smiled and said nothing. She was beginning to like the Scarecrow very much.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. What does the Scarecrow want more than anything?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. The Scarecrow says he has no brains, but he talks cleverly and asks thoughtful questions. Find one thing the Scarecrow says or does that makes you think he might already be smarter than he realizes.</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
