{render:()=>'<div class="lesson-page-card content-page"><h2>The Rescue of the Tin Woodman (Part 1)</h2><div><p>Dorothy found the oil can in a tiny cottage near the frozen man. She hurried back and carefully oiled his jaw first, drop by drop, until it loosened.</p><p>&quot;Oh, thank you,&quot; the Tin Woodman gasped. His voice was rough and creaky, like a gate that had not been opened in years. &quot;Thank you. I have been standing here for more than a year. If you had not come along, I might have stood here forever.&quot;</p><p>&quot;A whole year!&quot; Dorothy said. &quot;That&#39;s terrible!&quot; She oiled his neck, then his arms, his elbows, his shoulders. The Scarecrow held him steady while Dorothy worked on his legs and knees. Joint by joint, the Tin Woodman came back to life.</p><p>He lowered his axe at last, rolled his shoulders, bent his knees, and took one careful step. Then another. His joints squeaked, but they moved.</p><p>&quot;I feel like a new man,&quot; the Tin Woodman said. &quot;And I owe it all to you.&quot;</p><p>&quot;How did you get so rusted?&quot; the Scarecrow asked.</p><p>&quot;I was chopping that tree when it began to rain. The water rusted my joints, and I could not reach my oil can. So I stood here. And stood. And stood. The sun rose and set, the seasons changed, and I stood. I had nothing to do but think.&quot;</p><p>&quot;What did you think about?&quot; Dorothy asked.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Rescue of the Tin Woodman (Part 2)</h2><div><p>The Tin Woodman was quiet for a moment. &quot;I thought about the girl I used to love,&quot; he said softly. &quot;Before I was made of tin.&quot;</p><p>&quot;You were not always tin?&quot; the Scarecrow asked, surprised.</p><p>&quot;No. I was once a man of flesh and blood — a woodcutter. I fell in love with a beautiful Munchkin girl. She was kind and funny and she laughed at my jokes, and I wanted to marry her more than anything. But the Wicked Witch of the East did not want us to be happy. She enchanted my axe so that it slipped and cut me, piece by piece. First my legs, then my arms, then my head, then my body — and each time, a tinsmith replaced the part with tin.&quot;</p><p>&quot;How awful,&quot; Dorothy whispered.</p><p>&quot;The worst part,&quot; the Tin Woodman continued, &quot;was that when the tinsmith made me a complete body of tin, he forgot to give me a heart. Without a heart, I could not love the girl anymore. I could not feel anything at all — no happiness, no sadness, no love.&quot; He paused. &quot;At least, that is what I am told. And yet, standing here for a year, thinking of her... I felt something. I do not know what to call it. But it hurt.&quot;</p><p>A single tear rolled down his tin face.</p><p>&quot;Careful,&quot; the Scarecrow said. &quot;You&#39;ll rust again.&quot;</p><p>Dorothy quickly oiled the tear away. &quot;If you could have anything in the world,&quot; she said, &quot;what would it be?&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Rescue of the Tin Woodman (Part 3)</h2><div><p>&quot;A heart,&quot; the Tin Woodman said without hesitation. &quot;I would give up everything — my axe, my strength, my tin body — for a real heart. Because without one, nothing else matters.&quot;</p><p>&quot;Do you really think so?&quot; the Tin Woodman asked. Hope flickered in his tin eyes — which, Dorothy thought, was a remarkable thing to see in someone who claimed he could not feel.</p><p>&quot;I think it is worth asking,&quot; Dorothy said.</p><p>&quot;Then I will come with you,&quot; the Tin Woodman declared. &quot;But I must ask you to carry my oil can. If it rains, or if I cry, I will need oiling at once.&quot;</p><p>&quot;I will carry it,&quot; Dorothy promised.</p><p>So the three of them set off down the yellow brick road, deeper into the dark forest. The Scarecrow stumbled over roots. The Tin Woodman&#39;s joints squeaked with every step. And Dorothy walked between them, a girl from Kansas with silver shoes and an oil can, making her way toward a city she had never seen to meet a wizard she was not sure she believed in.</p><p>But she had friends, and they had her, and that made all the difference.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. What does the Tin Woodman want the Wizard to give him?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. The Tin Woodman says he cannot feel anything because he has no heart. But he cries when he is sad. Does that seem strange to you? What might the author be trying to show us about what the Tin Woodman already has?</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
