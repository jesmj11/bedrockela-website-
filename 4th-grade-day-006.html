                    <h2>🌍 Informational Text: Scarecrows: Guardians of the Garden</h2>

                        <p>Scarecrows have been protecting crops for thousands of years. Ancient Egyptians used them along the Nile River. Greek farmers built wooden scarecrows to guard their vineyards. But the classic scarecrow we know today — stuffed with straw, wearing old clothes — became popular in America during the 1800s.</p><p>Why do farmers need scarecrows? Birds, especially crows and blackbirds, love to eat seeds and sprouting crops. A flock of birds can destroy a newly planted field in hours. Scarecrows are meant to frighten birds away by looking like a human standing guard.</p><p>In the 1890s when Dorothy meets the Scarecrow, most were simple: a wooden pole with a crossbar for arms, stuffed with straw, dressed in worn-out clothes and a hat. Farmers positioned them in fields to protect corn, wheat, and other grains.</p><p>But here's the problem: birds are smart. They quickly figure out that scarecrows don't move. Within days, crows might perch right on the scarecrow's shoulders, mocking it. That's why the Scarecrow in the story feels useless — the crows literally told him he was just "stuffed with straw."</p><p>Modern farmers use many methods to protect crops: nets, noise makers, reflective tape, and even robots. But the traditional scarecrow remains a symbol of farming life and harvest time.</p><p>L. Frank Baum's Scarecrow is different from a typical farm scarecrow. He can talk, walk, and think. He joins Dorothy's journey seeking a brain, yet throughout the story, he's the one who comes up with clever plans and solves problems. The lesson? Intelligence isn't about what's in your head — it's about how you use what you have.</p><p>The Scarecrow represents a universal truth: we often have the very thing we think we're missing. We just don't recognize it yet.</p>
