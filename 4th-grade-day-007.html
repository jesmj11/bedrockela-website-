                    <h2>🌍 Informational Text: The Tin Man: From Folklore to Oz</h2>

                        <p>The Tin Woodman is one of L. Frank Baum's most original creations, but the idea of artificial people has fascinated humans for centuries. Ancient Greek myths told of bronze automatons created by gods. Fairy tales featured wooden puppets that came to life, like Pinocchio.</p><p>But Baum's Tin Woodman is unique. He wasn't built from scratch — he became tin piece by piece after a cursed axe kept cutting him. A tinsmith replaced each lost body part with metal until he was entirely made of tin. When the tinsmith forgot to give him a heart, the Woodman lost his ability to love.</p><p>This backstory is darker than most children's stories. The Wicked Witch of the East cursed the axe because she didn't want the Woodman to marry a Munchkin girl. His transformation from human to tin is both tragic and symbolic.</p><p>The Tin Woodman's greatest fear is rusting. When Dorothy finds him, he's been frozen for over a year, crying tears that rusted his joints. She saves him with an oil can — a simple act of kindness that frees him from his prison.</p><p>Throughout the story, the Tin Woodman insists he has no heart and cannot feel. Yet he's the most compassionate character. He carefully moves aside insects so he won't step on them. He cries when he accidentally crushes a beetle. He risks his own safety to protect Dorothy.</p><p>His constant need for oil represents our need for love and care. Just as the Tin Woodman rusts without oil, humans become hardened without kindness and connection.</p><p>The Tin Woodman's journey teaches us that having a heart isn't about biology — it's about how you treat others. Actions speak louder than anatomy. If you act with kindness and compassion, you have a heart, whether it's flesh or tin or something else entirely.</p>
