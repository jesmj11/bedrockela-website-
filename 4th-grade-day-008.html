                                    <div style="margin-bottom: 10px;">
                                        <span style="font-size: 28px; font-weight: 800; color: #305853;">courage</span>
                                        <span style="font-size: 14px; color: #666; margin-left: 10px;">(noun)</span>
                                    </div>
                                    <p style="font-size: 16px; font-weight: 600; margin-bottom: 15px;">The ability to do something even when you are afraid. Being brave when it is hard.</p>
                                    <p style="font-size: 14px; color: #666; margin-bottom: 8px;"><strong>From the story:</strong> The Lion said he had no courage, yet he leaped out of the trees to frighten the travelers — which took courage in itself.</p>
                                    <p style="font-size: 14px; color: #666; margin-bottom: 15px;"><strong>Think about it:</strong> Is courage the same as not being afraid? Or is courage doing something EVEN THOUGH you are afraid? What do you think?</p>

                                    </div>
                                    <p style="font-size: 16px; font-weight: 600; margin-bottom: 15px;">When two things are opposite or do not match — when someone says one thing but does another.</p>
