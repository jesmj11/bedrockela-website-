{render:()=>'<div class="lesson-page-card content-page"><h2>The Cowardly Lion (Part 1)</h2><div><p>The forest grew darker and wilder. Strange sounds echoed through the trees — growls, rustling, and the snap of twigs. Dorothy walked closer to her friends.</p><p>&quot;How far is it to the Emerald City?&quot; she asked.</p><p>&quot;I don&#39;t know,&quot; said the Tin Woodman. &quot;I have never been there. But my father once told me it was a long, difficult journey.&quot;</p><p>&quot;I heard that the road passes through dangerous country,&quot; the Scarecrow added. &quot;But since I have no brains, I am not afraid.&quot;</p><p>&quot;And since I have no heart,&quot; the Tin Woodman said, &quot;I cannot be afraid either.&quot;</p><p>Dorothy said nothing. She was the only one in the group who had both brains AND a heart, and she was quite frightened. Toto was frightened too. He pressed against Dorothy&#39;s legs and growled at the shadows.</p><p>Suddenly, a great beast burst out of the trees with a terrible roar. It was an enormous lion, with a thick golden mane and huge paws. He knocked the Scarecrow spinning with one swipe and struck at the Tin Woodman with his claws, which scraped against the tin but did no real damage.</p><p>Then the Lion opened his great mouth and lunged at Toto.</p><p>Dorothy did not think. She did not plan. She did not hesitate. She ran forward and slapped the Lion as hard as she could, right on his nose.</p><p>&quot;Don&#39;t you dare bite Toto!&quot; she cried. &quot;You ought to be ashamed of yourself — a big beast like you, trying to bite a poor little dog!&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Cowardly Lion (Part 2)</h2><div><p>The Lion looked shocked. He sat down and rubbed his nose with his paw.</p><p>&quot;I didn&#39;t bite him,&quot; the Lion said in a hurt voice.</p><p>&quot;No, but you tried to,&quot; Dorothy said. &quot;You are nothing but a big coward.&quot;</p><p>&quot;I know it,&quot; the Lion said, hanging his great head in shame. &quot;I have always known it. I am a disgrace.&quot;</p><p>Dorothy stared at him. This was not what she had expected.</p><p>&quot;But you&#39;re a lion,&quot; she said. &quot;Lions are supposed to be the king of beasts.&quot;</p><p>&quot;I know,&quot; the Lion said miserably. &quot;Everyone expects me to be brave and fierce. But I am terrified of almost everything. I roar to scare other creatures away, because if they got close, they would see that I am really a coward.&quot;</p><p>&quot;That&#39;s terrible,&quot; said the Scarecrow, picking straw out of his clothes.</p><p>&quot;It is,&quot; the Lion agreed. &quot;My roar is all I have. My heart pounds, my legs shake, and I want to run away. A real king of beasts would not be afraid. But I cannot help it.&quot;</p><p>The Lion&#39;s eyes grew wide. &quot;Do you think he could?&quot; he asked. &quot;If I only had courage, I would be everything a lion is supposed to be.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Cowardly Lion (Part 3)</h2><div><p>&quot;Come with us,&quot; Dorothy said. &quot;You can ask him yourself.&quot;</p><p>&quot;I will,&quot; said the Lion. &quot;Because right now, my life is unbearable. Every day I wake up afraid, and every night I go to sleep ashamed. If the Wizard can fix that, it would be worth any journey.&quot;</p><p>So the Lion joined the group. He was enormous — Dorothy barely reached his shoulder — and when he walked, the ground trembled slightly under his great paws. The Scarecrow walked on one side of Dorothy, the Tin Woodman on the other, and the Lion padded along behind them. Toto did not like the Lion at first and stayed as far away as possible, but after a while, the little dog decided that any creature who cried about being a coward was probably not very dangerous after all.</p><p>&quot;I am curious about something,&quot; Dorothy said as they walked. &quot;You say you are a coward, but you jumped out of the trees and attacked all of us. That seems rather brave to me.&quot;</p><p>&quot;Oh, that,&quot; the Lion said, embarrassed. &quot;I was more scared than any of you. My heart was pounding. I just roared and charged because I did not know what else to do.&quot;</p><p>&quot;But isn&#39;t that exactly what courage is?&quot; the Scarecrow asked. &quot;Doing something even when you are afraid?&quot;</p><p>The Lion thought about this for a long moment. &quot;No,&quot; he said finally. &quot;I think real courage means not being afraid at all.&quot;</p><p>&quot;I&#39;m not sure about that,&quot; Dorothy said. But she did not argue.</p><p>They walked on through the forest. Dorothy noticed something: the Scarecrow, who said he had no brains, was the one who figured out the safest path through the trees. The Tin Woodman, who said he had no heart, carefully moved a beetle off the road so it would not be stepped on. And the Lion, who said he had no courage, walked at the back of the group, keeping watch for danger.</p><p>Dorothy kept these observations to herself. But she was beginning to wonder if her friends already had exactly what they were looking for, and simply did not know it.</p></div></div>'},
