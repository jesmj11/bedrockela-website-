{render:()=>'<div class="lesson-page-card content-page"><h2>The Journey to the Great Oz (Part 1)</h2><div><p>The next morning, they set off again on the yellow brick road. The forest was still thick around them, but the road was clear, and the four companions walked together in good spirits.</p><p>They had not gone far when they came to a great ditch that stretched across the road. It was very wide and very deep, with jagged rocks at the bottom. There was no way around it.</p><p>&quot;What shall we do?&quot; Dorothy asked.</p><p>The Scarecrow thought for a moment. &quot;We cannot fly, and we cannot climb down and back up — it&#39;s too deep. But the Lion is very large and strong. Perhaps he could jump across.&quot;</p><p>&quot;I can try,&quot; the Lion said nervously. &quot;But what about the rest of you?&quot;</p><p>&quot;You could carry us, one at a time,&quot; the Scarecrow said.</p><p>The Lion looked at the ditch. It was a terrifying distance. His legs trembled. But he crouched low, gathered all his strength, and leaped — sailing through the air and landing safely on the other side.</p><p>&quot;It wasn&#39;t so bad,&quot; he called back, though his voice shook.</p><p>He jumped back and carried the Scarecrow across first, since he was the lightest. Then Dorothy, holding Toto tightly. Finally, the Tin Woodman, who was the heaviest and made the Lion grunt with the effort. But the great beast managed it.</p><p>&quot;There,&quot; said the Scarecrow. &quot;Problem solved.&quot;</p><p>&quot;That was your idea,&quot; Dorothy told him. &quot;That was very clever.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Journey to the Great Oz (Part 2)</h2><div><p>&quot;Was it?&quot; the Scarecrow said, surprised. &quot;I suppose it just seemed like common sense.&quot;</p><p>They continued walking. The forest thinned, and patches of sunlight began to break through the leaves. Then they heard a low, rumbling growl from the trees ahead.</p><p>Two great beasts leaped onto the road — fierce, catlike creatures with long teeth and angry eyes. They snarled at the group and crouched, ready to spring.</p><p>The Cowardly Lion stepped forward.</p><p>&quot;Stay behind me,&quot; he said, and his voice came out deeper and stronger than usual. He threw back his great head and let out a roar so loud and so terrible that the leaves shook on the trees and the two beasts stopped cold. They stared at the Lion, then turned and ran back into the forest.</p><p>&quot;They&#39;re gone,&quot; the Lion said, turning around. His legs were shaking. &quot;My heart is still pounding.&quot;</p><p>&quot;You just saved us all,&quot; the Tin Woodman said.</p><p>&quot;I was terrified,&quot; the Lion admitted.</p><p>&quot;You were terrified and you did it anyway,&quot; Dorothy said. &quot;That matters more than you think.&quot;</p><p>They walked on. The forest grew lighter, and soon they emerged into open country filled with wildflowers. A sparkling river ran alongside the road, and they stopped to drink and rest.</p><p>&quot;I like this much better than the forest,&quot; the Lion said, lying down in the tall grass. &quot;The open air makes me feel braver.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Journey to the Great Oz (Part 3)</h2><div><p>&quot;You were plenty brave in the forest,&quot; Dorothy said.</p><p>The Lion shook his great mane. &quot;I was pretending.&quot;</p><p>&quot;Everyone pretends sometimes,&quot; said the Tin Woodman quietly. &quot;I pretend I do not feel sad, even though I do.&quot;</p><p>&quot;And I pretend I do not notice things,&quot; said the Scarecrow, &quot;even though I notice quite a lot.&quot;</p><p>Dorothy looked at her three friends — the one who said he had no brains, the one who said he had no heart, and the one who said he had no courage — and she thought they were the cleverest, kindest, bravest companions anyone could wish for.</p><p>&quot;We make a good team,&quot; she said.</p><p>&quot;We do,&quot; the Scarecrow agreed. &quot;Though I cannot imagine why. A girl, a man of straw, a man of tin, and a cowardly lion — we are not exactly an army.&quot;</p><p>&quot;No,&quot; Dorothy said, smiling. &quot;But we are friends. And that is better.&quot;</p><p>They rested by the river as the afternoon sun warmed them, and Toto chased butterflies through the tall grass, and for a little while, everything was peaceful.</p><p>But the yellow brick road stretched on ahead of them, and the Emerald City was still far away. There would be more dangers before they reached it.</p></div></div>'},
