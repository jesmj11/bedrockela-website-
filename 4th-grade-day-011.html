{render:()=>'<div class="lesson-page-card content-page"><h2>The Queen of the Field Mice (Part 1)</h2><div><p>Dorothy and Toto lay sleeping on the grass beyond the poppy field. The Scarecrow and the Tin Woodman stood over them, relieved that they had carried their friends to safety, but sick with worry about the Lion. He lay deep in the field of poisonous flowers, too heavy for them to move, sinking into a sleep from which he might never wake.</p><p>&quot;We must do something,&quot; the Tin Woodman said. &quot;He is our friend.&quot;</p><p>&quot;I know,&quot; the Scarecrow said. &quot;Let me think.&quot;</p><p>He thought very hard. The Scarecrow always said he had no brains, but in moments like this, his head seemed to work better than anyone&#39;s.</p><p>Just then, a wildcat burst from the tall grass, chasing a tiny field mouse. Without thinking, the Tin Woodman raised his axe and brought it down. The wildcat fell, and the mouse was saved.</p><p>The little mouse looked up at the Tin Woodman with bright, grateful eyes. &quot;You have saved my life,&quot; she said in a small, squeaking voice. &quot;I am the Queen of the Field Mice. My subjects and I are forever in your debt.&quot;</p><p>&quot;It was nothing,&quot; the Tin Woodman said, bowing low. He truly meant it — he simply could not bear to see any creature hurt.</p><p>Hundreds of mice appeared from the grass, surrounding their queen. They were tiny — no bigger than Dorothy&#39;s thumb — but there were so many of them that the ground seemed to ripple with brown fur.</p><p>The Scarecrow&#39;s eyes brightened. &quot;Your Majesty,&quot; he said, &quot;I have an idea. Our friend the Lion is trapped in the poppy field, asleep. He is far too heavy for us to carry. But if the Tin Woodman were to build a cart, could your mice pull it?&quot;</p><p>The Queen tilted her tiny head. &quot;The Lion is very large,&quot; she said. &quot;But we are very many. Yes — I believe we could do it.&quot;</p><p>The Tin Woodman set to work immediately. He was a woodcutter by trade, and even though his body was tin, his skill with an axe was extraordinary. He felled small trees, trimmed branches, and built a rough but sturdy cart in less than an hour.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Queen of the Field Mice (Part 2)</h2><div><p>Meanwhile, the Scarecrow organized the mice. He tied strings of braided grass to the cart and attached them to the mice in long rows — thousands of mice, each one pulling with all its tiny strength.</p><p>Getting the Lion onto the cart was the hardest part. He was enormous — as heavy as a boulder and completely limp. The Scarecrow pushed from behind while the Tin Woodman lifted from the side, and inch by inch, groaning and straining, they rolled the great beast onto the wooden platform.</p><p>&quot;Now,&quot; said the Queen, &quot;pull!&quot;</p><p>The mice surged forward. The cart creaked, rocked, and then began to move — slowly at first, then faster, rolling through the poppy field toward clean air. The Scarecrow walked alongside, pushing when the wheels stuck. The Tin Woodman walked on the other side, steadying the Lion when he threatened to slide off.</p><p>The poppies swayed around them, their deadly perfume thick in the air. The Scarecrow and Tin Woodman felt nothing — straw and tin do not breathe — but they moved as fast as they could for the sake of the mice, who were flesh and blood and very small.</p><p>At last, the cart rolled out of the poppy field and onto clean grass. The mice collapsed in exhaustion, their tiny sides heaving. The Lion lay on the cart, still deeply asleep, but breathing.</p><p>&quot;He will wake when the fresh air clears the poison from his lungs,&quot; the Queen said. &quot;Give him time.&quot;</p><p>&quot;Thank you,&quot; the Scarecrow said. &quot;You saved our friend&#39;s life.&quot;</p><p>&quot;And your friend saved mine,&quot; the Queen replied, nodding at the Tin Woodman. &quot;We are even. But if you ever need us again, come to this field and call. We will come.&quot;</p><p>The mice disappeared into the grass like a brown river flowing back into the earth. The Scarecrow and the Tin Woodman sat down to wait.</p><p>Dorothy woke first. She blinked in the sunlight, saw the Lion on the cart beside her, and sat up in alarm. &quot;What happened?&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Queen of the Field Mice (Part 3)</h2><div><p>The Scarecrow told her everything — the wildcat, the Queen, the cart, the rescue.</p><p>&quot;You did all that while I was asleep?&quot; Dorothy asked.</p><p>&quot;You needed saving,&quot; the Tin Woodman said simply. &quot;So we saved you.&quot;</p><p>Dorothy felt tears prick her eyes. &quot;You carried me out of the poppy field,&quot; she said. &quot;And then you saved the Lion. You did all of this without being asked.&quot;</p><p>&quot;That is what friends do,&quot; the Scarecrow said.</p><p>The Lion stirred. He opened one great eye, then the other. He yawned enormously, stretched, and looked around in confusion.</p><p>&quot;How did I get here?&quot; he asked.</p><p>&quot;A thousand mice pulled you on a cart,&quot; Dorothy said.</p><p>The Lion blinked. &quot;I must still be dreaming.&quot;</p><p>&quot;You are not,&quot; the Tin Woodman said, smiling. &quot;Welcome back.&quot;</p></div></div>'},
