y cart in less than an hour.\n\nMeanwhile, the Scarecrow organized the mice. He tied strings of braided grass to the cart and attached them to the mice in long rows — thousands of mice, each one pulling with all its tiny strength."},{"text":"Getting the Lion onto the cart was the hardest part. He was enormous — as heavy as a boulder and completely limp. The Scarecrow pushed from behind while the Tin Woodman lifted from the side, and inch by inch, groaning and straining, they rolled the great beast onto the wooden platform.\n\n\"Now,\" said the Queen, \"pull!\"\n\nThe mice surged forward. The cart creaked, rocked, and then began to move — slowly at first, then faster, rolling through the poppy field toward clean air. The Scarecrow walked alongside, pushing when the wheels stuck. The Tin Woodman walked on the other side, steadying the Lion when he threatened to slide off.\n\nThe poppies swayed around them, their deadly perfume thick in the air. The Scarecrow and Tin Woodman felt nothing — straw and tin do not breathe — but they moved as fast as they could for the sake of the mice, who were flesh and blood and very small.\n\nAt last, the cart rolled out of the poppy field and onto clean grass. The mice collapsed in exhaustion, their tiny sides heaving. The Lion lay on the cart, still deeply asleep, but breathing.\n\n\"He will wake when the fresh air clears the poison from his lungs,\" the Queen said. \"Give him time.\"\n\n\"Thank you,\" the Scarecrow said. \"You saved our friend's life.\"\n\n\"And your friend saved mine,\" the Queen replied, nodding at the Tin Woodman. \"We are even. But if you ever need us again, come to this field and call. We will come.\"\n\nThe mice disappeared into the grass like a brown river flowing back into the earth. The Scarecrow and the Tin Woodman sat down to wait.\n\nDorothy woke first. She blinked in the sunlight, saw the Lion on the cart beside her, and sat up in alarm. \"What happened?\"\n\nThe Scarecrow told her everything — the wildcat, the Queen, the cart, the rescue.\n\n\"You did all that while I was asleep?\" Dorothy asked.\n\n\"You needed saving,\" the Tin Woodman said simply. \"So we saved you.\"\n\nDorothy felt tears prick her eyes. \"You carried me out of the poppy field,\" she said. \"And then you saved the Lion. You did all of this without being asked.\"\n\n\"That is what friends do,\" the Scarecrow said.\n\nThe Lion stirred. He opened one great eye, then the other. He yawned enormously, stretched, and looked around in confusion."},{"text":"\"How did I get here?\" he asked.\n\n\"A thousand mice pulled you on a cart,\" Dorothy said.\n\nThe Lion blinked. \"I must still be dreaming.\"\n\n\"You are not,\" the Tin Woodman said, smiling. \"Welcome back.\""}]
