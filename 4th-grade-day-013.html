                            <h2>📖 Dorothy the Prisoner</h2>
                            <div style="font-size: 16px; line-height: 1.8; color: #333;">
                                <p style="margin-bottom: 15px;">The Wicked Witch of the West kept Dorothy as her prisoner. She set her to work in the kitchen — scrubbing floors, washing pots, carrying water, sweeping ashes from the great fireplace. The work was hard and the Witch was cruel, but Dorothy did not break.
Every day, Dorothy checked on the Cowardly Lion, who was locked in an iron cage in the courtyard. The Witch was trying to starve him into pulling her carriage like a horse, but the Lion refused.
"I will not serve her," the Lion said through the bars. His voice was hoarse, but his eyes were fierce. "She can keep me in this cage forever, but I will not bow to a bully."

"Or very stubborn," the Lion said. "I am not sure there is a difference."
Dorothy smiled despite everything. Even here, even caged, the Lion was still himself.
The days were long and lonely. Dorothy missed the Scarecrow's clever conversation and the Tin Woodman's gentle kindness. She missed the open road and the sunshine and the yellow brick road stretching ahead of her full of possibility. In the Witch's castle, there was no possibility. There was only the same gray routine, day after day: scrub, sweep, carry, serve.
But Dorothy watched. And Dorothy planned.
She noticed that the Witch was afraid of certain things. The Witch never went near water — she washed herself with sand and kept every door and window shut when it rained. She flinched when Dorothy carried buckets from the well, and she screamed if even a single drop splashed in her direction.
Dorothy also noticed the silver shoes. The Witch stared at them constantly — with hunger, with fear, with a desperate longing that made her one eye burn. She wanted those shoes more than anything.
One day, the Witch tried to steal them. She placed an invisible iron bar across the kitchen floor, and when Dorothy walked past carrying a bucket, she tripped and fell. One of the silver shoes flew off her foot, and the Witch snatched it up.
"Give that back!" Dorothy cried. "That is mine!"
"It is mine now," the Witch said, clutching the shoe with both hands. "And soon I will have the other one, too."
Dorothy was furious — more furious than she had ever been in her life. The silver shoes were hers. The Witch of the North had given them to her. They were the last thing she had from the beginning of her journey, the last connection to the good people who had helped her.
"You are a wicked, wicked creature," Dorothy said. "And I am not afraid of you."
The Witch laughed. But there was something nervous in her laugh, because she could see the mark shining on Dorothy's forehead — the kiss of the Witch of the North — and she knew that as long as that mark remained, she could not truly harm the girl.
Dorothy lay awake that night, stroking Toto's ears and thinking. She still had one silver shoe. The Witch had the other. The Witch was afraid of water. And tomorrow, Dorothy would have to carry water from the well again, as she did every day.
An idea was forming — not a plan, exactly, but a feeling. A sense that something was about to change.
She held Toto close and waited for morning.</p>

                        <div class="lesson-page-card content-page">
                            <h2>🌍 Informational Text: The Power of Home in Literature</h2>
                            <div style="font-size: 15px; line-height: 1.7; color: #333; margin: 20px 0;">
                                <p style="margin-bottom: 15px;">"There's no place like home" is one of the most famous lines in children's literature. But what makes home so powerful? Why does Dorothy spend the entire book trying to return to gray, dusty Kansas instead of staying in colorful, magical Oz?</p><p style="margin-bottom: 15px;">In literature, "home" represents more than a physical place. It represents belonging, identity, safety, and love. Home is where you're known and accepted. It's where you can be yourself without pretending.</p><p style="margin-bottom: 15px;">Many classic stories explore the theme of home. In Homer's "Odyssey," Odysseus spends ten years trying to return home after the Trojan War. In "The Chronicles of Narnia," children travel between worlds but always return home. In "Alice in Wonderland," Alice desperately wants to wake up and go home.</p><p style="margin-bottom: 15px;">Why do these stories resonate? Because everyone sometimes feels lost or out of place. We all long for somewhere we truly belong. Children especially understand this feeling — school, sleepovers, camps, even vacations can make you homesick.</p><p style="margin-bottom: 15px;">Dorothy's journey is interesting because Oz seems objectively better than Kansas. Oz has magic, adventure, talking animals, and beautiful sights. Kansas has gray dust, hard work, and very little joy. Yet Dorothy never wavers. She wants to go home to Aunt Em, even though Aunt Em rarely smiles.</p><p style="margin-bottom: 15px;">This teaches an important lesson: love and belonging matter more than comfort or excitement. Aunt Em and Uncle Henry are Dorothy's family. They might not express affection openly, but they're her people. She knows them, and they know her. That connection is irreplaceable.</p><p style="margin-bottom: 15px;">L. Frank Baum understood something profound: children need roots. They need to know where they come from and where they belong. Adventures are wonderful, but they're better when you have a home to return to.</p><p style="margin-bottom: 15px;">The book's ending — Dorothy waking up in Kansas, surrounded by familiar faces — brings the message home (pun intended). She's learned that she didn't need to find her way home through magic. The power was within her all along, in her love for the people waiting for her.</p><p style="margin-bottom: 15px;">Home isn't about the fanciest house or the most exciting place. Home is where love lives.</p>
