                        <p style="margin-bottom: 15px;">The Wicked Witch of the West kept Dorothy as her prisoner. She set her to work in the kitchen — scrubbing floors, washing pots, carrying water, sweeping ashes from the great fireplace. The work was hard and the Witch was cruel, but Dorothy did not break.

Dorothy smiled despite everything. Even here, even caged, the Lion was still himself.
The days were long and lonely. Dorothy missed the Scarecrow's clever conversation and the Tin Woodman's gentle kindness. She missed the open road and the sunshine and the yellow brick road stretching ahead of her full of possibility. In the Witch's castle, there was no possibility. There was only the same gray routine, day after day: scrub, sweep, carry, serve.
But Dorothy watched. And Dorothy planned.
She noticed that the Witch was afraid of certain things. The Witch never went near water — she washed herself with sand and kept every door and window shut when it rained. She flinched when Dorothy carried buckets from the well, and she screamed if even a single drop splashed in her direction.
Dorothy also noticed the silver shoes. The Witch stared at them constantly — with hunger, with fear, with a desperate longing that made her one eye burn. She wanted those shoes more than anything.
One day, the Witch tried to steal them. She placed an invisible iron bar across the kitchen floor, and when Dorothy walked past carrying a bucket, she tripped and fell. One of the silver shoes flew off her foot, and the Witch snatched it up.

"It is mine now," the Witch said, clutching the shoe with both hands. "And soon I will have the other one, too."
Dorothy was furious — more furious than she had ever been in her life. The silver shoes were hers. The Witch of the North had given them to her. They were the last thing she had from the beginning of her journey, the last connection to the good people who had helped her.
"You are a wicked, wicked creature," Dorothy said. "And I am not afraid of you."
The Witch laughed. But there was something nervous in her laugh, because she could see the mark shining on Dorothy's forehead — the kiss of the Witch of the North — and she knew that as long as that mark remained, she could not truly harm the girl.

                    <h2>🌍 Informational Text: The Power of Home in Literature</h2>
                    <div class="informational-article">
                        <p>"There's no place like home" is one of the most famous lines in children's literature. But what makes home so powerful? Why does Dorothy spend the entire book trying to return to gray, dusty Kansas instead of staying in colorful, magical Oz?</p><p>In literature, "home" represents more than a physical place. It represents belonging, identity, safety, and love. Home is where you're known and accepted. It's where you can be yourself without pretending.</p><p>Many classic stories explore the theme of home. In Homer's "Odyssey," Odysseus spends ten years trying to return home after the Trojan War. In "The Chronicles of Narnia," children travel between worlds but always return home. In "Alice in Wonderland," Alice desperately wants to wake up and go home.</p><p>Why do these stories resonate? Because everyone sometimes feels lost or out of place. We all long for somewhere we truly belong. Children especially understand this feeling — school, sleepovers, camps, even vacations can make you homesick.</p><p>Dorothy's journey is interesting because Oz seems objectively better than Kansas. Oz has magic, adventure, talking animals, and beautiful sights. Kansas has gray dust, hard work, and very little joy. Yet Dorothy never wavers. She wants to go home to Aunt Em, even though Aunt Em rarely smiles.</p><p>This teaches an important lesson: love and belonging matter more than comfort or excitement. Aunt Em and Uncle Henry are Dorothy's family. They might not express affection openly, but they're her people. She knows them, and they know her. That connection is irreplaceable.</p><p>L. Frank Baum understood something profound: children need roots. They need to know where they come from and where they belong. Adventures are wonderful, but they're better when you have a home to return to.</p><p>The book's ending — Dorothy waking up in Kansas, surrounded by familiar faces — brings the message home (pun intended). She's learned that she didn't need to find her way home through magic. The power was within her all along, in her love for the people waiting for her.</p><p>Home isn't about the fanciest house or the most exciting place. Home is where love lives.</p>
