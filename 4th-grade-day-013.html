    { render: () => '<div class="lesson-page-card content-page"><h2>The Guardian of the Gates (Part 1)</h2><div><p>They rested in the grass until everyone felt strong again. Then they stood and looked ahead. The yellow brick road climbed a gentle hill, and beyond the hill, something sparkled in the distance — bright and green and impossibly dazzling, like a jewel set into the earth.</p><p>"The Emerald City," the Scarecrow whispered.</p><p>They hurried forward. With every step, the sparkle grew brighter and more magnificent. Soon they could see the great wall that surrounded the city, studded with emeralds that caught the sunlight and threw it back in brilliant green flashes. The wall was very tall, and behind it, towers and spires rose into the sky, gleaming like they were made of solid light.</p><p>"I have never seen anything so beautiful," the Tin Woodman said.</p><p>"Neither have I," said the Lion, and for once, he did not seem afraid of anything.</p><p>At the gate stood a small man dressed entirely in green — green clothes, green shoes, even green whiskers that curled at the tips. He had sharp, intelligent eyes and a serious expression.</p><p>"What do you wish in the Emerald City?" he asked.</p><p>"We have come to see the great Oz," Dorothy said.</p><p>The man's eyes widened. "Oz? No one has asked to see Oz in many years. He is very powerful and very terrible. If you come on a foolish errand, he may destroy you."</p><p>"It is not a foolish errand," Dorothy said. She stood up straight and looked the man in the eye. "I need to get home."</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>The Guardian of the Gates (Part 2)</h2><div><p>The Guardian studied her — her dusty dress, her silver shoes, the shining mark on her forehead where the Witch of the North had kissed her. He studied the Scarecrow, the Tin Woodman, and the great Lion. He studied Toto, who wagged his tail.</p><p>"Very well," the Guardian said at last. "But you must wear these spectacles inside the city. Everyone who enters the Emerald City must wear them, by order of Oz."</p><p>He opened a large box filled with green-tinted spectacles of every size. He found pairs for each of them — even Toto, whose tiny spectacles made him look very dignified — and locked them onto their heads with a small golden key.</p><p>"Why must we wear them?" Dorothy asked.</p><p>"If you did not," the Guardian said, "the brightness and glory of the Emerald City would blind you. The city is so dazzling that no one can look upon it with unprotected eyes."</p><p>He turned the key in the great lock, and the gate swung open.</p><p>Dorothy gasped.</p><p>Everything was green. The streets were green marble. The houses were built of green stone with green glass windows. The sky itself seemed to glow with emerald light through the tinted spectacles. People walked by in green velvet and green silk, eating green candy, selling green lemonade from green carts. A green dog trotted past, followed by a green cat. Even the sun seemed to shine green.</p><p>"It's incredible," Dorothy breathed.</p><p>The Tin Woodman's tin body reflected green light in every direction. The Lion's golden mane looked almost emerald. The Scarecrow's painted face glowed.</p></div></div>' },
