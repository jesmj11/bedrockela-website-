{render:()=>'<div class="lesson-page-card content-page"><h2>The Great and Terrible Oz (Part 1)</h2><div><p>A soldier with a long green beard led them through the gleaming streets to the Palace of Oz. The palace was the grandest building Dorothy had ever seen — towering green walls, emerald-studded gates, and corridors so bright they seemed to glow from within.</p><p>&quot;The great Oz will see you,&quot; the soldier told them, &quot;but only one at a time. Who will go first?&quot;</p><p>&quot;I will,&quot; said Dorothy.</p><p>The soldier led her into a vast, round room. The ceiling was so high she could barely see it. The walls were covered with emeralds, and in the center of the room stood an enormous throne made of green marble.</p><p>On the throne sat nothing but a giant head.</p><p>It had no body, no arms, no legs — just an enormous head, bigger than the head of the biggest giant. It had no hair, and its eyes rolled slowly, looking down at Dorothy. Its mouth moved.</p><p>&quot;I am Oz, the Great and Terrible,&quot; the head said in a voice that echoed through the chamber. &quot;Who are you, and why do you seek me?&quot;</p><p>Dorothy&#39;s knees trembled, but she took a breath and spoke clearly. &quot;I am Dorothy, the small and meek. I have come to ask you to send me back to Kansas, where my Aunt Em and Uncle Henry are. I do not like your country, although it is so beautiful. And I am sure Aunt Em must be terribly worried about me.&quot;</p><p>The eyes on the great head blinked slowly. &quot;Where did you get those silver shoes?&quot; the voice boomed.</p><p>&quot;From the Wicked Witch of the East. My house fell on her when the cyclone brought me here.&quot;</p><p>&quot;And where did you get that mark on your forehead?&quot;</p><p>Dorothy touched the spot where the Witch of the North had kissed her. &quot;The Witch of the North kissed me when she said goodbye and sent me to you.&quot;</p><p>The great head was silent for a long time. Then it spoke. &quot;I will help you — but only if you do something for me first.&quot;</p><p>&quot;What must I do?&quot; Dorothy asked.</p><p>&quot;You must kill the Wicked Witch of the West.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Great and Terrible Oz (Part 2)</h2><div><p>Dorothy&#39;s heart sank. &quot;But I cannot!&quot; she cried. &quot;I am just a girl. I have never killed anything in my life, and I do not want to start now.&quot;</p><p>&quot;The Wicked Witch of the West is the only truly wicked creature left in this land,&quot; the great head said. &quot;You wear the silver shoes that hold her sister&#39;s power. You bear the mark of the Witch of the North&#39;s kiss, which protects you. You are stronger than you know. Kill the Witch, and I will send you home.&quot;</p><p>Dorothy left the throne room with tears in her eyes.</p><p>The Scarecrow went next. When he entered the great room, the throne was empty. Instead, a beautiful fairy floated in the air above it, with shimmering wings and a crown of jewels.</p><p>&quot;I am Oz, the Great and Terrible,&quot; the fairy said. &quot;Why do you seek me?&quot;</p><p>&quot;I want brains,&quot; the Scarecrow said. &quot;My head is stuffed with straw, and I wish to have real brains so I can think properly.&quot;</p><p>&quot;Kill the Wicked Witch of the West,&quot; the fairy said, &quot;and I will give you brains — the finest brains in the land of Oz.&quot;</p><p>The Tin Woodman went third. He found on the throne a terrible beast, covered in thick fur, with the head of a rhinoceros and five long arms. Five eyes of flame stared down at him.</p><p>&quot;I am Oz, the Great and Terrible,&quot; the beast growled. &quot;Why do you seek me?&quot;</p><p>&quot;I want a heart,&quot; the Tin Woodman said. &quot;I am made of tin and cannot feel. I want to love and be loved.&quot;</p><p>&quot;Kill the Wicked Witch of the West,&quot; the beast said, &quot;and I will give you a heart.&quot;</p><p>The Cowardly Lion went last. When he entered, the throne held nothing but a ball of fire, so bright and fierce that he could barely look at it. The room was unbearably hot.</p><p>&quot;I am Oz, the Great and Terrible,&quot; the fire roared. &quot;Why do you seek me?&quot;</p><p>&quot;I — I want courage,&quot; the Lion stammered, crouching low. &quot;I am a coward, and I want to be brave.&quot;</p><p>&quot;Kill the Wicked Witch of the West,&quot; the fire blazed, &quot;and I will give you courage.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Great and Terrible Oz (Part 3)</h2><div><p>The four companions gathered in a hallway afterward and compared their experiences.</p><p>&quot;He appeared as a giant head to me,&quot; Dorothy said.</p><p>&quot;A beautiful fairy to me,&quot; the Scarecrow said.</p><p>&quot;A terrible beast to me,&quot; the Tin Woodman said.</p><p>&quot;A ball of fire to me,&quot; the Lion said.</p><p>They stared at each other.</p><p>&quot;Why would he look different to each of us?&quot; the Scarecrow asked slowly.</p><p>No one had an answer. But a seed of doubt had been planted, and it sat quietly in each of their minds.</p><p>&quot;He wants us to kill the Wicked Witch,&quot; Dorothy said unhappily. &quot;How can we possibly do that?&quot;</p><p>&quot;We must try,&quot; the Scarecrow said. &quot;It is the only way to get what we need.&quot;</p><p>&quot;I do not like it,&quot; the Tin Woodman said. &quot;But Dorothy needs to get home. So we will go.&quot;</p><p>&quot;Together,&quot; the Lion said. His voice shook, but he said it anyway. &quot;We will go together.&quot;</p><p>Dorothy looked at her friends — the Scarecrow standing tall, the Tin Woodman gripping his axe, the Lion trembling but determined — and she felt something warm spread through her chest.</p><p>&quot;Together,&quot; she agreed.</p></div></div>'},
