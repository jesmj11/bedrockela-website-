{render:()=>'<div class="lesson-page-card content-page"><h2>Dorothy the Prisoner (Part 1)</h2><div><p>The Wicked Witch of the West kept Dorothy as her prisoner. She set her to work in the kitchen — scrubbing floors, washing pots, carrying water, sweeping ashes from the great fireplace. The work was hard and the Witch was cruel, but Dorothy did not break.</p><p>Every day, Dorothy checked on the Cowardly Lion, who was locked in an iron cage in the courtyard. The Witch was trying to starve him into pulling her carriage like a horse, but the Lion refused.</p><p>&quot;I will not serve her,&quot; the Lion said through the bars. His voice was hoarse, but his eyes were fierce. &quot;She can keep me in this cage forever, but I will not bow to a bully.&quot;</p><p>&quot;That is very brave of you,&quot; Dorothy said, pushing food through the bars. She had saved scraps from the kitchen — bread, vegetables, a few pieces of meat she had hidden in her apron.</p><p>&quot;Or very stubborn,&quot; the Lion said. &quot;I am not sure there is a difference.&quot;</p><p>Dorothy smiled despite everything. Even here, even caged, the Lion was still himself.</p><p>The days were long and lonely. Dorothy missed the Scarecrow&#39;s clever conversation and the Tin Woodman&#39;s gentle kindness. She missed the open road and the sunshine and the yellow brick road stretching ahead of her full of possibility. In the Witch&#39;s castle, there was no possibility. There was only the same gray routine, day after day: scrub, sweep, carry, serve.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Dorothy the Prisoner (Part 2)</h2><div><p>But Dorothy watched. And Dorothy planned.</p><p>She noticed that the Witch was afraid of certain things. The Witch never went near water — she washed herself with sand and kept every door and window shut when it rained. She flinched when Dorothy carried buckets from the well, and she screamed if even a single drop splashed in her direction.</p><p>Dorothy also noticed the silver shoes. The Witch stared at them constantly — with hunger, with fear, with a desperate longing that made her one eye burn. She wanted those shoes more than anything.</p><p>One day, the Witch tried to steal them. She placed an invisible iron bar across the kitchen floor, and when Dorothy walked past carrying a bucket, she tripped and fell. One of the silver shoes flew off her foot, and the Witch snatched it up.</p><p>&quot;Give that back!&quot; Dorothy cried. &quot;That is mine!&quot;</p><p>&quot;It is mine now,&quot; the Witch said, clutching the shoe with both hands. &quot;And soon I will have the other one, too.&quot;</p><p>Dorothy was furious — more furious than she had ever been in her life. The silver shoes were hers. The Witch of the North had given them to her. They were the last thing she had from the beginning of her journey, the last connection to the good people who had helped her.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Dorothy the Prisoner (Part 3)</h2><div><p>&quot;You are a wicked, wicked creature,&quot; Dorothy said. &quot;And I am not afraid of you.&quot;</p><p>The Witch laughed. But there was something nervous in her laugh, because she could see the mark shining on Dorothy&#39;s forehead — the kiss of the Witch of the North — and she knew that as long as that mark remained, she could not truly harm the girl.</p><p>Dorothy lay awake that night, stroking Toto&#39;s ears and thinking. She still had one silver shoe. The Witch had the other. The Witch was afraid of water. And tomorrow, Dorothy would have to carry water from the well again, as she did every day.</p><p>An idea was forming — not a plan, exactly, but a feeling. A sense that something was about to change.</p><p>She held Toto close and waited for morning.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. Why is the Wicked Witch afraid of Dorothy?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. Even as a prisoner, Dorothy sneaks food to the Lion and refuses to give up. Where do you think her strength comes from? Is Dorothy brave in the same way as the Lion, or is her courage different?</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
