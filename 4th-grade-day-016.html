he placed an invisible iron bar across the kitchen floor, and when Dorothy walked past carrying a bucket, she tripped and fell. One of the silver shoes flew off her foot, and the Witch snatched it up.\n\n\"Give that back!\" Dorothy cried. \"That is mine!\""},{"text":"\"It is mine now,\" the Witch said, clutching the shoe with both hands. \"And soon I will have the other one, too.\"\n\nDorothy was furious — more furious than she had ever been in her life. The silver shoes were hers. The Witch of the North had given them to her. They were the last thing she had from the beginning of her journey, the last connection to the good people who had helped her.\n\n\"You are a wicked, wicked creature,\" Dorothy said. \"And I am not afraid of you.\"\n\nThe Witch laughed. But there was something nervous in her laugh, because she could see the mark shining on Dorothy's forehead — the kiss of the Witch of the North — and she knew that as long as that mark remained, she could not truly harm the girl.\n\nDorothy lay awake that night, stroking Toto's ears and thinking. She still had one silver shoe. The Witch had the other. The Witch was afraid of water. And tomorrow, Dorothy would have to carry water from the well again, as she did every day.\n\nAn idea was forming — not a plan, exactly, but a feeling. A sense that something was about to change.\n\nShe held Toto close and waited for morning."}]
