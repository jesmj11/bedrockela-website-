                        <p style="margin-bottom: 15px;">The next morning, the little man who called himself Oz sent for the Scarecrow.
"I cannot give you real brains," the man said. "But I can give you something that might work just as well."

The Scarecrow did not hear this. He was too busy thinking.
Next came the Tin Woodman. The man cut a small hole in the Tin Woodman's chest and placed inside it a pretty heart made of red silk, stuffed with sawdust.
"Is it a real heart?" the Tin Woodman asked, pressing his hand against his chest.
"It is a very kind heart," the man said. "And that is what matters."
A tear rolled down the Tin Woodman's cheek. "I can feel it beating," he said. "I am so happy."
"You were always kind," the man said. "The heart is just a reminder."
But the Tin Woodman was too moved to listen. He stood with his hand on his chest, feeling the silk heart shift inside him, and he smiled wider than Dorothy had ever seen him smile.
Last came the Cowardly Lion. The man poured a green liquid into a golden dish.
"Drink this," the man said.
"What is it?" the Lion asked nervously.
"Courage," the man said. "Pure, liquid courage. It has been in my cupboard for years. Drink it, and you will be full of courage."
The Lion lapped it up. He stood taller immediately. His mane seemed to bristle with new energy. His eyes grew bright and fierce.
"I feel brave!" the Lion roared. "I feel like I could fight a hundred enemies!"
"You always could," the man said. "You simply did not believe it."
Dorothy watched all of this with mixed feelings. She was happy for her friends — truly happy. The Scarecrow was walking around making observations about everything, delighted with his "new" brains. The Tin Woodman was so full of feeling that he cried every few minutes and had to be oiled. The Lion strutted through the palace like a king.
But Dorothy knew the truth. The brains were bran and pins. The heart was silk and sawdust. The courage was colored water. The man from Omaha had given them symbols, not magic.
And yet — her friends were different. Not because the gifts had changed them, but because they finally believed in themselves. The Scarecrow had always been clever. The Tin Woodman had always been kind. The Lion had always been brave. They just needed someone to tell them so.
Was that magic? Dorothy was not sure. But it worked.
"Now," Dorothy said, turning to the man. "What about me? How will you send me home?"

Dorothy understood that feeling perfectly.

                    <h2>🌍 Informational Text: The Science of Color: Why Green?</h2>
                    <div class="informational-article">
                        <p>The Emerald City's signature color isn't just a random choice — green has specific psychological and cultural meanings that enhance the story's themes.</p><p>In color psychology, green represents:
- **Growth and renewal**: Plants turn green when they're healthy and growing
- **Hope and prosperity**: In many cultures, green symbolizes good fortune
- **Envy**: We say people are "green with envy" when they want what others have
- **Money**: American dollars are green, linking green to wealth and economic power
- **Nature and life**: Green is the color of forests, meadows, and living things</p><p>L. Frank Baum used color symbolism throughout Oz. Each region has a signature color:
- **Blue** (Munchkin Country): Loyalty, peace, sadness
- **Yellow** (Winkie Country): Sunshine, happiness, warning
- **Red** (Quadling Country): Passion, energy, danger
- **Purple/Green** (Gillikin Country): Royalty, mystery, magic
- **Green** (Emerald City): Wealth, power, illusion</p><p>The Emerald City's green represents the illusion of prosperity. Everyone wears green-tinted glasses that make everything appear emerald. This creates a false sense of wealth and grandeur. The city looks rich and powerful, but it's partially an illusion maintained by controlling how people see.</p><p>This is a clever commentary on perception versus reality. Our eyes can be deceived by color. Retailers know this — they use colors to influence shopping behavior. Red makes people feel urgency (that's why sale signs are red). Blue builds trust (that's why banks use it). Green suggests health and freshness (grocery stores use it for organic products).</p><p>The Wizard of Oz teaches us to question what we see. Just because something appears a certain way doesn't mean it IS that way. The green spectacles are a metaphor for how easily our perceptions can be manipulated.</p><p>Modern science confirms that color affects mood and behavior. Studies show that:
- Green reduces stress and promotes calmness
- It improves concentration and productivity
- Green environments help people feel more relaxed
- It can even reduce pain perception in medical settings</p><p>So when Dorothy enters the Emerald City, the green isn't just pretty — it's psychologically soothing. It makes the city feel safe and prosperous, even if that feeling is partly manufactured.</p><p>The lesson? Be aware of how your environment influences your perceptions. Question whether you're seeing things as they really are, or as someone wants you to see them. And remember: the glasses can be removed.</p>
