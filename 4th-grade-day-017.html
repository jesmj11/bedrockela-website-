{render:()=>'<div class="lesson-page-card content-page"><h2>The Melting of the Witch (Part 1)</h2><div><p>The next morning, Dorothy filled her bucket at the well and carried it into the kitchen. The Witch was waiting for her, wearing the stolen silver shoe on one foot and nothing on the other. She was in a foul mood.</p><p>&quot;Scrub faster!&quot; the Witch snapped. &quot;And when you are finished with the kitchen, scrub the hallway. And when you are finished with the hallway, scrub the stairs. I want every stone in this castle clean enough to eat from.&quot;</p><p>Dorothy scrubbed. The water sloshed in the bucket, and the Witch kept her distance, watching from the doorway with her one terrible eye.</p><p>It happened quickly.</p><p>The Witch lunged forward, trying to snatch the second silver shoe from Dorothy&#39;s foot. Dorothy jumped back. The bucket tipped. Water splashed across the floor — and across the Witch.</p><p>The Witch screamed.</p><p>It was not a scream of anger. It was a scream of pure terror.</p><p>&quot;What have you done?&quot; the Witch shrieked. She was shrinking. Her black robes were collapsing around her. Her body was dissolving, melting away like brown sugar in the rain. &quot;Don&#39;t you know that water will be the end of me?&quot;</p><p>&quot;I didn&#39;t know!&quot; Dorothy cried, her heart hammering. &quot;I&#39;m sorry!&quot;</p><p>&quot;I have been wicked in my day,&quot; the Witch wailed, her voice fading as she grew smaller and smaller. &quot;But I never thought a little girl would be the end of me. Oh — I&#39;m melting! Melting! What a world... what a world...&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Melting of the Witch (Part 2)</h2><div><p>Her voice trailed off into nothing. Where the Wicked Witch of the West had stood, there was now only a brown puddle on the kitchen floor and a pointed black hat floating in it.</p><p>Dorothy stood very still. The kitchen was silent. Toto crept out from under the table and sniffed at the puddle. Even he seemed surprised.</p><p>&quot;It was an accident,&quot; Dorothy whispered. She had not meant to do it. She had been carrying water, and the Witch had lunged, and the bucket had tipped. That was all.</p><p>She picked up the silver shoe from the brown puddle, wiped it clean, and put it back on her foot. Both silver shoes were hers again.</p><p>Then Dorothy took a deep breath and walked out of the kitchen.</p><p>She found the Winkies in the courtyard. They were the people of the western land — small, quiet, frightened people who had served the Witch for years out of terror. They had watched Dorothy go into the kitchen carrying a bucket of water and heard the Witch&#39;s scream.</p><p>&quot;The Witch is dead,&quot; Dorothy told them.</p><p>For a moment, no one moved. Then one Winkie began to cry. Then another. Then they were all crying and laughing at the same time, hugging each other and jumping up and down. Years of fear and cruelty dissolved in an instant, like the Witch herself.</p><p>Dorothy ran to the Lion&#39;s cage and broke the lock. The great beast bounded out, stretching his cramped legs and shaking his mane.</p><p>&quot;Is it true?&quot; the Lion asked. &quot;She is really gone?&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Melting of the Witch (Part 3)</h2><div><p>&quot;She is really gone,&quot; Dorothy said.</p><p>&quot;Then we must find the Scarecrow and the Tin Woodman,&quot; the Lion said. &quot;We must put our friends back together.&quot;</p><p>The Winkies were eager to help. They sent their best tinsmiths to find the Tin Woodman on the rocks where the Winged Monkeys had dropped him. He was badly dented — his arms bent at wrong angles, his legs twisted, one side of his body nearly flat. But the tinsmiths were the finest in Oz, and they worked for three days, hammering and shaping and polishing, until the Tin Woodman looked almost as good as new.</p><p>When he opened his eyes and saw Dorothy, a tear rolled down his cheek. &quot;I thought I would never see you again,&quot; he said.</p><p>&quot;Don&#39;t cry,&quot; Dorothy said, reaching for the oil can. &quot;You&#39;ll rust.&quot;</p><p>&quot;Some tears are worth the rust,&quot; the Tin Woodman said.</p><p>The Winkies found the Scarecrow&#39;s clothes in the top of a tall tree, empty and flat. They stuffed him with fresh, clean straw — the finest straw in the western land — and sewed him up carefully. When his painted eyes blinked open, the Scarecrow looked around and said, &quot;Well. That was thoroughly unpleasant. But I must say, new straw feels wonderful. The old straw was getting quite lumpy.&quot;</p><p>Dorothy threw her arms around him. Then around the Tin Woodman. Then around the Lion. Toto barked and ran in circles around all of them.</p><p>They were together again. And the Wicked Witch was gone.</p><p>&quot;Now,&quot; Dorothy said, &quot;let us go back to the Emerald City and tell Oz.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. How is the Wicked Witch destroyed?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. The most powerful villain in the story is destroyed by an accident — a bucket of water. Dorothy did not plan it or mean to do it. What might the author be saying about the nature of wicked power? Is it as strong as it seems?</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
