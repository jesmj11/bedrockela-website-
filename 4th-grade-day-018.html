wn puddle, wiped it clean, and put it back on her foot. Both silver shoes were hers again.\n\nThen Dorothy took a deep breath and walked out of the kitchen."},{"text":"She found the Winkies in the courtyard. They were the people of the western land — small, quiet, frightened people who had served the Witch for years out of terror. They had watched Dorothy go into the kitchen carrying a bucket of water and heard the Witch's scream.\n\n\"The Witch is dead,\" Dorothy told them.\n\nFor a moment, no one moved. Then one Winkie began to cry. Then another. Then they were all crying and laughing at the same time, hugging each other and jumping up and down. Years of fear and cruelty dissolved in an instant, like the Witch herself.\n\nDorothy ran to the Lion's cage and broke the lock. The great beast bounded out, stretching his cramped legs and shaking his mane.\n\n\"Is it true?\" the Lion asked. \"She is really gone?\"\n\n\"She is really gone,\" Dorothy said.\n\n\"Then we must find the Scarecrow and the Tin Woodman,\" the Lion said. \"We must put our friends back together.\"\n\nThe Winkies were eager to help. They sent their best tinsmiths to find the Tin Woodman on the rocks where the Winged Monkeys had dropped him. He was badly dented — his arms bent at wrong angles, his legs twisted, one side of his body nearly flat. But the tinsmiths were the finest in Oz, and they worked for three days, hammering and shaping and polishing, until the Tin Woodman looked almost as good as new.\n\nWhen he opened his eyes and saw Dorothy, a tear rolled down his cheek. \"I thought I would never see you again,\" he said.\n\n\"Don't cry,\" Dorothy said, reaching for the oil can. \"You'll rust.\"\n\n\"Some tears are worth the rust,\" the Tin Woodman said.\n\nThe Winkies found the Scarecrow's clothes in the top of a tall tree, empty and flat. They stuffed him with fresh, clean straw — the finest straw in the western land — and sewed him up carefully. When his painted eyes blinked open, the Scarecrow looked around and said, \"Well. That was thoroughly unpleasant. But I must say, new straw feels wonderful. The old straw was getting quite lumpy.\"\n\nDorothy threw her arms around him. Then around the Tin Woodman. Then around the Lion. Toto barked and ran in circles around all of them.\n\nThey were together again. And the Wicked Witch was gone.\n\n\"Now,\" Dorothy said, \"let us go back to the Emerald City and tell Oz.\""}]
