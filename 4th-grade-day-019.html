{render:()=>'<div class="lesson-page-card content-page"><h2>The Winged Monkeys (Part 1)</h2><div><p>On the journey back to the Emerald City, Dorothy reached into her basket and pulled out the golden cap she had found in the Witch&#39;s castle.</p><p>&quot;What a curious thing,&quot; she said, turning it over in her hands. It was soft and beautiful, with a circle of diamonds and rubies around the brim.</p><p>&quot;That is the Golden Cap,&quot; the Lion said. &quot;I have heard stories about it. Whoever wears it can command the Winged Monkeys three times.&quot;</p><p>&quot;The Winged Monkeys?&quot; Dorothy shuddered. She remembered all too well how they had battered the Tin Woodman, scattered the Scarecrow, and caged the Lion. &quot;I don&#39;t want anything to do with them.&quot;</p><p>&quot;But they are not evil,&quot; the Lion said. &quot;They are bound by the cap&#39;s magic. They must obey whoever wears it. The Witch commanded them because she had the cap. Now you have it.&quot;</p><p>Dorothy looked at the cap doubtfully. &quot;I suppose we could use them to fly us back to the Emerald City. The road is so long, and we are all tired.&quot;</p><p>&quot;That is a very clever idea,&quot; the Scarecrow said.</p><p>Dorothy put on the Golden Cap and spoke the magic words that were written inside the brim. The sky darkened, the wind picked up, and with a great rushing of wings, the Winged Monkeys appeared — dozens of them, circling overhead.</p><p>Their leader landed before Dorothy and bowed. &quot;What do you command?&quot; he asked.</p><p>&quot;Please carry us to the Emerald City,&quot; Dorothy said.</p><p>&quot;It shall be done,&quot; said the monkey king.</p><p>The monkeys lifted the travelers gently into the air. Dorothy rode on the back of the king himself, with Toto in her lap. The Scarecrow and the Tin Woodman were each carried by four monkeys, and eight strong monkeys bore the heavy Lion between them.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Winged Monkeys (Part 2)</h2><div><p>As they flew, Dorothy looked down at the beautiful land of Oz spread below her — the green fields, the sparkling rivers, the dark forests, and far behind them, the gray ruins of the Witch&#39;s castle. Ahead, the Emerald City gleamed like a jewel.</p><p>&quot;May I ask you something?&quot; Dorothy said to the monkey king.</p><p>&quot;Of course.&quot;</p><p>&quot;Why did you serve the Wicked Witch? Were you afraid of her?&quot;</p><p>The monkey king sighed. &quot;It is a long story,&quot; he said. &quot;We Winged Monkeys were once free — the happiest creatures in all of Oz. We played and flew and caused mischief wherever we went. But long ago, my grandfather played a prank on a powerful sorceress, and she was furious. She enchanted the Golden Cap and bound our people to obey whoever wore it, three times for each owner.&quot;</p><p>&quot;That seems like a harsh punishment for a prank,&quot; Dorothy said.</p><p>&quot;Wait,&quot; Dorothy said. &quot;You said she drove the Wizard away? The great and powerful Oz?&quot;</p><p>&quot;Yes,&quot; the monkey king said. &quot;The Wizard was afraid of us. He fled back to his Emerald City and never returned to the west.&quot;</p><p>Dorothy thought about this. The great and powerful Oz — afraid of monkeys? That did not sound like someone who was truly all-powerful.</p><p>She tucked this information away and said nothing to the others. But it added to the doubt that had been growing in her mind since the throne room, where the Wizard had appeared in four different forms.</p><p>The monkeys set them down gently before the gates of the Emerald City. The leader bowed once more.</p><p>&quot;You have two commands remaining,&quot; he told Dorothy. &quot;Call us when you need us.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Winged Monkeys (Part 3)</h2><div><p>Then the Winged Monkeys soared back into the sky and vanished.</p><p>Dorothy tucked the Golden Cap into her basket and straightened her dress. &quot;Well,&quot; she said, &quot;let us go tell the Wizard that we have done what he asked.&quot;</p><p>The Guardian of the Gates gave them their green spectacles, and they walked once more through the gleaming streets to the Palace of Oz. The green-bearded soldier led them to the great throne room.</p><p>&quot;We have killed the Wicked Witch of the West,&quot; Dorothy announced to the empty room. &quot;We have come to claim your promises.&quot;</p><p>There was no answer. The throne sat empty.</p><p>&quot;Come back tomorrow,&quot; a voice boomed from nowhere. &quot;The Wizard is busy.&quot;</p><p>&quot;Busy?&quot; the Scarecrow said. &quot;We killed a witch for him, and he is busy?&quot;</p><p>&quot;Come back tomorrow,&quot; the voice repeated.</p><p>They had no choice. They returned to their rooms in the palace, disappointed but not defeated.</p><p>&quot;He will see us tomorrow,&quot; Dorothy said. &quot;And when he does, he will keep his word.&quot;</p><p>But as she lay in bed that night, stroking Toto&#39;s ears, Dorothy thought about what the monkey king had told her. A wizard who was afraid of monkeys. A wizard who looked different to everyone. A wizard who hid behind a locked door and a booming voice.</p><p>Something was not right. And tomorrow, Dorothy intended to find out what it was.</p></div></div>'},
