                        <div class="lesson-page-card content-page">
                            <h2>📖 The Country of the Quadlings</h2>
                            <div style="font-size: 16px; line-height: 1.8; color: #333;">
                                <p style="margin-bottom: 15px;">South of the china country, the land changed again. The wild forest gave way to gentle, rolling hills covered in soft red grass and dotted with red flowers. The houses they passed were painted red, and the fences were red, and the people they met wore red clothes and had kind, cheerful faces.
"This must be the country of the Quadlings," the Scarecrow said. "Just as the Munchkins love blue, the Quadlings love red."
The people they met were friendly and welcoming. When Dorothy asked the way to Glinda's castle, they smiled and pointed south. "Follow the road," they said. "You cannot miss it. Glinda's castle is the most beautiful building in all of Oz."
They were right.
The castle rose from a hill like something out of a dream. Its walls were deep red, studded with rubies that caught the afternoon sun and threw light in every direction. Three young women in red uniforms stood guard at the gates, and behind them, Dorothy could see gardens filled with red roses and paths of smooth red stone.
"State your business," one of the guards said.
"My name is Dorothy, and I have come to ask Glinda for help getting home to Kansas."
The guard studied her for a moment, then nodded. "Glinda will see you. She has been expecting you."
"Expecting us?" Dorothy said, surprised. But the guards were already leading them through the gates and into the castle.
The throne room was nothing like the Wizard's. There was no booming voice, no locked doors, no tricks. The room was open and airy, filled with light from tall windows, and on a throne of rubies sat a woman of extraordinary beauty.
Glinda had red hair that fell in curls to her shoulders, and eyes that were a deep, warm blue. She wore a white gown — pure white, in a country of red — and her smile was so genuine that Dorothy felt, for the first time in a long while, completely safe.
"Welcome, Dorothy," Glinda said. Her voice was gentle but strong, like a bell. "I know who you are, and I know what you have done. You killed the Wicked Witch of the East with your house and the Wicked Witch of the West with your bucket. The land of Oz owes you a great debt."
"I didn't mean to kill anyone," Dorothy said. "Both times were accidents."
"Sometimes the most important things happen by accident," Glinda said, smiling. "Now, tell me what you wish."
"I want to go home," Dorothy said. "I want to go back to Kansas, to Uncle Henry and Aunt Em. I love Oz, and I love my friends, but Kansas is my home, and I miss it."
"Even though Kansas is gray?" Glinda asked. There was no judgment in the question — only curiosity.
"Even though Kansas is gray," Dorothy said. "Home is not about what a place looks like. It is about the people who love you."
Glinda nodded slowly. "You are wiser than you know, Dorothy. But before I help you, let me help your friends. Each of them has somewhere to go, too."
She turned to the Scarecrow. "The people of the Emerald City love you and want you to rule them. Will you return and be their leader?"
The Scarecrow straightened up. "I will," he said. "I have brains now, and I will use them to govern wisely."
She turned to the Tin Woodman. "The Winkies of the western land have asked me to find them a ruler. They loved how you protected Dorothy, and they want you to be their emperor. Will you go?"
The Tin Woodman pressed his hand to his chest. "Emperor?" he said. "Of the Winkies?" His tin eyes shone. "I would be honored. I will rule them with all the kindness in my heart."
She turned to the Lion. "The animals of the great forest south of here have no king. They need someone brave and strong to protect them. Will you return and rule them?"
The Lion lifted his great head. "I will," he said. "I will be the bravest king the forest has ever known."
Dorothy looked at her three friends — each of them standing tall, each of them ready for the life ahead of them — and she felt a deep, bittersweet pride. They had come so far. The Scarecrow who could not stand without falling. The Tin Woodman who cried every time he felt anything. The Lion who trembled at his own shadow. They were not those creatures anymore.
"But how will they get to their new homes?" Dorothy asked.
"The Golden Cap," Glinda said. "You still have it, yes?"
Dorothy took the cap from her basket. "I have two commands left."

Glinda smiled. "Give the cap to me. I will use the final command to set the Winged Monkeys free, so they will never be slaves again."
Dorothy's heart swelled. "Yes," she said. "They deserve to be free."
"Now," said Glinda, leaning forward, "let me tell you about the silver shoes."</p>

                                <p style="font-size: 14px; color: #666; margin-bottom: 15px;"><strong>Hint:</strong> Real power does not need to hide or trick people. The Wizard needed tricks BECAUSE he had no real power. Glinda needs no tricks because she does.</p>

                        <div class="lesson-page-card content-page">
                            <h2>🌍 Informational Text: Magic and Science: Where Do They Meet?</h2>
                            <div style="font-size: 15px; line-height: 1.7; color: #333; margin: 20px 0;">
                                <p style="margin-bottom: 15px;">The Wizard of Oz exists in a fascinating middle ground between magic and science. Oz appears to be a magical world — witches cast spells, monkeys fly, and animals talk. Yet the "Wizard" himself admits he has no magic at all. He's a scientist of sorts, using tricks and technology to create illusions.</p><p style="margin-bottom: 15px;">This blend reflects the era when the book was written. The late 1800s and early 1900s were a time of incredible scientific advancement:
- Electric lights were replacing candles and oil lamps
- Telephones let people talk across long distances
- X-rays revealed the inside of the human body
- Automobiles were beginning to replace horses
- Motion pictures showed images that seemed to move</p><p style="margin-bottom: 15px;">To people unfamiliar with these technologies, they seemed like magic. Imagine seeing electric light for the first time if you'd only known candles! Or hearing someone's voice through a telephone! These innovations must have felt supernatural.</p><p style="margin-bottom: 15px;">The Wizard represents this blending of science and magic. His "magic" tricks are actually:
- Projection systems (making his giant head appear)
- Speakers and acoustics (amplifying his voice)
- Costumes and props (appearing as different forms)
- Chemistry (creating smoke and fire effects)
- Mechanical engineering (operating his machines)</p><p style="margin-bottom: 15px;">He's essentially a special effects artist creating convincing illusions. In our modern world of CGI and smartphones, his tricks seem simple. But in Oz — a pre-technological society — they're indistinguishable from magic.</p><p style="margin-bottom: 15px;">Arthur C. Clarke, a famous science fiction author, once said: "Any sufficiently advanced technology is indistinguishable from magic." The Wizard of Oz proves this point. His late-19th-century technology seems magical in Oz's medieval-style society.</p><p style="margin-bottom: 15px;">But Baum also includes genuine magic. The Good Witches truly have powers. The silver slippers are genuinely magical. The Wicked Witch can command wolves, crows, and bees. This magic exists alongside the Wizard's fake magic.</p><p style="margin-bottom: 15px;">The story suggests an important distinction:
- **Real magic** comes from within (courage, wisdom, love, loyalty)
- **Fake magic** comes from tricks and illusions (smoke, mirrors, costumes)
- **Science** can seem like magic when it's not understood</p><p style="margin-bottom: 15px;">Dorothy's journey is about discovering that real magic — the kind that changes lives — isn't about spells or wizards. It's about qualities like courage, friendship, and determination. These are real powers that anyone can develop.</p><p style="margin-bottom: 15px;">The Scarecrow doesn't need a magic brain — he already has intelligence. The Tin Woodman doesn't need a magic heart — he already has compassion. The Lion doesn't need magic courage — he already has bravery. And Dorothy doesn't need magic to go home — she always had the power within her.</p><p style="margin-bottom: 15px;">This is perhaps Baum's greatest message: The most important magic is the potential within ourselves. Not supernatural powers, but natural abilities like kindness, intelligence, bravery, and love. These powers are available to everyone — no wizard required.</p>
