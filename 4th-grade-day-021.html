{render:()=>'<div class="lesson-page-card content-page"><h2>The Magic of Oz (Part 1)</h2><div><p>The next morning, the little man who called himself Oz sent for the Scarecrow.</p><p>&quot;I cannot give you real brains,&quot; the man said. &quot;But I can give you something that might work just as well.&quot;</p><p>He opened the Scarecrow&#39;s head and removed the straw. Then he mixed together bran, pins, and needles, and stuffed the mixture inside. He sewed the head shut and stepped back.</p><p>&quot;There,&quot; the man said. &quot;Bran-new brains. The pins and needles mean you will be very sharp.&quot;</p><p>The Scarecrow reached up and touched his head. His painted eyes seemed to sparkle. &quot;I feel wise already,&quot; he said. &quot;I can feel thoughts — real thoughts — forming inside my head.&quot;</p><p>&quot;They were always there,&quot; the man said quietly. &quot;You just needed something to believe in.&quot;</p><p>The Scarecrow did not hear this. He was too busy thinking.</p><p>Next came the Tin Woodman. The man cut a small hole in the Tin Woodman&#39;s chest and placed inside it a pretty heart made of red silk, stuffed with sawdust.</p><p>&quot;Is it a real heart?&quot; the Tin Woodman asked, pressing his hand against his chest.</p><p>&quot;It is a very kind heart,&quot; the man said. &quot;And that is what matters.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Magic of Oz (Part 2)</h2><div><p>A tear rolled down the Tin Woodman&#39;s cheek. &quot;I can feel it beating,&quot; he said. &quot;I am so happy.&quot;</p><p>&quot;You were always kind,&quot; the man said. &quot;The heart is just a reminder.&quot;</p><p>But the Tin Woodman was too moved to listen. He stood with his hand on his chest, feeling the silk heart shift inside him, and he smiled wider than Dorothy had ever seen him smile.</p><p>Last came the Cowardly Lion. The man poured a green liquid into a golden dish.</p><p>&quot;Drink this,&quot; the man said.</p><p>&quot;What is it?&quot; the Lion asked nervously.</p><p>&quot;Courage,&quot; the man said. &quot;Pure, liquid courage. It has been in my cupboard for years. Drink it, and you will be full of courage.&quot;</p><p>The Lion lapped it up. He stood taller immediately. His mane seemed to bristle with new energy. His eyes grew bright and fierce.</p><p>&quot;I feel brave!&quot; the Lion roared. &quot;I feel like I could fight a hundred enemies!&quot;</p><p>&quot;You always could,&quot; the man said. &quot;You simply did not believe it.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Magic of Oz (Part 3)</h2><div><p>Dorothy watched all of this with mixed feelings. She was happy for her friends — truly happy. The Scarecrow was walking around making observations about everything, delighted with his &quot;new&quot; brains. The Tin Woodman was so full of feeling that he cried every few minutes and had to be oiled. The Lion strutted through the palace like a king.</p><p>But Dorothy knew the truth. The brains were bran and pins. The heart was silk and sawdust. The courage was colored water. The man from Omaha had given them symbols, not magic.</p><p>And yet — her friends were different. Not because the gifts had changed them, but because they finally believed in themselves. The Scarecrow had always been clever. The Tin Woodman had always been kind. The Lion had always been brave. They just needed someone to tell them so.</p><p>Was that magic? Dorothy was not sure. But it worked.</p><p>&quot;Now,&quot; Dorothy said, turning to the man. &quot;What about me? How will you send me home?&quot;</p><p>The man rubbed his chin. &quot;I have been thinking about that,&quot; he said. &quot;I came here in a balloon, and I believe I can leave in a balloon. If I build one large enough, we can fly over the desert that surrounds Oz and land in Kansas — or somewhere near it.&quot;</p><p>&quot;You would come with me?&quot; Dorothy asked, surprised.</p><p>&quot;I would very much like to go home,&quot; the man said. His voice was soft and sad. &quot;I have been pretending to be a wizard for so long that I have nearly forgotten who I really am. I am just a man from Omaha, and I miss it.&quot;</p><p>Dorothy understood that feeling perfectly.</p><p>&quot;Then build your balloon,&quot; she said. &quot;And let us go home.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. What does the Wizard give the Scarecrow as &#39;brains&#39;?</p><textarea id="q1"></textarea><p>2. The brains are bran, the heart is silk, and the courage is colored water. None of them are real. Yet the characters feel genuinely changed. How can a symbol work even when it is not magic? What really changed — the gifts, or the characters&#39; belief in themselves?</p><textarea id="q2"></textarea></div>'},
