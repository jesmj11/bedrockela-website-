{render:()=>'<div class="lesson-page-card content-page"><h2>The Balloon (Part 1)</h2><div><p>The man from Omaha set to work building a hot-air balloon. He had done it many times in the circus, and his hands remembered the craft even after all these years.</p><p>He cut strips of green silk — there was plenty of green silk in the Emerald City — and sewed them together into a great bag, wider at the top and narrow at the bottom. He coated the inside with thin glue to keep the hot air from leaking out. Then he attached the bag to a large wicker basket, big enough for two people and one small dog.</p><p>&quot;I am going away on a journey,&quot; he announced from the palace balcony. &quot;While I am gone, the Scarecrow will rule over you. He has brains now, and he will govern you wisely.&quot;</p><p>The people cheered. They loved the Scarecrow, who had helped kill the Wicked Witch.</p><p>The Scarecrow was nervous. &quot;I don&#39;t know anything about ruling a city,&quot; he whispered to Dorothy.</p><p>&quot;You&#39;ll figure it out,&quot; Dorothy said. &quot;You always do.&quot;</p><p>On the morning of the launch, the balloon was inflated in the great square before the palace. A fire underneath heated the air inside, and the green silk bag swelled and rose, tugging at the ropes that held it down. The whole city turned out to watch.</p><p>Dorothy hugged her friends one by one.</p><p>&quot;Goodbye, Scarecrow,&quot; she said. &quot;You were always the smartest person I knew — even before the brains.&quot;</p><p>&quot;Goodbye, Dorothy,&quot; the Scarecrow said. &quot;I will miss you terribly. But I will try to think of cheerful things, since I now have brains to think with.&quot;</p><p>&quot;Goodbye, Tin Woodman,&quot; Dorothy said. &quot;You have the biggest heart of anyone, and you always did.&quot;</p><p>The Tin Woodman was crying so hard he could not speak. Dorothy oiled his jaw so it would not rust, and he managed to whisper, &quot;You are the best friend I ever had.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Balloon (Part 2)</h2><div><p>&quot;Goodbye, Lion,&quot; Dorothy said. &quot;You are the bravest creature in all of Oz.&quot;</p><p>&quot;Only because you believed in me,&quot; the Lion said. His great golden eyes were wet. &quot;I was nothing before you came along.&quot;</p><p>&quot;That is not true,&quot; Dorothy said firmly. &quot;You were always brave. You just didn&#39;t know it.&quot;</p><p>The balloon strained against its ropes. The man from Omaha climbed into the basket and called to Dorothy. &quot;Hurry! The balloon is ready! We must go now, before it lifts off without us!&quot;</p><p>Dorothy turned to get Toto — but the little dog had spotted a cat in the crowd and had run off barking. Dorothy chased after him.</p><p>&quot;Come back, Toto! Come back!&quot;</p><p>There was a snap. One of the ropes broke. Then another. The basket lurched upward.</p><p>&quot;Dorothy!&quot; the man cried. &quot;Hurry!&quot;</p><p>But Dorothy was still chasing Toto through the crowd. She caught him, scooped him up, and turned back — just in time to see the last rope break.</p><p>The balloon rose into the air.</p><p>&quot;Come back!&quot; Dorothy shouted. &quot;Wait for me!&quot;</p><p>&quot;I can&#39;t!&quot; the man called down. His voice was already faint. The balloon was rising fast, caught by the wind. &quot;I don&#39;t know how to bring it down! Goodbye, Dorothy! Goodbye!&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Balloon (Part 3)</h2><div><p>The balloon sailed up and up, growing smaller against the blue sky, until it was nothing but a green speck, and then nothing at all.</p><p>Dorothy stood in the square, holding Toto, and watched it disappear.</p><p>The man from Omaha was gone. And Dorothy was still in Oz.</p><p>She did not cry. Not right away. She stood very still, feeling the weight of it — the closed door, the vanished hope, the enormous distance between her and Kansas.</p><p>Then the Scarecrow put his stuffed hand on her shoulder. The Tin Woodman stood on her other side. The Lion pressed his great warm body against her back.</p><p>&quot;We will find another way,&quot; the Scarecrow said.</p><p>&quot;We will not give up,&quot; the Tin Woodman said.</p><p>&quot;We are with you,&quot; the Lion said.</p><p>Dorothy looked at her three friends — the ones who were supposed to need her help, who had turned out to be the ones helping her — and she allowed herself one small, tired smile.</p><p>&quot;All right,&quot; she said. &quot;Another way.&quot;</p></div></div>'},
