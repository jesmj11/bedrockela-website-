                    <h2>🌍 Informational Text: The Hero's Journey: Dorothy's Transformation</h2>
                    <div class="informational-article">
                        <p>The Wizard of Oz follows a pattern that appears in stories across all cultures and time periods: the Hero's Journey. Identified by scholar Joseph Campbell, this pattern includes stages that Dorothy experiences almost exactly.</p><p>**Stage 1: The Ordinary World**
Dorothy lives in gray Kansas, dissatisfied but accepting her life. She's ordinary, unhappy, but unaware of her potential.</p><p>**Stage 2: Call to Adventure**
The tornado literally calls Dorothy to adventure, lifting her house and dropping her in Oz. She didn't choose this; it chose her.</p><p>**Stage 3: Refusal of the Call**
Dorothy immediately wants to go home. She doesn't want adventure — she wants Kansas. This is normal; most heroes initially refuse the call.</p><p>**Stage 4: Meeting the Mentor**
The Good Witch of the North becomes Dorothy's mentor. She gives advice, protects Dorothy (with a kiss), and points her toward the Wizard.</p><p>**Stage 5: Crossing the Threshold**
Dorothy steps onto the Yellow Brick Road. She's committed now. There's no turning back.</p><p>**Stage 6: Tests, Allies, and Enemies**
Dorothy meets allies (Scarecrow, Tin Woodman, Lion) and enemies (Wicked Witch). Each test builds her strength and confidence.</p><p>**Stage 7: Approach to the Inmost Cave**
Dorothy reaches the Emerald City. She's approaching the source of power she thinks can solve her problem.</p><p>**Stage 8: The Ordeal**
The Wizard sends Dorothy to kill the Wicked Witch — an impossible task. But she succeeds, not through power but through accident (water) and determination.</p><p>**Stage 9: Reward**
Dorothy returns victorious. She's earned her reward: going home.</p><p>**Stage 10: The Road Back**
Complications arise (the balloon leaves without her), but Dorothy continues searching for a way home.</p><p>**Stage 11: Resurrection**
Dorothy learns the truth: she could have gone home anytime using the silver slippers. She had the power all along.</p><p>**Stage 12: Return with the Elixir**
Dorothy returns to Kansas transformed. She looks the same, but she's different inside. She's braver, wiser, and more confident. The adventure changed her.</p><p>**Why Does This Pattern Matter?**</p><p>The Hero's Journey resonates because it mirrors real life. We all face challenges that push us out of our comfort zones. We all meet helpful people and difficult obstacles. We all discover strengths we didn't know we had.</p><p>Dorothy starts as a helpless girl carried away by forces beyond her control. She ends as a leader who defeated a powerful witch, survived numerous dangers, and helped three friends discover their own strengths.</p><p>The key insight: she didn't gain new powers. She discovered powers she always had. Courage, leadership, kindness, and determination were within her all along. The journey simply revealed them.</p><p>This is why the story remains powerful over 120 years after publication. It's not about magic slippers or wizard — it's about discovering your own strength through adversity.</p><p>Every one of us is on a hero's journey. School, friendships, family challenges, personal growth — these are our adventures. Like Dorothy, we start feeling powerless. But through our journey, we discover capabilities we never knew we possessed.</p><p>The question isn't whether you have the strength to face your challenges. The question is whether you'll take the first step on your yellow brick road and discover the hero you already are.</p>
