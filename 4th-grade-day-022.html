                            <h2>📖 Glinda Grants Dorothy's Wish</h2>
                            <div style="font-size: 16px; line-height: 1.8; color: #333;">
                                <p style="margin-bottom: 15px;">Glinda sat on her throne of rubies and looked at Dorothy with warm, knowing eyes.
"Before I tell you how to get home," Glinda said, "let me help your friends find their places in the world."
She turned to the Scarecrow. "The people of the Emerald City have asked me to find them a good ruler. They love you, Scarecrow. You helped defeat the witches, and you governed wisely while the Wizard was... away. Will you return and lead them?"

The Tin Woodman placed both hands over his silk heart. "Emperor?" he said softly. "Of the Winkies?" He stood taller than Dorothy had ever seen him stand. "I would be honored. I will rule them with all the kindness I have."
Glinda turned to the Lion. "And the animals of the great forest near here have no king. They need someone brave and strong to protect them from danger. Will you return and rule them?"
The Lion's mane seemed to bristle with new energy. "I will," he said. "I will be a good king. I will protect every creature in the forest, large and small."
Dorothy looked at her three friends — each of them standing tall, each of them exactly where they were meant to be. The Scarecrow who had been stuck on a pole. The Tin Woodman who had been rusted in a forest. The Lion who had been too afraid to leave his den. They had come so far.
"But how will they reach their new homes?" Dorothy asked.
"The Golden Cap," Glinda said. "You have two commands left, yes?"
Dorothy took the cap from her basket. "Yes."
"Use the first to send all three of your friends to their new homes. The Winged Monkeys can carry the Scarecrow to the Emerald City, the Tin Woodman to the Winkies' land, and the Lion to the great forest — all at once."
"And the second command?"
"Give the cap to me," Glinda said. "I will use the final command to set the Winged Monkeys free forever, so that no one can ever force them to be slaves again."
"Yes," Dorothy said at once. "They have been slaves long enough."
Dorothy put on the Golden Cap and spoke the magic words. The sky darkened, the air hummed, and the Winged Monkeys appeared, circling above the ruby castle.
"What do you command?" their leader asked.
"Please carry my friends to their new homes," Dorothy said. "The Scarecrow to the Emerald City, the Tin Woodman to the land of the Winkies, and the Lion to the great forest."
"It shall be done," the monkey king said.
This was the moment Dorothy had been dreading. The goodbyes.
She went to the Scarecrow first. He was trying not to look sad, but his painted eyes gave him away.
"You are the best friend I ever had," the Scarecrow said. "Before you came along, I was stuck on a pole, and the crows laughed at me. You gave me a life."
"You gave yourself a life," Dorothy said. "I just helped you off the pole." She hugged him tightly. He smelled like clean straw and sunshine.
The Tin Woodman was next. He was crying so hard that Dorothy reached for the oil can without even thinking. She oiled his jaw, his cheeks, the hinges around his eyes.
"Let them rust," the Tin Woodman whispered. "Some things are worth rusting for."
Dorothy oiled him anyway. Then she hugged him, and his tin arms held her carefully, and his silk heart pressed against her cheek.
The Lion knelt so Dorothy could wrap her arms around his great maned neck. His golden fur was warm, and his chest rumbled with a sound that was half purr, half sob.
"You made me brave," the Lion said.
"No," Dorothy said. "You were always brave. I just noticed."
The Winged Monkeys lifted her three friends into the air. Dorothy watched them grow smaller against the sky — a man of straw, a man of tin, a great golden lion — until they were specks, and then nothing.
She stood in the courtyard of the ruby castle, holding Toto, and allowed herself to cry.
Then she wiped her eyes, took a breath, and turned back to Glinda.

                        <div class="lesson-page-card content-page">
                            <h2>🌍 Informational Text: The Hero's Journey: Dorothy's Transformation</h2>
                            <div style="font-size: 15px; line-height: 1.7; color: #333; margin: 20px 0;">
                                <p style="margin-bottom: 15px;">The Wizard of Oz follows a pattern that appears in stories across all cultures and time periods: the Hero's Journey. Identified by scholar Joseph Campbell, this pattern includes stages that Dorothy experiences almost exactly.</p><p style="margin-bottom: 15px;">**Stage 1: The Ordinary World**
Dorothy lives in gray Kansas, dissatisfied but accepting her life. She's ordinary, unhappy, but unaware of her potential.</p><p style="margin-bottom: 15px;">**Stage 2: Call to Adventure**
The tornado literally calls Dorothy to adventure, lifting her house and dropping her in Oz. She didn't choose this; it chose her.</p><p style="margin-bottom: 15px;">**Stage 3: Refusal of the Call**
Dorothy immediately wants to go home. She doesn't want adventure — she wants Kansas. This is normal; most heroes initially refuse the call.</p><p style="margin-bottom: 15px;">**Stage 4: Meeting the Mentor**
The Good Witch of the North becomes Dorothy's mentor. She gives advice, protects Dorothy (with a kiss), and points her toward the Wizard.</p><p style="margin-bottom: 15px;">**Stage 5: Crossing the Threshold**
Dorothy steps onto the Yellow Brick Road. She's committed now. There's no turning back.</p><p style="margin-bottom: 15px;">**Stage 6: Tests, Allies, and Enemies**
Dorothy meets allies (Scarecrow, Tin Woodman, Lion) and enemies (Wicked Witch). Each test builds her strength and confidence.</p><p style="margin-bottom: 15px;">**Stage 7: Approach to the Inmost Cave**
Dorothy reaches the Emerald City. She's approaching the source of power she thinks can solve her problem.</p><p style="margin-bottom: 15px;">**Stage 8: The Ordeal**
The Wizard sends Dorothy to kill the Wicked Witch — an impossible task. But she succeeds, not through power but through accident (water) and determination.</p><p style="margin-bottom: 15px;">**Stage 9: Reward**
Dorothy returns victorious. She's earned her reward: going home.</p><p style="margin-bottom: 15px;">**Stage 10: The Road Back**
Complications arise (the balloon leaves without her), but Dorothy continues searching for a way home.</p><p style="margin-bottom: 15px;">**Stage 11: Resurrection**
Dorothy learns the truth: she could have gone home anytime using the silver slippers. She had the power all along.</p><p style="margin-bottom: 15px;">**Stage 12: Return with the Elixir**
Dorothy returns to Kansas transformed. She looks the same, but she's different inside. She's braver, wiser, and more confident. The adventure changed her.</p><p style="margin-bottom: 15px;">**Why Does This Pattern Matter?**</p><p style="margin-bottom: 15px;">The Hero's Journey resonates because it mirrors real life. We all face challenges that push us out of our comfort zones. We all meet helpful people and difficult obstacles. We all discover strengths we didn't know we had.</p><p style="margin-bottom: 15px;">Dorothy starts as a helpless girl carried away by forces beyond her control. She ends as a leader who defeated a powerful witch, survived numerous dangers, and helped three friends discover their own strengths.</p><p style="margin-bottom: 15px;">The key insight: she didn't gain new powers. She discovered powers she always had. Courage, leadership, kindness, and determination were within her all along. The journey simply revealed them.</p><p style="margin-bottom: 15px;">This is why the story remains powerful over 120 years after publication. It's not about magic slippers or wizard — it's about discovering your own strength through adversity.</p><p style="margin-bottom: 15px;">Every one of us is on a hero's journey. School, friendships, family challenges, personal growth — these are our adventures. Like Dorothy, we start feeling powerless. But through our journey, we discover capabilities we never knew we possessed.</p><p style="margin-bottom: 15px;">The question isn't whether you have the strength to face your challenges. The question is whether you'll take the first step on your yellow brick road and discover the hero you already are.</p>
