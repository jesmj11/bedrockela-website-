ature in all of Oz.\"\n\"Only because you believed in me,\" the Lion said. His great golden eyes were wet. \"I was nothing before you came along.\"\n\"That is not true,\" Dorothy said firmly. \"You were always brave. You just didn't know it.\"\nThe balloon strained against its ropes. The man from Omaha climbed into the basket and called to Dorothy. \"Hurry! The balloon is ready! We must go now, before it lifts off without us!\"\nDorothy turned to get Toto — but the little dog had spotted a cat in the crowd and had run off barking. Dorothy chased after him.\n\"Come back, Toto! Come back!\"\nThere was a snap. One of the ropes broke. Then another. The basket lurched upward.\n\"Dorothy!\" the man cried. \"Hurry!\"\nBut Dorothy was still chasing Toto through the crowd. She caught him, scooped him up, and turned back — just in time to see the last rope break.\nThe balloon rose into the air.\n\"Come back!\" Dorothy shouted. \"Wait for me!\"\n\"I can't!\" the man called down. His voice was already faint. The balloon was rising fast, caught by the wind. \"I don't know how to bring it down! Goodbye, Dorothy! Goodbye!\"\nThe balloon sailed up and up, growing smaller against the blue sky, until it was nothing but a green speck, and then nothing at all.\nDorothy stood in the square, holding Toto, and watched it disappear.\nThe man from Omaha was gone. And Dorothy was still in Oz.\nShe did not cry. Not right away. She stood very still, feeling the weight of it — the closed door, the vanished hope, the enormous distance between her and Kansas.\nThen the Scarecrow put his stuffed hand on her shoulder. The Tin Woodman stood on her other side. The Lion pressed his great warm body against her back.\n\"We will find another way,\" the Scarecrow said.\n\"We will not give up,\" the Tin Woodman said.\n\"We are with you,\" the Lion said.\nDorothy looked at her three friends — the ones who were supposed to need her help, who had turned out to be the ones helping her — and she allowed herself
