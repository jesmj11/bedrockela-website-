                            <h2>📖 There's No Place Like Home</h2>
                            <div style="font-size: 16px; line-height: 1.8; color: #333;">
                                <p style="margin-bottom: 15px;">"The silver shoes," Glinda said, "have a very powerful magic. They can carry you anywhere in the world in three steps."
Dorothy looked down at the shoes on her feet. She had been wearing them since the very beginning — since the moment she took them from the Wicked Witch of the East on her first day in Oz. Through forests and poppy fields, through the Emerald City and the Witch's castle, through every danger and every mile of yellow brick road — the answer had been on her feet the entire time.
"You mean," Dorothy said slowly, "I could have gone home from the very start?"
"Yes," Glinda said.
The room seemed to tilt. Dorothy felt dizzy with the weight of it. She could have gone home on the first day. She could have avoided the dark forest, the deadly poppies, the Wicked Witch, the humbug Wizard. She could have clicked her heels and been in Kansas before she ever set foot on the yellow brick road.
But then she never would have met the Scarecrow. Or the Tin Woodman. Or the Lion.
She never would have learned that the Scarecrow was the cleverest person she knew. She never would have watched the Tin Woodman weep over a crushed beetle. She never would have seen the Cowardly Lion stand between his friends and danger, shaking with fear but refusing to back down.
She never would have learned that a wizard could be a fraud and still teach a lesson, or that a bucket of water could defeat what an army could not, or that the smallest mouse and the fiercest lion could both be heroes.
She never would have learned what home really meant.
"I would not trade this journey for anything," Dorothy said.
Glinda smiled. "I know. That is why I did not tell you sooner. Some things cannot be taught. They must be lived."
"How do I use the shoes?" Dorothy asked.
"Click the heels together three times," Glinda said. "And with each click, say where you wish to go."
Dorothy held Toto close against her chest. She could feel his small heart beating fast. She looked at Glinda — the most powerful and the most honest person she had met in all of Oz — and said, "Thank you."
"Thank yourself," Glinda said. "You did this, Dorothy. All of it."
Dorothy closed her eyes. She thought of Aunt Em's face. She thought of Uncle Henry's quiet hands. She thought of the flat, gray prairie and the small wooden house and the smell of bread baking in the oven.
She clicked her heels together.
"Take me home."
Click.
"Take me home."
Click.
"Take me home."
Click.
The world dissolved. The ruby castle, the red flowers, the warm light — all of it swirled and blurred and spun away. Wind roared past her ears. She felt herself flying, tumbling, spinning through an impossible distance. Toto pressed against her chest, and Dorothy held on.
Then — silence.
She was sitting in the grass. Real grass. Brown, dry, Kansas grass, warm from the sun.
She opened her eyes.
In front of her was a farmhouse — a new one, because the old house had flown to Oz. Uncle Henry had built it while she was gone. It was small and plain, just like the old one. No emeralds. No rubies. No green marble or yellow brick.
It was the most beautiful thing Dorothy had ever seen.
And running across the yard toward her, arms outstretched, was Aunt Em.</p>

                            <h2>🌍 Informational Text: Kansas Geography: Understanding the Setting</h2>
                            <div style="font-size: 15px; line-height: 1.7; color: #333; margin: 20px 0;">
                                <p style="margin-bottom: 15px;">To truly understand Dorothy's story, we need to understand Kansas — not just any Kansas, but 1890s Kansas, where life was dramatically different from today.</p><p style="margin-bottom: 15px;">**The Geography**:
Kansas is located in the central United States, part of the Great Plains. This region is characterized by:
- **Flatness**: Kansas is one of America's flattest states. You can see for miles in every direction with few hills or trees blocking the view.
- **Grasslands**: Before farming, Kansas was covered in tallgrass prairie. Grasses grew 6-8 feet high, creating a "sea of grass" that moved like waves in the wind.
- **Extreme weather**: Kansas experiences harsh winters (blizzards, ice storms) and brutal summers (droughts, heat waves). Spring and fall bring violent thunderstorms and tornadoes.
- **Few trees**: Natural trees are rare on the prairie. What trees exist were planted by settlers for windbreaks and shade.</p><p style="margin-bottom: 15px;">**Why Settlers Came**:
Despite harsh conditions, people moved to Kansas in the 1800s because:
- **Free land**: The Homestead Act gave 160 acres to anyone who would farm it for five years
- **Good soil**: Once plowed, prairie soil is incredibly fertile and grows excellent wheat
- **Central location**: Kansas connected East and West, making it important for transportation
- **Opportunity**: People fleeing poverty or persecution saw Kansas as a fresh start</p><p style="margin-bottom: 15px;">**Daily Life on a Kansas Farm**:
Dorothy's life would have included:
- **Isolation**: Farms were miles apart. You might go days without seeing anyone outside your family.
- **Hard physical labor**: Plowing, planting, harvesting, caring for animals, hauling water — all done by hand.
- **Simple housing**: Most prairie homes were one-room dugouts or small wooden houses with no running water or electricity.
- **Extreme weather**: Summer temperatures could exceed 100°F with no air conditioning. Winter blizzards could trap families indoors for days.
- **Limited education**: School happened only after planting and before harvest. Many children attended only a few months per year.</p><p style="margin-bottom: 15px;">**Why "Gray and Dull"?**:
Baum describes Kansas as gray and dull, which reflects several realities:
- **Drought cycles**: Kansas experiences periodic droughts. During dry years, green grass turns brown, crops fail, and everything is covered in dust.
- **Limited color**: Without gardens, paint, or decorations (expensive!), prairie life was visually monotonous.
- **Hard work**: When you work from dawn to dusk just to survive, life can feel joyless.
- **Isolation**: Without neighbors, entertainment, or variety, prairie life could feel suffocating.</p><p style="margin-bottom: 15px;">**Modern Kansas**:
Today's Kansas is quite different:
- Major cities like Wichita and Kansas City
- Modern farming with tractors and irrigation
- Good roads, schools, and infrastructure
- Still agricultural but more diverse
- Still experiences tornadoes!</p><p style="margin-bottom: 15px;">**Why This Matters to the Story**:
Understanding Kansas helps us appreciate why:
- Dorothy is so desperate to return home (Aunt Em is literally all she has)
- Oz seems so magical (anything would compared to gray Kansas)
- The silver slippers' power is significant (instant travel was fantasy in an era of slow horses and wagons)
- "There's no place like home" resonates (even a harsh home is your home)</p><p style="margin-bottom: 15px;">Kansas represents reality — sometimes harsh, often difficult, rarely magical. But it's real. It's home. And for Dorothy, that matters more than all the wonders of Oz.</p>
