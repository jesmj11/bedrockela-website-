                            <h2>📖 Home Again</h2>
                            <div style="font-size: 16px; line-height: 1.8; color: #333;">
                                <p style="margin-bottom: 15px;">"My darling child!" Aunt Em cried, sweeping Dorothy into her arms and holding her so tightly that Toto yelped between them. "Where in the world did you come from?"
"From the land of Oz," Dorothy said into Aunt Em's shoulder. "Oh, Aunt Em, I am so glad to be home!"
Aunt Em pulled back and looked at Dorothy's face as though she could not quite believe she was real. Her gray eyes were shining — with tears, with relief, with a fierce, burning love that Dorothy had always known was there, even when Aunt Em had been too worn down by the prairie to show it.
Uncle Henry came out of the barn. He stopped in the doorway and stared. Then he walked across the yard, slowly, as though Dorothy might disappear if he moved too quickly. He knelt down in the dirt and put his weathered hands on her shoulders.
"Dorothy," he said. Just her name. But he said it in a way that held everything.
Then he did something Dorothy had never seen him do before.
He smiled.
Dorothy looked around. The Kansas prairie stretched flat and brown to the horizon. The wind blew dust across the yard. The sun baked the earth the same dull gray it had always been. There were no emerald cities, no yellow brick roads, no fields of scarlet poppies or countries made of china.
But Aunt Em was there, warm and real. Uncle Henry was there, steady and solid. And Toto was barking and jumping in circles, thrilled to be on solid ground again.
Dorothy looked down at her feet. The silver shoes were gone — lost somewhere in the sky between Oz and Kansas, tumbled away during the flight. She felt for them for a moment, a pang of loss. Those shoes had carried her so far.
But she did not need them anymore. They had done their job.
"Come inside," Aunt Em said, wiping her eyes. "I have just taken bread out of the oven. You must be starving."
The kitchen of the new house smelled like warm bread and butter. It was small and plain — one room, a stove, a table, chairs. No green marble. No ruby thrones. But as Dorothy sat down at the table and Aunt Em set a thick slice of bread in front of her and Uncle Henry poured a glass of milk, Dorothy felt something settle inside her chest like a key turning in a lock.
This was it. This was the thing she had traveled hundreds of miles to find, the thing the Wizard could not give her, the thing even Glinda could not create. It was not a place, exactly, though Kansas was part of it. It was not a feeling, exactly, though love was part of it. It was something bigger and simpler than either of those things.
It was home.
Not a perfect home. Not a dazzling home. Not a home made of emeralds or rubies or magic. Just a small house on a flat prairie with two people who loved her and a little black dog who made her laugh.
That was enough. That had always been enough.
Dorothy ate her bread. Toto lay at her feet. Aunt Em sat across the table, watching Dorothy with eyes that would not look away, as if she were memorizing her.
"Aunt Em," Dorothy said.
"Yes, dear?"
"There is no place like home."
Aunt Em reached across the table and took Dorothy's hand. She did not ask what the words meant. She did not need to.
Outside, the Kansas wind blew across the prairie, and the sun began to set, painting the gray sky with gold. It was not emerald and it was not ruby. But it was warm, and it was real, and it was hers.
Dorothy was home.</p>

                        <div class="lesson-page-card content-page">
                            <h2>🌍 Informational Text: Children's Literature: Then and Now</h2>
                            <div style="font-size: 15px; line-height: 1.7; color: #333; margin: 20px 0;">
                                <p style="margin-bottom: 15px;">When "The Wonderful Wizard of Oz" was published in 1900, children's literature was very different from what we know today. Understanding these differences helps us appreciate why Oz was revolutionary.</p><p style="margin-bottom: 15px;">**Before 1900, Children's Books Were:**</p><p style="margin-bottom: 15px;">1. **Moralistic**: Stories existed mainly to teach moral lessons. Characters who misbehaved suffered terrible consequences. The message was more important than entertainment.</p><p style="margin-bottom: 15px;">2. **Dark and scary**: Traditional fairy tales included violence, death, and psychological terror. Children were abandoned, poisoned, or eaten. These weren't sanitized stories — they were warnings.</p><p style="margin-bottom: 15px;">3. **Class-conscious**: Most heroes were royalty or wealthy. Poor characters either stayed poor or magically became royalty. Social mobility wasn't realistic.</p><p style="margin-bottom: 15px;">4. **European**: Most stories came from Europe (Grimm, Andersen, Perrault). They featured castles, kings, and European settings. American children read about places they'd never seen.</p><p style="margin-bottom: 15px;">5. **Gender-specific**: Books for girls taught them to be passive, obedient, and domestic. Books for boys taught them to be brave, adventurous, and dominant. Few characters broke these roles.</p><p style="margin-bottom: 15px;">**Baum Changed Everything**:</p><p style="margin-bottom: 15px;">1. **Fun first**: While Oz has themes, it's primarily entertaining. Adventure and imagination matter more than moralizing.</p><p style="margin-bottom: 15px;">2. **Optimistic tone**: Bad things happen, but nobody dies. The story ends happily. Evil is defeated through cleverness and friendship, not violence.</p><p style="margin-bottom: 15px;">3. **Democratic values**: Dorothy isn't a princess; she's a farm girl. She succeeds through courage and kindness, not birthright. The "great" Wizard is exposed as an ordinary man, and that's okay.</p><p style="margin-bottom: 15px;">4. **American setting**: The story begins in Kansas and reflects American values: self-reliance, innovation, democracy, and optimism.</p><p style="margin-bottom: 15px;">5. **Gender-neutral**: Dorothy is brave, leads the group, and saves herself. The "female" characters (Dorothy, Glinda) are powerful and competent. The "male" characters (Scarecrow, Tin Woodman, Lion) are emotional and vulnerable. Everyone can be everything.</p><p style="margin-bottom: 15px;">**Impact on Modern Children's Literature**:</p><p style="margin-bottom: 15px;">Baum influenced generations of children's authors:
- **Fantasy as legitimate literature**: Oz proved fantasy could be meaningful, not just escapist
- **Child protagonists**: Children could be heroes without adults constantly rescuing them
- **American mythology**: Writers could create American fantasy worlds
- **Emotional honesty**: Characters could admit fears and weaknesses
- **Friendship focus**: Stories could center on friendship rather than romance or family</p><p style="margin-bottom: 15px;">**Modern Children's Books Owe Oz**:
- Harry Potter (ordinary child in magical world)
- Percy Jackson (American mythology)
- The Hunger Games (strong girl protagonist leading others)
- Chronicles of Narnia (entering a magical world)
- Coraline (finding courage to face danger)</p><p style="margin-bottom: 15px;">**What Makes a Good Children's Book?**:</p><p style="margin-bottom: 15px;">Modern understanding, influenced by Oz:
1. Respects children's intelligence
2. Entertains while providing meaning
3. Features diverse, realistic characters
4. Addresses real emotions and fears
5. Empowers rather than preaches
6. Ends with hope, not just "happily ever after"</p><p style="margin-bottom: 15px;">**Why Oz Endures**:</p><p style="margin-bottom: 15px;">120+ years later, The Wizard of Oz remains popular because:
- Its themes are timeless (courage, friendship, home)
- It empowers children rather than lecturing them
- The story is genuinely entertaining
- Characters are memorable and relatable
- It balances adventure with emotional depth</p><p style="margin-bottom: 15px;">**The Legacy**:</p><p style="margin-bottom: 15px;">When you read modern children's books, you're reading in a tradition Baum helped create. Before Oz, children's books often treated readers as empty vessels needing to be filled with morals. After Oz, children's literature could be fun, empowering, and meaningful all at once.</p><p style="margin-bottom: 15px;">Baum believed children deserved stories that delighted them, not just instructed them. He believed kids were smart enough to find their own meaning in stories. And he believed American children deserved American fairy tales.</p><p style="margin-bottom: 15px;">He was right. The Wonderful Wizard of Oz proved it. And children's literature has never been the same.</p>
