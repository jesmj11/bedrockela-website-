    { render: () => '<div class="lesson-page-card content-page"><h2>The Journey South (Part 1)</h2><div><p>The next morning, the four friends set out from the Emerald City heading south. The Guardian of the Gates unlocked their green spectacles, wished them well, and watched them walk away down the road.</p><p>"I hope you find what you are looking for," he called after them.</p><p>"So do I," Dorothy said quietly.</p><p>The countryside was lovely at first — green fields, gentle hills, and sparkling streams. But as they went further south, the road disappeared entirely. There were no more yellow bricks, no more fences, no more signs. Just wild, untamed land stretching in every direction.</p><p>"We must keep going south," the Scarecrow said, studying the position of the sun. "Glinda's country is on the southern border of Oz. If we walk straight, we should reach it."</p><p>They walked through tall grass and across shallow streams. The Lion led the way, his great nose sniffing the air for danger. The Tin Woodman kept his axe ready. The Scarecrow watched the sun and kept them heading in the right direction.</p><p>Then they reached the forest.</p><p>It was not like the dark forest near the Munchkin country. This forest was alive — aggressively alive. The trees were thick and gnarled, with branches that hung low across the path like arms.</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>The Journey South (Part 2)</h2><div><p>"These trees look unfriendly," the Tin Woodman said.</p><p>He was right. When the Scarecrow tried to walk between two of them, the nearest tree swung a great branch like a fist and knocked him flying. He tumbled through the air and landed in a heap ten feet away.</p><p>"Ow," the Scarecrow said. Then: "Well, not ow exactly, since I cannot feel pain. But that was very rude."</p><p>The trees thrashed their branches, blocking the path completely. Every time someone tried to pass, the trees struck at them. The Lion growled and swiped at a branch, but another tree hit him from behind and sent him stumbling.</p><p>"Let me try," the Tin Woodman said.</p><p>He marched toward the nearest fighting tree, axe raised. A branch whipped toward his head. He ducked and chopped it clean off. Another branch swung at his legs. He chopped that one, too. A third branch came from the side — chop. A fourth from above — chop.</p><p>The trees recoiled, pulling their remaining branches tight against their trunks. They had learned very quickly that hitting a man made of tin with an axe was not a winning strategy.</p><p>"Run!" the Tin Woodman shouted, holding the trees back.</p></div></div>' },
