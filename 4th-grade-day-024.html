anch whipped toward his head. He ducked and chopped it clean off. Another branch swung at his legs. He chopped that one, too. A third branch came from the side — chop. A fourth from above — chop."},{"text":"The trees recoiled, pulling their remaining branches tight against their trunks. They had learned very quickly that hitting a man made of tin with an axe was not a winning strategy.\n\n\"Run!\" the Tin Woodman shouted, holding the trees back.\n\nThe others dashed through the gap. The Tin Woodman followed, chopping one more branch for good measure. Behind them, the fighting trees shook with fury, but they could not follow.\n\n\"That was magnificent,\" the Lion said.\n\n\"Thank you,\" the Tin Woodman said. \"I may not have real muscles, but tin is very hard, and this axe is very sharp.\"\n\n\"Brains, heart, and courage,\" the Scarecrow said, brushing dirt from his clothes. \"We have everything we need between us.\"\n\n\"We always did,\" Dorothy said.\n\nThey pressed on through the forest, and the trees did not bother them again."}]
