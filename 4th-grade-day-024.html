                    <h2>📖 Home Again - Part 1</h2>

                        <p style="margin-bottom: 15px;">"My darling child!" Aunt Em cried, sweeping Dorothy into her arms and holding her so tightly that Toto yelped between them. "Where in the world did you come from?"

Dorothy looked down at her feet. The silver shoes were gone — lost somewhere in the sky between Oz and Kansas, tumbled away during the flight. She felt for them for a moment, a pang of loss. Those shoes had carried her so far.
But she did not need them anymore. They had done their job.
"Come inside," Aunt Em said, wiping her eyes. "I have just taken bread out of the oven. You must be starving."
The kitchen of the new house smelled like warm bread and butter. It was small and plain — one room, a stove, a table, chairs. No green marble. No ruby thrones. But as Dorothy sat down at the table and Aunt Em set a thick slice of bread in front of her and Uncle Henry poured a glass of milk, Dorothy felt something settle inside her chest like a key turning in a lock.

It was home.
Not a perfect home. Not a dazzling home. Not a home made of emeralds or rubies or magic. Just a small house on a flat prairie with two people who loved her and a little black dog who made her laugh.
That was enough. That had always been enough.

"Aunt Em," Dorothy said.

Dorothy was home.</p>

                    <h2>🌍 Informational Text: Children's Literature: Then and Now</h2>
                    <div class="informational-article">
                        <p>When "The Wonderful Wizard of Oz" was published in 1900, children's literature was very different from what we know today. Understanding these differences helps us appreciate why Oz was revolutionary.</p><p>**Before 1900, Children's Books Were:**</p><p>1. **Moralistic**: Stories existed mainly to teach moral lessons. Characters who misbehaved suffered terrible consequences. The message was more important than entertainment.</p><p>2. **Dark and scary**: Traditional fairy tales included violence, death, and psychological terror. Children were abandoned, poisoned, or eaten. These weren't sanitized stories — they were warnings.</p><p>3. **Class-conscious**: Most heroes were royalty or wealthy. Poor characters either stayed poor or magically became royalty. Social mobility wasn't realistic.</p><p>4. **European**: Most stories came from Europe (Grimm, Andersen, Perrault). They featured castles, kings, and European settings. American children read about places they'd never seen.</p><p>5. **Gender-specific**: Books for girls taught them to be passive, obedient, and domestic. Books for boys taught them to be brave, adventurous, and dominant. Few characters broke these roles.</p><p>**Baum Changed Everything**:</p><p>1. **Fun first**: While Oz has themes, it's primarily entertaining. Adventure and imagination matter more than moralizing.</p><p>2. **Optimistic tone**: Bad things happen, but nobody dies. The story ends happily. Evil is defeated through cleverness and friendship, not violence.</p><p>3. **Democratic values**: Dorothy isn't a princess; she's a farm girl. She succeeds through courage and kindness, not birthright. The "great" Wizard is exposed as an ordinary man, and that's okay.</p><p>4. **American setting**: The story begins in Kansas and reflects American values: self-reliance, innovation, democracy, and optimism.</p><p>5. **Gender-neutral**: Dorothy is brave, leads the group, and saves herself. The "female" characters (Dorothy, Glinda) are powerful and competent. The "male" characters (Scarecrow, Tin Woodman, Lion) are emotional and vulnerable. Everyone can be everything.</p><p>**Impact on Modern Children's Literature**:</p><p>Baum influenced generations of children's authors:
- **Fantasy as legitimate literature**: Oz proved fantasy could be meaningful, not just escapist
- **Child protagonists**: Children could be heroes without adults constantly rescuing them
- **American mythology**: Writers could create American fantasy worlds
- **Emotional honesty**: Characters could admit fears and weaknesses
- **Friendship focus**: Stories could center on friendship rather than romance or family</p><p>**Modern Children's Books Owe Oz**:
- Harry Potter (ordinary child in magical world)
- Percy Jackson (American mythology)
- The Hunger Games (strong girl protagonist leading others)
- Chronicles of Narnia (entering a magical world)
- Coraline (finding courage to face danger)</p><p>**What Makes a Good Children's Book?**:</p><p>Modern understanding, influenced by Oz:
1. Respects children's intelligence
2. Entertains while providing meaning
3. Features diverse, realistic characters
4. Addresses real emotions and fears
5. Empowers rather than preaches
6. Ends with hope, not just "happily ever after"</p><p>**Why Oz Endures**:</p><p>120+ years later, The Wizard of Oz remains popular because:
- Its themes are timeless (courage, friendship, home)
- It empowers children rather than lecturing them
- The story is genuinely entertaining
- Characters are memorable and relatable
- It balances adventure with emotional depth</p><p>**The Legacy**:</p><p>When you read modern children's books, you're reading in a tradition Baum helped create. Before Oz, children's books often treated readers as empty vessels needing to be filled with morals. After Oz, children's literature could be fun, empowering, and meaningful all at once.</p><p>Baum believed children deserved stories that delighted them, not just instructed them. He believed kids were smart enough to find their own meaning in stories. And he believed American children deserved American fairy tales.</p><p>He was right. The Wonderful Wizard of Oz proved it. And children's literature has never been the same.</p>
