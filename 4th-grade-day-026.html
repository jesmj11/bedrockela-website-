                    <h2>📖 Home Again - Part 1</h2>

                        <p style="margin-bottom: 15px;">"My darling child!" Aunt Em cried, sweeping Dorothy into her arms and holding her so tightly that Toto yelped between them. "Where in the world did you come from?"
"From the land of Oz," Dorothy said into Aunt Em's shoulder. "Oh, Aunt Em, I am so glad to be home!"
Aunt Em pulled back and looked at Dorothy's face as though she could not quite believe she was real. Her gray eyes were shining — with tears, with relief, with a fierce, burning love that Dorothy had always known was there, even when Aunt Em had been too worn down by the prairie to show it.
Uncle Henry came out of the barn. He stopped in the doorway and stared. Then he walked across the yard, slowly, as though Dorothy might disappear if he moved too quickly. He knelt down in the dirt and put his weathered hands on her shoulders.
"Dorothy," he said. Just her name. But he said it in a way that held everything.
Then he did something Dorothy had never seen him do before.
He smiled.
Dorothy looked around. The Kansas prairie stretched flat and brown to the horizon. The wind blew dust across the yard. The sun baked the earth the same dull gray it had always been. There were no emerald cities, no yellow brick roads, no fields of scarlet poppies or countries made of china.
But Aunt Em was there, warm and real. Uncle Henry was there, steady and solid. And Toto was barking and jumping in circles, thrilled to be on solid ground again.
Dorothy looked down at her feet. The silver shoes were gone — lost somewhere in the sky between Oz and Kansas, tumbled away during the flight. She felt for them for a moment, a pang of loss. Those shoes had carried her so far.
But she did not need them anymore. They had done their job.
"Come inside," Aunt Em said, wiping her eyes. "I have just taken bread out of the oven. You must be starving."
The kitchen of the new house smelled like warm bread and butter. It was small and plain — one room, a stove, a table, chairs. No green marble. No ruby thrones. But as Dorothy sat down at the table and Aunt Em set a thick slice of bread in front of her and Uncle Henry poured a glass of milk, Dorothy felt something settle inside her chest like a key turning in a lock.
This was it. This was the thing she had traveled hundreds of miles to find, the thing the Wizard could not give her, the thing even Glinda could not create. It was not a place, exactly, though Kansas was part of it. It was not a feeling, exactly, though love was part of it. It was something bigger and simpler than either of those things.
It was home.
Not a perfect home. Not a dazzling home. Not a home made of emeralds or rubies or magic. Just a small house on a flat prairie with two people who loved her and a little black dog who made her laugh.
That was enough. That had always been enough.
Dorothy ate her bread. Toto lay at her feet. Aunt Em sat across the table, watching Dorothy with eyes that would not look away, as if she were memorizing her.
"Aunt Em," Dorothy said.
"Yes, dear?"
"There is no place like home."
Aunt Em reached across the table and took Dorothy's hand. She did not ask what the words meant. She did not need to.
Outside, the Kansas wind blew across the prairie, and the sun began to set, painting the gray sky with gold. It was not emerald and it was not ruby. But it was warm, and it was real, and it was hers.
Dorothy was home.</p>

                    <h2>🌍 Informational Text: Courage, Wisdom, and Heart: Universal Values</h2>
                    <div class="informational-article">
                        <p>The three gifts Dorothy's friends seek — a brain, a heart, and courage — represent universal human values that matter across all cultures and time periods. Let's explore why these three qualities matter so much.</p><p>**The Scarecrow's Brain (Wisdom)**:
Intelligence and wisdom aren't the same thing:
- **Intelligence** is the ability to learn and understand
- **Wisdom** is knowing how to use what you know</p><p>The Scarecrow already demonstrates intelligence throughout the journey. He solves problems, creates plans, and makes smart decisions. What he lacks isn't intelligence — it's confidence in his intelligence.</p><p>The "brain" the Wizard gives him (a mixture of bran, pins, and needles) is symbolic. Bran represents nutrition for thought. Pins and needles represent sharp thinking. None of it is magical, but believing he has a brain makes the Scarecrow confident enough to use the intelligence he always had.</p><p>**The Tin Woodman's Heart (Compassion)**:
The Tin Woodman thinks he can't feel because he has no biological heart. Yet he:
- Cries when he accidentally steps on a beetle
- Refuses to hurt any living thing
- Risks himself to protect Dorothy
- Shows more compassion than most "hearted" characters</p><p>The silk heart stuffed with sawdust that the Wizard gives him doesn't enable feeling — it validates feelings he already has. He learns that having a heart isn't about anatomy; it's about how you treat others.</p><p>**The Lion's Courage (Bravery)**:
The Lion defines courage as absence of fear. He thinks being brave means never being scared. But true courage is acting despite fear.</p><p>Throughout the journey, the Lion is terrified — but he acts anyway:
- He crosses dangerous rivers
- He fights fierce beasts (Kalidahs)
- He leaps over chasms
- He protects his friends</p><p>The drink the Wizard gives him as "courage" is colored water. But believing he's brave makes the Lion recognize the courage he's demonstrated all along.</p><p>**Why These Three?**:</p><p>Brain, Heart, and Courage represent three essential aspects of being human:
1. **Thinking** (brain/wisdom): Making good decisions
2. **Feeling** (heart/compassion): Caring about others
3. **Acting** (courage/bravery): Doing what's right despite difficulty</p><p>All three are necessary. Wisdom without compassion becomes cold calculation. Compassion without courage becomes passive sympathy. Courage without wisdom becomes reckless foolishness.</p><p>**Cultural Universality**:</p><p>Every culture values these three qualities, though they use different words:
- Ancient Greeks valued wisdom (Athena), courage (Ares), and love (Aphrodite)
- Christianity teaches faith, hope, and charity (love)
- Buddhism emphasizes wisdom, compassion, and courage
- Native American traditions honor the mind, heart, and spirit
- Modern psychology recognizes thinking, feeling, and acting</p><p>**The Real Magic**:</p><p>The Wizard's great trick isn't creating fake brains, hearts, and courage. It's helping the characters recognize what they already possess. He's a therapist, not a magician. He changes their self-perception, and that changes everything.</p><p>This is the story's deepest wisdom: We often have what we think we're missing. We just don't recognize it or trust it. Sometimes we need:
- Validation: Someone telling us we're capable
- Evidence: Seeing ourselves succeed
- Permission: Being told it's okay to use our abilities
- Confidence: Believing in ourselves</p><p>**Modern Application**:</p><p>When you feel you lack something important, ask yourself:
1. **Brain**: Have I used intelligence/creativity in the past, even if I didn't recognize it?
2. **Heart**: Have I shown kindness/compassion, even in small ways?
3. **Courage**: Have I done difficult things despite being scared?</p><p>The answer is probably yes. Like Dorothy's friends, you likely have more wisdom, compassion, and courage than you give yourself credit for.</p><p>The Wizard's lesson: You don't need magic to develop these qualities. You need to recognize and use what's already within you. Brain, heart, and courage aren't given — they're discovered.</p>
