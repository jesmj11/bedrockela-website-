    { render: () => '<div class="lesson-page-card content-page"><h2>The Country of the Quadlings (Part 1)</h2><div><p>South of the china country, the land changed again. The wild forest gave way to gentle, rolling hills covered in soft red grass and dotted with red flowers. The houses they passed were painted red, and the fences were red, and the people they met wore red clothes and had kind, cheerful faces.</p><p>"This must be the country of the Quadlings," the Scarecrow said. "Just as the Munchkins love blue, the Quadlings love red."</p><p>The people they met were friendly and welcoming. When Dorothy asked the way to Glinda's castle, they smiled and pointed south. "Follow the road," they said. "You cannot miss it. Glinda's castle is the most beautiful building in all of Oz."</p><p>They were right.</p><p>The castle rose from a hill like something out of a dream. Its walls were deep red, studded with rubies that caught the afternoon sun and threw light in every direction. Three young women in red uniforms stood guard at the gates, and behind them, Dorothy could see gardens filled with red roses and paths of smooth red stone.</p><p>"State your business," one of the guards said.</p><p>"My name is Dorothy, and I have come to ask Glinda for help getting home to Kansas."</p><p>The guard studied her for a moment, then nodded. "Glinda will see you. She has been expecting you."</p><p>"Expecting us?" Dorothy said, surprised. But the guards were already leading them through the gates and into the castle.</p><p>The throne room was nothing like the Wizard's. There was no booming voice, no locked doors, no tricks. The room was open and airy, filled with light from tall windows, and on a throne of rubies sat a woman of extraordinary beauty.</p><p>Glinda had red hair that fell in curls to her shoulders, and eyes that were a deep, warm blue. She wore a white gown — pure white, in a country of red — and her smile was so genuine that Dorothy felt, for the first time in a long while, completely safe.</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>The Country of the Quadlings (Part 2)</h2><div><p>"Welcome, Dorothy," Glinda said. Her voice was gentle but strong, like a bell. "I know who you are, and I know what you have done. You killed the Wicked Witch of the East with your house and the Wicked Witch of the West with your bucket. The land of Oz owes you a great debt."</p><p>"I didn't mean to kill anyone," Dorothy said. "Both times were accidents."</p><p>"Sometimes the most important things happen by accident," Glinda said, smiling. "Now, tell me what you wish."</p><p>"I want to go home," Dorothy said. "I want to go back to Kansas, to Uncle Henry and Aunt Em. I love Oz, and I love my friends, but Kansas is my home, and I miss it."</p><p>"Even though Kansas is gray?" Glinda asked. There was no judgment in the question — only curiosity.</p><p>"Even though Kansas is gray," Dorothy said. "Home is not about what a place looks like. It is about the people who love you."</p><p>Glinda nodded slowly. "You are wiser than you know, Dorothy. But before I help you, let me help your friends. Each of them has somewhere to go, too."</p><p>She turned to the Scarecrow. "The people of the Emerald City love you and want you to rule them. Will you return and be their leader?"</p><p>The Scarecrow straightened up. "I will," he said. "I have brains now, and I will use them to govern wisely."</p><p>She turned to the Tin Woodman. "The Winkies of the western land have asked me to find them a ruler. They loved how you protected Dorothy, and they want you to be their emperor. Will you go?"</p><p>The Tin Woodman pressed his hand to his chest. "Emperor?" he said. "Of the Winkies?" His tin eyes shone. "I would be honored. I will rule them with all the kindness in my heart."</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>The Country of the Quadlings (Part 3)</h2><div><p>She turned to the Lion. "The animals of the great forest south of here have no king. They need someone brave and strong to protect them. Will you return and rule them?"</p><p>The Lion lifted his great head. "I will," he said. "I will be the bravest king the forest has ever known."</p><p>Dorothy looked at her three friends — each of them standing tall, each of them ready for the life ahead of them — and she felt a deep, bittersweet pride. They had come so far. The Scarecrow who could not stand without falling. The Tin Woodman who cried every time he felt anything. The Lion who trembled at his own shadow. They were not those creatures anymore.</p><p>"But how will they get to their new homes?" Dorothy asked.</p><p>"The Golden Cap," Glinda said. "You still have it, yes?"</p><p>Dorothy took the cap from her basket. "I have two commands left."</p><p>"Use one to send the Scarecrow to the Emerald City, the Tin Woodman to the Winkies, and the Lion to the great forest. The Winged Monkeys can carry them all at once."</p><p>"And the last command?"</p><p>Glinda smiled. "Give the cap to me. I will use the final command to set the Winged Monkeys free, so they will never be slaves again."</p><p>Dorothy's heart swelled. "Yes," she said. "They deserve to be free."</p><p>"Now," said Glinda, leaning forward, "let me tell you about the silver shoes."</p></div></div>' },
