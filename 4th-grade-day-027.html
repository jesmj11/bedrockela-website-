{render:()=>'<div class="lesson-page-card content-page"><h2>Glinda Grants Dorothy&#39;s Wish (Part 1)</h2><div><p>Glinda sat on her throne of rubies and looked at Dorothy with warm, knowing eyes.</p><p>&quot;Before I tell you how to get home,&quot; Glinda said, &quot;let me help your friends find their places in the world.&quot;</p><p>She turned to the Scarecrow. &quot;The people of the Emerald City have asked me to find them a good ruler. They love you, Scarecrow. You helped defeat the witches, and you governed wisely while the Wizard was... away. Will you return and lead them?&quot;</p><p>The Scarecrow straightened up. His painted face seemed to glow. &quot;I will,&quot; he said. &quot;I have brains now, and I will use them to make the Emerald City the wisest place in all of Oz.&quot;</p><p>Glinda turned to the Tin Woodman. &quot;The Winkies of the western land need a ruler, too. They remember how you fought for Dorothy, and how gently you treated them after the Witch was destroyed. Will you be their emperor?&quot;</p><p>The Tin Woodman placed both hands over his silk heart. &quot;Emperor?&quot; he said softly. &quot;Of the Winkies?&quot; He stood taller than Dorothy had ever seen him stand. &quot;I would be honored. I will rule them with all the kindness I have.&quot;</p><p>Glinda turned to the Lion. &quot;And the animals of the great forest near here have no king. They need someone brave and strong to protect them from danger. Will you return and rule them?&quot;</p><p>The Lion&#39;s mane seemed to bristle with new energy. &quot;I will,&quot; he said. &quot;I will be a good king. I will protect every creature in the forest, large and small.&quot;</p><p>Dorothy looked at her three friends — each of them standing tall, each of them exactly where they were meant to be. The Scarecrow who had been stuck on a pole. The Tin Woodman who had been rusted in a forest. The Lion who had been too afraid to leave his den. They had come so far.</p><p>&quot;But how will they reach their new homes?&quot; Dorothy asked.</p><p>&quot;The Golden Cap,&quot; Glinda said. &quot;You have two commands left, yes?&quot;</p><p>Dorothy took the cap from her basket. &quot;Yes.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Glinda Grants Dorothy&#39;s Wish (Part 2)</h2><div><p>&quot;Use the first to send all three of your friends to their new homes. The Winged Monkeys can carry the Scarecrow to the Emerald City, the Tin Woodman to the Winkies&#39; land, and the Lion to the great forest — all at once.&quot;</p><p>&quot;And the second command?&quot;</p><p>&quot;Give the cap to me,&quot; Glinda said. &quot;I will use the final command to set the Winged Monkeys free forever, so that no one can ever force them to be slaves again.&quot;</p><p>&quot;Yes,&quot; Dorothy said at once. &quot;They have been slaves long enough.&quot;</p><p>Dorothy put on the Golden Cap and spoke the magic words. The sky darkened, the air hummed, and the Winged Monkeys appeared, circling above the ruby castle.</p><p>&quot;What do you command?&quot; their leader asked.</p><p>&quot;Please carry my friends to their new homes,&quot; Dorothy said. &quot;The Scarecrow to the Emerald City, the Tin Woodman to the land of the Winkies, and the Lion to the great forest.&quot;</p><p>&quot;It shall be done,&quot; the monkey king said.</p><p>This was the moment Dorothy had been dreading. The goodbyes.</p><p>She went to the Scarecrow first. He was trying not to look sad, but his painted eyes gave him away.</p><p>&quot;You are the best friend I ever had,&quot; the Scarecrow said. &quot;Before you came along, I was stuck on a pole, and the crows laughed at me. You gave me a life.&quot;</p><p>&quot;You gave yourself a life,&quot; Dorothy said. &quot;I just helped you off the pole.&quot; She hugged him tightly. He smelled like clean straw and sunshine.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Glinda Grants Dorothy&#39;s Wish (Part 3)</h2><div><p>The Tin Woodman was next. He was crying so hard that Dorothy reached for the oil can without even thinking. She oiled his jaw, his cheeks, the hinges around his eyes.</p><p>&quot;Let them rust,&quot; the Tin Woodman whispered. &quot;Some things are worth rusting for.&quot;</p><p>Dorothy oiled him anyway. Then she hugged him, and his tin arms held her carefully, and his silk heart pressed against her cheek.</p><p>The Lion knelt so Dorothy could wrap her arms around his great maned neck. His golden fur was warm, and his chest rumbled with a sound that was half purr, half sob.</p><p>&quot;You made me brave,&quot; the Lion said.</p><p>&quot;No,&quot; Dorothy said. &quot;You were always brave. I just noticed.&quot;</p><p>The Winged Monkeys lifted her three friends into the air. Dorothy watched them grow smaller against the sky — a man of straw, a man of tin, a great golden lion — until they were specks, and then nothing.</p><p>She stood in the courtyard of the ruby castle, holding Toto, and allowed herself to cry.</p><p>Then she wiped her eyes, took a breath, and turned back to Glinda.</p><p>&quot;Now,&quot; Dorothy said. &quot;Tell me about the silver shoes.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. What does Glinda plan to do with the Golden Cap after Dorothy uses it?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. Each of Dorothy&#39;s friends receives a role that perfectly matches who they already are: the Scarecrow rules (brains), the Tin Woodman serves with kindness (heart), and the Lion protects (courage). Were these destinies created by the Wizard&#39;s gifts, or were they always who these characters were meant to be?</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
