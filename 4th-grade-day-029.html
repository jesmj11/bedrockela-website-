    { render: () => '<div class="lesson-page-card content-page"><h2>There's No Place Like Home (Part 1)</h2><div><p>"The silver shoes," Glinda said, "have a very powerful magic. They can carry you anywhere in the world in three steps."</p><p>Dorothy looked down at the shoes on her feet. She had been wearing them since the very beginning — since the moment she took them from the Wicked Witch of the East on her first day in Oz. Through forests and poppy fields, through the Emerald City and the Witch's castle, through every danger and every mile of yellow brick road — the answer had been on her feet the entire time.</p><p>"You mean," Dorothy said slowly, "I could have gone home from the very start?"</p><p>"Yes," Glinda said.</p><p>The room seemed to tilt. Dorothy felt dizzy with the weight of it. She could have gone home on the first day. She could have avoided the dark forest, the deadly poppies, the Wicked Witch, the humbug Wizard. She could have clicked her heels and been in Kansas before she ever set foot on the yellow brick road.</p><p>But then she never would have met the Scarecrow. Or the Tin Woodman. Or the Lion.</p><p>She never would have learned that the Scarecrow was the cleverest person she knew. She never would have watched the Tin Woodman weep over a crushed beetle. She never would have seen the Cowardly Lion stand between his friends and danger, shaking with fear but refusing to back down.</p><p>She never would have learned that a wizard could be a fraud and still teach a lesson, or that a bucket of water could defeat what an army could not, or that the smallest mouse and the fiercest lion could both be heroes.</p><p>She never would have learned what home really meant.</p><p>"I would not trade this journey for anything," Dorothy said.</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>There's No Place Like Home (Part 2)</h2><div><p>Glinda smiled. "I know. That is why I did not tell you sooner. Some things cannot be taught. They must be lived."</p><p>"How do I use the shoes?" Dorothy asked.</p><p>"Click the heels together three times," Glinda said. "And with each click, say where you wish to go."</p><p>Dorothy held Toto close against her chest. She could feel his small heart beating fast. She looked at Glinda — the most powerful and the most honest person she had met in all of Oz — and said, "Thank you."</p><p>"Thank yourself," Glinda said. "You did this, Dorothy. All of it."</p><p>Dorothy closed her eyes. She thought of Aunt Em's face. She thought of Uncle Henry's quiet hands. She thought of the flat, gray prairie and the small wooden house and the smell of bread baking in the oven.</p><p>She clicked her heels together.</p><p>"Take me home."</p><p>Click.</p><p>"Take me home."</p></div></div>' },
