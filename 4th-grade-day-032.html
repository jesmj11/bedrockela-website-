{render:()=>'<div class="lesson-page-card content-page"><h2>The Boy from Gascony (Part 1)</h2><div><p>On the first Monday of April, in the year 1625, a young man rode into the town of Meung on the most ridiculous horse anyone had ever seen.</p><p>The horse was yellow. Not golden, not amber — yellow, like a sunflower that had been left in the rain too long. It was old, bony, and walked with a peculiar sideways shuffle, as though it were not entirely sure how legs worked. Its mane stuck out in clumps, and its tail looked like it had been chewed on by something that was not very particular about its food.</p><p>The young man on the horse was no more impressive — at first glance. He was eighteen years old, tall and thin, with a long face tanned brown by the sun. He wore clothes that had once been fine but were now faded and patched in several places. At his side hung an enormous sword that was far too big for him. On his head sat a hat that might have been fashionable ten years earlier, in a town that had never been fashionable at all.</p><p>His name was D&#39;Artagnan, and he had come from Gascony — a rough, wild province in the south of France where the people were known for three things: their pride, their tempers, and their absolute refusal to be impressed by anyone or anything.</p><p>D&#39;Artagnan had all three qualities in abundance.</p><p>That morning, his father had stood in the doorway of their small stone farmhouse and given him three gifts. The first was the yellow horse. The second was fifteen gold coins — every coin the family could spare. The third was a piece of advice.</p><p>&quot;Yes, Father.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Boy from Gascony (Part 2)</h2><div><p>&quot;You will face many challenges in Paris. Men will try to cheat you, insult you, and fight you. Here is what you must know: never run from a fight, never tolerate an insult, and never — never — betray a friend. Do you understand?&quot;</p><p>&quot;Yes, Father.&quot;</p><p>&quot;One more thing.&quot; His father reached behind the door and brought out a sword in a worn leather scabbard. &quot;This was mine. It is old and plain, but the steel is good. Carry it with honor.&quot;</p><p>D&#39;Artagnan took the sword and drew it. The blade was long and straight, nicked in places from old battles, but still sharp. It felt heavy in his hand — heavier than any sword he had practiced with. But he held it steady and nodded.</p><p>&quot;I will make you proud,&quot; he said.</p><p>His father&#39;s eyes glistened. &quot;You already have.&quot;</p><p>His mother had cried, of course. She had pressed a small pouch of herbs into his hand — lavender, for luck — and kissed both his cheeks and told him to eat properly and wear clean shirts. D&#39;Artagnan had promised everything, knowing he would probably forget most of it by the second day.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Boy from Gascony (Part 3)</h2><div><p>And so he rode north, on his ridiculous yellow horse, with his father&#39;s sword and his mother&#39;s lavender and fifteen gold coins and a heart full of fire, toward the greatest city in the world.</p><p>Paris.</p><p>Where the King lived, and the musketeers served, and a young man from nowhere could become someone who mattered.</p><p>D&#39;Artagnan did not know, as he rode through the April sunshine, that he was about to walk straight into trouble. He did not know that before the day was over, he would be humiliated, robbed of his pride, and left burning with a desire for revenge that would change the course of his life.</p><p>But that was the thing about D&#39;Artagnan. Trouble did not frighten him.</p><p>Trouble was exactly what he was looking for.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. What three gifts does D&#39;Artagnan&#39;s father give him before he leaves for Paris?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. D&#39;Artagnan&#39;s father gives him three pieces of advice: never run from a fight, never tolerate an insult, and never betray a friend. Which piece of advice do you think will be the most important? Why?</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
