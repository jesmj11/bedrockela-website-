{render:()=>'<div class="lesson-page-card content-page"><h2>Trouble in Meung (Part 1)</h2><div><p>D&#39;Artagnan stopped at an inn in Meung to water his horse and eat something before the final stretch to Paris. He tied the yellow horse to a post and walked inside, trying to look confident and worldly, which is difficult to do when you are eighteen and your clothes are patched.</p><p>He was sitting by the window eating bread and cheese when he heard laughter from the courtyard.</p><p>He looked out. Three men stood around his horse, pointing and snickering. The tallest of them — a dark-haired man with a scar on his cheek and an air of cold authority — was describing the horse to his companions with obvious amusement.</p><p>&quot;I have never seen such a creature,&quot; the man said. &quot;It is the color of a dandelion and appears to move by accident rather than intention.&quot;</p><p>The other men roared with laughter.</p><p>D&#39;Artagnan&#39;s blood went hot. His father&#39;s voice echoed in his head: Never tolerate an insult.</p><p>He threw open the inn door and marched into the courtyard, his hand on his sword. &quot;Sir,&quot; he said, his voice shaking with anger, &quot;you are mocking my horse.&quot;</p><p>The man with the scar turned slowly and looked D&#39;Artagnan up and down. His eyes were sharp and cold, like a hawk studying a mouse. He did not seem impressed.</p><p>&quot;I am mocking your horse,&quot; the man agreed pleasantly. &quot;It deserves to be mocked.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Trouble in Meung (Part 2)</h2><div><p>&quot;That horse was a gift from my father,&quot; D&#39;Artagnan said. &quot;And any insult to it is an insult to me.&quot;</p><p>&quot;Then you are easily insulted,&quot; the man said. He turned back to his companions as though D&#39;Artagnan did not exist.</p><p>D&#39;Artagnan drew his sword.</p><p>What happened next was fast and painful. The man with the scar did not even bother to draw his own weapon. His two companions seized D&#39;Artagnan from behind, knocked the sword from his hand, and beat him with the flats of their blades until he fell to the ground. The innkeeper&#39;s servants came running out and dragged D&#39;Artagnan inside, where they dumped him on the kitchen floor.</p><p>When D&#39;Artagnan came to his senses, his head was throbbing, his ribs ached, and his pride hurt worst of all. He had been beaten — humiliated — in front of everyone, and the man with the scar had not even considered him worth fighting.</p><p>He staggered to the window just in time to see the man mounting a fine black horse. A woman leaned from a carriage window and spoke to him. She was beautiful — pale, with golden hair and eyes that glittered like cold jewels. The man bowed to her, and they exchanged words that D&#39;Artagnan could not hear.</p><p>Then they were gone.</p><p>D&#39;Artagnan burned. He did not know the man&#39;s name. He did not know the woman&#39;s name. But he memorized everything: the scar, the cold eyes, the black horse, the woman in the carriage. He would find them again. And when he did, things would be different.</p><p>He reached for his father&#39;s letter of introduction to Monsieur de Tréville — the letter that was supposed to open doors for him in Paris — and his stomach dropped.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Trouble in Meung (Part 3)</h2><div><p>It was gone. Stolen during the beating.</p><p>D&#39;Artagnan sank onto a bench and put his head in his hands. He had been in the world for exactly one day, and he had already lost his letter, his dignity, and very nearly his sword. He had nothing left but fifteen coins, a yellow horse, and his father&#39;s advice.</p><p>Never run from a fight. Never tolerate an insult. Never betray a friend.</p><p>&quot;Fine,&quot; D&#39;Artagnan said aloud to the empty kitchen. &quot;Paris it is.&quot;</p><p>He stood up, straightened his battered hat, and walked back out into the daylight. The yellow horse was still tied to the post, looking no worse than before — which was not saying much.</p><p>&quot;Come on,&quot; D&#39;Artagnan told the horse. &quot;We have work to do.&quot;</p><p>The horse shuffled sideways and sneezed.</p><p>They rode for Paris.</p></div></div>'},
