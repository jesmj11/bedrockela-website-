    { render: () => '<div class="lesson-page-card content-page"><h2>Three Duels Before Noon (Part 1)</h2><div><p>Paris was enormous.</p><p>D&apos;Artagnan had never seen so many people in one place. The streets were packed with carriages, horses, merchants, soldiers, beggars, and nobles in silk and lace. Buildings rose three and four stories high, and the noise was overwhelming — the clatter of hooves on cobblestone, the shouts of vendors, the barking of dogs, and underneath it all, a constant hum of life that never stopped.</p><p>D&apos;Artagnan sold the yellow horse for three gold coins — which was, honestly, more than it was worth — and found a tiny room above a shop that he could afford for a week. Then he put on his least-patched clothes, strapped on his father&apos;s sword, and went to find Monsieur de Tréville.</p><p>But D&apos;Artagnan was not the sort of person who let small problems like having nothing stop him. He walked straight up to the front door and asked to see the captain.</p><p>To his shock, Monsieur de Tréville agreed to see him. The captain was a serious man with sharp eyes and a military bearing. He listened as D&apos;Artagnan explained who he was — the son of an old comrade, come to Paris to serve the king.</p><p>&quot;I remember your father,&quot; Tréville said. &quot;He was a good man and a fine swordsman. I would have welcomed his letter, but I believe your story. I can offer you a place in the guards — not the musketeers, mind you, but the guards. Earn your place, and perhaps one day you will wear the blue cloak.&quot;</p><p>D&apos;Artagnan&apos;s heart soared. It was not everything he wanted, but it was a start.</p><p>He was leaving Tréville&apos;s office, practically floating with excitement, when he glanced out a window and saw something that turned his blood to ice.</p><p>The man with the scar.</p><p>Walking calmly through the street below, as though he had every right to exist in the same city as D&apos;Artagnan. The man who had humiliated him in Meung, who had stolen his letter, who had laughed at his horse and his sword and his pride.</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>Three Duels Before Noon (Part 2)</h2><div><p>D&apos;Artagnan did not think. He bolted down the stairs, crashed through the door, and sprinted into the street after the man — and in his haste, he slammed directly into a musketeer who was walking up the steps.</p><p>The musketeer was tall, dark-haired, and carried himself with quiet dignity. He winced sharply when D&apos;Artagnan hit his shoulder.</p><p>&quot;Forgive me!&quot; D&apos;Artagnan gasped. &quot;I am in a hurry —&quot;</p><p>&quot;You hit my shoulder,&quot; the musketeer said through clenched teeth. His face was pale with pain. &quot;That shoulder was wounded in a duel last week, and you have just made it worse.&quot;</p><p>&quot;I am sorry, truly —&quot;</p><p>&quot;Sorry is not enough,&quot; the musketeer said coldly. &quot;I will expect you at noon, behind the Luxembourg Palace. Bring your sword.&quot;</p><p>A duel. D&apos;Artagnan had been challenged to a duel by a musketeer. He had been in Paris less than a day.</p><p>&quot;I will be there,&quot; D&apos;Artagnan said, because he had promised his father he would never run from a fight.</p><p>He continued chasing the man with the scar, but the man had vanished into the crowd. Cursing, D&apos;Artagnan turned a corner too fast and ran straight into another musketeer — a large, broad-shouldered man in an enormous plumed hat who was showing off his new sword belt to a friend.</p><p>D&apos;Artagnan&apos;s foot caught the edge of the belt, and the elaborate gold clasp snapped clean off.</p></div></div>' },
