{render:()=>'<div class="lesson-page-card content-page"><h2>The Three Musketeers (Part 1)</h2><div><p>Over the next few weeks, D&#39;Artagnan learned everything he could about his three new friends.</p><p>Athos was the oldest of the three, and the most mysterious. He was tall, handsome, and carried himself like a nobleman — which, D&#39;Artagnan suspected, he secretly was. Athos rarely spoke about his past. When the others told stories around the fire, Athos listened with a faint, sad smile, as though he were remembering something painful. He drank more wine than was good for him, and sometimes D&#39;Artagnan found him sitting alone in the dark, staring at nothing.</p><p>But when Athos drew his sword, every trace of sadness disappeared. He became something magnificent — precise, controlled, and utterly fearless. He was the finest swordsman D&#39;Artagnan had ever seen, and D&#39;Artagnan&#39;s father had been very good indeed.</p><p>&quot;Athos does not fight because he enjoys it,&quot; Aramis told D&#39;Artagnan once. &quot;He fights because it is the one thing that makes him forget.&quot;</p><p>D&#39;Artagnan wanted to ask what Athos was trying to forget, but something in Aramis&#39;s eyes told him not to.</p><p>Porthos was the opposite of Athos in nearly every way. Where Athos was quiet, Porthos was loud. Where Athos was spare and elegant, Porthos was enormous and extravagant. He wore the biggest hats, the shiniest boots, and the most ridiculous sword belts in all of Paris. He told stories that grew bigger every time he told them, and he laughed at his own jokes louder than anyone else.</p><p>But beneath the bluster, Porthos had a heart the size of his appetite — which was considerable. He would give his last coin to a friend in need, share his last meal with a stranger, and fight anyone who threatened someone smaller than himself. He was vain, yes. He was loud, certainly. But he was also loyal to his bones.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Three Musketeers (Part 2)</h2><div><p>Aramis was the most puzzling of the three. He was slim, soft-spoken, and always impeccably dressed. He read poetry. He wrote letters in beautiful handwriting. He spoke of becoming a priest someday and leaving the world of swords behind.</p><p>And yet, when the fighting started, Aramis was as deadly as any of them. He fought with a quiet, lethal grace that belied his gentle manner. He was also the cleverest of the three — the one who noticed details the others missed, who read between the lines, who saw the trap before anyone walked into it.</p><p>&quot;Aramis is the most dangerous man I know,&quot; Athos said once, in a rare moment of openness. &quot;Because no one ever suspects him.&quot;</p><p>Together, the three musketeers were legendary. They were the best swordsmen in the king&#39;s service, the most loyal friends in all of France, and the biggest headache the Cardinal&#39;s Guards had ever known. They moved through Paris like a force of nature — fighting, feasting, and living by a code that was simple and unbreakable.</p><p>All for one, and one for all.</p><p>It meant that if one of them was in trouble, all of them came. If one was insulted, all were insulted. If one needed money, the others emptied their pockets. If one was challenged to a duel, three swords appeared at his side.</p><p>D&#39;Artagnan was not yet a musketeer — he was only a cadet in the guards, the lowest rung of the military ladder. He had no blue cloak, no silver cross, no official rank. But the three musketeers treated him as an equal. They invited him to their meals, included him in their adventures, and taught him everything they knew about swordsmanship, honor, and how to survive in a city where everyone was plotting against everyone else.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Three Musketeers (Part 3)</h2><div><p>&quot;You are one of us,&quot; Porthos told him simply. &quot;The cloak will come later. The friendship is now.&quot;</p><p>D&#39;Artagnan trained every day. He practiced with Athos, who taught him precision and control. He sparred with Porthos, who taught him power and endurance. He studied with Aramis, who taught him strategy and observation.</p><p>He was getting better. Faster. Stronger. More confident.</p><p>But Paris was a dangerous city, and the greatest danger of all was not in the streets. It was in the palace, where a man in red robes pulled the strings of power like a puppet master.</p><p>His name was Cardinal Richelieu, and he was about to change D&#39;Artagnan&#39;s life forever.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. Which description best matches each musketeer?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. The motto &#39;All for one, and one for all&#39; means that if one friend is in trouble, all of them come. Why is this code so powerful? What would happen to the group if even one of them broke it?</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
