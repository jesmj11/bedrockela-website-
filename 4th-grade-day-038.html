    { render: () => '<div class="lesson-page-card content-page"><h2>The Captain&apos;s Blessing (Part 1)</h2><div><p>The fame of the fight behind the Luxembourg Palace spread quickly. Four men against five of the Cardinal&apos;s Guards — and the four had won without losing a single sword. The story grew with each telling, as stories do. By the end of the week, some people claimed it had been four against ten. By the end of the month, four against twenty.</p><p>The king himself heard about it.</p><p>King Louis XIII was a complicated man. He depended on Cardinal Richelieu to run the government, but he secretly resented the Cardinal&apos;s power. The musketeers were HIS men — loyal to the crown, not to the church — and when they embarrassed the Cardinal&apos;s Guards, the king was quietly delighted.</p><p>&quot;Bring me this young Gascon,&quot; the king told Monsieur de Tréville. &quot;I want to meet the boy who fought alongside my musketeers.&quot;</p><p>D&apos;Artagnan was terrified. He had never been inside a palace, never stood before a king, never done anything more grand than herd goats in Gascony. He put on his best clothes — which were not very good — and tried to comb his hair into something respectable. Porthos lent him a hat. Aramis lent him a clean collar. Athos simply said, &quot;Stand straight and tell the truth. That is all any king can ask.&quot;</p><p>The palace was overwhelming. Gold everywhere — on the walls, the ceilings, the frames of every mirror. Courtiers in silk and velvet whispered behind their hands. D&apos;Artagnan felt like the yellow horse all over again: out of place and slightly ridiculous.</p><p>But when he stood before the king, something changed inside him. He stopped being afraid. He remembered his father&apos;s words: never run from a fight. This was not a fight with swords, but it was a fight nonetheless — a fight to prove that he belonged.</p><p>&quot;You are the boy from Gascony?&quot; the king asked. He was younger than D&apos;Artagnan expected, with a thin face and sharp, curious eyes.</p><p>&quot;Yes, Your Majesty.&quot;</p><p>&quot;They tell me you fought five of the Cardinal&apos;s Guards alongside three of my best musketeers. Is this true?&quot;</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>The Captain&apos;s Blessing (Part 2)</h2><div><p>&quot;It is, Your Majesty. Though I must say, Athos, Porthos, and Aramis did most of the work. I merely did my best not to get in their way.&quot;</p><p>The king smiled. Modesty was rare in Paris, and he appreciated it.</p><p>&quot;Tréville tells me you wish to become a musketeer,&quot; the king said.</p><p>&quot;More than anything, Your Majesty.&quot;</p><p>&quot;You are young. You are untested. You have no family name, no fortune, and no connections. Why should I allow it?&quot;</p><p>D&apos;Artagnan thought for a moment. Then he said, &quot;Because I will never stop trying, Your Majesty. I may not be the best swordsman in France — not yet. But I will work harder than anyone else, fight braver than anyone else, and be more loyal than anyone else. I may have nothing, but I will give everything.&quot;</p><p>The room was very quiet.</p><p>The king nodded slowly. &quot;Tréville,&quot; he said. &quot;Enroll this boy in your company of guards. Let him train. Let him prove himself. And when he has earned it — give him the blue cloak.&quot;</p><p>D&apos;Artagnan&apos;s heart nearly burst.</p><p>Monsieur de Tréville placed a hand on D&apos;Artagnan&apos;s shoulder as they left the throne room. &quot;You did well,&quot; the captain said. &quot;The king does not give praise easily. Earn that cloak, and you will have a place in this company for life.&quot;</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>The Captain&apos;s Blessing (Part 3)</h2><div><p>That evening, D&apos;Artagnan sat with Athos, Porthos, and Aramis in a small tavern near the barracks. The fire was warm. The food was simple — bread, cheese, and soup. But D&apos;Artagnan felt richer than any king.</p><p>&quot;To D&apos;Artagnan,&quot; Porthos said, raising his cup. &quot;The fourth musketeer.&quot;</p><p>&quot;I&apos;m not a musketeer yet,&quot; D&apos;Artagnan protested.</p><p>&quot;You will be,&quot; Athos said. And the way he said it — quiet, certain, without a shred of doubt — made D&apos;Artagnan believe it too.</p><p>They raised their cups together.</p><p>&quot;All for one,&quot; D&apos;Artagnan said.</p><p>&quot;And one for all,&quot; they answered.</p><p>Outside, the lights of Paris glittered in the darkness, and somewhere in the shadows of the city, a man in red robes was making plans that would test the four friends more than any sword fight ever could.</p></div></div>' },
