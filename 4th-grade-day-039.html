{render:()=>'<div class="lesson-page-card content-page"><h2>The Queen&#39;s Secret (Part 1)</h2><div><p>Cardinal Richelieu was the most powerful man in France.</p><p>He was not the king — that was Louis XIII. But everyone knew that Richelieu held the real power. He controlled the army, the treasury, and the network of spies that stretched across Europe like a web. He was brilliant, ruthless, and absolutely convinced that everything he did was for the good of France.</p><p>The king respected Richelieu. He also feared him, just a little. And the queen — Anne of Austria, who had come from Spain to marry Louis — feared the Cardinal most of all. Because the Cardinal did not trust her. She was Spanish, and France and Spain were enemies, and Richelieu believed that anyone with divided loyalties was dangerous.</p><p>He was not entirely wrong. The queen had a secret.</p><p>She had become friends with the Duke of Buckingham, an English nobleman who had visited Paris on a diplomatic mission. The friendship was innocent — the queen was lonely, far from her homeland, and Buckingham was kind and charming. But in the world of kings and cardinals, an innocent friendship between a French queen and an English duke was the most dangerous thing imaginable.</p><p>As a token of friendship, the queen had given the duke a gift: twelve diamond studs, set in blue velvet, that the king had given her on their wedding day. It was a foolish thing to do. If the king discovered that his gift was now in England, the consequences for the queen would be terrible.</p><p>D&#39;Artagnan stumbled into this world of secrets by accident.</p><p>His new lodgings were above the house of a man named Bonacieux, a mild-mannered cloth merchant whose wife worked as a seamstress for the queen. Constance Bonacieux was clever, brave, and devoted to the queen. When the queen needed help, Constance was the one she turned to.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Queen&#39;s Secret (Part 2)</h2><div><p>One evening, D&#39;Artagnan heard a commotion downstairs. He crept to the landing and saw two men dragging Constance Bonacieux toward the door. She was struggling and calling for help.</p><p>D&#39;Artagnan did not hesitate. He drew his sword, vaulted down the stairs, and confronted the men. They were agents of the Cardinal — D&#39;Artagnan recognized their red cloaks. He fought them fiercely, and they fled into the night, leaving Constance behind.</p><p>&quot;Thank you,&quot; Constance said, catching her breath. Her eyes were bright and sharp despite her fear. &quot;You are very brave.&quot;</p><p>&quot;What did they want with you?&quot; D&#39;Artagnan asked.</p><p>Constance hesitated. Then, sensing that D&#39;Artagnan could be trusted, she told him about the diamond studs.</p><p>&quot;The queen gave them to Buckingham as a sign of friendship,&quot; Constance explained. &quot;The Cardinal has discovered this. He has convinced the king to hold a great ball and to insist that the queen wear the diamond studs. If she cannot produce them, the king will know she gave them away. It will be a disaster.&quot;</p><p>&quot;When is the ball?&quot; D&#39;Artagnan asked.</p><p>&quot;In twelve days.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Queen&#39;s Secret (Part 3)</h2><div><p>&quot;And the studs are in England?&quot;</p><p>&quot;With the Duke of Buckingham, in London.&quot;</p><p>D&#39;Artagnan&#39;s mind raced. London was far — across the English Channel. The roads between Paris and the coast were controlled by the Cardinal&#39;s agents. Anyone trying to reach Buckingham would be hunted every step of the way.</p><p>It was impossibly dangerous. It was almost certainly a trap. It was exactly the kind of mission that could get a young man killed.</p><p>D&#39;Artagnan grinned.</p><p>&quot;I&#39;ll go,&quot; he said.</p></div></div>'},
