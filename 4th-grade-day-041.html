{render:()=>'<div class="lesson-page-card content-page"><h2>The Mission (Part 1)</h2><div><p>The trouble started in Chantilly.</p><p>They had been riding hard for two hours when they stopped at an inn to change horses and eat. A stranger approached Porthos as they were leaving and made a remark about the size of his hat. Porthos, who could not tolerate an insult to his wardrobe, challenged the man to a duel on the spot.</p><p>&quot;Go!&quot; Porthos shouted to the others as he drew his sword. &quot;I will catch up!&quot;</p><p>They hesitated. Every instinct told them to stay and fight beside their friend. But Athos shook his head.</p><p>&quot;The mission comes first,&quot; he said. &quot;Porthos can handle himself.&quot;</p><p>They rode on, three instead of four. D&#39;Artagnan looked back once and saw Porthos circling his opponent in the courtyard of the inn, his enormous sword gleaming in the sunlight. Then the road curved, and Porthos was gone.</p><p>In Beauvais, they were ambushed.</p><p>Eight men on horseback burst from the trees and surrounded them. The Cardinal&#39;s agents — D&#39;Artagnan recognized the cold efficiency of their attack. There was no warning, no conversation. Just swords and speed.</p><p>Aramis took a ball from a pistol in the shoulder. He slumped in his saddle but stayed mounted.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Mission (Part 2)</h2><div><p>&quot;Go!&quot; Aramis shouted, clutching his wounded arm. &quot;I&#39;ll hold them here! Go!&quot;</p><p>Athos and D&#39;Artagnan fought their way through the ring of attackers and galloped away, leaving Aramis behind to face the remaining agents alone. D&#39;Artagnan&#39;s heart was in pieces, but he kept riding.</p><p>Two friends down. Two left.</p><p>They reached Amiens by nightfall, exhausted and desperate. They stopped at an inn for fresh horses and found the innkeeper friendly — too friendly. He offered them wine, praised their bravery, and insisted they rest before continuing.</p><p>Athos, who trusted no one, tasted the wine and stopped drinking.</p><p>&quot;Drugged,&quot; he said quietly.</p><p>But it was too late. His vision was already blurring. The innkeeper had poisoned the wine before Athos could detect it.</p><p>&quot;Run,&quot; Athos whispered to D&#39;Artagnan. &quot;Take the fresh horse. Ride for Calais. Don&#39;t stop for anything.&quot;</p><p>&quot;I can&#39;t leave you —&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Mission (Part 3)</h2><div><p>&quot;You can and you will.&quot; Athos&#39;s eyes were fierce even as they glazed over. &quot;The mission, D&#39;Artagnan. The queen is counting on you. Go.&quot;</p><p>D&#39;Artagnan ran. He grabbed the fresh horse, swung into the saddle, and rode into the darkness alone.</p><p>Three friends down. D&#39;Artagnan alone.</p><p>The road to Calais was the loneliest ride of his life. Every shadow was an enemy. Every sound was an ambush. He rode through the night without stopping, his father&#39;s sword on his hip, the letter for Buckingham inside his coat, and the faces of his three friends burning in his mind.</p><p>They had sacrificed themselves for him — for the mission, for the queen, for the code they lived by. Porthos, fighting in a courtyard. Aramis, wounded and surrounded. Athos, poisoned and left behind. Each one had given himself so that D&#39;Artagnan could keep riding.</p><p>He would not let their sacrifices be wasted.</p><p>D&#39;Artagnan reached Calais at dawn. The harbor was gray and cold, and the English Channel stretched before him like a sheet of steel. He found a boat, paid the captain with his last coins, and crossed the water to England.</p><p>He was alone in a foreign country, with no money, no friends, and no plan except to find the Duke of Buckingham and save the queen.</p><p>But he was D&#39;Artagnan of Gascony. And he had promised.</p></div></div>'},
