{render:()=>'<div class="lesson-page-card content-page"><h2>D&#39;Artagnan Alone (Part 1)</h2><div><p>London was nothing like Paris.</p><p>The streets were wider but grayer, and the people spoke a language D&#39;Artagnan barely understood. He had learned a few words of English from Aramis, who spoke four languages, but it was not enough to ask for directions to a duke&#39;s palace.</p><p>He showed Constance&#39;s letter to a merchant near the docks. The man studied the seal, raised his eyebrows, and pointed D&#39;Artagnan toward a grand house near the river.</p><p>The Duke of Buckingham&#39;s residence was magnificent — marble columns, gleaming windows, and guards in red uniforms at every door. D&#39;Artagnan marched up to the front gate, covered in road dust and sea salt, his clothes torn, his face unshaven, and his eyes wild with exhaustion.</p><p>&quot;I must see the Duke of Buckingham,&quot; he said. &quot;Immediately.&quot;</p><p>The guards looked at this ragged young Frenchman and very nearly laughed. But D&#39;Artagnan produced the letter with the queen&#39;s seal, and the laughter died instantly. Within minutes, he was standing in a private room before one of the most powerful men in England.</p><p>The Duke of Buckingham was tall, elegant, and impeccably dressed. He had dark eyes and a sharp intelligence that D&#39;Artagnan recognized immediately — this was a man who understood power.</p><p>&quot;You come from the queen?&quot; Buckingham said, reading the letter. His expression changed as he understood the danger. &quot;The diamond studs. The Cardinal means to expose her.&quot;</p><p>&quot;The ball is in seven days,&quot; D&#39;Artagnan said. &quot;If the queen cannot wear the studs, the king will know she gave them away. You must return them.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>D&#39;Artagnan Alone (Part 2)</h2><div><p>Buckingham moved immediately. He unlocked a velvet case and produced the diamond studs — twelve brilliant stones set in a ribbon of blue silk. They were dazzling, even in the dim light of the room.</p><p>Then he stopped. His face went pale.</p><p>&quot;Two are missing,&quot; Buckingham said.</p><p>&quot;Missing?&quot;</p><p>Buckingham examined the ribbon closely. &quot;The clasps have been cut. Someone has stolen two of the studs.&quot; His jaw tightened. &quot;Milady de Winter. She was here last week — a guest at a banquet. She must have taken them. She is an agent of the Cardinal.&quot;</p><p>D&#39;Artagnan felt the floor shift under him. Two missing studs. The Cardinal&#39;s agent had been one step ahead of them.</p><p>&quot;How long to replace them?&quot; D&#39;Artagnan asked.</p><p>Buckingham was already calling for his jeweler. &quot;Two days,&quot; he said. &quot;My jeweler is the finest in London. He can make copies that even the queen herself could not tell from the originals.&quot;</p><p>&quot;Two days,&quot; D&#39;Artagnan repeated. That left five days to cross the Channel and ride back to Paris. It would be close — desperately close.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>D&#39;Artagnan Alone (Part 3)</h2><div><p>For two days, D&#39;Artagnan paced the halls of Buckingham&#39;s residence like a caged animal. He ate without tasting. He slept in snatches. He checked the jeweler&#39;s progress every few hours, watching the old man set tiny diamonds into gold with steady, ancient hands.</p><p>On the morning of the third day, the jeweler finished. Twelve diamond studs lay on blue velvet — ten originals and two copies so perfect that even Buckingham could not tell them apart.</p><p>&quot;Thank you,&quot; D&#39;Artagnan said, tucking the velvet case inside his coat. &quot;I will never forget this.&quot;</p><p>Buckingham provided a fast horse, a bag of gold, and a letter of passage that would get D&#39;Artagnan through English ports without delay. At the dock, he gripped D&#39;Artagnan&#39;s hand.</p><p>&quot;Tell the queen that Buckingham is her servant,&quot; the duke said. &quot;And tell her that her friendship is the greatest treasure I possess — worth more than any diamonds.&quot;</p><p>D&#39;Artagnan nodded, mounted his horse, and rode for the coast.</p><p>The Channel crossing was rough — gray waves and howling wind — but D&#39;Artagnan barely noticed. All he could think about was the road ahead. Five days to Paris. The Cardinal&#39;s agents would be watching every mile.</p><p>But D&#39;Artagnan had the studs, a fast horse, and a fire in his chest that no Cardinal could extinguish.</p><p>He rode.</p></div></div>'},
