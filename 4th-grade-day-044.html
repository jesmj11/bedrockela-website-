{render:()=>'<div class="lesson-page-card content-page"><h2>The Race to Paris (Part 1)</h2><div><p>The ride back was a nightmare.</p><p>D&#39;Artagnan pushed his horse to the limit, changing mounts at every coaching inn. He rode through rain and darkness, eating in the saddle, sleeping only when his eyes refused to stay open. Every hour counted. The ball was in five days. Then four. Then three.</p><p>The Cardinal&#39;s agents were everywhere. At Boulogne, two men tried to block the road. D&#39;Artagnan spurred his horse straight at them, and they dove out of the way. At Abbeville, a man in a tavern tried to start a fight — obviously trying to delay him. D&#39;Artagnan walked out without a word, which was the hardest thing he had ever done. Every instinct screamed at him to draw his sword, but the mission came first.</p><p>On the third night, exhausted beyond anything he had ever experienced, D&#39;Artagnan found Athos.</p><p>The musketeer was in the cellar of the inn at Amiens — the same inn where he had been drugged. He was alive, awake, and surrounded by empty wine bottles. He had locked the innkeeper in the cellar with him and refused to let the man leave until he confessed who had paid him to drug the wine.</p><p>&quot;The Cardinal&#39;s agents paid me twenty gold pieces,&quot; the innkeeper whimpered. &quot;Please let me go.&quot;</p><p>&quot;D&#39;Artagnan!&quot; Athos stood up, swaying slightly. &quot;You are alive!&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Race to Paris (Part 2)</h2><div><p>&quot;So are you,&quot; D&#39;Artagnan said, relief flooding through him. &quot;What about the others?&quot;</p><p>&quot;Porthos won his duel in Chantilly and is recovering at the inn — his opponent nicked his leg, nothing serious. Aramis&#39;s wound was minor; a farmer&#39;s wife bandaged him and he is resting in Beauvais. They are all alive.&quot;</p><p>D&#39;Artagnan felt tears prick his eyes. His friends were safe. Battered, wounded, scattered across France — but safe.</p><p>&quot;Do you have the studs?&quot; Athos asked.</p><p>D&#39;Artagnan patted his coat. &quot;All twelve. Two were stolen by a woman named Milady de Winter, but Buckingham&#39;s jeweler made perfect copies.&quot;</p><p>&quot;Milady,&quot; Athos said, and something dark and complicated passed across his face. He said nothing more, but D&#39;Artagnan filed the reaction away. There was a story there — a painful one.</p><p>&quot;I must get to Paris,&quot; D&#39;Artagnan said. &quot;The ball is the day after tomorrow.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Race to Paris (Part 3)</h2><div><p>&quot;Then ride,&quot; Athos said. &quot;I will follow when I can. But you — ride like the wind, D&#39;Artagnan. The queen is depending on you.&quot;</p><p>D&#39;Artagnan rode. Through the night, through the rain, through his own exhaustion. He ate hard bread and drank water from streams. His legs ached. His back burned. His eyes stung from lack of sleep.</p><p>But every time he wanted to stop, he thought of the queen — alone in her palace, waiting for the studs that could save her. He thought of Constance, who had trusted him with this mission. He thought of Athos, Porthos, and Aramis, who had sacrificed themselves so he could keep riding.</p><p>He could not let them down. He would not.</p><p>On the morning of the ball, D&#39;Artagnan galloped through the gates of Paris covered in mud, half-dead with exhaustion, clutching the velvet case against his chest like a newborn child.</p><p>He had made it.</p><p>Barely.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. What does D&#39;Artagnan discover when he finds Athos at the inn in Amiens?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. When D&#39;Artagnan learns all three of his friends survived, he nearly cries with relief. Why is this moment so emotional? What does it reveal about what D&#39;Artagnan values most?</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
