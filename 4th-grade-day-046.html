{render:()=>'<div class="lesson-page-card content-page"><h2>The Woman in the Shadows (Part 1)</h2><div><p>In the weeks following the ball, D&#39;Artagnan began to notice a woman.</p><p>She appeared at the edges of his life like a shadow — glimpsed across a crowded street, spotted in a carriage window, mentioned in whispered conversations. She was beautiful in a way that made people stop and stare: golden hair, pale skin, and eyes so blue they seemed almost violet. She moved through Parisian society with effortless grace, charming everyone she met.</p><p>Her name was Milady de Winter.</p><p>D&#39;Artagnan recognized the name immediately. This was the woman the Duke of Buckingham had mentioned — the one who had stolen two diamond studs from his case. She was an agent of the Cardinal, working in the shadows to carry out his schemes.</p><p>&quot;Stay away from her,&quot; Athos warned when D&#39;Artagnan mentioned the name.</p><p>They were sitting in their usual tavern. Athos&#39;s voice was low and hard — harder than D&#39;Artagnan had ever heard it.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Woman in the Shadows (Part 2)</h2><div><p>&quot;You know her?&quot; D&#39;Artagnan asked.</p><p>&quot;I know what she is,&quot; Athos said. &quot;She is the most dangerous person in France. More dangerous than the Cardinal himself, because the Cardinal at least acts in the open. Milady works in darkness. She uses charm the way others use swords — to get close enough to strike.&quot;</p><p>&quot;What do you mean?&quot;</p><p>Athos stared into his wine for a long time. &quot;She is not what she appears to be. Nothing about her is real. The beauty, the manners, the gentle voice — they are weapons. She has destroyed better men than you, D&#39;Artagnan. Stay away.&quot;</p><p>D&#39;Artagnan heard the warning. He understood the danger. But something in Athos&#39;s voice bothered him — the way it cracked slightly, the way his hand tightened on his cup, the way his dark eyes flickered with something that looked like grief.</p><p>There was history there. Deep, painful history.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Woman in the Shadows (Part 3)</h2><div><p>D&#39;Artagnan did not ask. He knew Athos well enough to know that pressing would only drive the man deeper into silence. But he watched Milady more carefully after that, and what he saw confirmed Athos&#39;s warning.</p><p>Milady met with the Cardinal&#39;s agents in quiet corners. She passed notes in sealed envelopes. She attended parties where important people said careless things, and those careless words somehow found their way to the Cardinal&#39;s ears.</p><p>She was a spy. A brilliant, beautiful, utterly ruthless spy.</p><p>And D&#39;Artagnan had the uncomfortable feeling that she was watching him, too.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. Why does Athos warn D&#39;Artagnan to stay away from Milady?</p><textarea id="q1" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea><p>2. Athos says Milady &#39;has destroyed better men than you.&#39; What makes Milady more dangerous than the Cardinal&#39;s Guards or the enemies they fought on the road to England?</p><textarea id="q2" style="width:100%;min-height:100px;padding:12px;border:2px solid #305853;border-radius:8px;font-family:inherit;font-size:16px;line-height:1.6;resize:vertical;"></textarea></div>'},
