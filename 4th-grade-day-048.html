    { render: () => '<div class="lesson-page-card content-page"><h2>Athos&apos;s Secret (Part 1)</h2><div><p>The truth came out one night when Athos had drunk more wine than usual.</p><p>The four friends were alone in Athos&apos;s rooms. A storm raged outside, rain hammering the windows and wind howling through the streets. Porthos was asleep in a chair, snoring. Aramis was reading by candlelight. D&apos;Artagnan sat on the floor, cleaning his sword.</p><p>&quot;I was married once,&quot; Athos said suddenly.</p><p>D&apos;Artagnan looked up. Athos never talked about his past. In all the months they had been friends, Athos had shared nothing about who he was before Paris — no family, no home, no history. He was like a man who had appeared fully formed, with nothing behind him but shadows.</p><p>&quot;She was beautiful,&quot; Athos continued, his voice flat and distant, as though he were talking about someone else&apos;s life. &quot;The most beautiful woman I had ever seen. I was young — younger than you, D&apos;Artagnan — and I was a fool. I fell in love with her face and her voice and her smile, and I did not look deeper.&quot;</p><p>Aramis closed his book. Even Porthos stopped snoring, though whether he was awake or simply holding his breath was unclear.</p><p>&quot;I married her,&quot; Athos said. &quot;I gave her my name, my home, my trust — everything. And then one day, by accident, I discovered the truth. She was a criminal. She had committed terrible crimes — theft, deception, cruelty. She had been branded on the shoulder as punishment — a mark that she had hidden from everyone, including me.&quot;</p></div></div>' },
