{render:()=>'<div class="lesson-page-card content-page"><h2>The Siege of La Rochelle (Part 1)</h2><div><p>War came, as it always does.</p><p>The Cardinal ordered the King&#39;s armies to march south to the city of La Rochelle, a Protestant stronghold that had been resisting the Cardinal&#39;s authority for years. The musketeers were called to fight, and D&#39;Artagnan — as a cadet attached to the company — went with them.</p><p>La Rochelle was a walled city on the coast, surrounded by water on one side and the king&#39;s army on the other. The siege would be long and bloody. Thousands of soldiers camped in the fields outside the walls, digging trenches, building fortifications, and waiting for the city to surrender.</p><p>It was D&#39;Artagnan&#39;s first experience of real war, and it was nothing like the stories.</p><p>The stories talked about glory and honor and magnificent charges. The reality was mud, cold, bad food, and long stretches of boredom punctuated by sudden, terrifying violence. Cannonballs screamed overhead. Musket fire crackled from the walls. Men D&#39;Artagnan had eaten breakfast with were carried away on stretchers by afternoon.</p><p>But the four friends endured it together, and that made all the difference.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Siege of La Rochelle (Part 2)</h2><div><p>Athos was calm under fire — eerily calm, as though the chaos of battle were a relief from the chaos inside his own head. He gave quiet orders, steadied nervous soldiers, and fought with the cold precision that made him legendary.</p><p>Porthos was in his element. He was built for war — his enormous strength and boundless energy made him tireless in the trenches. He carried supplies that took two normal men to lift, dug fortifications with the enthusiasm of a boy building a sandcastle, and told jokes so bad that even the enemy must have groaned.</p><p>Aramis tended the wounded as often as he fought. He bandaged cuts, set broken bones, and prayed with dying men. The gentle poet who dreamed of becoming a priest was, in the horror of war, exactly the person everyone needed.</p><p>D&#39;Artagnan fought bravely. He volunteered for every dangerous mission, led scouting parties into no-man&#39;s-land, and never once showed fear — though he felt it, deeply, every single day.</p><p>&quot;You do not have to prove yourself this hard,&quot; Athos told him one evening, as they sat in the trench watching the sun set over the ocean.</p><p>&quot;Yes, I do,&quot; D&#39;Artagnan said.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Siege of La Rochelle (Part 3)</h2><div><p>&quot;Why?&quot;</p><p>&quot;Because every time I volunteer for something dangerous, every time I fight harder than I need to, I am one step closer to the blue cloak. And I want it, Athos. I want it more than anything.&quot;</p><p>Athos looked at him for a long time. &quot;You will have it,&quot; he said. &quot;But not because of what you do in battle. You will have it because of who you are.&quot;</p><p>D&#39;Artagnan did not entirely understand. But he kept the words in his heart and returned to the fighting the next day.</p></div></div>'},
