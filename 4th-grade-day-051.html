{render:()=>'<div class="lesson-page-card content-page"><h2>Milady&#39;s Mission (Part 1)</h2><div><p>While the four friends ate breakfast under cannon fire, Milady de Winter was already at sea.</p><p>Her ship cut through the grey waters of the English Channel, carrying her toward England and the Duke of Buckingham. In her luggage was a letter from the Cardinal with very specific instructions. In her mind was a plan far more dangerous than anything the Cardinal had imagined.</p><p>Milady was not simply the Cardinal&#39;s agent. She was her own agent — a woman of extraordinary intelligence who used everyone around her as tools to achieve her own ends. The Cardinal thought he controlled her. He was wrong. Milady served Milady, and no one else.</p><p>Back at the siege, D&#39;Artagnan pieced together what he could about Milady&#39;s movements from intercepted messages and the gossip of soldiers. Aramis, whose network of contacts stretched across France, gathered additional information from letters and whispered conversations.</p><p>&quot;She reached England three days ago,&quot; Aramis reported one evening. &quot;She is staying near Buckingham&#39;s estate.&quot;</p><p>&quot;What is she planning?&quot; Porthos asked.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Milady&#39;s Mission (Part 2)</h2><div><p>&quot;Something terrible,&quot; Athos said quietly. He knew Milady better than any of them. He knew what she was capable of. &quot;The Cardinal wants a message delivered. But Milady will do more than deliver a message. She never simply does what she is told. She improves upon it — makes it darker, more final.&quot;</p><p>D&#39;Artagnan felt a chill. &quot;You think she will try to harm Buckingham?&quot;</p><p>&quot;I think she will try to destroy him,&quot; Athos said. &quot;And anyone else who stands in her way.&quot;</p><p>They sent warnings to England through every channel they could find — letters carried by trusted messengers, coded notes passed through Aramis&#39;s network of contacts, even a message entrusted to the captain of a merchant ship bound for London.</p><p>But they could not be sure any of the warnings would arrive in time. The sea was wide, the roads were dangerous, and Milady had a head start.</p><p>&quot;We have done what we can from here,&quot; Athos said. &quot;The rest depends on others.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Milady&#39;s Mission (Part 3)</h2><div><p>D&#39;Artagnan hated waiting. He was a man of action — of riding and fighting and doing things with his own hands. Sitting in a trench while someone he cared about was in danger felt like a slow form of torture.</p><p>But Athos taught him something important during those long days of waiting.</p><p>&quot;Patience is not weakness,&quot; Athos said. &quot;It is the hardest kind of strength. Any fool can charge into battle. It takes real courage to wait, to trust, to hold steady when every part of you wants to run.&quot;</p><p>D&#39;Artagnan tried to learn this lesson. He was not sure he succeeded.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>Comprehension</h2><p>1. What does Athos say about Milady&#39;s nature as the Cardinal&#39;s agent?</p><textarea id="q1"></textarea><p>2. Athos teaches D&#39;Artagnan that &#39;patience is not weakness — it is the hardest kind of strength.&#39; D&#39;Artagnan hates waiting while Milady is in England. Is Athos right? When is patience stronger than action?</p><textarea id="q2"></textarea></div>'},
