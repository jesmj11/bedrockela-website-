    { render: () => '<div class="lesson-page-card content-page"><h2>Milady&apos;s Mission (Part 1)</h2><div><p>While the four friends ate breakfast under cannon fire, Milady de Winter was already at sea.</p><p>Her ship cut through the grey waters of the English Channel, carrying her toward England and the Duke of Buckingham. In her luggage was a letter from the Cardinal with very specific instructions. In her mind was a plan far more dangerous than anything the Cardinal had imagined.</p><p>Milady was not simply the Cardinal&apos;s agent. She was her own agent — a woman of extraordinary intelligence who used everyone around her as tools to achieve her own ends. The Cardinal thought he controlled her. He was wrong. Milady served Milady, and no one else.</p><p>Back at the siege, D&apos;Artagnan pieced together what he could about Milady&apos;s movements from intercepted messages and the gossip of soldiers. Aramis, whose network of contacts stretched across France, gathered additional information from letters and whispered conversations.</p><p>&quot;She reached England three days ago,&quot; Aramis reported one evening. &quot;She is staying near Buckingham&apos;s estate.&quot;</p><p>&quot;What is she planning?&quot; Porthos asked.</p></div></div>' },
