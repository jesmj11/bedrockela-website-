{render:()=>'<div class="lesson-page-card content-page"><h2>The Warning (Part 1)</h2><div><p>They rode hard for Paris, gathering information at every stop. Aramis&#39;s network of contacts proved invaluable — at each coaching inn, there was someone who owed him a favor, someone who had heard something, someone who could point them in the right direction.</p><p>The picture that emerged was terrifying.</p><p>Milady had returned to France. She had been spotted in the north, traveling fast, with purpose. She was heading for a convent near the town of Béthune, where — according to Aramis&#39;s sources — Constance had been hidden for her own safety.</p><p>&quot;She knows where Constance is,&quot; D&#39;Artagnan said, his face white. &quot;How does she know?&quot;</p><p>&quot;The Cardinal&#39;s spies,&quot; Athos said. &quot;He knows everything. And Milady has his full resources behind her.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Warning (Part 2)</h2><div><p>They pushed their horses harder. D&#39;Artagnan rode at the front, leaning forward in the saddle, willing the horse to go faster. Every minute felt like an hour. Every delay — a lame horse, a blocked road, a bridge under repair — was agony.</p><p>On the third day, they met a man on the road who recognized Aramis. He was a monk from a monastery near Béthune, and he carried terrible news.</p><p>&quot;A woman arrived at the convent two days ago,&quot; the monk said. &quot;Beautiful, with golden hair. She told the Mother Superior she was a friend of the young woman staying there — Constance Bonacieux. The Mother Superior believed her.&quot;</p><p>&quot;No,&quot; D&#39;Artagnan whispered.</p><p>&quot;We must ride faster,&quot; Athos said.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Warning (Part 3)</h2><div><p>They abandoned the road and cut across open country, jumping fences and splashing through streams. The horses were foaming and wild-eyed. D&#39;Artagnan&#39;s hands were numb on the reins, and his heart was pounding so hard he could hear it over the hoofbeats.</p><p>As the sun set on the third day, they saw the convent in the distance — a quiet stone building surrounded by gardens, looking peaceful and safe.</p><p>D&#39;Artagnan leaped from his horse before it had fully stopped and ran for the door.</p></div></div>'},
