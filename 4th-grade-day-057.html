{render:()=>'<div class="lesson-page-card content-page"><h2>The Cardinal&#39;s Offer (Part 1)</h2><div><p>They returned to Paris expecting punishment. They had left the siege without full permission, pursued a personal vendetta against one of the Cardinal&#39;s agents, and conducted a trial with no legal authority. The Cardinal had every reason to destroy them.</p><p>D&#39;Artagnan was summoned to the Cardinal&#39;s private chambers in the palace. He went alone. Athos, Porthos, and Aramis wanted to accompany him, but D&#39;Artagnan refused.</p><p>&quot;This is my fight,&quot; he said. &quot;If anyone is punished, it should be me. I started this.&quot;</p><p>He walked through the palace corridors feeling like a man walking toward the executioner&#39;s block. The Cardinal&#39;s guards lined the halls, watching him with cold eyes. The doors to the Cardinal&#39;s chambers were enormous — dark wood, iron hinges, large enough to make anyone who entered feel small.</p><p>Cardinal Richelieu sat behind a desk piled with documents. He was older than D&#39;Artagnan had expected — thin, sharp-featured, with piercing eyes that seemed to see through walls. He wore his red robes like armor.</p><p>&quot;Sit down,&quot; the Cardinal said.</p><p>D&#39;Artagnan sat.</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Cardinal&#39;s Offer (Part 2)</h2><div><p>&quot;You have caused me a great deal of trouble,&quot; the Cardinal said. His voice was not angry. It was measured, curious, almost respectful. &quot;You retrieved the diamond studs. You warned Buckingham. You pursued and captured my agent. You have interfered with my plans at every turn.&quot;</p><p>&quot;I did what honor required,&quot; D&#39;Artagnan said.</p><p>&quot;Honor,&quot; the Cardinal repeated. He seemed to taste the word. &quot;An interesting concept. Tell me, young man — do you believe that I am without honor?&quot;</p><p>D&#39;Artagnan hesitated. This was a trap. Any answer could be wrong.</p><p>&quot;I believe that you serve France,&quot; D&#39;Artagnan said carefully. &quot;And I believe that you and I disagree about how France should be served.&quot;</p><p>The Cardinal&#39;s eyes narrowed — not with anger, but with something like appreciation. &quot;A diplomatic answer. You are learning.&quot;</p><p>He reached into his desk and produced a folded document. &quot;I should have you arrested,&quot; the Cardinal said. &quot;I should have all four of you locked in the Bastille for the rest of your lives. You have defied me, embarrassed me, and cost me one of my most valuable agents.&quot;</p></div></div>'},
{render:()=>'<div class="lesson-page-card content-page"><h2>The Cardinal&#39;s Offer (Part 3)</h2><div><p>D&#39;Artagnan said nothing. His heart hammered.</p><p>&quot;But I am not a petty man,&quot; the Cardinal continued. &quot;I recognize talent when I see it. And you, D&#39;Artagnan of Gascony, have talent. You have courage, determination, loyalty, and an irritating refusal to give up that I find... admirable.&quot;</p><p>He unfolded the document and slid it across the desk. D&#39;Artagnan looked down.</p><p>&quot;Fill in any name you wish,&quot; the Cardinal said. &quot;Your own, or one of your friends&#39;. Consider it a peace offering — from an old man who knows how to recognize a worthy opponent.&quot;</p><p>D&#39;Artagnan stared at the document. This was everything he had wanted since leaving Gascony. The blue cloak. The silver cross. The rank of musketeer.</p><p>He picked up the commission, bowed to the Cardinal, and walked out of the palace in a daze.</p></div></div>'},
