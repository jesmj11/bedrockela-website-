    { render: () => '<div class="lesson-page-card content-page"><h2>The Trial of Milady (Part 1)</h2><div><p>They found her at a house near the river, three days north of Béthune.</p><p>She was alone. Her carriage stood in the courtyard, her bags packed for a journey. She was preparing to flee to a new country, a new name, a new life — as she had done so many times before.</p><p>But this time, four men blocked her path.</p><p>They brought her to a clearing on the riverbank. It was night. The moon hung low and full, casting silver light across the water. Torches had been planted in the ground, and their flames flickered in the wind.</p><p>Milady stood in the center of the clearing, her hands unbound. She was not chained or shackled. There was nowhere to run.</p><p>She was still beautiful. Even now, even in the torchlight with four armed men surrounding her, she carried herself with poise and elegance. She looked at each of them in turn — Athos, Porthos, Aramis, D&apos;Artagnan — and her expression was calm. Almost amused.</p><p>&quot;So,&quot; she said. &quot;A trial.&quot;</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>The Trial of Milady (Part 2)</h2><div><p>&quot;Yes,&quot; Athos said. His voice was steady, but D&apos;Artagnan could see the effort it cost him. This woman had been his wife. He had loved her once. And now he stood in judgment of her. &quot;You will answer for your crimes.&quot;</p><p>Athos listed them. The theft of the diamond studs. The manipulation of the Cardinal&apos;s power for personal gain. The escape from English custody through deception. And the poisoning of Constance Bonacieux — an innocent woman whose only crime had been loyalty to the queen.</p><p>Milady listened to each charge without flinching. When Athos finished, she spoke.</p><p>&quot;I have done what I had to do to survive,&quot; she said. &quot;The world gave me nothing. Every man I trusted betrayed me. Every hand that was offered came with a price. I made myself powerful because no one else would protect me.&quot;</p><p>&quot;You poisoned an innocent woman,&quot; D&apos;Artagnan said.</p><p>Milady&apos;s eyes flickered. For just a moment — so brief that D&apos;Artagnan almost missed it — something human passed across her face. Regret? Shame? Or simply the recognition that she had finally gone too far?</p><p>&quot;She was in my way,&quot; Milady said. But her voice was quieter now.</p></div></div>' },
