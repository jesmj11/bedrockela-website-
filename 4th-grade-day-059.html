    { render: () => '<div class="lesson-page-card content-page"><h2>One for All (Part 1)</h2><div><p>D&apos;Artagnan found his three friends waiting at the tavern. They were trying to look calm, but the worry in their eyes gave them away. When D&apos;Artagnan walked through the door — alive, free, and carrying a piece of paper — all three of them stood up at once.</p><p>&quot;Well?&quot; Porthos demanded. &quot;Are we going to prison?&quot;</p><p>D&apos;Artagnan laid the commission on the table.</p><p>There was a long silence as the three musketeers read it. A lieutenant&apos;s commission. Blank. Ready for any name.</p><p>&quot;He gave you this?&quot; Athos said, disbelief in his voice.</p><p>&quot;He said I could fill in any name. Mine, or one of yours.&quot; D&apos;Artagnan pushed the document toward Athos. &quot;It should be yours. You are the best of us.&quot;</p><p>Athos pushed it back. &quot;I do not want rank. I have had rank before, and it brought me nothing but grief. Give it to Porthos.&quot;</p><p>Porthos shook his head. &quot;I am too loud and too vain for command. Everyone knows it, including me. Give it to Aramis.&quot;</p></div></div>' },
    { render: () => '<div class="lesson-page-card content-page"><h2>One for All (Part 2)</h2><div><p>Aramis smiled gently. &quot;I am thinking of leaving the musketeers to enter the church. A commission would be wasted on me. It must be yours, D&apos;Artagnan.&quot;</p><p>D&apos;Artagnan looked at his friends — each one refusing the honor, each one insisting it go to someone else. This was who they were. This was what &quot;all for one&quot; truly meant. Not just fighting together, but lifting each other up.</p><p>&quot;I cannot take this,&quot; D&apos;Artagnan said. &quot;Not alone. Everything I have done, I did because of you. Athos taught me to think. Porthos taught me to be strong. Aramis taught me to be clever. Without the three of you, I would still be a boy from Gascony on a yellow horse.&quot;</p><p>&quot;You were never just a boy from Gascony,&quot; Athos said. &quot;You were always a musketeer. You simply needed time to prove it.&quot;</p><p>D&apos;Artagnan picked up the quill from the table. His hand trembled slightly. He dipped it in ink and, in his best handwriting, wrote his name on the blank line.</p><p>D&apos;Artagnan.</p><p>He looked up at his friends.</p><p>&quot;I accept this,&quot; he said. &quot;Not for myself. For us. For everything we have been through and everything we will face together.&quot;</p></div></div>' },
