 orphan, first came to her, Aunt Em had been so startled by the child’s laughter that she would scream and press her hand upon her heart whenever Dorothy’s merry voice reached her ears; and she still looked at the little girl with wonder that she could find anything to laugh at. Uncle Henry never laughed. He worked hard from morning till night and did not know what joy was. He was gray also, from his long beard to his rough boots, and he looked stern and solemn, and rarely spoke. It was Toto that made Dorothy laugh, and saved her from growing as gray as her other surroundings. Toto was not gray; he was a little black dog, with long silky hair and small black eyes that twinkled merrily on either side of his funny, wee nose. Toto played all day long, and Dorothy played with him, and loved him dearly. Today, however, they were not playing. Uncle Henry sat upon the doorstep and looked anxiously at the sky, which was even grayer than usual. Dorothy stood in the door with Toto in her arms, and looked at the sky too. Aunt Em was washing the dishes. From the far north they heard a low wail of the wind, and Uncle Henry and Dorothy could see where the long grass bowed in waves before the coming storm. There now came a sharp whistling in the air from the south, and as they turned their eyes that way they saw ripples in the grass coming from that direction also. Suddenly Uncle Henry stood up. “There’s a <span class="vocab-highlight" title="Vocabulary word: cyclone">cyclone</span> coming, Em,” he called to his wife. “I’ll go look after the stock.” Then he ran toward the sheds where the cows and horses were kept. Aunt Em dropped her work and came to the door. One glance told her of the danger close at hand. “Quick, Dorothy!” she screamed. “Run for the cellar!” Toto jumped out of Dorothy’s arms and hid under the bed, and the girl started to get him. Aunt Em, badly frightened, threw open the trap door in the floor and climbed down the ladder into the small, dark hole. Dorothy caught Toto at last and started to follow her aunt. When she was halfway across the room there came a great shriek from the wind, and the house shook so hard that she lost her footing and sat down suddenly upon the floor. Then a strange thing happened. The house whirled around two or three times and rose slowly through the air. Dorothy felt as if she were going up in a balloon. The north and south winds met where the house stood, and made it the exact center of the <span class="vocab-highlight" title="Vocabulary word: cyclone">cyclone</span>. In the middle of a <span class="vocab-highlight" title="Vocabulary word: cyclone">cyclone</span> the air is generally still, but the great pressure of the wind on every side of the house raised it up higher and higher, until it was at the very top of the <span class="vocab-highlight" title="Vocabulary word: cyclone">cyclone</span>; and there it remained and was carried miles and miles away as easily as you could carry a feather. It was very dark, and the wind howled horribly around her, but Dorothy found she was riding quite easily. After the first few whirls around, and one other time when the house tipped badly, she felt as if she were being rocked gently, like a baby in a cradle. Toto did not like it. He ran about the room, now here, now there, barking loudly; but Dorothy sat quite still on the floor and waited to see what would happen. Once Toto got too near the open trap door, and fell in; and at first the little girl thought she had lost him. But soon she saw one of his ears sticking up through the hole, for the strong pressure of the air was keeping him up so that he could not fall. She crept to the hole, caught Toto by the ear, and dragged him into the room again, afterward closing the trap door so that no more accidents could happen. Hour after hour passed away, and slowly Dorothy got over her fright; but she felt quite lonely, and the wind shrieked so loudly all about her that she nearly became deaf. At first she had wondered if she would be dashed to pieces when the house fell again; but as the hours passed and nothing terrible happened, she stopped worrying and resolved to wait calmly and see what the future would bring. At last she crawled over the swaying floor to her bed, and lay down upon it; and Toto followed and lay down beside her. In spite of the swaying of the house and the wailing of the wind, Dorothy soon closed her eyes and fell fast asleep.</p>

                                <p style="margin-bottom: 15px;">Tornadoes are one of nature's most powerful and destructive forces. These spinning columns of air can reach wind speeds of over 300 miles per hour and cause devastating damage.</p><h4 style="color: #1B2A4A; margin: 20px 0 10px 0;">How Tornadoes Form</h4><p style="margin-bottom: 15px;">Tornadoes typically form during severe thunderstorms when certain atmospheric conditions come together. Warm, moist air near the ground meets cool, dry air higher up in the atmosphere. This creates instability in the air. When strong winds at different heights blow at different speeds or directions (called wind shear), they can cause the air to start rotating horizontally.</p><p style="margin-bottom: 15px;">Rising air within a thunderstorm can tilt this horizontal rotation into a vertical spin. If the rotation tightens and reaches the ground, a tornado is born. The rotating column of air becomes visible when it picks up dust, dirt, and debris from the ground.</p>
