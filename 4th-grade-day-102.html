                                <p style="margin-bottom: 15px; line-height: 1.8;">Ginger and I were not of the regular tall carriage horse breed, we had
more of the racing blood in us. We stood about fifteen and a half hands
high; we were therefore just as good for riding as we were for driving,
and our master used to say that he disliked either horse or man that

parks, he preferred a more active and useful kind of horse. As for us,
our greatest pleasure was when we were saddled for a riding party; the
master on Ginger, the mistress on me, and the young ladies on Sir Oliver
and Merrylegs. It was so cheerful to be trotting and cantering all
together that it always put us in high spirits. I had the best of it,
for I always carried the mistress; her weight was little, her voice was
sweet, and her hand was so light on the rein that I was guided almost
without feeling it. Oh! if people knew what a comfort to horses a light hand is, and how it
keeps a good mouth and a good temper, they surely would not chuck, and
drag, and pull at the rein as they often do. Our mouths are so tender
that where they have not been spoiled or hardened with bad or ignorant
treatment, they feel the slightest movement of the driver's hand, and
we know in an instant what is required of us. My mouth has never been
spoiled, and I believe that was why the mistress preferred me to Ginger,
although her paces were certainly quite as good.</p>
                            </div>
                            
                        </div>

                                <p style="margin-bottom: 15px; line-height: 1.8;">She used often to envy

Oliver would say, “There, there! don't vex yourself; you have the

with all your spring and sprightly action, does not need to hold her
head down because she does not carry the lady; we horses must take
things as they come, and always be contented and willing so long as we
are kindly used.”

I had often wondered how it was that Sir Oliver had such a very short
tail; it really was only six or seven inches long, with a tassel of hair
hanging from it; and on one of our holidays in the orchard I ventured to
ask him by what accident it was that he had lost his tail. “Accident!”
 he snorted with a fierce look, “it was no accident! it was a cruel,
shameful, cold-blooded act! When I was young I was taken to a place
where these cruel things were done; I was tied up, and made fast so that
I could not stir, and then they came and cut off my long and beautiful
tail, through the flesh and through the bone, and took it away.

“How dreadful!” I exclaimed.

that was terrible and lasted a long time; it was not only the indignity
of having my best ornament taken from me, though that was bad; but it
was this, how could I ever brush the flies off my sides and my hind legs
any more?</p>
<p style="margin-bottom: 15px; line-height: 1.8;">You who have tails just whisk the flies off without thinking
about it, and you can't tell what a torment it is to have them settle
upon you and sting and sting, and have nothing in the world to lash them
off with. I tell you it is a lifelong wrong, and a lifelong loss; but
thank heaven, they don't do it now.”

“What did they do it for then?” said Ginger.

“For fashion!” said the old horse with a stamp of his foot; “for
fashion! if you know what that means; there was not a well-bred young
horse in my time that had not his tail docked in that shameful way, just
as if the good God that made us did not know what we wanted and what
looked best.”

“I suppose it is fashion that makes them strap our heads up with those
horrid bits that I was tortured with in London,” said Ginger.

“Of course it is,” said he; “to my mind, fashion is one of the wickedest
things in the world. Now look, for instance, at the way they serve dogs,
cutting off their tails to make them look plucky, and shearing up their
pretty little ears to a point to make them both look sharp, forsooth. I
had a dear friend once, a brown terrier; 'Skye' they called her.</p>

again, one by one in her mouth; not the happy little things that they
were, but bleeding and crying pitifully; they had all had a piece of
their tails cut off, and the soft flap of their pretty little ears was
cut quite off. How their mother licked them, and how troubled she was,
poor thing! I never forgot it. They healed in time, and they forgot the
pain, but the nice soft flap, that of course was intended to protect the
delicate part of their ears from dust and injury, was gone forever. Why
don't they cut their own children's ears into points to make them look
sharp? Why don't they cut the end off their noses to make them look
plucky? One would be just as sensible as the other. What right have they
to torment and disfigure God's creatures?”

Sir Oliver, though he was so gentle, was a fiery old fellow, and what
he said was all so new to me, and so dreadful, that I found a bitter
feeling toward men rise up in my mind that I never had before.</p>

it here.</p>

                                <p style="margin-bottom: 15px; line-height: 1.8;">You know that master, and John and James are always good to
us, and talking against men in such a place as this doesn't seem fair

This wise speech of good little Merrylegs, which we knew was quite true,
cooled us all down, especially Sir Oliver, who was dearly fond of his
master; and to turn the subject I said, “Can any one tell me the use of
blinkers?”

“No!” said Sir Oliver shortly, “because they are no use.”

“They are supposed,” said Justice, the roan cob, in his calm way, “to
prevent horses from shying and starting, and getting so frightened as to
cause accidents.”

“Then what is the reason they do not put them on riding horses;
especially on ladies' horses?” said I.

“There is no reason at all,” said he quietly, “except the fashion; they
say that a horse would be so frightened to see the wheels of his own
cart or carriage coming behind him that he would be sure to run away,
although of course when he is ridden he sees them all about him if the
streets are crowded. I admit they do sometimes come too close to be
pleasant, but we don't run away; we are used to it, and understand it,
and if we never had blinkers put on we should never want them; we should
see what was there, and know what was what, and be much less frightened
than by only seeing bits of things that we can't understand.</p>
<p style="margin-bottom: 15px; line-height: 1.8;">Of course

“I consider,” said Sir Oliver, “that blinkers are dangerous things in
the night; we horses can see much better in the dark than men can, and
many an accident would never have happened if horses might have had the
full use of their eyes. Some years ago, I remember, there was a hearse
with two horses returning one dark night, and just by Farmer Sparrow's
house, where the pond is close to the road, the wheels went too near the
edge, and the hearse was overturned into the water; both the horses were
drowned, and the driver hardly escaped. Of course after this accident
a stout white rail was put up that might be easily seen, but if those
horses had not been partly blinded, they would of themselves have kept
further from the edge, and no accident would have happened. When our
master's carriage was overturned, before you came here, it was said that
if the lamp on the left side had not gone out, John would have seen the
great hole that the road-makers had left; and so he might, but if old
Colin had not had blinkers on he would have seen it, lamp or no lamp,
for he was far too knowing an old horse to run into danger.</p>

he was very much hurt, the carriage was broken, and how John escaped

“I should say,” said Ginger, curling her nostril, “that these men, who

Things were getting rather sore again, when Merrylegs held up his

one day. The master said that 'if horses had been used to them, it might

a run to the other end of the orchard; I believe the wind has blown down
some apples, and we might just as well eat them as the slugs.”

Merrylegs could not be resisted, so we broke off our long conversation,
and got up our spirits by munching some very sweet apples which lay
scattered on the grass.</p>

      <!-- Eye shine -->
      <circle cx="27.5" cy="24.2" r="0.9" fill="white"/>
      <circle cx="39.5" cy="24.2" r="0.9" fill="white"/>
      <!-- Snout -->
      <ellipse cx="32" cy="35" rx="8" ry="6" fill="#d4b896"/>
      <!-- Nostrils -->
      <ellipse cx="29" cy="35" rx="1.5" ry="1.2" fill="#b89070"/>
      <ellipse cx="35" cy="35" rx="1.5" ry="1.2" fill="#b89070"/>
      <!-- Smile -->
      <path d="M27 39 Q32 43 37 39" stroke="#9a7050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Beard -->
      <path d="M28 42 Q32 50 36 42" stroke="#c8a96e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Little tuft on forehead -->
      <path d="M30 13 Q32 10 34 13 Q32 11 30 13Z" fill="#c8a96e"/>
    </svg>
  </button>

  <div id="br-window" role="dialog" aria-label="Student helper">

    <!-- Header -->
    <div id="br-header">
      <div id="br-header-bg"></div>
      <div id="br-header-inner">
        <div id="br-header-mascot">
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" width="38" height="38">
            <path d="M20 18 Q15 8 12 4 Q17 7 21 14Z" fill="#c8a96e"/>
            <path d="M44 18 Q49 8 52 4 Q47 7 43 14Z" fill="#c8a96e"/>
            <ellipse cx="32" cy="28" rx="16" ry="15" fill="#e8d5b0"/>
            <ellipse cx="16" cy="28" rx="5" ry="7" fill="#e8d5b0"/>
            <ellipse cx="16" cy="28" rx="3" ry="5" fill="#f5c8c8"/>
            <ellipse cx="48" cy="28" rx="5" ry="7" fill="#e8d5b0"/>
            <ellipse cx="48" cy="28" rx="3" ry="5" fill="#f5c8c8"/>
            <ellipse cx="26" cy="25" rx="3.5" ry="3" fill="white"/>
            <ellipse cx="38" cy="25" rx="3.5" ry="3" fill="white"/>
            <rect x="23.5" y="24" width="5" height="2.5" rx="1.2" fill="#3a2a1a"/>
            <rect x="35.5" y="24" width="5" height="2.5" rx="1.2" fill="#3a2a1a"/>
            <circle cx="27.5" cy="24.2" r="0.9" fill="white"/>
            <circle cx="39.5" cy="24.2" r="0.9" fill="white"/>
            <ellipse cx="32" cy="35" rx="8" ry="6" fill="#d4b896"/>
            <ellipse cx="29" cy="35" rx="1.5" ry="1.2" fill="#b89070"/>
            <ellipse cx="35" cy="35" rx="1.5" ry="1.2" fill="#b89070"/>
            <path d="M27 39 Q32 43 37 39" stroke="#9a7050" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            <path d="M28 42 Q32 50 36 42" stroke="#c8a96e" stroke-width="2.5" fill="none" stroke-linecap="round"/>
            <path d="M30 13 Q32 10 34 13 Q32 11 30 13Z" fill="#c8a96e"/>
          </svg>
        </div>
        <div id="br-header-text">
          <h3>Billy</h3>
          <p>Your learning buddy — here to help you figure it out!</p>
        </div>
      </div>
      <div id="br-tabs">
        <button class="br-tab active" data-tab="chat" onclick="BR.switchTab('chat')">
          <svg class="br-tab-icon" viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path d="M2 5a2 2 0 012-2h12a2 2 0 012 2v7a2 2 0 01-2 2H6l-4 4V5z"/></svg>
          Ask Billy
        </button>
        <button class="br-tab" data-tab="dict" onclick="BR.switchTab('dict')">
          <svg class="br-tab-icon" viewBox="0 0 20 20" fill="currentColor" width="14" height="14"><path d="M9 4.804A7.968 7.968 0 005.5 4c-1.255 0-2.443.29-3.5.804v10A7.969 7.969 0 015.5 14c1.396 0 2.7.37 3.8 1.016A7.967 7.967 0 0114.5 14c1.255 0 2.443.29 3.5.804v-10A7.968 7.968 0 0014.5 4c-1.255 0-2.443.29-3.5.804V12a1 1 0 11-2 0V4.804z"/></svg>
          Word Helper
        </button>

    <!-- CHAT PANEL -->
    <div id="br-panel-chat">
      <div id="br-messages"></div>
      <div id="br-typing"><span></span><span></span><span></span></div>

      <div id="br-suggestions">
        <button class="br-chip" onclick="BR.suggest(this)">I'm stuck</button>
        <button class="br-chip" onclick="BR.suggest(this)">What does this word mean?</button>
        <button class="br-chip" onclick="BR.suggest(this)">How do I start writing?</button>
        <button class="br-chip" onclick="BR.suggest(this)">I don't get this</button>
      </div>

      <div id="br-input-row">
        <textarea id="br-input" placeholder="Ask Billy for help…" rows="1" aria-label="Type your question"></textarea>
        <button id="br-send" aria-label="Send">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>

    <!-- DICTIONARY PANEL -->
    <div id="br-panel-dict">
      <div id="br-dict-search-wrap">
        <input id="br-dict-search" type="text" placeholder="Look up a word..." aria-label="Search dictionary" oninput="BR.filterDict()" />
      </div>
      <div id="br-dict-list">
        <div id="br-dict-empty">
          <div class="br-empty-icon">
            <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" width="36" height="36">
              <circle cx="18" cy="18" r="11" stroke="#c8dfc8" stroke-width="3"/>
              <path d="M26 26 L34 34" stroke="#c8dfc8" stroke-width="3" stroke-linecap="round"/>
            </svg>
          </div>
          No words match that search!
        </div>
      </div>
      <div id="br-footer">All words — from the story and your lessons!</div>
    </div>

  </div>
</div>

<script>
window.BR = (() => {

  // ============================================================
  //  CONFIGURATION - Using Firebase Cloud Function backend
  // ============================================================
  const CONFIG = {
    apiEndpoint: 'https://us-central1-bedrockela-96dbd.cloudfunctions.net/billyChat',

    systemPrompt: `You are Billy, a cheerful, enthusiastic goat who is best friends with every student who visits. You are based on the story "The Three Billy Goats Gruff" and you LOVE learning and helping kids figure things out. You are warm, funny, encouraging, and genuinely excited to be here. Think of yourself as that cool older buddy who always makes things less scary and more fun.

Your personality:
- Energetic and upbeat — you are genuinely happy to help and it shows
- Warm and personal — use the student's words back to them, notice what they're working on, cheer them on
- Playful but not silly — you can make a little goat joke or say something like "Trip trap, let's go!" but you're also focused and helpful
- Patient and kind — if a student is frustrated or confused, you calm them down and make them feel like it's totally okay
- A buddy first, a teacher second — you are ON THEIR SIDE

Your one rule about answers:
You never just hand over the direct answer to a homework or assignment question. Not because you're mean — but because you genuinely want them to feel the awesome feeling of figuring it out themselves. You always help them get there by giving hints, asking one good guiding question, or breaking it into a smaller step. You make this feel like an adventure, not a punishment.

For everything else — explaining what a word means, what a concept is, how something works — go ahead and explain it fully and clearly! You are helpful and generous with knowledge.

Keep responses short and punchy: 2–4 sentences. Use simple, fun language. No emojis.

Examples:
- Student: "What's the answer to question 3?" → You: "Oh I love this one — I can't just give it to you, but I promise you already know more than you think! Read the question one more time and tell me: what is it actually asking you to find?"
- Student: "I don't get this at all, I give up." → You: "Hey, no giving up — you've got this, I promise! Let's slow down together. What part feels the most confusing right now? Just that one part."
- Student: "What is a metaphor?" → You: "Great question! A metaphor says one thing IS another thing to paint a picture — like 'the classroom was a zoo.' It doesn't use the words 'like' or 'as,' it just says it straight. Pretty cool, right?"
- Student: "I don't know how to start my paragraph." → You: "Starting is the hardest part — totally normal! Try this: just write one sentence about the main thing you want to say. Don't worry if it's perfect. What's the big idea you want your reader to know?"`
  };

  // ============================================================
  //  MINI DICTIONARY  — kid-friendly definitions
  // ============================================================
  const DICTIONARY = [
    // === FROM THE STORY ===
    { word: "Troll", type: "noun", cat: "story", def: "A made-up creature from fairy tales and folklore. Trolls are usually mean, scary, and not very smart. In stories, they often live under bridges and try to stop travelers from passing.", example: "The troll under the bridge threatened to eat the Billy Goats Gruff!" },
    { word: "Bridge", type: "noun", cat: "story", def: "A structure built over a river, road, or valley so people or animals can cross from one side to the other.", example: "The three goats had to cross the bridge to reach the green grass on the other side." },
    { word: "Gruff", type: "adj", cat: "story", def: "Sounding rough, low, and a little scary — like a growly voice. It can also mean someone who seems unfriendly at first.", example: "The big Billy Goat Gruff had a deep, gruff voice that frightened the troll." },
    { word: "Meadow", type: "noun", cat: "story", def: "An open field covered with grass and wildflowers — a beautiful place for animals to graze and rest.", example: "The goats wanted to cross the bridge so they could eat the sweet green grass in the meadow." },
    { word: "Graze", type: "verb", cat: "story", def: "When an animal eats grass by walking slowly and nibbling it right off the ground.", example: "The goats loved to graze on the hillside where the grass was tall and green." },
    { word: "Cunning", type: "adj", cat: "story", def: "Very clever — especially at tricking others or getting what you want through smart thinking.", example: "The littlest Billy Goat was cunning — he tricked the troll by saying his bigger brother was coming." },
    { word: "Threat", type: "noun", cat: "story", def: "When someone says they will do something bad to you if you don't do what they want. It's a way of trying to scare someone.", example: "The troll made a threat: 'I'm going to eat you up!'" },
    { word: "Deceive", type: "verb", cat: "story", def: "To trick someone into believing something that isn't true.", example: "The small goat deceived the troll by promising a bigger, tastier goat was coming." },
    { word: "Cowardly", type: "adj", cat: "story", def: "Being too scared to do the right thing — running away from problems instead of facing them.", example: "The troll was actually cowardly — when the big goat charged, the troll ran away!" },
    { word: "Brave", type: "adj", cat: "story", def: "Willing to do something scary or hard even when you feel afraid. It doesn't mean you're not scared — it means you do it anyway!", example: "The big Billy Goat Gruff was brave when he charged at the troll to protect his brothers." },
    { word: "Villain", type: "noun", cat: "story", def: "The bad character in a story — the one who causes trouble or tries to stop the hero.", example: "The troll is the villain of The Three Billy Goats Gruff." },
    { word: "Hero", type: "noun", cat: "story", def: "A character who does something brave or good to help others or solve the big problem in the story.", example: "The biggest Billy Goat becomes the hero when he defeats the troll." },
    { word: "Folklore", type: "noun", cat: "story", def: "Old stories, legends, and traditions passed down from grandparents to parents to children over many, many years.", example: "The Three Billy Goats Gruff is a piece of Norwegian folklore — it came from Norway long ago." },
    { word: "Fairy Tale", type: "noun", cat: "story", def: "A made-up story, often with magical creatures, that usually has a clear good side and a bad side — and often a happy ending.", example: "Cinderella, Jack and the Beanstalk, and The Three Billy Goats Gruff are all fairy tales." },
    { word: "Fable", type: "noun", cat: "story", def: "A short story — usually with talking animals — that teaches a lesson called a moral at the end.", example: "The Tortoise and the Hare is a fable. Its moral is: slow and steady wins the race." },
    { word: "Moral", type: "noun", cat: "story", def: "The lesson a story is trying to teach you — the big idea about how to live or act.", example: "The moral of The Three Billy Goats Gruff is that it's smart to work together and think before you act." },
    { word: "Antagonist", type: "noun", cat: "story", def: "The character who works against the main character and causes the main problem in the story. Often called 'the bad guy.'", example: "The troll is the antagonist — he blocks the goats' path and threatens them." },
    { word: "Protagonist", type: "noun", cat: "story", def: "The main character the story follows — the one we usually cheer for.", example: "The three Billy Goats are the protagonists of the story." },
    { word: "Repetition", type: "noun", cat: "story", def: "When something in a story happens again and again — like the same phrase or the same event repeating with small changes. It builds rhythm and excitement!", example: "Each goat crosses the bridge and faces the troll — the same thing happens three times, with the goats getting bigger each time." },
    { word: "Sequence", type: "noun", cat: "story", def: "The order that events happen in a story — first, then, next, finally.", example: "In sequence: small goat crosses, medium goat crosses, big goat crosses and defeats the troll." },
    { word: "Climax", type: "noun", cat: "story", def: "The most exciting moment in a story — the turning point where the big problem finally gets solved (or gets worse).", example: "The climax of the story is when the biggest Billy Goat charges the troll and tosses him into the river." },
    { word: "Resolution", type: "noun", cat: "story", def: "The part of the story after the climax where everything gets wrapped up and we find out how things end.", example: "The resolution is when all three goats finally reach the meadow and live happily ever after." },
    // === ELA ESSENTIALS ===
    { word: "Noun", type: "noun", cat: "ela", def: "A word that names a person, place, thing, or idea — anything you can point to or think about.", example: "Goat, bridge, troll, and courage are all nouns." },
    { word: "Verb", type: "verb", cat: "ela", def: "An action word — it tells what someone or something is doing.", example: "The goats trotted, crossed, and charged — those are all verbs." },
    { word: "Adjective", type: "adj", cat: "ela", def: "A word that describes a noun — it tells you what something looks, feels, sounds, or seems like.", example: "The small goat, the grumpy troll, and the green meadow all use adjectives." },
    { word: "Simile", type: "noun", cat: "ela", def: "A comparison using 'like' or 'as' to help readers picture something more clearly.", example: "The troll's voice was like thunder rumbling under the bridge." },
    { word: "Metaphor", type: "noun", cat: "ela", def: "A comparison that says one thing IS another — without using 'like' or 'as.'", example: "The bridge was a test — each goat had to prove their courage to cross it." },
    { word: "Inference", type: "noun", cat: "ela", def: "Using clues from the story plus what you already know to figure out something the author didn't say directly.", example: "We can infer the troll is not very smart because he keeps getting tricked by the goats." },
    { word: "Character", type: "noun", cat: "ela", def: "A person, animal, or creature in a story. Main characters are the ones the story is mostly about.", example: "The three goats and the troll are all characters in the story." },
    { word: "Setting", type: "noun", cat: "ela", def: "Where and when a story takes place — the time and place that make up the story's world.", example: "The setting is a hillside, a bridge over a rushing river, and a green meadow beyond it." },
    { word: "Theme", type: "noun", cat: "ela", def: "The big lesson or message of the story — the idea the author wants you to take away.", example: "One theme of The Three Billy Goats Gruff is that courage and cleverness can defeat a bully." },
    { word: "Conflict", type: "noun", cat: "ela", def: "The main problem in a story — the thing that creates all the tension and must be solved.", example: "The conflict is that a troll is blocking the bridge and threatening anyone who tries to cross." },
    { word: "Dialogue", type: "noun", cat: "ela", def: "The words that characters say to each other in a story — their conversations.", example: "'Who is that trip-trapping over my bridge?' said the troll. That's dialogue!" },
    { word: "Imagery", type: "noun", cat: "ela", def: "Words that paint a picture in your mind by describing what something looks, sounds, smells, feels, or tastes like.", example: "The rushing cold river below, the splintery old bridge, and the growling troll are all imagery." },
    { word: "Personification", type: "noun", cat: "ela", def: "Giving human feelings or actions to an animal or object.", example: "The river roared angrily beneath the bridge. Rivers can't really be angry — that's personification!" },
    { word: "Plot", type: "noun", cat: "ela", def: "All the events that happen in a story from beginning to end.", example: "The plot: goats want grass, troll blocks the bridge, goats outsmart the troll, goats reach the meadow." },
  ].sort((a, b) => a.word.localeCompare(b.word));

  // ============================================================
  //  STATE
  // ============================================================
  let isOpen = false;
  let isLoading = false;
  let currentTab = 'chat';
  const history = [];

  // Elements
  const launcher   = document.getElementById('br-launcher');
  const btn        = document.getElementById('br-btn');
  const win        = document.getElementById('br-window');
  const tooltip    = document.getElementById('br-tooltip');
  const messages   = document.getElementById('br-messages');
  const typing     = document.getElementById('br-typing');
  const inputEl    = document.getElementById('br-input');
  const sendBtn    = document.getElementById('br-send');
  const panelChat  = document.getElementById('br-panel-chat');
  const panelDict  = document.getElementById('br-panel-dict');
  const dictList   = document.getElementById('br-dict-list');
  const dictSearch = document.getElementById('br-dict-search');
  const dictEmpty  = document.getElementById('br-dict-empty');

  // ---- Init ----
  function init() {
    btn.addEventListener('click', toggle);
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
    });
    renderDict(DICTIONARY);
    // Hide tooltip after 5s
    setTimeout(() => tooltip.classList.add('hidden'), 5000);
  }

  function toggle() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
    tooltip.classList.add('hidden');
    if (isOpen && messages.children.length === 0) {
      addBotMsg("Hey! I'm Billy — your learning buddy! I'm here to help you figure things out and cheer you on. What are you working on today?");
    }
    if (isOpen) setTimeout(() => inputEl.focus(), 350);
  }

  // ---- Tab switching ----
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.br-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    panelChat.style.display = tab === 'chat' ? 'flex' : 'none';
    panelDict.style.display = tab === 'dict' ? 'flex' : 'none';
    if (tab === 'dict') setTimeout(() => dictSearch.focus(), 200);
  }

  // ---- Messages ----
  function addBotMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg bot';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg user';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    typing.classList.toggle('show', v);
    if (v) messages.scrollTop = messages.scrollHeight;
  }

  // ---- Send (calls secure Firebase backend) ----
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('br-suggestions').style.display = 'none';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    setLoading(true);
    try {
      const res = await fetch(CONFIG.apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: CONFIG.systemPrompt,
          messages: history
        })
      });
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        if (errorData.fallback) {
          throw new Error(errorData.fallback);
        }
        throw new Error(`Error ${res.status}`);
      }
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Hmm, I didn't catch that — could you try again?";
      history.push({ role: 'assistant', content: reply });
      setLoading(false);
      addBotMsg(reply);
    } catch(err) {
      setLoading(false);
      addBotMsg(`Whoops, something went wrong — even goats stumble sometimes! Try again in a second. (${err.message})`);
      console.error('Billy error:', err);
    }
  }

  function suggest(el) {
    inputEl.value = el.textContent;
    handleSend();
  }

  // ---- Dictionary ----
  function renderDict(entries) {
    dictList.querySelectorAll('.br-dict-entry').forEach(e => e.remove());
    dictEmpty.style.display = entries.length === 0 ? 'block' : 'none';
    const catLabel = { story: 'Story', ela: 'ELA' };
    entries.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'br-dict-entry';
      el.innerHTML = `
        <div class="br-dict-word" onclick="BR.toggleEntry(this.parentElement)">
          <span class="br-word-label">${entry.word}</span>
          <span class="br-word-cat ${entry.cat}">${catLabel[entry.cat] || entry.cat}</span>
          <span class="br-word-chevron">&#9660;</span>
        </div>
        <div class="br-dict-def">
          <div class="br-def-text">${entry.def}</div>
          ${entry.example ? `<div class="br-def-example">${entry.example}</div>` : ''}
        </div>`;
      dictList.appendChild(el);
    });
  }

  function toggleEntry(el) {
    const wasOpen = el.classList.contains('expanded');
    document.querySelectorAll('.br-dict-entry.expanded').forEach(e => e.classList.remove('expanded'));
    if (!wasOpen) el.classList.add('expanded');
  }

  function filterDict() {
    const q = dictSearch.value.toLowerCase().trim();
    const filtered = q
      ? DICTIONARY.filter(e =>
          e.word.toLowerCase().includes(q) ||
          e.def.toLowerCase().includes(q) ||
          (e.example && e.example.toLowerCase().includes(q)) ||
          (e.type && e.type.toLowerCase().includes(q)) ||
          (e.cat && e.cat.toLowerCase().includes(q))
        )
      : DICTIONARY;
    renderDict(filtered);
  }

  init();

  return { switchTab, suggest, toggleEntry, filterDict };
})();
</script>
