                                <p style="margin-bottom: 20px; line-height: 1.8;">For a minute or two she stood looking at the house, and wondering what

<p style="margin-bottom: 20px; line-height: 1.8;">“—or next day, maybe,” the Footman continued in the same tone, exactly

<p style="margin-bottom: 20px; line-height: 1.8;">“How am I to get in?” asked Alice again, in a louder tone.</p>

<p style="margin-bottom: 20px; line-height: 1.8;">The Footman seemed to think this a good opportunity for repeating his

<p style="margin-bottom: 20px; line-height: 1.8;">“But what am _I_ to do?” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Anything you like,” said the Footman, and began whistling.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, there’s no use in talking to him,” said Alice desperately: “he’s
perfectly idiotic!” And she opened the door and went in.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The door led right into a large kitchen, which was full of smoke from
one end to the other: the Duchess was sitting on a three-legged stool
in the middle, nursing a baby; the cook was leaning over the fire,
stirring a large cauldron which seemed to be full of soup.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“There’s certainly too much pepper in that soup!” Alice said to
herself, as well as she could for sneezing.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">There was certainly too much of it in the air. Even the Duchess sneezed

alternately without a moment’s pause. The only things in the kitchen
that did not sneeze, were the cook, and a large cat which was sitting

<p style="margin-bottom: 20px; line-height: 1.8;">“Please would you tell me,” said Alice, a little timidly, for she was
not quite sure whether it was good manners for her to speak first, “why
your cat grins like that?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It’s a Cheshire cat,” said the Duchess, “and that’s why. Pig!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">She said the last word with such sudden violence that Alice quite
jumped; but she saw in another moment that it was addressed to the
baby, and not to her, so she took courage, and went on again:—</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I didn’t know that Cheshire cats always grinned; in fact, I didn’t
know that cats _could_ grin.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“They all can,” said the Duchess; “and most of ’em do.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I don’t know of any that do,” Alice said very politely, feeling quite
pleased to have got into a conversation.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You don’t know much,” said the Duchess; “and that’s a fact.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice did not at all like the tone of this remark, and thought it would
be as well to introduce some other subject of conversation. While she
was trying to fix on one, the cook took the cauldron of soup off the
fire, and at once set to work throwing everything within her reach at
the Duchess and the baby—the fire-irons came first; then followed a
shower of saucepans, plates, and dishes. The Duchess took no notice of
them even when they hit her; and the baby was howling so much already,
that it was quite impossible to say whether the blows hurt it or not.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, _please_ mind what you’re doing!” cried Alice, jumping up and down

unusually large saucepan flew close by it, and very nearly carried it

<p style="margin-bottom: 20px; line-height: 1.8;">“If everybody minded their own business,” the Duchess said in a hoarse
growl, “the world would go round a deal faster than it does.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Which would _not_ be an advantage,” said Alice, who felt very glad to
get an opportunity of showing off a little of her knowledge. “Just
think of what work it would make with the day and night! You see the
earth takes twenty-four hours to turn round on its axis—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Talking of axes,” said the Duchess, “chop off her head!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice glanced rather anxiously at the cook, to see if she meant to take
the hint; but the cook was busily stirring the soup, and seemed not to
be listening, so she went on again: “Twenty-four hours, I _think_; or
is it twelve? I—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, don’t bother _me_,” said the Duchess; “I never could abide
figures!” And with that she began nursing her child again, singing a
sort of lullaby to it as she did so, and giving it a violent shake at
the end of every line:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Speak roughly to your little boy,
    And beat him when he sneezes:
He only does it to annoy,
    Because he knows it teases.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">CHORUS.
(In which the cook and the baby joined):</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Wow! wow! wow!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">While the Duchess sang the second verse of the song, she kept tossing

that Alice could hardly hear the words:—</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I speak severely to my boy,
    I beat him when he sneezes;
For he can thoroughly enjoy
    The pepper when he pleases!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">CHORUS.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Wow! wow! wow!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Here! you may nurse it a bit, if you like!” the Duchess said to Alice,
flinging the baby at her as she spoke. “I must go and get ready to play
croquet with the Queen,” and she hurried out of the room. The cook
threw a frying-pan after her as she went out, but it just missed her.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice caught the baby with some difficulty, as it was a queer-shaped
little creature, and held out its arms and legs in all directions,
“just like a star-fish,” thought Alice. The poor little thing was
snorting like a steam-engine when she caught it, and kept doubling
itself up and straightening itself out again, so that altogether, for
the first minute or two, it was as much as she could do to hold it.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">As soon as she had made out the proper way of nursing it, (which was to
twist it up into a sort of knot, and then keep tight hold of its right
ear and left foot, so as to prevent its undoing itself,) she carried it
out into the open air. “If I don’t take this child away with me,”
thought Alice, “they’re sure to kill it in a day or two: wouldn’t it be
murder to leave it behind?” She said the last words out loud, and the
little thing grunted in reply (it had left off sneezing by this time).
“Don’t grunt,” said Alice; “that’s not at all a proper way of
expressing yourself.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The baby grunted again, and Alice looked very anxiously into its face
to see what was the matter with it. There could be no doubt that it had
a _very_ turn-up nose, much more like a snout than a real nose; also
its eyes were getting extremely small for a baby: altogether Alice did
not like the look of the thing at all. “But perhaps it was only
sobbing,” she thought, and looked into its eyes again, to see if there
were any tears.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">No, there were no tears. “If you’re going to turn into a pig, my dear,”
said Alice, seriously, “I’ll have nothing more to do with you. Mind
now!” The poor little thing sobbed again (or grunted, it was impossible
to say which), and they went on for some while in silence.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice was just beginning to think to herself, “Now, what am I to do
with this creature when I get it home?” when it grunted again, so
violently, that she looked down into its face in some alarm. This time
there could be _no_ mistake about it: it was neither more nor less than
a pig, and she felt that it would be quite absurd for her to carry it
further.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">So she set the little creature down, and felt quite relieved to see it
trot away quietly into the wood. “If it had grown up,” she said to
herself, “it would have made a dreadfully ugly child: but it makes
rather a handsome pig, I think.” And she began thinking over other
children she knew, who might do very well as pigs, and was just saying
to herself, “if one only knew the right way to change them—” when she
was a little startled by seeing the Cheshire Cat sitting on a bough of
a tree a few yards off.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Cat only grinned when it saw Alice. It looked good-natured, she

felt that it ought to be treated with respect.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Cheshire Puss,” she began, rather timidly, as she did not at all know
whether it would like the name: however, it only grinned a little
wider. “Come, it’s pleased so far,” thought Alice, and she went on.
“Would you tell me, please, which way I ought to go from here?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That depends a good deal on where you want to get to,” said the Cat.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I don’t much care where—” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then it doesn’t matter which way you go,” said the Cat.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“—so long as I get _somewhere_,” Alice added as an explanation.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, you’re sure to do that,” said the Cat, “if you only walk long
enough.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice felt that this could not be denied, so she tried another
question. “What sort of people live about here?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“In _that_ direction,” the Cat said, waving its right paw round, “lives
a Hatter: and in _that_ direction,” waving the other paw, “lives a
March Hare. Visit either you like: they’re both mad.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“But I don’t want to go among mad people,” Alice remarked.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, you can’t help that,” said the Cat: “we’re all mad here. I’m mad.
You’re mad.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“How do you know I’m mad?” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You must be,” said the Cat, “or you wouldn’t have come here.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice didn’t think that proved it at all; however, she went on “And how
do you know that you’re mad?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“To begin with,” said the Cat, “a dog’s not mad. You grant that?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I suppose so,” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, then,” the Cat went on, “you see, a dog growls when it’s angry,
and wags its tail when it’s pleased. Now _I_ growl when I’m pleased,
and wag my tail when I’m angry. Therefore I’m mad.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“_I_ call it purring, not growling,” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Call it what you like,” said the Cat. “Do you play croquet with the
Queen to-day?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I should like it very much,” said Alice, “but I haven’t been invited
yet.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You’ll see me there,” said the Cat, and vanished.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice was not much surprised at this, she was getting so used to queer
things happening. While she was looking at the place where it had been,
it suddenly appeared again.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“By-the-bye, what became of the baby?” said the Cat. “I’d nearly
forgotten to ask.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It turned into a pig,” Alice quietly said, just as if it had come back
in a natural way.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I thought it would,” said the Cat, and vanished again.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice waited a little, half expecting to see it again, but it did not
appear, and after a minute or two she walked on in the direction in
which the March Hare was said to live. “I’ve seen hatters before,” she
said to herself; “the March Hare will be much the most interesting, and
perhaps as this is May it won’t be raving mad—at least not so mad as it
was in March.” As she said this, she looked up, and there was the Cat
again, sitting on a branch of a tree.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Did you say pig, or fig?” said the Cat.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I said pig,” replied Alice; “and I wish you wouldn’t keep appearing
and vanishing so suddenly: you make one quite giddy.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“All right,” said the Cat; and this time it vanished quite slowly,
beginning with the end of the tail, and ending with the grin, which
remained some time after the rest of it had gone.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well! I’ve often seen a cat without a grin,” thought Alice; “but a
grin without a cat! It’s the most curious thing I ever saw in my life!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">She had not gone much farther before she came in sight of the house of
the March Hare: she thought it must be the right house, because the
chimneys were shaped like ears and the roof was thatched with fur. It
was so large a house, that she did not like to go nearer till she had
nibbled some more of the lefthand bit of mushroom, and raised herself
to about two feet high: even then she walked up towards it rather
timidly, saying to herself “Suppose it should be raving mad after all!
I almost wish I’d gone to see the Hatter instead!”</p>
