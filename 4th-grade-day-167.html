                        <div class="lesson-page-card content-page">
                            <h2>📖 Reading: Alice in Wonderland</h2>
                            <h3 style="color: var(--book-color, #305853);">Chapter 7: CHAPTER VII.
A Mad Tea-Party</h3>
                            
                            <div style="padding: 25px; background: #f9f9f9; border-radius: 12px; line-height: 1.8; font-size: 16px; margin-bottom: 25px;" class="reading-passage">
                                <p style="margin-bottom: 20px; line-height: 1.8;">There was a table set out under a tree in front of the house, and the
March Hare and the Hatter were having tea at it: a Dormouse was sitting
between them, fast asleep, and the other two were using it as a
cushion, resting their elbows on it, and talking over its head. “Very
uncomfortable for the Dormouse,” thought Alice; “only, as it’s asleep,

<p style="margin-bottom: 20px; line-height: 1.8;">The table was a large one, but the three were all crowded together at
one corner of it: “No room! No room!” they cried out when they saw
Alice coming. “There’s _plenty_ of room!” said Alice indignantly, and
she sat down in a large arm-chair at one end of the table.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Have some wine,” the March Hare said in an encouraging tone.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice looked all round the table, but there was nothing on it but tea.
“I don’t see any wine,” she remarked.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“There isn’t any,” said the March Hare.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then it wasn’t very civil of you to offer it,” said Alice angrily.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It wasn’t very civil of you to sit down without being invited,” said
the March Hare.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I didn’t know it was _your_ table,” said Alice; “it’s laid for a great
many more than three.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Your hair wants cutting,” said the Hatter. He had been looking at
Alice for some time with great curiosity, and this was his first
speech.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You should learn not to make personal remarks,” Alice said with some
severity; “it’s very rude.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Hatter opened his eyes very wide on hearing this; but all he _said_
was, “Why is a raven like a writing-desk?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Come, we shall have some fun now!” thought Alice. “I’m glad they’ve
begun asking riddles.—I believe I can guess that,” she added aloud.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Do you mean that you think you can find out the answer to it?” said
the March Hare.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Exactly so,” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then you should say what you mean,” the March Hare went on.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I do,” Alice hastily replied; “at least—at least I mean what I
say—that’s the same thing, you know.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Not the same thing a bit!” said the Hatter. “You might just as well
say that ‘I see what I eat’ is the same thing as ‘I eat what I see’!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You might just as well say,” added the March Hare, “that ‘I like what
I get’ is the same thing as ‘I get what I like’!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You might just as well say,” added the Dormouse, who seemed to be
talking in his sleep, “that ‘I breathe when I sleep’ is the same thing
as ‘I sleep when I breathe’!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It _is_ the same thing with you,” said the Hatter, and here the
conversation dropped, and the party sat silent for a minute, while
Alice thought over all she could remember about ravens and
writing-desks, which wasn’t much.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Hatter was the first to break the silence. “What day of the month
is it?” he said, turning to Alice: he had taken his watch out of his
pocket, and was looking at it uneasily, shaking it every now and then,
and holding it to his ear.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice considered a little, and then said “The fourth.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Two days wrong!” sighed the Hatter. “I told you butter wouldn’t suit
the works!” he added looking angrily at the March Hare.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It was the _best_ butter,” the March Hare meekly replied.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, but some crumbs must have got in as well,” the Hatter grumbled:
“you shouldn’t have put it in with the bread-knife.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The March Hare took the watch and looked at it gloomily: then he dipped
it into his cup of tea, and looked at it again: but he could think of
nothing better to say than his first remark, “It was the _best_ butter,
you know.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice had been looking over his shoulder with some curiosity. “What a
funny watch!” she remarked. “It tells the day of the month, and doesn’t
tell what o’clock it is!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why should it?” muttered the Hatter. “Does _your_ watch tell you what
year it is?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Of course not,” Alice replied very readily: “but that’s because it
stays the same year for such a long time together.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Which is just the case with _mine_,” said the Hatter.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice felt dreadfully puzzled, The Hatter’s remark seemed to have no
sort of meaning in it, and yet it was certainly English. “I don’t quite
understand you,” she said, as politely as she could.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“The Dormouse is asleep again,” said the Hatter, and he poured a little
hot tea upon its nose.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Dormouse shook its head impatiently, and said, without opening its
eyes, “Of course, of course; just what I was going to remark myself.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Have you guessed the riddle yet?” the Hatter said, turning to Alice
again.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No, I give it up,” Alice replied: “what’s the answer?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I haven’t the slightest idea,” said the Hatter.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Nor I,” said the March Hare.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice sighed wearily. “I think you might do something better with the
time,” she said, “than waste it in asking riddles that have no
answers.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“If you knew Time as well as I do,” said the Hatter, “you wouldn’t talk
about wasting _it_. It’s _him_.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I don’t know what you mean,” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Of course you don’t!” the Hatter said, tossing his head
contemptuously. “I dare say you never even spoke to Time!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Perhaps not,” Alice cautiously replied: “but I know I have to beat
time when I learn music.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Ah! that accounts for it,” said the Hatter. “He won’t stand beating.
Now, if you only kept on good terms with him, he’d do almost anything
you liked with the clock. For instance, suppose it were nine o’clock in
the morning, just time to begin lessons: you’d only have to whisper a
hint to Time, and round goes the clock in a twinkling! Half-past one,
time for dinner!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">(“I only wish it was,” the March Hare said to itself in a whisper.)</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That would be grand, certainly,” said Alice thoughtfully: “but then—I
shouldn’t be hungry for it, you know.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Not at first, perhaps,” said the Hatter: “but you could keep it to
half-past one as long as you liked.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Is that the way _you_ manage?” Alice asked.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Hatter shook his head mournfully. “Not I!” he replied. “We
quarrelled last March—just before _he_ went mad, you know—” (pointing
with his tea spoon at the March Hare,) “—it was at the great concert
given by the Queen of Hearts, and I had to sing</p>
<p style="margin-bottom: 20px; line-height: 1.8;">‘Twinkle, twinkle, little bat!
How I wonder what you’re at!’</p>
<p style="margin-bottom: 20px; line-height: 1.8;">You know the song, perhaps?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’ve heard something like it,” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It goes on, you know,” the Hatter continued, “in this way:—</p>
<p style="margin-bottom: 20px; line-height: 1.8;">‘Up above the world you fly,
Like a tea-tray in the sky.
                    Twinkle, twinkle—’”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Here the Dormouse shook itself, and began singing in its sleep
“_Twinkle, twinkle, twinkle, twinkle_—” and went on so long that they
had to pinch it to make it stop.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I’d hardly finished the first verse,” said the Hatter, “when the
Queen jumped up and bawled out, ‘He’s murdering the time! Off with his
head!’”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“How dreadfully savage!” exclaimed Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And ever since that,” the Hatter went on in a mournful tone, “he won’t
do a thing I ask! It’s always six o’clock now.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">A bright idea came into Alice’s head. “Is that the reason so many
tea-things are put out here?” she asked.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, that’s it,” said the Hatter with a sigh: “it’s always tea-time,
and we’ve no time to wash the things between whiles.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then you keep moving round, I suppose?” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Exactly so,” said the Hatter: “as the things get used up.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“But what happens when you come to the beginning again?” Alice ventured
to ask.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Suppose we change the subject,” the March Hare interrupted, yawning.
“I’m getting tired of this. I vote the young lady tells us a story.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’m afraid I don’t know one,” said Alice, rather alarmed at the
proposal.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then the Dormouse shall!” they both cried. “Wake up, Dormouse!” And
they pinched it on both sides at once.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Dormouse slowly opened his eyes. “I wasn’t asleep,” he said in a
hoarse, feeble voice: “I heard every word you fellows were saying.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tell us a story!” said the March Hare.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, please do!” pleaded Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And be quick about it,” added the Hatter, “or you’ll be asleep again
before it’s done.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Once upon a time there were three little sisters,” the Dormouse began
in a great hurry; “and their names were Elsie, Lacie, and Tillie; and
they lived at the bottom of a well—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What did they live on?” said Alice, who always took a great interest
in questions of eating and drinking.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“They lived on treacle,” said the Dormouse, after thinking a minute or
two.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“They couldn’t have done that, you know,” Alice gently remarked;
“they’d have been ill.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“So they were,” said the Dormouse; “_very_ ill.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice tried to fancy to herself what such an extraordinary way of
living would be like, but it puzzled her too much, so she went on: “But
why did they live at the bottom of a well?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Take some more tea,” the March Hare said to Alice, very earnestly.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’ve had nothing yet,” Alice replied in an offended tone, “so I can’t
take more.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You mean you can’t take _less_,” said the Hatter: “it’s very easy to
take _more_ than nothing.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Nobody asked _your_ opinion,” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Who’s making personal remarks now?” the Hatter asked triumphantly.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice did not quite know what to say to this: so she helped herself to
some tea and bread-and-butter, and then turned to the Dormouse, and
repeated her question. “Why did they live at the bottom of a well?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Dormouse again took a minute or two to think about it, and then
said, “It was a treacle-well.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“There’s no such thing!” Alice was beginning very angrily, but the
Hatter and the March Hare went “Sh! sh!” and the Dormouse sulkily
remarked, “If you can’t be civil, you’d better finish the story for
yourself.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No, please go on!” Alice said very humbly; “I won’t interrupt again. I
dare say there may be _one_.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“One, indeed!” said the Dormouse indignantly. However, he consented to
go on. “And so these three little sisters—they were learning to draw,
you know—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What did they draw?” said Alice, quite forgetting her promise.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Treacle,” said the Dormouse, without considering at all this time.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I want a clean cup,” interrupted the Hatter: “let’s all move one place
on.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">He moved on as he spoke, and the Dormouse followed him: the March Hare
moved into the Dormouse’s place, and Alice rather unwillingly took the
place of the March Hare. The Hatter was the only one who got any
advantage from the change: and Alice was a good deal worse off than
before, as the March Hare had just upset the milk-jug into his plate.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice did not wish to offend the Dormouse again, so she began very
cautiously: “But I don’t understand. Where did they draw the treacle
from?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You can draw water out of a water-well,” said the Hatter; “so I should
think you could draw treacle out of a treacle-well—eh, stupid?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“But they were _in_ the well,” Alice said to the Dormouse, not choosing
to notice this last remark.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Of course they were,” said the Dormouse; “—well in.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">This answer so confused poor Alice, that she let the Dormouse go on for
some time without interrupting it.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“They were learning to draw,” the Dormouse went on, yawning and rubbing
its eyes, for it was getting very sleepy; “and they drew all manner of
things—everything that begins with an M—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why with an M?” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why not?” said the March Hare.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice was silent.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Dormouse had closed its eyes by this time, and was going off into a
doze; but, on being pinched by the Hatter, it woke up again with a
little shriek, and went on: “—that begins with an M, such as
mouse-traps, and the moon, and memory, and muchness—you know you say
things are “much of a muchness”—did you ever see such a thing as a
drawing of a muchness?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Really, now you ask me,” said Alice, very much confused, “I don’t
think—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then you shouldn’t talk,” said the Hatter.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">This piece of rudeness was more than Alice could bear: she got up in
great disgust, and walked off; the Dormouse fell asleep instantly, and
neither of the others took the least notice of her going, though she
looked back once or twice, half hoping that they would call after her:
the last time she saw them, they were trying to put the Dormouse into
the teapot.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“At any rate I’ll never go _there_ again!” said Alice as she picked her
way through the wood. “It’s the stupidest tea-party I ever was at in
all my life!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Just as she said this, she noticed that one of the trees had a door
leading right into it. “That’s very curious!” she thought. “But
everything’s curious today. I think I may as well go in at once.” And
in she went.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Once more she found herself in the long hall, and close to the little
glass table. “Now, I’ll manage better this time,” she said to herself,
and began by taking the little golden key, and unlocking the door that
led into the garden. Then she went to work nibbling at the mushroom
(she had kept a piece of it in her pocket) till she was about a foot
high: then she walked down the little passage: and _then_—she found
herself at last in the beautiful garden, among the bright flower-beds
