                                <p style="margin-bottom: 20px; line-height: 1.8;">“You can’t think how glad I am to see you again, you dear old thing!”

<p style="margin-bottom: 20px; line-height: 1.8;">Alice was very glad to find her in such a pleasant temper, and thought

<p style="margin-bottom: 20px; line-height: 1.8;">“When _I’m_ a Duchess,” she said to herself, (not in a very hopeful

about something, my dear, and that makes you forget to talk. I can’t
tell you just now what the moral of that is, but I shall remember it in
a bit.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Perhaps it hasn’t one,” Alice ventured to remark.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tut, tut, child!” said the Duchess. “Everything’s got a moral, if only
you can find it.” And she squeezed herself up closer to Alice’s side as
she spoke.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice did not much like keeping so close to her: first, because the
Duchess was _very_ ugly; and secondly, because she was exactly the
right height to rest her chin upon Alice’s shoulder, and it was an
uncomfortably sharp chin. However, she did not like to be rude, so she
bore it as well as she could.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“The game’s going on rather better now,” she said, by way of keeping up
the conversation a little.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“’Tis so,” said the Duchess: “and the moral of that is—‘Oh, ’tis love,
’tis love, that makes the world go round!’”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Somebody said,” Alice whispered, “that it’s done by everybody minding
their own business!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Ah, well! It means much the same thing,” said the Duchess, digging her
sharp little chin into Alice’s shoulder as she added, “and the moral of
_that_ is—‘Take care of the sense, and the sounds will take care of
themselves.’”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“How fond she is of finding morals in things!” Alice thought to
herself.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I dare say you’re wondering why I don’t put my arm round your waist,”
the Duchess said after a pause: “the reason is, that I’m doubtful about
the temper of your flamingo. Shall I try the experiment?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“He might bite,” Alice cautiously replied, not feeling at all anxious
to have the experiment tried.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Very true,” said the Duchess: “flamingoes and mustard both bite. And
the moral of that is—‘Birds of a feather flock together.’”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Only mustard isn’t a bird,” Alice remarked.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Right, as usual,” said the Duchess: “what a clear way you have of
putting things!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It’s a mineral, I _think_,” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Of course it is,” said the Duchess, who seemed ready to agree to
everything that Alice said; “there’s a large mustard-mine near here.
And the moral of that is—‘The more there is of mine, the less there is
of yours.’”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, I know!” exclaimed Alice, who had not attended to this last
remark, “it’s a vegetable. It doesn’t look like one, but it is.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I quite agree with you,” said the Duchess; “and the moral of that
is—‘Be what you would seem to be’—or if you’d like it put more
simply—‘Never imagine yourself not to be otherwise than what it might
appear to others that what you were or might have been was not
otherwise than what you had been would have appeared to them to be
otherwise.’”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I think I should understand that better,” Alice said very politely,
“if I had it written down: but I can’t quite follow it as you say it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That’s nothing to what I could say if I chose,” the Duchess replied,
in a pleased tone.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Pray don’t trouble yourself to say it any longer than that,” said
Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, don’t talk about trouble!” said the Duchess. “I make you a present
of everything I’ve said as yet.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“A cheap sort of present!” thought Alice. “I’m glad they don’t give
birthday presents like that!” But she did not venture to say it out
loud.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Thinking again?” the Duchess asked, with another dig of her sharp
little chin.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’ve a right to think,” said Alice sharply, for she was beginning to
feel a little worried.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Just about as much right,” said the Duchess, “as pigs have to fly; and
the m—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">But here, to Alice’s great surprise, the Duchess’s voice died away,
even in the middle of her favourite word ‘moral,’ and the arm that was
linked into hers began to tremble. Alice looked up, and there stood the
Queen in front of them, with her arms folded, frowning like a
thunderstorm.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“A fine day, your Majesty!” the Duchess began in a low, weak voice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Now, I give you fair warning,” shouted the Queen, stamping on the
ground as she spoke; “either you or your head must be off, and that in
about half no time! Take your choice!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Duchess took her choice, and was gone in a moment.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Let’s go on with the game,” the Queen said to Alice; and Alice was too
much frightened to say a word, but slowly followed her back to the
croquet-ground.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The other guests had taken advantage of the Queen’s absence, and were
resting in the shade: however, the moment they saw her, they hurried
back to the game, the Queen merely remarking that a moment’s delay
would cost them their lives.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">All the time they were playing the Queen never left off quarrelling
with the other players, and shouting “Off with his head!” or “Off with
her head!” Those whom she sentenced were taken into custody by the
soldiers, who of course had to leave off being arches to do this, so
that by the end of half an hour or so there were no arches left, and
all the players, except the King, the Queen, and Alice, were in custody
and under sentence of execution.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Then the Queen left off, quite out of breath, and said to Alice, “Have
you seen the Mock Turtle yet?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No,” said Alice. “I don’t even know what a Mock Turtle is.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It’s the thing Mock Turtle Soup is made from,” said the Queen.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I never saw one, or heard of one,” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Come on, then,” said the Queen, “and he shall tell you his history.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">As they walked off together, Alice heard the King say in a low voice,
to the company generally, “You are all pardoned.” “Come, _that’s_ a
good thing!” she said to herself, for she had felt quite unhappy at the
number of executions the Queen had ordered.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">They very soon came upon a Gryphon, lying fast asleep in the sun. (If
you don’t know what a Gryphon is, look at the picture.) “Up, lazy
thing!” said the Queen, “and take this young lady to see the Mock
Turtle, and to hear his history. I must go back and see after some
executions I have ordered;” and she walked off, leaving Alice alone
with the Gryphon. Alice did not quite like the look of the creature,
but on the whole she thought it would be quite as safe to stay with it
as to go after that savage Queen: so she waited.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Gryphon sat up and rubbed its eyes: then it watched the Queen till
she was out of sight: then it chuckled. “What fun!” said the Gryphon,
half to itself, half to Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What _is_ the fun?” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, _she_,” said the Gryphon. “It’s all her fancy, that: they never
executes nobody, you know. Come on!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Everybody says ‘come on!’ here,” thought Alice, as she went slowly
after it: “I never was so ordered about in all my life, never!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">They had not gone far before they saw the Mock Turtle in the distance,
sitting sad and lonely on a little ledge of rock, and, as they came
nearer, Alice could hear him sighing as if his heart would break. She
pitied him deeply. “What is his sorrow?” she asked the Gryphon, and the
Gryphon answered, very nearly in the same words as before, “It’s all
his fancy, that: he hasn’t got no sorrow, you know. Come on!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">So they went up to the Mock Turtle, who looked at them with large eyes
full of tears, but said nothing.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“This here young lady,” said the Gryphon, “she wants for to know your
history, she do.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’ll tell it her,” said the Mock Turtle in a deep, hollow tone: “sit
down, both of you, and don’t speak a word till I’ve finished.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">So they sat down, and nobody spoke for some minutes. Alice thought to
herself, “I don’t see how he can _ever_ finish, if he doesn’t begin.”
But she waited patiently.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Once,” said the Mock Turtle at last, with a deep sigh, “I was a real
Turtle.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">These words were followed by a very long silence, broken only by an
occasional exclamation of “Hjckrrh!” from the Gryphon, and the constant
heavy sobbing of the Mock Turtle. Alice was very nearly getting up and
saying, “Thank you, sir, for your interesting story,” but she could not
help thinking there _must_ be more to come, so she sat still and said
nothing.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“When we were little,” the Mock Turtle went on at last, more calmly,
though still sobbing a little now and then, “we went to school in the
sea. The master was an old Turtle—we used to call him Tortoise—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why did you call him Tortoise, if he wasn’t one?” Alice asked.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“We called him Tortoise because he taught us,” said the Mock Turtle
angrily: “really you are very dull!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You ought to be ashamed of yourself for asking such a simple
question,” added the Gryphon; and then they both sat silent and looked
at poor Alice, who felt ready to sink into the earth. At last the
Gryphon said to the Mock Turtle, “Drive on, old fellow! Don’t be all
day about it!” and he went on in these words:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, we went to school in the sea, though you mayn’t believe it—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I never said I didn’t!” interrupted Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You did,” said the Mock Turtle.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Hold your tongue!” added the Gryphon, before Alice could speak again.
The Mock Turtle went on.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“We had the best of educations—in fact, we went to school every day—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“_I’ve_ been to a day-school, too,” said Alice; “you needn’t be so
proud as all that.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“With extras?” asked the Mock Turtle a little anxiously.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes,” said Alice, “we learned French and music.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And washing?” said the Mock Turtle.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Certainly not!” said Alice indignantly.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Ah! then yours wasn’t a really good school,” said the Mock Turtle in a
tone of great relief. “Now at _ours_ they had at the end of the bill,
‘French, music, _and washing_—extra.’”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You couldn’t have wanted it much,” said Alice; “living at the bottom
of the sea.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I couldn’t afford to learn it.” said the Mock Turtle with a sigh. “I
only took the regular course.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What was that?” inquired Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Reeling and Writhing, of course, to begin with,” the Mock Turtle
replied; “and then the different branches of Arithmetic—Ambition,
Distraction, Uglification, and Derision.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I never heard of ‘Uglification,’” Alice ventured to say. “What is it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Gryphon lifted up both its paws in surprise. “What! Never heard of
uglifying!” it exclaimed. “You know what to beautify is, I suppose?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes,” said Alice doubtfully: “it means—to—make—anything—prettier.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, then,” the Gryphon went on, “if you don’t know what to uglify
is, you _are_ a simpleton.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alice did not feel encouraged to ask any more questions about it, so
she turned to the Mock Turtle, and said “What else had you to learn?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, there was Mystery,” the Mock Turtle replied, counting off the
subjects on his flappers, “—Mystery, ancient and modern, with
Seaography: then Drawling—the Drawling-master was an old conger-eel,
that used to come once a week: _he_ taught us Drawling, Stretching, and
Fainting in Coils.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What was _that_ like?” said Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I can’t show it you myself,” the Mock Turtle said: “I’m too
stiff. And the Gryphon never learnt it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Hadn’t time,” said the Gryphon: “I went to the Classics master,
though. He was an old crab, _he_ was.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I never went to him,” the Mock Turtle said with a sigh: “he taught
Laughing and Grief, they used to say.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“So he did, so he did,” said the Gryphon, sighing in his turn; and both
creatures hid their faces in their paws.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And how many hours a day did you do lessons?” said Alice, in a hurry
to change the subject.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Ten hours the first day,” said the Mock Turtle: “nine the next, and so
on.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What a curious plan!” exclaimed Alice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That’s the reason they’re called lessons,” the Gryphon remarked:
“because they lessen from day to day.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">This was quite a new idea to Alice, and she thought it over a little
before she made her next remark. “Then the eleventh day must have been
a holiday?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Of course it was,” said the Mock Turtle.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And how did you manage on the twelfth?” Alice went on eagerly.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That’s enough about lessons,” the Gryphon interrupted in a very
decided tone: “tell her something about the games now.”</p>

<script>
const BR = (() => {

  // ============================================================
  //  CONFIGURATION - Using Firebase Cloud Function backend
  // ============================================================
  const CONFIG = {
    apiEndpoint: 'https://us-central1-bedrockela-96dbd.cloudfunctions.net/billyChat',

    systemPrompt: `You are Billy, a cheerful, enthusiastic goat who is best friends with every student who visits. You are based on the story "The Three Billy Goats Gruff" and you LOVE learning and helping kids figure things out. You are warm, funny, encouraging, and genuinely excited to be here. Think of yourself as that cool older buddy who always makes things less scary and more fun.

Your personality:
- Energetic and upbeat — you are genuinely happy to help and it shows
- Warm and personal — use the student's words back to them, notice what they're working on, cheer them on
- Playful but not silly — you can make a little goat joke or say something like "Trip trap, let's go!" but you're also focused and helpful
- Patient and kind — if a student is frustrated or confused, you calm them down and make them feel like it's totally okay
- A buddy first, a teacher second — you are ON THEIR SIDE

Your one rule about answers:
You never just hand over the direct answer to a homework or assignment question. Not because you're mean — but because you genuinely want them to feel the awesome feeling of figuring it out themselves. You always help them get there by giving hints, asking one good guiding question, or breaking it into a smaller step. You make this feel like an adventure, not a punishment.

For everything else — explaining what a word means, what a concept is, how something works — go ahead and explain it fully and clearly! You are helpful and generous with knowledge.

Keep responses short and punchy: 2–4 sentences. Use simple, fun language. No emojis.

Examples:
- Student: "What's the answer to question 3?" → You: "Oh I love this one — I can't just give it to you, but I promise you already know more than you think! Read the question one more time and tell me: what is it actually asking you to find?"
- Student: "I don't get this at all, I give up." → You: "Hey, no giving up — you've got this, I promise! Let's slow down together. What part feels the most confusing right now? Just that one part."
- Student: "What is a metaphor?" → You: "Great question! A metaphor says one thing IS another thing to paint a picture — like 'the classroom was a zoo.' It doesn't use the words 'like' or 'as,' it just says it straight. Pretty cool, right?"
- Student: "I don't know how to start my paragraph." → You: "Starting is the hardest part — totally normal! Try this: just write one sentence about the main thing you want to say. Don't worry if it's perfect. What's the big idea you want your reader to know?"`
  };

  // ============================================================
  //  MINI DICTIONARY  — kid-friendly definitions
  // ============================================================
  const DICTIONARY = [
    // === FROM THE STORY ===
    { word: "Troll", type: "noun", cat: "story", def: "A made-up creature from fairy tales and folklore. Trolls are usually mean, scary, and not very smart. In stories, they often live under bridges and try to stop travelers from passing.", example: "The troll under the bridge threatened to eat the Billy Goats Gruff!" },
    { word: "Bridge", type: "noun", cat: "story", def: "A structure built over a river, road, or valley so people or animals can cross from one side to the other.", example: "The three goats had to cross the bridge to reach the green grass on the other side." },
    { word: "Gruff", type: "adj", cat: "story", def: "Sounding rough, low, and a little scary — like a growly voice. It can also mean someone who seems unfriendly at first.", example: "The big Billy Goat Gruff had a deep, gruff voice that frightened the troll." },
    { word: "Meadow", type: "noun", cat: "story", def: "An open field covered with grass and wildflowers — a beautiful place for animals to graze and rest.", example: "The goats wanted to cross the bridge so they could eat the sweet green grass in the meadow." },
    { word: "Graze", type: "verb", cat: "story", def: "When an animal eats grass by walking slowly and nibbling it right off the ground.", example: "The goats loved to graze on the hillside where the grass was tall and green." },
    { word: "Cunning", type: "adj", cat: "story", def: "Very clever — especially at tricking others or getting what you want through smart thinking.", example: "The littlest Billy Goat was cunning — he tricked the troll by saying his bigger brother was coming." },
    { word: "Threat", type: "noun", cat: "story", def: "When someone says they will do something bad to you if you don't do what they want. It's a way of trying to scare someone.", example: "The troll made a threat: 'I'm going to eat you up!'" },
    { word: "Deceive", type: "verb", cat: "story", def: "To trick someone into believing something that isn't true.", example: "The small goat deceived the troll by promising a bigger, tastier goat was coming." },
    { word: "Cowardly", type: "adj", cat: "story", def: "Being too scared to do the right thing — running away from problems instead of facing them.", example: "The troll was actually cowardly — when the big goat charged, the troll ran away!" },
    { word: "Brave", type: "adj", cat: "story", def: "Willing to do something scary or hard even when you feel afraid. It doesn't mean you're not scared — it means you do it anyway!", example: "The big Billy Goat Gruff was brave when he charged at the troll to protect his brothers." },
    { word: "Villain", type: "noun", cat: "story", def: "The bad character in a story — the one who causes trouble or tries to stop the hero.", example: "The troll is the villain of The Three Billy Goats Gruff." },
    { word: "Hero", type: "noun", cat: "story", def: "A character who does something brave or good to help others or solve the big problem in the story.", example: "The biggest Billy Goat becomes the hero when he defeats the troll." },
    { word: "Folklore", type: "noun", cat: "story", def: "Old stories, legends, and traditions passed down from grandparents to parents to children over many, many years.", example: "The Three Billy Goats Gruff is a piece of Norwegian folklore — it came from Norway long ago." },
    { word: "Fairy Tale", type: "noun", cat: "story", def: "A made-up story, often with magical creatures, that usually has a clear good side and a bad side — and often a happy ending.", example: "Cinderella, Jack and the Beanstalk, and The Three Billy Goats Gruff are all fairy tales." },
    { word: "Fable", type: "noun", cat: "story", def: "A short story — usually with talking animals — that teaches a lesson called a moral at the end.", example: "The Tortoise and the Hare is a fable. Its moral is: slow and steady wins the race." },
    { word: "Moral", type: "noun", cat: "story", def: "The lesson a story is trying to teach you — the big idea about how to live or act.", example: "The moral of The Three Billy Goats Gruff is that it's smart to work together and think before you act." },
    { word: "Antagonist", type: "noun", cat: "story", def: "The character who works against the main character and causes the main problem in the story. Often called 'the bad guy.'", example: "The troll is the antagonist — he blocks the goats' path and threatens them." },
    { word: "Protagonist", type: "noun", cat: "story", def: "The main character the story follows — the one we usually cheer for.", example: "The three Billy Goats are the protagonists of the story." },
    { word: "Repetition", type: "noun", cat: "story", def: "When something in a story happens again and again — like the same phrase or the same event repeating with small changes. It builds rhythm and excitement!", example: "Each goat crosses the bridge and faces the troll — the same thing happens three times, with the goats getting bigger each time." },
    { word: "Sequence", type: "noun", cat: "story", def: "The order that events happen in a story — first, then, next, finally.", example: "In sequence: small goat crosses, medium goat crosses, big goat crosses and defeats the troll." },
    { word: "Climax", type: "noun", cat: "story", def: "The most exciting moment in a story — the turning point where the big problem finally gets solved (or gets worse).", example: "The climax of the story is when the biggest Billy Goat charges the troll and tosses him into the river." },
    { word: "Resolution", type: "noun", cat: "story", def: "The part of the story after the climax where everything gets wrapped up and we find out how things end.", example: "The resolution is when all three goats finally reach the meadow and live happily ever after." },
    // === ELA ESSENTIALS ===
    { word: "Noun", type: "noun", cat: "ela", def: "A word that names a person, place, thing, or idea — anything you can point to or think about.", example: "Goat, bridge, troll, and courage are all nouns." },
    { word: "Verb", type: "verb", cat: "ela", def: "An action word — it tells what someone or something is doing.", example: "The goats trotted, crossed, and charged — those are all verbs." },
    { word: "Adjective", type: "adj", cat: "ela", def: "A word that describes a noun — it tells you what something looks, feels, sounds, or seems like.", example: "The small goat, the grumpy troll, and the green meadow all use adjectives." },
    { word: "Simile", type: "noun", cat: "ela", def: "A comparison using 'like' or 'as' to help readers picture something more clearly.", example: "The troll's voice was like thunder rumbling under the bridge." },
    { word: "Metaphor", type: "noun", cat: "ela", def: "A comparison that says one thing IS another — without using 'like' or 'as.'", example: "The bridge was a test — each goat had to prove their courage to cross it." },
    { word: "Inference", type: "noun", cat: "ela", def: "Using clues from the story plus what you already know to figure out something the author didn't say directly.", example: "We can infer the troll is not very smart because he keeps getting tricked by the goats." },
    { word: "Character", type: "noun", cat: "ela", def: "A person, animal, or creature in a story. Main characters are the ones the story is mostly about.", example: "The three goats and the troll are all characters in the story." },
    { word: "Setting", type: "noun", cat: "ela", def: "Where and when a story takes place — the time and place that make up the story's world.", example: "The setting is a hillside, a bridge over a rushing river, and a green meadow beyond it." },
    { word: "Theme", type: "noun", cat: "ela", def: "The big lesson or message of the story — the idea the author wants you to take away.", example: "One theme of The Three Billy Goats Gruff is that courage and cleverness can defeat a bully." },
    { word: "Conflict", type: "noun", cat: "ela", def: "The main problem in a story — the thing that creates all the tension and must be solved.", example: "The conflict is that a troll is blocking the bridge and threatening anyone who tries to cross." },
    { word: "Dialogue", type: "noun", cat: "ela", def: "The words that characters say to each other in a story — their conversations.", example: "'Who is that trip-trapping over my bridge?' said the troll. That's dialogue!" },
    { word: "Imagery", type: "noun", cat: "ela", def: "Words that paint a picture in your mind by describing what something looks, sounds, smells, feels, or tastes like.", example: "The rushing cold river below, the splintery old bridge, and the growling troll are all imagery." },
    { word: "Personification", type: "noun", cat: "ela", def: "Giving human feelings or actions to an animal or object.", example: "The river roared angrily beneath the bridge. Rivers can't really be angry — that's personification!" },
    { word: "Plot", type: "noun", cat: "ela", def: "All the events that happen in a story from beginning to end.", example: "The plot: goats want grass, troll blocks the bridge, goats outsmart the troll, goats reach the meadow." },
  ].sort((a, b) => a.word.localeCompare(b.word));

  // ============================================================
  //  STATE
  // ============================================================
  let isOpen = false;
  let isLoading = false;
  let currentTab = 'chat';
  const history = [];

  // Elements
  const launcher   = document.getElementById('br-launcher');
  const btn        = document.getElementById('br-btn');
  const win        = document.getElementById('br-window');
  const tooltip    = document.getElementById('br-tooltip');
  const messages   = document.getElementById('br-messages');
  const typing     = document.getElementById('br-typing');
  const inputEl    = document.getElementById('br-input');
  const sendBtn    = document.getElementById('br-send');
  const panelChat  = document.getElementById('br-panel-chat');
  const panelDict  = document.getElementById('br-panel-dict');
  const dictList   = document.getElementById('br-dict-list');
  const dictSearch = document.getElementById('br-dict-search');
  const dictEmpty  = document.getElementById('br-dict-empty');

  // ---- Init ----
  function init() {
    btn.addEventListener('click', toggle);
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
    });
    renderDict(DICTIONARY);
    // Hide tooltip after 5s
    setTimeout(() => tooltip.classList.add('hidden'), 5000);
  }

  function toggle() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
    tooltip.classList.add('hidden');
    if (isOpen && messages.children.length === 0) {
      addBotMsg("Hey! I'm Billy — your learning buddy! I'm here to help you figure things out and cheer you on. What are you working on today?");
    }
    if (isOpen) setTimeout(() => inputEl.focus(), 350);
  }

  // ---- Tab switching ----
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.br-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    panelChat.style.display = tab === 'chat' ? 'flex' : 'none';
    panelDict.style.display = tab === 'dict' ? 'flex' : 'none';
    if (tab === 'dict') setTimeout(() => dictSearch.focus(), 200);
  }

  // ---- Messages ----
  function addBotMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg bot';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg user';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    typing.classList.toggle('show', v);
    if (v) messages.scrollTop = messages.scrollHeight;
  }

  // ---- Send (calls secure Firebase backend) ----
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('br-suggestions').style.display = 'none';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    setLoading(true);
    try {
      const res = await fetch(CONFIG.apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: CONFIG.systemPrompt,
          messages: history
        })
      });
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        if (errorData.fallback) {
          throw new Error(errorData.fallback);
        }
        throw new Error(`Error ${res.status}`);
      }
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Hmm, I didn't catch that — could you try again?";
      history.push({ role: 'assistant', content: reply });
      setLoading(false);
      addBotMsg(reply);
    } catch(err) {
      setLoading(false);
      addBotMsg(`Whoops, something went wrong — even goats stumble sometimes! Try again in a second. (${err.message})`);
      console.error('Billy error:', err);
    }
  }

  function suggest(el) {
    inputEl.value = el.textContent;
    handleSend();
  }

  // ---- Dictionary ----
  function renderDict(entries) {
    dictList.querySelectorAll('.br-dict-entry').forEach(e => e.remove());
    dictEmpty.style.display = entries.length === 0 ? 'block' : 'none';
    const catLabel = { story: 'Story', ela: 'ELA' };
    entries.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'br-dict-entry';
      el.innerHTML = `
        <div class="br-dict-word" onclick="BR.toggleEntry(this.parentElement)">
          <span class="br-word-label">${entry.word}</span>
          <span class="br-word-cat ${entry.cat}">${catLabel[entry.cat] || entry.cat}</span>
          <span class="br-word-chevron">&#9660;</span>
        </div>
        <div class="br-dict-def">
          <div class="br-def-text">${entry.def}</div>
          ${entry.example ? `<div class="br-def-example">${entry.example}</div>` : ''}
        </div>`;
      dictList.appendChild(el);
    });
  }

  function toggleEntry(el) {
    const wasOpen = el.classList.contains('expanded');
    document.querySelectorAll('.br-dict-entry.expanded').forEach(e => e.classList.remove('expanded'));
    if (!wasOpen) el.classList.add('expanded');
  }

  function filterDict() {
    const q = dictSearch.value.toLowerCase().trim();
    const filtered = q
      ? DICTIONARY.filter(e =>
          e.word.toLowerCase().includes(q) ||
          e.def.toLowerCase().includes(q) ||
          (e.example && e.example.toLowerCase().includes(q)) ||
          (e.type && e.type.toLowerCase().includes(q)) ||
          (e.cat && e.cat.toLowerCase().includes(q))
        )
      : DICTIONARY;
    renderDict(filtered);
  }

  init();

  return { switchTab, suggest, toggleEntry, filterDict };
})();
</script>

</body>
</html>
