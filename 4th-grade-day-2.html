s the room there came a great shriek from the wind, and the house shook so hard that she lost her footing and sat down suddenly upon the floor. Then a strange thing happened. The house whirled around two or three times and rose slowly through the air. Dorothy felt as if she were going up in a balloon. The north and south winds met where the house stood, and made it the exact center of the cyclone. In the middle of a cyclone the air is generally still, but the great pressure of the wind on every side of the house raised it up higher and higher, until it was at the very top of the cyclone; and there it remained and was carried miles and miles away as easily as you could carry a feather. It was very dark, and the wind howled horribly around her, but Dorothy found she was riding quite easily. After the first few whirls around, and one other time when the house tipped badly, she felt as if she were being rocked gently, like a baby in a cradle. Toto did not like it. He ran about the room, now here, now there, barking loudly; but Dorothy sat quite still on the floor and waited to see what would happen. Once Toto got too near the open trap door, and fell in; and at first the little girl thought she had lost him. But soon she saw one of his ears sticking up through the hole, for the strong pressure of the air was keeping him up so that he could not fall. She crept to the hole, caught Toto by the ear, and dragged him into the room again, afterward closing the trap door so that no more accidents could happen. Hour after hour passed away, and slowly Dorothy got over her fright; but she felt quite lonely, and the wind shrieked so loudly all about her that she nearly became deaf. At first she had wondered if she would be dashed to pieces when the house fell again; but as the hours passed and nothing terrible happened, she stopped worrying and resolved to wait calmly and see what the future would bring. At last she crawled over the swaying floor to her bed, and lay down upon it; a                                 <p style="margin-bottom: 15px;">When Dorothy entered the Land of Oz, everything suddenly became more colorful. But what is color, and how do our eyes perceive it?</p><h4 style="color: #1B2A4A; margin: 20px 0 10px 0;">Light and Color</h4><p style="margin-bottom: 15px;">Color is actually a property of light, not objects themselves. When light from the sun or a lamp hits an object, the object absorbs some wavelengths of light and reflects others. The wavelengths that bounce back to our eyes determine what color we see. A yellow brick road appears yellow because it reflects yellow wavelengths of light and absorbs other colors.</p><h4 style="color: #1B2A4A; margin: 20px 0 10px 0;">How Our Eyes Work</h4><p style="margin-bottom: 15px;">Inside our eyes are special cells called cones that detect color. We have three types of cones: one sensitive to red light, one to green, and one to blue. When light enters our eye, these cones send signals to our brain, which interprets the combination of signals as different colors. This is why we can see millions of different colors!</p><h4 style="color: #1B2A4A; margin: 20px 0 10px 0;">Why Kansas Looked Gray</h4><p style="margin-bottom: 15px;">The author describes Kansas as looking gray because of drought and harsh sun. When plants die from lack of water, they lose their green chlorophyll (the chemical that makes plants green). Dry grass and dusty soil reflect light more evenly across all wavelengths, which our brain perceives as gray or brown.</p><p style="margin-bottom: 15px;">In contrast, healthy plants in Oz would have vibrant green chlorophyll. Flowers would have colorful pigments to attract insects. The difference between gray Kansas and colorful Oz wasn't magic—it was the difference between drought and abundance!</p>
