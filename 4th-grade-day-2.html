                                <h4 style="color: #1B2A4A; margin: 20px 0 10px 0;">How Our Eyes Work</h4><p style="margin-bottom: 15px;">Inside our eyes are special cells called cones that detect color. We have three types of cones: one sensitive to red light, one to green, and one to blue. When light enters our eye, these cones send signals to our brain, which interprets the combination of signals as different colors. This is why we can see millions of different colors!</p><h4 style="color: #1B2A4A; margin: 20px 0 10px 0;">Why Kansas Looked Gray</h4><p style="margin-bottom: 15px;">The author describes Kansas as looking gray because of drought and harsh sun. When plants die from lack of water, they lose their green chlorophyll (the chemical that makes plants green). Dry grass and dusty soil reflect light more evenly across all wavelengths, which our brain perceives as gray or brown.</p><p style="margin-bottom: 15px;">In contrast, healthy plants in Oz would have vibrant green chlorophyll. Flowers would have colorful pigments to attract insects. The difference between gray Kansas and colorful Oz wasn't magic—it was the difference between drought and abundance!</p>
