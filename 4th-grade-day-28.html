 down the hill as if he had been struck by a cannon ball. Dorothy ran down and helped the Scarecrow to his feet, and the Lion came up to her, feeling rather bruised and sore, and said, “It is useless to fight people with shooting heads; no one can withstand them.” “What can we do, then?” she asked. “Call the Winged Monkeys,” suggested the Tin Woodman. “You have still the right to command them once more.” “Very well,” she answered, and putting on the Golden Cap she uttered the magic words. The Monkeys were as prompt as ever, and in a few moments the entire band stood before her. “What are your commands?” inquired the King of the Monkeys, bowing low. “Carry us over the hill to the country of the Quadlings,” answered the girl. “It shall be done,” said the King, and at once the Winged Monkeys caught the four travelers and Toto up in their arms and flew away with them. As they passed over the hill the Hammer-Heads yelled with vexation, and shot their heads high in the air, but they could not reach the Winged Monkeys, which carried Dorothy and her comrades safely over the hill and set them down in the beautiful country of the Quadlings. “This is the last time you can summon us,” said the leader to Dorothy; “so good-bye and good luck to you.” “Good-bye, and thank you very much,” returned the girl; and the Monkeys rose into the air and were out of sight in a twinkling. The country of the Quadlings seemed rich and happy. There was field upon field of ripening grain, with well-paved roads running between, and pretty rippling brooks with strong bridges across them. The fences and houses and bridges were all painted bright red, just as they had been painted yellow in the country of the Winkies and blue in the country of the Munchkins. The Quadlings themselves, who were short and fat and looked chubby and good-natured, were dressed all in red, which showed bright against the green grass and the yellowing grain. The Monkeys had set them down near a farmhouse, and the four travelers walked up to it and knocked at the door. It was opened by the farmer’s wife, and when Dorothy asked for something to eat the woman gave them all a good dinner, with three kinds of cake and four kinds of cookies, and a bowl of milk for Toto. “How far is it to the Castle of Glinda?” asked the child. “It is not a great way,” answered the farmer’s wife. “Take the road to the South and you will soon reach it.” Thanking the good woman, they started afresh and walked by the fields and across the pretty bridges until they saw before them a very beautiful Castle. Before the gates were three young girls, dressed in handsome red uniforms trimmed with gold braid; and as Dorothy approached, one of them said to her: “Why have you come to the South Country?” “To see the Good Witch who rules here,” she answered. “Will you take me to her?” “Let me have your name, and I will ask Glinda if she will receive you.” They told who they were, and the girl soldier went into the Castle. After a few moments she came back to say that Dorothy and the others were to be admitted at once.</p>
