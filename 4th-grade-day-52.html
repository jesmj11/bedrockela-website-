                                <p style="margin-bottom: 20px; line-height: 1.8;">CHAPTER XXV</p>
<p style="margin-bottom: 20px; line-height: 1.8;">There comes a time in every rightly-constructed boy’s life when he has
a raging desire to go somewhere and dig for hidden treasure. This desire
suddenly came upon Tom one day. He sallied out to find Joe Harper,
but failed of success. Next he sought Ben Rogers; he had gone fishing.
Presently he stumbled upon Huck Finn the Red-Handed. Huck would
answer. Tom took him to a private place and opened the matter to him
confidentially. Huck was willing. Huck was always willing to take a hand
in any enterprise that offered entertainment and required no capital,
for he had a troublesome superabundance of that sort of time which is
not money. “Where’ll we dig?” said Huck.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, most anywhere.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, is it hid all around?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No, indeed it ain’t. It’s hid in mighty particular places,
Huck—sometimes on islands, sometimes in rotten chests under the end of
a limb of an old dead tree, just where the shadow falls at midnight; but
mostly under the floor in ha’nted houses.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Who hides it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, robbers, of course—who’d you reckon? Sunday-school
sup’rintendents?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I don’t know. If ’twas mine I wouldn’t hide it; I’d spend it and have a
good time.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“So would I. But robbers don’t do that way. They always hide it and
leave it there.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Don’t they come after it any more?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No, they think they will, but they generally forget the marks, or else
they die. Anyway, it lays there a long time and gets rusty; and by and
by somebody finds an old yellow paper that tells how to find the marks—a
paper that’s got to be ciphered over about a week because it’s mostly
signs and hy’roglyphics.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Hyro—which?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Hy’roglyphics—pictures and things, you know, that don’t seem to mean
anything.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Have you got one of them papers, Tom?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well then, how you going to find the marks?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I don’t want any marks. They always bury it under a ha’nted house or on
an island, or under a dead tree that’s got one limb sticking out. Well,
we’ve tried Jackson’s Island a little, and we can try it again some
time; and there’s the old ha’nted house up the Still-House branch, and
there’s lots of dead-limb trees—dead loads of ’em.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Is it under all of them?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“How you talk! No!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then how you going to know which one to go for?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Go for all of ’em!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, Tom, it’ll take all summer.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, what of that? Suppose you find a brass pot with a hundred dollars
in it, all rusty and gray, or rotten chest full of di’monds. How’s
that?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Huck’s eyes glowed.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That’s bully. Plenty bully enough for me. Just you gimme the hundred
dollars and I don’t want no di’monds.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“All right. But I bet you I ain’t going to throw off on di’monds. Some
of ’em’s worth twenty dollars apiece—there ain’t any, hardly, but’s
worth six bits or a dollar.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No! Is that so?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Cert’nly—anybody’ll tell you so. Hain’t you ever seen one, Huck?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Not as I remember.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, kings have slathers of them.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I don’ know no kings, Tom.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I reckon you don’t. But if you was to go to Europe you’d see a raft of
’em hopping around.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Do they hop?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Hop?—your granny! No!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, what did you say they did, for?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Shucks, I only meant you’d _see_ ’em—not hopping, of course—what do
they want to hop for?—but I mean you’d just see ’em—scattered around,
you know, in a kind of a general way. Like that old humpbacked Richard.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Richard? What’s his other name?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“He didn’t have any other name. Kings don’t have any but a given name.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“But they don’t.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, if they like it, Tom, all right; but I don’t want to be a king
and have only just a given name, like a nigger. But say—where you going
to dig first?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I don’t know. S’pose we tackle that old dead-limb tree on the
hill t’other side of Still-House branch?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’m agreed.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">So they got a crippled pick and a shovel, and set out on their
three-mile tramp. They arrived hot and panting, and threw themselves
down in the shade of a neighboring elm to rest and have a smoke.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I like this,” said Tom.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“So do I.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Say, Huck, if we find a treasure here, what you going to do with your
share?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I’ll have pie and a glass of soda every day, and I’ll go to every
circus that comes along. I bet I’ll have a gay time.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, ain’t you going to save any of it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Save it? What for?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, so as to have something to live on, by and by.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, that ain’t any use. Pap would come back to thish-yer town some day
and get his claws on it if I didn’t hurry up, and I tell you he’d clean
it out pretty quick. What you going to do with yourn, Tom?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’m going to buy a new drum, and a sure’nough sword, and a red necktie
and a bull pup, and get married.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Married!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That’s it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom, you—why, you ain’t in your right mind.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Wait—you’ll see.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, that’s the foolishest thing you could do. Look at pap and my
mother. Fight! Why, they used to fight all the time. I remember, mighty
well.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That ain’t anything. The girl I’m going to marry won’t fight.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom, I reckon they’re all alike. They’ll all comb a body. Now you
better think ’bout this awhile. I tell you you better. What’s the name
of the gal?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It ain’t a gal at all—it’s a girl.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It’s all the same, I reckon; some says gal, some says girl—both’s
right, like enough. Anyway, what’s her name, Tom?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’ll tell you some time—not now.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“All right—that’ll do. Only if you get married I’ll be more lonesomer
than ever.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No you won’t. You’ll come and live with me. Now stir out of this and
we’ll go to digging.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">They worked and sweated for half an hour. No result. They toiled another
halfhour. Still no result. Huck said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Do they always bury it as deep as this?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Sometimes—not always. Not generally. I reckon we haven’t got the right
place.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">So they chose a new spot and began again. The labor dragged a little,
but still they made progress. They pegged away in silence for some time.
Finally Huck leaned on his shovel, swabbed the beaded drops from his
brow with his sleeve, and said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Where you going to dig next, after we get this one?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I reckon maybe we’ll tackle the old tree that’s over yonder on Cardiff
Hill back of the widow’s.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I reckon that’ll be a good one. But won’t the widow take it away from
us, Tom? It’s on her land.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“_She_ take it away! Maybe she’d like to try it once. Whoever finds one
of these hid treasures, it belongs to him. It don’t make any difference
whose land it’s on.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">That was satisfactory. The work went on. By and by Huck said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Blame it, we must be in the wrong place again. What do you think?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It is mighty curious, Huck. I don’t understand it. Sometimes witches
interfere. I reckon maybe that’s what’s the trouble now.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Shucks! Witches ain’t got no power in the daytime.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, that’s so. I didn’t think of that. Oh, I know what the matter is!
What a blamed lot of fools we are! You got to find out where the shadow
of the limb falls at midnight, and that’s where you dig!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then consound it, we’ve fooled away all this work for nothing. Now hang
it all, we got to come back in the night. It’s an awful long way. Can
you get out?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I bet I will. We’ve got to do it tonight, too, because if somebody sees
these holes they’ll know in a minute what’s here and they’ll go for it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I’ll come around and maow tonight.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“All right. Let’s hide the tools in the bushes.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The boys were there that night, about the appointed time. They sat in
the shadow waiting. It was a lonely place, and an hour made <span class="vocab-highlight" title="Vocabulary word: solemn">solemn</span> by
old traditions. Spirits whispered in the rustling leaves, ghosts lurked
in the murky nooks, the deep baying of a hound floated up out of the
distance, an owl answered with his sepulchral note. The boys were
subdued by these solemnities, and talked little. By and by they judged
that twelve had come; they marked where the shadow fell, and began to
dig. Their hopes commenced to rise. Their interest grew stronger, and
their industry kept pace with it. The hole deepened and still deepened,
but every time their hearts jumped to hear the pick strike upon
something, they only suffered a new disappointment. It was only a stone
or a chunk. At last Tom said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It ain’t any use, Huck, we’re wrong again.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, but we _can’t_ be wrong. We spotted the shadder to a dot.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I know it, but then there’s another thing.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What’s that?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, we only guessed at the time. Like enough it was too late or too
early.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Huck dropped his shovel.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That’s it,” said he. “That’s the very trouble. We got to give this one
up. We can’t ever tell the right time, and besides this kind of thing’s
too awful, here this time of night with witches and ghosts a-fluttering
around so. I feel as if something’s behind me all the time; and I’m
afeard to turn around, becuz maybe there’s others in front a-waiting for
a chance. I been creeping all over, ever since I got here.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I’ve been pretty much so, too, Huck. They most always put in a
dead man when they bury a treasure under a tree, to look out for it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Lordy!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, they do. I’ve always heard that.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom, I don’t like to fool around much where there’s dead people. A
body’s bound to get into trouble with ’em, sure.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I don’t like to stir ’em up, either. S’pose this one here was to stick
his skull out and say something!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Don’t Tom! It’s awful.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, it just is. Huck, I don’t feel comfortable a bit.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Say, Tom, let’s give this place up, and try somewheres else.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“All right, I reckon we better.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What’ll it be?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Tom considered awhile; and then said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“The ha’nted house. That’s it!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Blame it, I don’t like ha’nted houses, Tom. Why, they’re a dern sight
worse’n dead people. Dead people might talk, maybe, but they don’t come
sliding around in a shroud, when you ain’t noticing, and peep over your
shoulder all of a sudden and grit their teeth, the way a ghost does. I
couldn’t stand such a thing as that, Tom—nobody could.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, but, Huck, ghosts don’t travel around only at night. They won’t
hender us from digging there in the daytime.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, that’s so. But you know mighty well people don’t go about that
ha’nted house in the day nor the night.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, that’s mostly because they don’t like to go where a man’s been
murdered, anyway—but nothing’s ever been seen around that house except
in the night—just some blue lights slipping by the windows—no regular
ghosts.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, where you see one of them blue lights flickering around, Tom,
you can bet there’s a ghost mighty close behind it. It stands to reason.
Becuz you know that they don’t anybody but ghosts use ’em.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, that’s so. But anyway they don’t come around in the daytime, so
what’s the use of our being afeard?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, all right. We’ll tackle the ha’nted house if you say so—but I
reckon it’s taking chances.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">They had started down the hill by this time. There in the middle of the
moonlit valley below them stood the “ha’nted” house, utterly isolated,
its fences gone long ago, rank weeds smothering the very doorsteps, the
chimney crumbled to ruin, the window-sashes vacant, a corner of the roof
caved in. The boys gazed awhile, half expecting to see a blue light flit
past a window; then talking in a low tone, as befitted the time and the
circumstances, they struck far off to the right, to give the haunted

  .br-dict-word {

  .br-dict-def {

<script>
window.BR = (() => {

  // ============================================================
  //  CONFIGURATION - Using Firebase Cloud Function backend
  // ============================================================
  const CONFIG = {
    apiEndpoint: 'https://us-central1-bedrockela-96dbd.cloudfunctions.net/billyChat',

    systemPrompt: `You are Billy, a cheerful, enthusiastic goat who is best friends with every student who visits. You are based on the story "The Three Billy Goats Gruff" and you LOVE learning and helping kids figure things out. You are warm, funny, encouraging, and genuinely excited to be here. Think of yourself as that cool older buddy who always makes things less scary and more fun.

Your personality:
- Energetic and upbeat — you are genuinely happy to help and it shows
- Warm and personal — use the student's words back to them, notice what they're working on, cheer them on
- Playful but not silly — you can make a little goat joke or say something like "Trip trap, let's go!" but you're also focused and helpful
- Patient and kind — if a student is frustrated or confused, you calm them down and make them feel like it's totally okay
- A buddy first, a teacher second — you are ON THEIR SIDE

Your one rule about answers:
You never just hand over the direct answer to a homework or assignment question. Not because you're mean — but because you genuinely want them to feel the awesome feeling of figuring it out themselves. You always help them get there by giving hints, asking one good guiding question, or breaking it into a smaller step. You make this feel like an adventure, not a punishment.

For everything else — explaining what a word means, what a concept is, how something works — go ahead and explain it fully and clearly! You are helpful and generous with knowledge.

Keep responses short and punchy: 2–4 sentences. Use simple, fun language. No emojis.

Examples:
- Student: "What's the answer to question 3?" → You: "Oh I love this one — I can't just give it to you, but I promise you already know more than you think! Read the question one more time and tell me: what is it actually asking you to find?"
- Student: "I don't get this at all, I give up." → You: "Hey, no giving up — you've got this, I promise! Let's slow down together. What part feels the most confusing right now? Just that one part."
- Student: "What is a metaphor?" → You: "Great question! A metaphor says one thing IS another thing to paint a picture — like 'the classroom was a zoo.' It doesn't use the words 'like' or 'as,' it just says it straight. Pretty cool, right?"
- Student: "I don't know how to start my paragraph." → You: "Starting is the hardest part — totally normal! Try this: just write one sentence about the main thing you want to say. Don't worry if it's perfect. What's the big idea you want your reader to know?"`
  };

  // ============================================================
  //  MINI DICTIONARY  — kid-friendly definitions
  // ============================================================
  const DICTIONARY = [
    // === FROM THE STORY ===
    { word: "Troll", type: "noun", cat: "story", def: "A made-up creature from fairy tales and folklore. Trolls are usually mean, scary, and not very smart. In stories, they often live under bridges and try to stop travelers from passing.", example: "The troll under the bridge threatened to eat the Billy Goats Gruff!" },
    { word: "Bridge", type: "noun", cat: "story", def: "A structure built over a river, road, or valley so people or animals can cross from one side to the other.", example: "The three goats had to cross the bridge to reach the green grass on the other side." },
    { word: "Gruff", type: "adj", cat: "story", def: "Sounding rough, low, and a little scary — like a growly voice. It can also mean someone who seems unfriendly at first.", example: "The big Billy Goat Gruff had a deep, gruff voice that frightened the troll." },
    { word: "Meadow", type: "noun", cat: "story", def: "An open field covered with grass and wildflowers — a beautiful place for animals to graze and rest.", example: "The goats wanted to cross the bridge so they could eat the sweet green grass in the meadow." },
    { word: "Graze", type: "verb", cat: "story", def: "When an animal eats grass by walking slowly and nibbling it right off the ground.", example: "The goats loved to graze on the hillside where the grass was tall and green." },
    { word: "Cunning", type: "adj", cat: "story", def: "Very clever — especially at tricking others or getting what you want through smart thinking.", example: "The littlest Billy Goat was cunning — he tricked the troll by saying his bigger brother was coming." },
    { word: "Threat", type: "noun", cat: "story", def: "When someone says they will do something bad to you if you don't do what they want. It's a way of trying to scare someone.", example: "The troll made a threat: 'I'm going to eat you up!'" },
    { word: "Deceive", type: "verb", cat: "story", def: "To trick someone into believing something that isn't true.", example: "The small goat deceived the troll by promising a bigger, tastier goat was coming." },
    { word: "Cowardly", type: "adj", cat: "story", def: "Being too scared to do the right thing — running away from problems instead of facing them.", example: "The troll was actually cowardly — when the big goat charged, the troll ran away!" },
    { word: "Brave", type: "adj", cat: "story", def: "Willing to do something scary or hard even when you feel afraid. It doesn't mean you're not scared — it means you do it anyway!", example: "The big Billy Goat Gruff was brave when he charged at the troll to protect his brothers." },
    { word: "Villain", type: "noun", cat: "story", def: "The bad character in a story — the one who causes trouble or tries to stop the hero.", example: "The troll is the villain of The Three Billy Goats Gruff." },
    { word: "Hero", type: "noun", cat: "story", def: "A character who does something brave or good to help others or solve the big problem in the story.", example: "The biggest Billy Goat becomes the hero when he defeats the troll." },
    { word: "Folklore", type: "noun", cat: "story", def: "Old stories, legends, and traditions passed down from grandparents to parents to children over many, many years.", example: "The Three Billy Goats Gruff is a piece of Norwegian folklore — it came from Norway long ago." },
    { word: "Fairy Tale", type: "noun", cat: "story", def: "A made-up story, often with magical creatures, that usually has a clear good side and a bad side — and often a happy ending.", example: "Cinderella, Jack and the Beanstalk, and The Three Billy Goats Gruff are all fairy tales." },
    { word: "Fable", type: "noun", cat: "story", def: "A short story — usually with talking animals — that teaches a lesson called a moral at the end.", example: "The Tortoise and the Hare is a fable. Its moral is: slow and steady wins the race." },
    { word: "Moral", type: "noun", cat: "story", def: "The lesson a story is trying to teach you — the big idea about how to live or act.", example: "The moral of The Three Billy Goats Gruff is that it's smart to work together and think before you act." },
    { word: "Antagonist", type: "noun", cat: "story", def: "The character who works against the main character and causes the main problem in the story. Often called 'the bad guy.'", example: "The troll is the antagonist — he blocks the goats' path and threatens them." },
    { word: "Protagonist", type: "noun", cat: "story", def: "The main character the story follows — the one we usually cheer for.", example: "The three Billy Goats are the protagonists of the story." },
    { word: "Repetition", type: "noun", cat: "story", def: "When something in a story happens again and again — like the same phrase or the same event repeating with small changes. It builds rhythm and excitement!", example: "Each goat crosses the bridge and faces the troll — the same thing happens three times, with the goats getting bigger each time." },
    { word: "Sequence", type: "noun", cat: "story", def: "The order that events happen in a story — first, then, next, finally.", example: "In sequence: small goat crosses, medium goat crosses, big goat crosses and defeats the troll." },
    { word: "Climax", type: "noun", cat: "story", def: "The most exciting moment in a story — the turning point where the big problem finally gets solved (or gets worse).", example: "The climax of the story is when the biggest Billy Goat charges the troll and tosses him into the river." },
    { word: "Resolution", type: "noun", cat: "story", def: "The part of the story after the climax where everything gets wrapped up and we find out how things end.", example: "The resolution is when all three goats finally reach the meadow and live happily ever after." },
    // === ELA ESSENTIALS ===
    { word: "Noun", type: "noun", cat: "ela", def: "A word that names a person, place, thing, or idea — anything you can point to or think about.", example: "Goat, bridge, troll, and courage are all nouns." },
    { word: "Verb", type: "verb", cat: "ela", def: "An action word — it tells what someone or something is doing.", example: "The goats trotted, crossed, and charged — those are all verbs." },
    { word: "Adjective", type: "adj", cat: "ela", def: "A word that describes a noun — it tells you what something looks, feels, sounds, or seems like.", example: "The small goat, the grumpy troll, and the green meadow all use adjectives." },
    { word: "Simile", type: "noun", cat: "ela", def: "A comparison using 'like' or 'as' to help readers picture something more clearly.", example: "The troll's voice was like thunder rumbling under the bridge." },
    { word: "Metaphor", type: "noun", cat: "ela", def: "A comparison that says one thing IS another — without using 'like' or 'as.'", example: "The bridge was a test — each goat had to prove their courage to cross it." },
    { word: "Inference", type: "noun", cat: "ela", def: "Using clues from the story plus what you already know to figure out something the author didn't say directly.", example: "We can infer the troll is not very smart because he keeps getting tricked by the goats." },
    { word: "Character", type: "noun", cat: "ela", def: "A person, animal, or creature in a story. Main characters are the ones the story is mostly about.", example: "The three goats and the troll are all characters in the story." },
    { word: "Setting", type: "noun", cat: "ela", def: "Where and when a story takes place — the time and place that make up the story's world.", example: "The setting is a hillside, a bridge over a rushing river, and a green meadow beyond it." },
    { word: "Theme", type: "noun", cat: "ela", def: "The big lesson or message of the story — the idea the author wants you to take away.", example: "One theme of The Three Billy Goats Gruff is that courage and cleverness can defeat a bully." },
    { word: "Conflict", type: "noun", cat: "ela", def: "The main problem in a story — the thing that creates all the tension and must be solved.", example: "The conflict is that a troll is blocking the bridge and threatening anyone who tries to cross." },
    { word: "Dialogue", type: "noun", cat: "ela", def: "The words that characters say to each other in a story — their conversations.", example: "'Who is that trip-trapping over my bridge?' said the troll. That's dialogue!" },
    { word: "Imagery", type: "noun", cat: "ela", def: "Words that paint a picture in your mind by describing what something looks, sounds, smells, feels, or tastes like.", example: "The rushing cold river below, the splintery old bridge, and the growling troll are all imagery." },
    { word: "Personification", type: "noun", cat: "ela", def: "Giving human feelings or actions to an animal or object.", example: "The river roared angrily beneath the bridge. Rivers can't really be angry — that's personification!" },
    { word: "Plot", type: "noun", cat: "ela", def: "All the events that happen in a story from beginning to end.", example: "The plot: goats want grass, troll blocks the bridge, goats outsmart the troll, goats reach the meadow." },
  ].sort((a, b) => a.word.localeCompare(b.word));

  // ============================================================
  //  STATE
  // ============================================================
  let isOpen = false;
  let isLoading = false;
  let currentTab = 'chat';
  const history = [];

  // Elements
  const launcher   = document.getElementById('br-launcher');
  const btn        = document.getElementById('br-btn');
  const win        = document.getElementById('br-window');
  const tooltip    = document.getElementById('br-tooltip');
  const messages   = document.getElementById('br-messages');
  const typing     = document.getElementById('br-typing');
  const inputEl    = document.getElementById('br-input');
  const sendBtn    = document.getElementById('br-send');
  const panelChat  = document.getElementById('br-panel-chat');
  const panelDict  = document.getElementById('br-panel-dict');
  const dictList   = document.getElementById('br-dict-list');
  const dictSearch = document.getElementById('br-dict-search');
  const dictEmpty  = document.getElementById('br-dict-empty');

  // ---- Init ----
  function init() {
    btn.addEventListener('click', toggle);
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
    });
    renderDict(DICTIONARY);
    // Hide tooltip after 5s
    setTimeout(() => tooltip.classList.add('hidden'), 5000);
  }

  function toggle() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
    tooltip.classList.add('hidden');
    if (isOpen && messages.children.length === 0) {
      addBotMsg("Hey! I'm Billy — your learning buddy! I'm here to help you figure things out and cheer you on. What are you working on today?");
    }
    if (isOpen) setTimeout(() => inputEl.focus(), 350);
  }

  // ---- Tab switching ----
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.br-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    panelChat.style.display = tab === 'chat' ? 'flex' : 'none';
    panelDict.style.display = tab === 'dict' ? 'flex' : 'none';
    if (tab === 'dict') setTimeout(() => dictSearch.focus(), 200);
  }

  // ---- Messages ----
  function addBotMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg bot';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg user';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    typing.classList.toggle('show', v);
    if (v) messages.scrollTop = messages.scrollHeight;
  }

  // ---- Send (calls secure Firebase backend) ----
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('br-suggestions').style.display = 'none';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    setLoading(true);
    try {
      const res = await fetch(CONFIG.apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: CONFIG.systemPrompt,
          messages: history
        })
      });
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        if (errorData.fallback) {
          throw new Error(errorData.fallback);
        }
        throw new Error(`Error ${res.status}`);
      }
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Hmm, I didn't catch that — could you try again?";
      history.push({ role: 'assistant', content: reply });
      setLoading(false);
      addBotMsg(reply);
    } catch(err) {
      setLoading(false);
      addBotMsg(`Whoops, something went wrong — even goats stumble sometimes! Try again in a second. (${err.message})`);
      console.error('Billy error:', err);
    }
  }

  function suggest(el) {
    inputEl.value = el.textContent;
    handleSend();
  }

  // ---- Dictionary ----
  function renderDict(entries) {
    dictList.querySelectorAll('.br-dict-entry').forEach(e => e.remove());
    dictEmpty.style.display = entries.length === 0 ? 'block' : 'none';
    const catLabel = { story: 'Story', ela: 'ELA' };
    entries.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'br-dict-entry';
      el.innerHTML = `
        <div class="br-dict-word" onclick="BR.toggleEntry(this.parentElement)">
          <span class="br-word-label">${entry.word}</span>
          <span class="br-word-cat ${entry.cat}">${catLabel[entry.cat] || entry.cat}</span>
          <span class="br-word-chevron">&#9660;</span>
        </div>
        <div class="br-dict-def">
          <div class="br-def-text">${entry.def}</div>
          ${entry.example ? `<div class="br-def-example">${entry.example}</div>` : ''}
        </div>`;
      dictList.appendChild(el);
    });
  }

  function toggleEntry(el) {
    const wasOpen = el.classList.contains('expanded');
    document.querySelectorAll('.br-dict-entry.expanded').forEach(e => e.classList.remove('expanded'));
    if (!wasOpen) el.classList.add('expanded');
  }

  function filterDict() {
    const q = dictSearch.value.toLowerCase().trim();
    const filtered = q
      ? DICTIONARY.filter(e =>
          e.word.toLowerCase().includes(q) ||
          e.def.toLowerCase().includes(q) ||
          (e.example && e.example.toLowerCase().includes(q)) ||
          (e.type && e.type.toLowerCase().includes(q)) ||
          (e.cat && e.cat.toLowerCase().includes(q))
        )
      : DICTIONARY;
    renderDict(filtered);
  }

  init();

  return { switchTab, suggest, toggleEntry, filterDict };
})();
</script>

</body>
</html>
