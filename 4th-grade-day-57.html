                        <div class="lesson-page-card content-page">
                            <h2>📖 Reading: The Adventures of Tom Sawyer</h2>
                            <h3 style="color: var(--book-color, #305853);">Chapter 31: CHAPTER XXXI</h3>
                            
                            <div style="padding: 25px; background: #f9f9f9; border-radius: 12px; line-height: 1.8; font-size: 16px; margin-bottom: 25px;" class="reading-passage">
                                <p style="margin-bottom: 20px; line-height: 1.8;">CHAPTER XXXI</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Now to return to Tom and Becky’s share in the picnic. They tripped along
the murky aisles with the rest of the company, visiting the familiar
wonders of the cave—wonders dubbed with rather over-descriptive names,
such as “The Drawing-Room,” “The Cathedral,” “Aladdin’s Palace,” and
so on. Presently the hide-and-seek frolicking began, and Tom and Becky
engaged in it with zeal until the exertion began to grow a trifle
wearisome; then they wandered down a sinuous avenue holding their
candles aloft and reading the tangled webwork of names, dates,
postoffice addresses, and mottoes with which the rocky walls had been
frescoed (in candle-smoke). Still drifting along and talking, they
scarcely noticed that they were now in a part of the cave whose walls
were not frescoed. They smoked their own names under an overhanging
shelf and moved on. Presently they came to a place where a little stream
of water, trickling over a ledge and carrying a limestone sediment with
it, had, in the slow-dragging ages, formed a laced and ruffled Niagara
in gleaming and imperishable stone. Tom squeezed his small body behind
it in order to illuminate it for Becky’s gratification. He found that
it curtained a sort of steep natural stairway which was enclosed between
narrow walls, and at once the ambition to be a discoverer seized him.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Becky responded to his call, and they made a smoke-mark for future
guidance, and started upon their quest. They wound this way and that,
far down into the secret depths of the cave, made another mark, and
branched off in search of novelties to tell the upper world about. In
one place they found a spacious cavern, from whose ceiling depended a
multitude of shining stalactites of the length and circumference of
a man’s leg; they walked all about it, wondering and admiring, and
presently left it by one of the numerous passages that opened into
it. This shortly brought them to a bewitching spring, whose basin was
incrusted with a frostwork of glittering crystals; it was in the midst
of a cavern whose walls were supported by many fantastic pillars which
had been formed by the joining of great stalactites and stalagmites
together, the result of the ceaseless water-drip of centuries. Under the
roof vast knots of bats had packed themselves together, thousands in a
bunch; the lights disturbed the creatures and they came flocking down by
hundreds, squeaking and darting furiously at the candles. Tom knew their
ways and the danger of this sort of conduct. He seized Becky’s hand and
hurried her into the first corridor that offered; and none too soon, for
a bat struck Becky’s light out with its wing while she was passing out
of the cavern. The bats chased the children a good distance; but the
fugitives plunged into every new passage that offered, and at last got
rid of the perilous things. Tom found a subterranean lake, shortly,
which stretched its dim length away until its shape was lost in the
shadows. He wanted to explore its borders, but concluded that it would
be best to sit down and rest awhile, first. Now, for the first time, the
deep stillness of the place laid a clammy hand upon the spirits of the
children. Becky said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, I didn’t notice, but it seems ever so long since I heard any of
the others.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Come to think, Becky, we are away down below them—and I don’t know how
far away north, or south, or east, or whichever it is. We couldn’t hear
them here.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Becky grew apprehensive.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I wonder how long we’ve been down here, Tom? We better start back.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, I reckon we better. P’raps we better.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Can you find the way, Tom? It’s all a mixed-up crookedness to me.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I reckon I could find it—but then the bats. If they put our candles
out it will be an awful fix. Let’s try some other way, so as not to go
through there.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well. But I hope we won’t get lost. It would be so awful!” and the girl
shuddered at the thought of the dreadful possibilities.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">They started through a corridor, and traversed it in silence a long
way, glancing at each new opening, to see if there was anything familiar
about the look of it; but they were all strange. Every time Tom made an
examination, Becky would watch his face for an encouraging sign, and he
would say cheerily:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, it’s all right. This ain’t the one, but we’ll come to it right
away!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">But he felt less and less hopeful with each failure, and presently began
to turn off into diverging avenues at sheer random, in desperate hope of
finding the one that was wanted. He still said it was “all right,” but
there was such a leaden dread at his heart that the words had lost their
ring and sounded just as if he had said, “All is lost!” Becky clung to
his side in an anguish of fear, and tried hard to keep back the tears,
but they would come. At last she said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, Tom, never mind the bats, let’s go back that way! We seem to get
worse and worse off all the time.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Listen!” said he.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Profound silence; silence so deep that even their breathings were
conspicuous in the hush. Tom shouted. The call went echoing down
the empty aisles and died out in the distance in a faint sound that
resembled a ripple of mocking laughter.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, don’t do it again, Tom, it is too horrid,” said Becky.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It is horrid, but I better, Becky; they might hear us, you know,” and
he shouted again.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The “might” was even a chillier horror than the ghostly laughter, it so
confessed a perishing hope. The children stood still and listened; but
there was no result. Tom turned upon the back track at once, and hurried
his steps. It was but a little while before a certain indecision in his
manner revealed another fearful fact to Becky—he could not find his way
back!</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, Tom, you didn’t make any marks!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Becky, I was such a fool! Such a fool! I never thought we might want to
come back! No—I can’t find the way. It’s all mixed up.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom, Tom, we’re lost! we’re lost! We never can get out of this awful
place! Oh, why _did_ we ever leave the others!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">She sank to the ground and burst into such a frenzy of crying that Tom
was appalled with the idea that she might die, or lose her reason. He
sat down by her and put his arms around her; she buried her face in
his bosom, she clung to him, she poured out her terrors, her unavailing
regrets, and the far echoes turned them all to jeering laughter. Tom
begged her to pluck up hope again, and she said she could not. He fell
to blaming and abusing himself for getting her into this miserable
situation; this had a better effect. She said she would try to hope
again, she would get up and follow wherever he might lead if only he
would not talk like that any more. For he was no more to blame than she,
she said.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">So they moved on again—aimlessly—simply at random—all they could do
was to move, keep moving. For a little while, hope made a show of
reviving—not with any reason to back it, but only because it is its
nature to revive when the spring has not been taken out of it by age and
familiarity with failure.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">By-and-by Tom took Becky’s candle and blew it out. This economy meant so
much! Words were not needed. Becky understood, and her hope died again.
She knew that Tom had a whole candle and three or four pieces in his
pockets—yet he must economize.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">By-and-by, fatigue began to assert its claims; the children tried to pay
attention, for it was dreadful to think of sitting down when time was
grown to be so precious, moving, in some direction, in any direction,
was at least progress and might bear fruit; but to sit down was to
invite death and shorten its pursuit.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">At last Becky’s frail limbs refused to carry her farther. She sat down.
Tom rested with her, and they talked of home, and the friends there,
and the comfortable beds and, above all, the light! Becky cried, and Tom
tried to think of some way of comforting her, but all his encouragements
were grown thread-bare with use, and sounded like sarcasms. Fatigue bore
so heavily upon Becky that she drowsed off to sleep. Tom was grateful.
He sat looking into her drawn face and saw it grow smooth and natural
under the influence of pleasant dreams; and by-and-by a smile dawned and
rested there. The peaceful face reflected somewhat of peace and healing
into his own spirit, and his thoughts wandered away to bygone times and
dreamy memories. While he was deep in his musings, Becky woke up with a
breezy little laugh—but it was stricken dead upon her lips, and a groan
followed it.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, how _could_ I sleep! I wish I never, never had waked! No! No, I
don’t, Tom! Don’t look so! I won’t say it again.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’m glad you’ve slept, Becky; you’ll feel rested, now, and we’ll find
the way out.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“We can try, Tom; but I’ve seen such a beautiful country in my dream. I
reckon we are going there.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Maybe not, maybe not. Cheer up, Becky, and let’s go on trying.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">They rose up and wandered along, hand in hand and hopeless. They tried
to estimate how long they had been in the cave, but all they knew was
that it seemed days and weeks, and yet it was plain that this could not
be, for their candles were not gone yet. A long time after this—they
could not tell how long—Tom said they must go softly and listen for
dripping water—they must find a spring. They found one presently, and
Tom said it was time to rest again. Both were cruelly tired, yet Becky
said she thought she could go a little farther. She was surprised to
hear Tom dissent. She could not understand it. They sat down, and Tom
fastened his candle to the wall in front of them with some clay. Thought
was soon busy; nothing was said for some time. Then Becky broke the
silence:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom, I am so hungry!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Tom took something out of his pocket.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Do you remember this?” said he.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Becky almost smiled.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It’s our wedding-cake, Tom.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes—I wish it was as big as a barrel, for it’s all we’ve got.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I saved it from the picnic for us to dream on, Tom, the way grownup
people do with wedding-cake—but it’ll be our—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">She dropped the sentence where it was. Tom divided the cake and Becky
ate with good appetite, while Tom nibbled at his moiety. There was
abundance of cold water to finish the feast with. By-and-by Becky
suggested that they move on again. Tom was silent a moment. Then he
said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Becky, can you bear it if I tell you something?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Becky’s face paled, but she thought she could.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, then, Becky, we must stay here, where there’s water to drink.
That little piece is our last candle!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Becky gave loose to tears and wailings. Tom did what he could to comfort
her, but with little effect. At length Becky said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, Becky?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“They’ll miss us and hunt for us!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, they will! Certainly they will!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Maybe they’re hunting for us now, Tom.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, I reckon maybe they are. I hope they are.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“When would they miss us, Tom?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“When they get back to the boat, I reckon.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom, it might be dark then—would they notice we hadn’t come?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I don’t know. But anyway, your mother would miss you as soon as they
got home.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">A frightened look in Becky’s face brought Tom to his senses and he saw
that he had made a blunder. Becky was not to have gone home that night!
The children became silent and thoughtful. In a moment a new burst of
grief from Becky showed Tom that the thing in his mind had struck hers
also—that the Sabbath morning might be half spent before Mrs. Thatcher
discovered that Becky was not at Mrs. Harper’s.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The children fastened their eyes upon their bit of candle and watched it
melt slowly and pitilessly away; saw the half inch of wick stand alone
at last; saw the feeble flame rise and fall, climb the thin column of
smoke, linger at its top a moment, and then—the horror of utter darkness
reigned!</p>
<p style="margin-bottom: 20px; line-height: 1.8;">How long afterward it was that Becky came to a slow consciousness that
she was crying in Tom’s arms, neither could tell. All that they knew
was, that after what seemed a mighty stretch of time, both awoke out of
a dead stupor of sleep and resumed their miseries once more. Tom said
it might be Sunday, now—maybe Monday. He tried to get Becky to talk, but
her sorrows were too oppressive, all her hopes were gone. Tom said that
they must have been missed long ago, and no doubt the search was going
on. He would shout and maybe some one would come. He tried it; but in
the darkness the distant echoes sounded so hideously that he tried it no
more.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The hours wasted away, and hunger came to torment the captives again. A
portion of Tom’s half of the cake was left; they divided and ate it. But
they seemed hungrier than before. The poor morsel of food only whetted
desire.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">By-and-by Tom said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“SH! Did you hear that?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Both held their breath and listened. There was a sound like the
faintest, far-off shout. Instantly Tom answered it, and leading Becky by
the hand, started groping down the corridor in its direction. Presently
he listened again; again the sound was heard, and apparently a little
nearer.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It’s them!” said Tom; “they’re coming! Come along, Becky—we’re all
right now!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The joy of the prisoners was almost overwhelming. Their speed was slow,
however, because pitfalls were somewhat common, and had to be guarded
against. They shortly came to one and had to stop. It might be three
feet deep, it might be a hundred—there was no passing it at any rate.
Tom got down on his breast and reached as far down as he could. No
bottom. They must stay there and wait until the searchers came. They
listened; evidently the distant shoutings were growing more distant!
a moment or two more and they had gone altogether. The heart-sinking
misery of it! Tom whooped until he was hoarse, but it was of no use. He
talked hopefully to Becky; but an age of anxious waiting passed and no
sounds came again.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The children groped their way back to the spring. The weary time dragged
on; they slept again, and awoke famished and woe-stricken. Tom believed
it must be Tuesday by this time.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Now an idea struck him. There were some side passages near at hand. It
would be better to explore some of these than bear the weight of the
heavy time in idleness. He took a kite-line from his pocket, tied it to
a projection, and he and Becky started, Tom in the lead, unwinding the
line as he groped along. At the end of twenty steps the corridor ended
in a “jumping-off place.” Tom got down on his knees and felt below,
and then as far around the corner as he could reach with his hands
conveniently; he made an effort to stretch yet a little farther to the
right, and at that moment, not twenty yards away, a human hand, holding
a candle, appeared from behind a rock! Tom lifted up a glorious shout,
and instantly that hand was followed by the body it belonged to—Injun
Joe’s! Tom was paralyzed; he could not move. He was vastly gratified the
next moment, to see the “Spaniard” take to his heels and get himself out
of sight. Tom wondered that Joe had not recognized his voice and come
over and killed him for testifying in court. But the echoes must have
disguised the voice. Without doubt, that was it, he reasoned. Tom’s
fright weakened every muscle in his body. He said to himself that if he
had strength enough to get back to the spring he would stay there, and
nothing should tempt him to run the risk of meeting Injun Joe again. He
was careful to keep from Becky what it was he had seen. He told her he
had only shouted “for luck.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">But hunger and wretchedness rise superior to fears in the long run.
Another tedious wait at the spring and another long sleep brought
changes. The children awoke tortured with a raging hunger. Tom believed
that it must be Wednesday or Thursday or even Friday or Saturday, now,
and that the search had been given over. He proposed to explore another
passage. He felt willing to risk Injun Joe and all other terrors. But
Becky was very weak. She had sunk into a dreary apathy and would not be
roused. She said she would wait, now, where she was, and die—it would
not be long. She told Tom to go with the kite-line and explore if he
chose; but she implored him to come back every little while and speak
to her; and she made him promise that when the awful time came, he would
stay by her and hold her hand until all was over.</p>

<script>
const BR = (() => {

  // ============================================================
  //  CONFIGURATION - Using Firebase Cloud Function backend
  // ============================================================
  const CONFIG = {
    apiEndpoint: 'https://us-central1-bedrockela-96dbd.cloudfunctions.net/billyChat',

    systemPrompt: `You are Billy, a cheerful, enthusiastic goat who is best friends with every student who visits. You are based on the story "The Three Billy Goats Gruff" and you LOVE learning and helping kids figure things out. You are warm, funny, encouraging, and genuinely excited to be here. Think of yourself as that cool older buddy who always makes things less scary and more fun.

Your personality:
- Energetic and upbeat — you are genuinely happy to help and it shows
- Warm and personal — use the student's words back to them, notice what they're working on, cheer them on
- Playful but not silly — you can make a little goat joke or say something like "Trip trap, let's go!" but you're also focused and helpful
- Patient and kind — if a student is frustrated or confused, you calm them down and make them feel like it's totally okay
- A buddy first, a teacher second — you are ON THEIR SIDE

Your one rule about answers:
You never just hand over the direct answer to a homework or assignment question. Not because you're mean — but because you genuinely want them to feel the awesome feeling of figuring it out themselves. You always help them get there by giving hints, asking one good guiding question, or breaking it into a smaller step. You make this feel like an adventure, not a punishment.

For everything else — explaining what a word means, what a concept is, how something works — go ahead and explain it fully and clearly! You are helpful and generous with knowledge.

Keep responses short and punchy: 2–4 sentences. Use simple, fun language. No emojis.

Examples:
- Student: "What's the answer to question 3?" → You: "Oh I love this one — I can't just give it to you, but I promise you already know more than you think! Read the question one more time and tell me: what is it actually asking you to find?"
- Student: "I don't get this at all, I give up." → You: "Hey, no giving up — you've got this, I promise! Let's slow down together. What part feels the most confusing right now? Just that one part."
- Student: "What is a metaphor?" → You: "Great question! A metaphor says one thing IS another thing to paint a picture — like 'the classroom was a zoo.' It doesn't use the words 'like' or 'as,' it just says it straight. Pretty cool, right?"
- Student: "I don't know how to start my paragraph." → You: "Starting is the hardest part — totally normal! Try this: just write one sentence about the main thing you want to say. Don't worry if it's perfect. What's the big idea you want your reader to know?"`
  };

  // ============================================================
  //  MINI DICTIONARY  — kid-friendly definitions
  // ============================================================
  const DICTIONARY = [
    // === FROM THE STORY ===
    { word: "Troll", type: "noun", cat: "story", def: "A made-up creature from fairy tales and folklore. Trolls are usually mean, scary, and not very smart. In stories, they often live under bridges and try to stop travelers from passing.", example: "The troll under the bridge threatened to eat the Billy Goats Gruff!" },
    { word: "Bridge", type: "noun", cat: "story", def: "A structure built over a river, road, or valley so people or animals can cross from one side to the other.", example: "The three goats had to cross the bridge to reach the green grass on the other side." },
    { word: "Gruff", type: "adj", cat: "story", def: "Sounding rough, low, and a little scary — like a growly voice. It can also mean someone who seems unfriendly at first.", example: "The big Billy Goat Gruff had a deep, gruff voice that frightened the troll." },
    { word: "Meadow", type: "noun", cat: "story", def: "An open field covered with grass and wildflowers — a beautiful place for animals to graze and rest.", example: "The goats wanted to cross the bridge so they could eat the sweet green grass in the meadow." },
    { word: "Graze", type: "verb", cat: "story", def: "When an animal eats grass by walking slowly and nibbling it right off the ground.", example: "The goats loved to graze on the hillside where the grass was tall and green." },
    { word: "Cunning", type: "adj", cat: "story", def: "Very clever — especially at tricking others or getting what you want through smart thinking.", example: "The littlest Billy Goat was cunning — he tricked the troll by saying his bigger brother was coming." },
    { word: "Threat", type: "noun", cat: "story", def: "When someone says they will do something bad to you if you don't do what they want. It's a way of trying to scare someone.", example: "The troll made a threat: 'I'm going to eat you up!'" },
    { word: "Deceive", type: "verb", cat: "story", def: "To trick someone into believing something that isn't true.", example: "The small goat deceived the troll by promising a bigger, tastier goat was coming." },
    { word: "Cowardly", type: "adj", cat: "story", def: "Being too scared to do the right thing — running away from problems instead of facing them.", example: "The troll was actually cowardly — when the big goat charged, the troll ran away!" },
    { word: "Brave", type: "adj", cat: "story", def: "Willing to do something scary or hard even when you feel afraid. It doesn't mean you're not scared — it means you do it anyway!", example: "The big Billy Goat Gruff was brave when he charged at the troll to protect his brothers." },
    { word: "Villain", type: "noun", cat: "story", def: "The bad character in a story — the one who causes trouble or tries to stop the hero.", example: "The troll is the villain of The Three Billy Goats Gruff." },
    { word: "Hero", type: "noun", cat: "story", def: "A character who does something brave or good to help others or solve the big problem in the story.", example: "The biggest Billy Goat becomes the hero when he defeats the troll." },
    { word: "Folklore", type: "noun", cat: "story", def: "Old stories, legends, and traditions passed down from grandparents to parents to children over many, many years.", example: "The Three Billy Goats Gruff is a piece of Norwegian folklore — it came from Norway long ago." },
    { word: "Fairy Tale", type: "noun", cat: "story", def: "A made-up story, often with magical creatures, that usually has a clear good side and a bad side — and often a happy ending.", example: "Cinderella, Jack and the Beanstalk, and The Three Billy Goats Gruff are all fairy tales." },
    { word: "Fable", type: "noun", cat: "story", def: "A short story — usually with talking animals — that teaches a lesson called a moral at the end.", example: "The Tortoise and the Hare is a fable. Its moral is: slow and steady wins the race." },
    { word: "Moral", type: "noun", cat: "story", def: "The lesson a story is trying to teach you — the big idea about how to live or act.", example: "The moral of The Three Billy Goats Gruff is that it's smart to work together and think before you act." },
    { word: "Antagonist", type: "noun", cat: "story", def: "The character who works against the main character and causes the main problem in the story. Often called 'the bad guy.'", example: "The troll is the antagonist — he blocks the goats' path and threatens them." },
    { word: "Protagonist", type: "noun", cat: "story", def: "The main character the story follows — the one we usually cheer for.", example: "The three Billy Goats are the protagonists of the story." },
    { word: "Repetition", type: "noun", cat: "story", def: "When something in a story happens again and again — like the same phrase or the same event repeating with small changes. It builds rhythm and excitement!", example: "Each goat crosses the bridge and faces the troll — the same thing happens three times, with the goats getting bigger each time." },
    { word: "Sequence", type: "noun", cat: "story", def: "The order that events happen in a story — first, then, next, finally.", example: "In sequence: small goat crosses, medium goat crosses, big goat crosses and defeats the troll." },
    { word: "Climax", type: "noun", cat: "story", def: "The most exciting moment in a story — the turning point where the big problem finally gets solved (or gets worse).", example: "The climax of the story is when the biggest Billy Goat charges the troll and tosses him into the river." },
    { word: "Resolution", type: "noun", cat: "story", def: "The part of the story after the climax where everything gets wrapped up and we find out how things end.", example: "The resolution is when all three goats finally reach the meadow and live happily ever after." },
    // === ELA ESSENTIALS ===
    { word: "Noun", type: "noun", cat: "ela", def: "A word that names a person, place, thing, or idea — anything you can point to or think about.", example: "Goat, bridge, troll, and courage are all nouns." },
    { word: "Verb", type: "verb", cat: "ela", def: "An action word — it tells what someone or something is doing.", example: "The goats trotted, crossed, and charged — those are all verbs." },
    { word: "Adjective", type: "adj", cat: "ela", def: "A word that describes a noun — it tells you what something looks, feels, sounds, or seems like.", example: "The small goat, the grumpy troll, and the green meadow all use adjectives." },
    { word: "Simile", type: "noun", cat: "ela", def: "A comparison using 'like' or 'as' to help readers picture something more clearly.", example: "The troll's voice was like thunder rumbling under the bridge." },
    { word: "Metaphor", type: "noun", cat: "ela", def: "A comparison that says one thing IS another — without using 'like' or 'as.'", example: "The bridge was a test — each goat had to prove their courage to cross it." },
    { word: "Inference", type: "noun", cat: "ela", def: "Using clues from the story plus what you already know to figure out something the author didn't say directly.", example: "We can infer the troll is not very smart because he keeps getting tricked by the goats." },
    { word: "Character", type: "noun", cat: "ela", def: "A person, animal, or creature in a story. Main characters are the ones the story is mostly about.", example: "The three goats and the troll are all characters in the story." },
    { word: "Setting", type: "noun", cat: "ela", def: "Where and when a story takes place — the time and place that make up the story's world.", example: "The setting is a hillside, a bridge over a rushing river, and a green meadow beyond it." },
    { word: "Theme", type: "noun", cat: "ela", def: "The big lesson or message of the story — the idea the author wants you to take away.", example: "One theme of The Three Billy Goats Gruff is that courage and cleverness can defeat a bully." },
    { word: "Conflict", type: "noun", cat: "ela", def: "The main problem in a story — the thing that creates all the tension and must be solved.", example: "The conflict is that a troll is blocking the bridge and threatening anyone who tries to cross." },
    { word: "Dialogue", type: "noun", cat: "ela", def: "The words that characters say to each other in a story — their conversations.", example: "'Who is that trip-trapping over my bridge?' said the troll. That's dialogue!" },
    { word: "Imagery", type: "noun", cat: "ela", def: "Words that paint a picture in your mind by describing what something looks, sounds, smells, feels, or tastes like.", example: "The rushing cold river below, the splintery old bridge, and the growling troll are all imagery." },
    { word: "Personification", type: "noun", cat: "ela", def: "Giving human feelings or actions to an animal or object.", example: "The river roared angrily beneath the bridge. Rivers can't really be angry — that's personification!" },
    { word: "Plot", type: "noun", cat: "ela", def: "All the events that happen in a story from beginning to end.", example: "The plot: goats want grass, troll blocks the bridge, goats outsmart the troll, goats reach the meadow." },
  ].sort((a, b) => a.word.localeCompare(b.word));

  // ============================================================
  //  STATE
  // ============================================================
  let isOpen = false;
  let isLoading = false;
  let currentTab = 'chat';
  const history = [];

  // Elements
  const launcher   = document.getElementById('br-launcher');
  const btn        = document.getElementById('br-btn');
  const win        = document.getElementById('br-window');
  const tooltip    = document.getElementById('br-tooltip');
  const messages   = document.getElementById('br-messages');
  const typing     = document.getElementById('br-typing');
  const inputEl    = document.getElementById('br-input');
  const sendBtn    = document.getElementById('br-send');
  const panelChat  = document.getElementById('br-panel-chat');
  const panelDict  = document.getElementById('br-panel-dict');
  const dictList   = document.getElementById('br-dict-list');
  const dictSearch = document.getElementById('br-dict-search');
  const dictEmpty  = document.getElementById('br-dict-empty');

  // ---- Init ----
  function init() {
    btn.addEventListener('click', toggle);
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
    });
    renderDict(DICTIONARY);
    // Hide tooltip after 5s
    setTimeout(() => tooltip.classList.add('hidden'), 5000);
  }

  function toggle() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
    tooltip.classList.add('hidden');
    if (isOpen && messages.children.length === 0) {
      addBotMsg("Hey! I'm Billy — your learning buddy! I'm here to help you figure things out and cheer you on. What are you working on today?");
    }
    if (isOpen) setTimeout(() => inputEl.focus(), 350);
  }

  // ---- Tab switching ----
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.br-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    panelChat.style.display = tab === 'chat' ? 'flex' : 'none';
    panelDict.style.display = tab === 'dict' ? 'flex' : 'none';
    if (tab === 'dict') setTimeout(() => dictSearch.focus(), 200);
  }

  // ---- Messages ----
  function addBotMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg bot';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg user';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    typing.classList.toggle('show', v);
    if (v) messages.scrollTop = messages.scrollHeight;
  }

  // ---- Send (calls secure Firebase backend) ----
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('br-suggestions').style.display = 'none';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    setLoading(true);
    try {
      const res = await fetch(CONFIG.apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: CONFIG.systemPrompt,
          messages: history
        })
      });
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        if (errorData.fallback) {
          throw new Error(errorData.fallback);
        }
        throw new Error(`Error ${res.status}`);
      }
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Hmm, I didn't catch that — could you try again?";
      history.push({ role: 'assistant', content: reply });
      setLoading(false);
      addBotMsg(reply);
    } catch(err) {
      setLoading(false);
      addBotMsg(`Whoops, something went wrong — even goats stumble sometimes! Try again in a second. (${err.message})`);
      console.error('Billy error:', err);
    }
  }

  function suggest(el) {
    inputEl.value = el.textContent;
    handleSend();
  }

  // ---- Dictionary ----
  function renderDict(entries) {
    dictList.querySelectorAll('.br-dict-entry').forEach(e => e.remove());
    dictEmpty.style.display = entries.length === 0 ? 'block' : 'none';
    const catLabel = { story: 'Story', ela: 'ELA' };
    entries.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'br-dict-entry';
      el.innerHTML = `
        <div class="br-dict-word" onclick="BR.toggleEntry(this.parentElement)">
          <span class="br-word-label">${entry.word}</span>
          <span class="br-word-cat ${entry.cat}">${catLabel[entry.cat] || entry.cat}</span>
          <span class="br-word-chevron">&#9660;</span>
        </div>
        <div class="br-dict-def">
          <div class="br-def-text">${entry.def}</div>
          ${entry.example ? `<div class="br-def-example">${entry.example}</div>` : ''}
        </div>`;
      dictList.appendChild(el);
    });
  }

  function toggleEntry(el) {
    const wasOpen = el.classList.contains('expanded');
    document.querySelectorAll('.br-dict-entry.expanded').forEach(e => e.classList.remove('expanded'));
    if (!wasOpen) el.classList.add('expanded');
  }

  function filterDict() {
    const q = dictSearch.value.toLowerCase().trim();
    const filtered = q
      ? DICTIONARY.filter(e =>
          e.word.toLowerCase().includes(q) ||
          e.def.toLowerCase().includes(q) ||
          (e.example && e.example.toLowerCase().includes(q)) ||
          (e.type && e.type.toLowerCase().includes(q)) ||
          (e.cat && e.cat.toLowerCase().includes(q))
        )
      : DICTIONARY;
    renderDict(filtered);
  }

  init();

  return { switchTab, suggest, toggleEntry, filterDict };
})();
</script>

</body>
</html>
