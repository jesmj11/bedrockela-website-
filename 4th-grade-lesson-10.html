<br>
<p>From the story: The Tin Woodman feels melancholy when he thinks about the heart he lost. It’s not a loud sadness — it’s a quiet ache.</p>
<br>
<p>Think about it: What’s the difference between being sad and being melancholy? Can you think of a time you felt melancholy instead of just plain sad?</p>

<p>D) An army of witches</p>

<p>B) You might already have what you’re looking for inside you</p>
<p>C) Home is a boring place</p>
<p>D) Only wizards can solve your problems</p>

<p>[Your answer]</p>
