<ul>
<li>Adding details that help the reader picture the scene</li>
<li>Cutting parts that are boring or don’t matter</li>

<li>I used descriptive details (I can picture the setting): ___</li>
<li>I included at least one line of dialogue with quotation marks: ___</li>
<li>My hero changes by the end: ___</li>
<li>My climax is exciting: ___</li>
<li>My ending feels satisfying: ___</li>

</ul>
