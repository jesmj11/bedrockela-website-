<br>

<br>

<p>Editing checklist — read through your story and fix:</p>
<br>
<h4>✅  Every sentence starts with a capital letter</h4>
<h4>✅  Every sentence ends with a period, question mark, or exclamation point</h4>
<h4>✅  Dialogue has quotation marks around the spoken words</h4>
<h4>✅  Character names are capitalized</h4>
<h4>✅  Spelling is correct (if you’re not sure about a word, look it up!)</h4>
<h4>✅  Paragraphs are indented</h4>
<br>
                        </div>
                    `
                },

                // Page 4: 📖  Part 2: Today’s Task
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>📖  Part 2: Today’s Task</h3>
<p>Read through your story one more time, slowly, focusing ONLY on conventions (spelling, grammar, punctuation). Then write your clean final draft.</p>
<br>
<h4>💡 Editing trick: Read your story BACKWARDS, sentence by sentence. This forces you to look at each sentence on its own and catch errors you’d miss reading normally.</h4>
<br>
                        </div>
                    `
                },

                // Page 5: 💬  Part 3: Word of the Day
                {
                    render: () => `

<p>To make your writing available for others to read. When you share your final draft, you are publishing it!</p>
<br>
<p>From the story: L. Frank Baum published The Wonderful Wizard of Oz in 1900. Today, you’re publishing YOUR hero’s journey!</p>
<br>
<p>Think about it: How does it feel to know that someone else will read your story? Does it change how carefully you write?</p>
