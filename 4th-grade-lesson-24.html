                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h4>📚  Welcome!</h4>
<p>Today is one of the best days of the year: Author’s Chair Day! You wrote a hero’s journey story from scratch — planned it, drafted it, revised it, edited it, and published it. Now it’s time to share it.</p>
<br>
<p>Today you will: </p>
<ul>
<li>Read your hero’s journey story (to a partner, group, or by recording yourself)</li>
<li>Listen to other stories and give kind feedback</li>
<li>Reflect on your growth as a writer</li>
</ul>
<br>
<p>Time: About 45-50 minutes</p>
<br>
                        </div>
                    `
                },

                // Page 3: 🧐  Part 1: Before You Read
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>🧐  Part 1: Before You Read</h3>
<p>When you share your writing:</p>
<ul>
<li>Read slowly and clearly.</li>
<li>Use expression — change your voice for dialogue!</li>
<li>Be proud. You MADE this.</li>
</ul>
<br>
<p>When you listen to someone else’s story:</p>
<ul>
<li>Listen respectfully.</li>
<li>Think of one specific thing you liked (“I loved the part where...”).</li>
<li>Think of one kind suggestion (“I wonder what would happen if...”).</li>
</ul>
<br>
                        </div>
                    `
                },

                // Page 4: 📖  Part 2: Today’s Task
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>📖  Part 2: Today’s Task</h3>
<p>Read your final draft aloud. If you’re working independently, record yourself reading it, or read it to a family member, friend, or pet. (Pets are great listeners.)</p>
<br>
<p>Then, if your teacher has shared other students’ stories, read at least one of them and leave a comment using the feedback format below.</p>
<br>
<h4>💡 Sharing your writing takes courage. Remember the Cowardly Lion? Courage isn’t the absence of fear — it’s doing the thing even when you’re nervous.</h4>
<br>
                        </div>
                    `
                },

                // Page 5: 💬  Part 3: Word of the Day
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>💬  Part 3: Word of the Day</h3>
<div class="vocab-box"><strong>feedback  (noun)</strong></div>
<p>Helpful comments about someone’s work. Good feedback is specific, kind, and useful.</p>
<br>
<p>From the story: When you give feedback on a story, focus on what worked AND what could be even better.</p>
<br>
<p>Think about it: What’s the difference between helpful feedback and just saying “it’s good”? Why is specific feedback more useful?</p>
<br>
<h4>✅  Check Your Understanding</h4>
<p>Answer these questions using what you’ve learned.</p>
<br>
<div class="question">1. After reading or sharing your story, write a “STAR” (one thing you’re proud of) and a “WISH” (one thing you’d improve if you could write it again).</div>
<br>
<p>STAR: ___</p>
<br>
<p>WISH: ___</p>
<h4>💡 Hint: Be specific! “I’m proud of my dialogue” is better than “it’s good.”</h4>
<p>[Your answer]</p>
<br>
<div class="question">2. If you read or listened to another student’s story, give them feedback:</div>
<br>
<p>“I liked the part where ___.”</p>
<p>“One thing that could make it even better is ___.”</p>
<h4>💡 Hint: Be kind and specific. Writers work hard and deserve thoughtful responses.</h4>
<p>[Your answer]</p>
<br>
<br>

<br>
<ul>
<li>How did it feel to share your writing? What was nerve-wracking? What was exciting?</li>
<li>What did you learn about yourself as a writer during this project?</li>
<li>If you could write another hero’s journey, what would you do differently?</li>
</ul>
<br>

<p>[Write your journal entry here]</p>

<br>

<br>

<br>
<p>See you next lesson, reader. 📚</p>
