<div class="vocab-box"><strong>evidence  (noun)</strong></div>
<p>Specific details, facts, or examples from a text that support your point. When you say “In Chapter 15, the Wizard admits he’s a humbug,” that’s evidence.</p>
<br>
<p>From the story: Strong writing uses evidence from the text to prove its point. Don’t just say what you think — show WHY you think it.</p>
<br>
<p>Think about it: Why is evidence important? What’s the difference between an opinion with evidence and an opinion without it?</p>

<br>

<p>C) Kansas is the best place on Earth</p>
<p>D) Magic solves everything</p>
<br>
<div class="question">2. What is the Hero’s Journey?</div>

<p>B) A pattern found in stories across cultures: home → call → challenges → help → big test → victory → return</p>
<p>C) A type of Greek myth</p>
<p>D) The yellow brick road</p>
<br>
<div class="question">3. What does “appearance vs. reality” mean as a theme?</div>

<p>B) Things are not always what they seem on the surface</p>
<p>C) The Emerald City is green</p>
<p>D) Characters wear disguises</p>
<br>

<p>B) “Dorothy is brave because in Chapter 6, she slaps the Lion on the nose to protect Toto, even though the Lion is much bigger than her.”</p>

<p>Write a response to this prompt. This is your first essay using evidence from more than one text!</p>
