<br>
<p>Today you will: </p>

<ul>
<li>Dorothy meets the Scarecrow (Chapter 3)</li>
<li>The Cowardly Lion appears (Chapter 6)</li>
<li>The Wizard is revealed as a humbug (Chapter 15)</li>
<li>Dorothy clicks her heels (final chapter)</li>
</ul>
<br>
<p>Tips for reading with expression:</p>
<ul>
<li>Give each character a different voice</li>
<li>Read dialogue with feeling — scared, excited, angry, sad</li>
<li>Slow down for dramatic moments. Speed up for action.</li>
</ul>

<br>
<p>If possible, record yourself and listen back. You’ll be surprised how good you sound!</p>
<br>
<h4>💡 Reading with expression helps you understand the text better. When you have to decide HOW a character sounds, you’re thinking deeply about who they are.</h4>

<br>
<p>From the story: When you read the Cowardly Lion’s lines with a shaky, nervous voice, that’s reading with expression.</p>
<br>
<p>Think about it: How does expression change the experience of hearing a story? Would Oz be as interesting if everything were read in a flat, boring voice?</p>
