<p>In The Wonderful Wizard of Oz, a narrator told us Dorothy’s story from the outside. That’s called THIRD PERSON — the narrator uses “she,” “he,” “they.”</p>
<br>
<p>In Treasure Island, Jim Hawkins tells his OWN story using “I” and “me.” That’s FIRST PERSON. You can only know what Jim knows, see what Jim sees, feel what Jim feels.</p>
<br>
<p>Think about this: What’s the difference between someone telling you about a scary experience vs. hearing it from the person who lived it?</p>
<br>
<h4>🔍 What to look for:</h4>
<ul>
<li>Find sentences where Jim uses “I” — this is first person</li>
<li>What do we learn about Jim from the way he tells his story?</li>

</ul>

<br>
<p>This book was written in 1883, so the language is older than Oz. Some words will feel unfamiliar. Use context clues and keep going — it gets easier.</p>
<br>
