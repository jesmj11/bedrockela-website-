                            <p style="font-size: 20px; color: #B06821; margin: 15px 0; font-weight: 600;">Unit 2 Review  Day 50 of 180</p>

                },

                    render: () => `

<h4>🎉 DAY 50! You are more than a quarter of the way through the year!</h4>
<br>
<p>In 50 days, you have:</p>
<ul>
<li>Read TWO complete novels (Wizard of Oz + Treasure Island)</li>
<li>Read Greek myths, Sinbad the Sailor, and nonfiction about real pirates</li>
<li>Written 45+ journal entries</li>

<li>Mastered 1st person vs. 3rd person POV</li>
<li>Learned 45+ vocabulary words</li>
</ul>
<br>
<p>Today you will: </p>
<ul>
<li>Review key skills from Units 1-2</li>
<li>Begin planning your adventure narrative</li>
<li>Celebrate!</li>
</ul>

<p>Time: About 50 minutes</p>
<br>

                // Page 3: 🧐  Part 1: Before You Read
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>🧐  Part 1: Before You Read</h3>
<p>Before planning your story, review the tools you have collected:</p>
<br>
<ul>
<li>From Unit 1: Story mountain, hero’s journey, descriptive details, dialogue, theme</li>
<li>From Unit 2: First-person POV, voice, dramatic irony, suspense, complex characters, pacing</li>

<br>

                    `
                },

                // Page 5: 💬  Part 3: Word of the Day
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>💬  Part 3: Word of the Day</h3>
<div class="vocab-box"><strong>narrator  (noun)</strong></div>
<p>The voice that tells a story. In first person, the narrator is a character inside the story.</p>
<br>
<p>From the story: You have experienced Jim Hawkins (young, scared, brave) and Sinbad (older, confident, boastful). Now you will CREATE your own narrator.</p>
<br>
<p>Think about it: What kind of narrator will YOUR adventure story have?</p>
<br>
<h4>✅  Check Your Understanding</h4>
<p>Answer these questions using what you’ve learned.</p>
<br>
<div class="question">1. What is the difference between first and third person POV?</div>
<p>A) No difference</p>
<p>B) First person uses I/me (narrator IN story); third person uses he/she/they (narrator OUTSIDE)</p>
<p>C) First person is always better</p>
<p>D) Third person uses I</p>
<br>
<div class="question">2. What is dramatic irony?</div>
<p>A) A funny moment in a drama</p>
<p>B) When the reader knows something characters do not</p>
<p>C) When the ending is ironic</p>
<p>D) When characters are dramatic</p>
<br>
<div class="question">3. Which is the best example of a complex character?</div>
<p>A) A villain who is purely evil</p>
<p>B) A character with both good and bad traits and mixed motivations, like Silver</p>
<p>C) A character who never changes</p>
<p>D) A perfect hero</p>
<br>
<div class="question">4. What is the most important thing you learned about POV from Treasure Island? How did first-person narration change your experience?</div>
<h4>💡 Hint: Think about the apple barrel, limits of Jim’s perspective, how voice shapes a story.</h4>
<p>[Your answer]</p>
<br>
<br>
<h4>✍️  Plan Your 1st-Person Adventure Narrative!</h4>
<p>Over the next 5 days, you will write a 1st-person adventure story (1.5-2 pages). Today is PLANNING DAY.</p>
<br>
<p>Your story must include:</p>
<ul>
<li>A first-person narrator with a DISTINCT VOICE</li>
<li>A clear story mountain (rising action, climax, resolution)</li>
<li>Descriptive details and at least 2 lines of dialogue</li>
<li>A moment of suspense or dramatic irony</li>
</ul>
<br>
<p>Plan your story:</p>
<p>My narrator’s name: [___]</p>
<p>My narrator’s personality (3 words): [___]</p>
<p>Setting: [___]</p>
<p>The adventure/problem: [___]</p>
<p>Rising action (at least 2 challenges): [___]</p>
<p>Climax (the most intense moment): [___]</p>
<p>Resolution (how it ends): [___]</p>
<p>Moment of suspense or dramatic irony: [___]</p>
<br>
<p>Your narrator can be anyone — a kid, a sailor, an explorer, a time traveler. Just make it an ADVENTURE in FIRST PERSON with a voice that sounds like a real person.</p>
<br>
<h4>🌟  You’re Done!</h4>
<p>Great work today!</p>
<br>

<h4>✅  Planned your adventure narrative</h4>
<h4>✅  Learned a new vocabulary word (narrator)</h4>
<br>
<p>Tomorrow, you start writing! Your narrator is about to come to life.</p>
<br>
<p>See you next lesson, reader. ⚓</p>
                        </div>
                    `
