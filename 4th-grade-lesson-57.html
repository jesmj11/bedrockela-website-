<div class="vocab-box"><strong>perspective  (noun)</strong></div>
<p>A particular way of seeing or understanding something. In literature, the narrator’s perspective shapes everything the reader experiences.</p>
<br>
<p>From the story: Jim’s perspective as a young boy makes us experience Silver’s betrayal with shock and hurt. An adult narrator might have been more suspicious from the start.</p>

<p>B) The reader experiences events intimately through the narrator’s thoughts and feelings</p>
<p>C) First person is always more exciting</p>
<p>D) The narrator knows what everyone is thinking</p>
<br>
<div class="question">2. What is the MAIN limitation of first-person narration?</div>

<p>B) The reader can only know what the narrator knows, creating blind spots</p>
<p>C) It cannot include dialogue</p>
<p>D) There are no limitations</p>
<br>
<div class="question">3. What is the best example of dramatic irony from Treasure Island?</div>

<p>B) Jim knows about Silver’s mutiny plan, but Silver does not know Jim knows</p>
