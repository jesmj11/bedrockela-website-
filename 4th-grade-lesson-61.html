<br>
<p>The Call of the Wild by Jack London is the story of Buck, a large, pampered dog living in sunny California who is stolen and sold as a sled dog in the frozen Yukon during the gold rush. It is brutal, beautiful, and unlike anything you have read this year.</p>

<p>In Oz, we followed a girl swept away from home. In Treasure Island, we followed a boy dragged into adventure. Now we are following a DOG ripped from everything he knows. Notice the pattern: all three stories start with a character losing their world.</p>
<br>
<p>Think about this: Can an animal be the main character of a serious story? Can we understand what an animal feels even though they cannot talk?</p>

<br>
<p>Think about it: What does it mean to go from civilized to primitive? Is primitive always bad, or can it also mean powerful and free?</p>
