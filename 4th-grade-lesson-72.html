<p>London’s toolkit:</p>
<br>
<ul>
<li>IMAGERY: Descriptions that appeal to the five senses (sight, sound, touch, taste, smell)</li>
<li>SIMILE: A comparison using like or as — The snow fell like ash from a cold fire.</li>
<li>METAPHOR: Saying something IS something else — The trail was a white ribbon through the darkness.</li>
<li>PERSONIFICATION: Giving human qualities to non-human things — The cold crept into his bones and whispered stay down.</li>
</ul>
<br>
<p>London uses ALL of these constantly. Today you will find examples and then try writing your own.</p>

<br>
<p>From the story: London’s imagery is so powerful that you can feel the Yukon cold in your bones while sitting in a warm room.</p>
<br>
<p>Think about it: Why is imagery more effective than just stating facts? What is the difference between the cold was bad and the cold bit through his fur like a thousand needles?</p>

<p>[Your answer]</p>
