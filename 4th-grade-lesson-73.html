            subtitle: 'Writing Workshop — Setting and Transformation Essay (Planning)',
            pages: [
                // Page 1: Title
                {
                    render: () => `
                        <div class="lesson-page-card title-page">
                            <div class="character">📖</div>
                            <h1>Day 73</h1>
                            <p class="subtitle">4th Grade ELA</p>
                            <p style="font-size: 20px; color: #B06821; margin: 15px 0; font-weight: 600;">Writing Workshop — Setting and Transformation Essay (Planning)</p>
                        </div>
                    `

                // Page 2: 📚  Welcome!
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h4>📚  Welcome!</h4>
<p>Your Unit 3 writing project is a descriptive essay about how a SETTING transforms a CHARACTER. This combines everything you have learned: setting as a force, character transformation, figurative language, and strong writing craft.</p>
<br>
<p>Today you will: </p>
<ul>
<li>Understand the essay prompt</li>
<li>Choose your topic (from the books or original)</li>
<li>Plan your essay with an outline</li>
</ul>
<br>
<p>Time: About 50 minutes</p>
<br>
                        </div>
                    `
                },

                // Page 3: 🧐  Part 1: Before You Read
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>🧐  Part 1: Before You Read</h3>
<p>This essay is different from your Unit 1 and Unit 2 narratives. Those were STORIES. This is an ESSAY — it makes an argument and supports it with evidence and description. But it still uses vivid writing!</p>
<br>
<p>Essay prompt options (choose ONE):</p>
<br>
<p>Option A: How does the Yukon setting transform Buck in The Call of the Wild? Use specific details and figurative language to describe the setting and show how it changes him.</p>
<br>
<p>Option B: How does the jungle setting shape who Mowgli becomes in The Jungle Book? Use specific details and figurative language to describe the setting and show how it shapes him.</p>
<br>
<p>Option C: Create an ORIGINAL setting and character. Describe a place so vividly that the reader can feel it, and show how that place transforms the character who enters it.</p>
<br>
                        </div>
                    `
                },

                // Page 4: 📖  Part 2: Today’s Task
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>📖  Part 2: Today’s Task</h3>
<p>No new reading. This is a planning day.</p>
<br>
<p>If you choose Option A or B, flip through the book to find specific passages about the setting that you can reference. If you choose Option C, let your imagination go wild.</p>
<br>
                        </div>
                    `
                },

                // Page 5: 💬  Part 3: Word of the Day
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>💬  Part 3: Word of the Day</h3>
<div class="vocab-box"><strong>vivid  (adjective)</strong></div>
<p>Producing strong, clear images in the mind. Writing that is so detailed and specific that the reader can picture it perfectly.</p>
<br>
<p>From the story: London’s descriptions of the Yukon are vivid — you can see the snow, feel the cold, hear the wolves. Your essay should be just as vivid.</p>
<br>
<p>Think about it: What makes writing vivid? It is specificity. Not the place was cold but the wind drove ice crystals into every gap in his fur.</p>
<br>
<h4>✍️  Plan Your Descriptive Essay</h4>
<p>Choose your topic and plan your essay:</p>
<br>
<p>I am writing about (circle one): Option A (Buck/Yukon) / Option B (Mowgli/Jungle) / Option C (Original)</p>
<br>
<p>My setting: [Describe in 2-3 sentences — what does it look, sound, feel like?]</p>
<br>
<p>My character: [Who are they BEFORE entering this setting?]</p>
<br>
<p>The transformation: [How does the setting change them? What do they become?]</p>
<br>
<p>Essay outline:</p>
<br>
<p>Introduction (2-3 sentences): Hook + state how the setting transforms the character</p>
<br>
<p>Body paragraph 1 — THE SETTING (4-5 sentences): Describe the setting vividly using imagery, simile, metaphor. Make the reader FEEL it.</p>
<br>
<p>Body paragraph 2 — THE TRANSFORMATION (4-5 sentences): Show how the setting changes the character. Use specific details or text evidence.</p>
<br>
<p>Body paragraph 3 — THE MEANING (3-4 sentences): What does this transformation tell us about the nature vs. civilization theme? What is the deeper message?</p>
<br>
<p>Conclusion (2-3 sentences): Bring it together. End with a memorable final line.</p>
<br>
<p>This will be your longest and most sophisticated piece of writing yet. You are ready.</p>
<br>
<h4>🌟  You’re Done!</h4>
<p>Great work today!</p>
<br>
<h4>✅  Chose your essay topic</h4>
<h4>✅  Created a detailed outline</h4>
<h4>✅  Planned vivid descriptions for your setting</h4>
<h4>✅  Learned a new vocabulary word (vivid)</h4>
<br>
<p>Tomorrow, you start drafting! Focus on making your setting come alive on the page.</p>
<br>
<p>See you next lesson, reader. ⚓</p>
                        </div>
                    `
