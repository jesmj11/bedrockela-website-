                        <div class="lesson-page-card title-page">
                            <div class="character">📖</div>
                            <h1>Day 76</h1>
                            <p class="subtitle">4th Grade ELA</p>
                            <p style="font-size: 20px; color: #B06821; margin: 15px 0; font-weight: 600;">Writing Workshop — Revising Your Descriptive Essay</p>

                // Page 2: 📚  Welcome!
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h4>📚  Welcome!</h4>
<p>Your first draft is done. Today you will make it BETTER. This revision focuses on two things: (1) Is your setting description vivid enough? (2) Is your analysis deep enough?</p>
<br>
<p>Today you will: </p>
<ul>
<li>Re-read your entire essay</li>
<li>Revise for vivid description and strong analysis</li>
<li>Use a revision checklist</li>
</ul>
<br>
<p>Time: About 45-50 minutes</p>
<br>
                        </div>
                    `
                },

                // Page 3: 🧐  Part 1: Before You Read
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>🧐  Part 1: Before You Read</h3>
<p>This essay has TWO kinds of writing that need revision:</p>
<br>
<p>Descriptive writing revision:</p>
<ul>
<li>Can the reader SEE, HEAR, FEEL your setting?</li>
<li>Did you use at least one simile and one metaphor?</li>
<li>Are your details specific or vague?</li>
</ul>
<p>Vague: The place was scary. → Vivid: The silence pressed against my ears like a hand.</p>
<br>
<p>Analytical writing revision:</p>
<ul>
<li>Did you explain HOW the setting changes the character?</li>
<li>Did you say WHY it matters (connect to theme)?</li>
<li>Are you THINKING on the page, or just summarizing?</li>
</ul>
<p>Summary: Buck changed in the Yukon. → Analysis: The Yukon stripped away everything civilized about Buck, revealing an ancient wildness that had been sleeping inside him all along.</p>
<br>
                        </div>
                    `
                },

                // Page 4: 📖  Part 2: Today’s Task
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>📖  Part 2: Today’s Task</h3>
<p>Re-read your entire essay. Read it OUT LOUD. Mark places where the description feels flat or the analysis feels thin.</p>
<br>
<p>The best revision trick for descriptive writing: close your eyes after reading each sentence. Can you picture it? If not, the description needs work.</p>
<br>
                        </div>
                    `
                },

                // Page 5: 💬  Part 3: Word of the Day
                {
                    render: () => `
                        <div class="lesson-page-card content-page">
                            <h3>💬  Part 3: Word of the Day</h3>
<div class="vocab-box"><strong>evocative  (adjective)</strong></div>
<p>Bringing strong images, memories, or feelings to mind. Writing that EVOKES a response in the reader.</p>
<br>
<p>From the story: London’s writing is evocative — it does not just describe the Yukon, it makes you FEEL like you are there. Your essay should be evocative too.</p>
<br>
<p>Think about it: What is the difference between informative writing and evocative writing? Can writing be both?</p>
<br>
<h4>✅  Check Your Understanding</h4>
<p>Answer these questions using what you’ve learned.</p>
<br>
<div class="question">1. REVISION CHECKLIST — Rate yourself YES or NEEDS WORK:</div>
<ul>
<li>My introduction has a strong hook: ___</li>
<li>My setting paragraph uses at least one simile: ___</li>
<li>My setting paragraph uses at least one metaphor or personification: ___</li>
<li>I appeal to 3 or more senses: ___</li>
<li>My details are specific, not vague: ___</li>
<li>My transformation paragraph shows before AND after: ___</li>
<li>My meaning paragraph explains WHY the transformation matters: ___</li>
<li>My conclusion has a memorable final line: ___</li>
<h4>💡 Hint: Be honest with yourself. Finding weaknesses is how you improve.</h4>
</ul>
<p>[Your answer]</p>
<br>
<div class="question">2. Find your WEAKEST sentence in the essay. Rewrite it below to be more vivid or more analytical.</div>
<h4>💡 Hint: If it is a description, add figurative language. If it is analysis, go deeper — explain the WHY.</h4>
<p>[Your answer]</p>
<br>
<div class="question">3. Find your STRONGEST sentence. What makes it work? What technique did you use?</div>
<h4>💡 Hint: Knowing what you do well helps you do more of it.</h4>
<p>[Your answer]</p>
<br>
<br>

<br>

<h4>✅  Strengthened both description and analysis</h4>
<h4>✅  Used the revision checklist</h4>
<h4>✅  Learned a new vocabulary word (evocative)</h4>
<br>
<p>Tomorrow, editing and final draft. Then your essay is ready to share!</p>
<br>
<p>See you next lesson, reader. ⚓</p>
                        </div>
