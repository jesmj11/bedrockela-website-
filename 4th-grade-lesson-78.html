<li>Emphasize your figurative language</li>
<li>Pause before your final line for effect</li>
</ul>
<br>
<p>Feedback focus today:</p>
<ul>
<li>What IMAGE from the essay do you remember most? (This tells the writer which descriptions worked.)</li>

<p>Notice which moments get the strongest reactions. The images people remember are the ones that worked best.</p>

<br>
<p>From the story: The best writing has resonance — it stays in the reader’s mind long after they finish reading. Which moments from your essay have resonance?</p>
<br>

</ul>
<br>
