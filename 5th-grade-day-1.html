        <p>In the days of good King Henry the Second, when England was still wild with thick forests and long stretches of untamed land, there lived a young man named Robin Hood in the town of Locksley, in Nottinghamshire. He was eighteen years old, tall and strong, with sharp eyes the color of a summer sky and hair as brown as an oak leaf in autumn. He could shoot an arrow straighter than any man in the county, and he walked through the greenwood as quietly as a deer.</p>

      <div class="story-text">
        <p>But as he sat there in the green shade of Sherwood Forest, listening to the birdsong slowly returning and the gentle whisper of the wind through the canopy, something strange happened. Instead of despair, he felt a fierce, wild joy rising in his chest like a flame. The forest stretched around him in every direction, vast and deep and free. No walls. No master. No one to tell him what to do or where to go.</p>
        <p>"Well then," Robin said aloud, and a grin spread across his face despite everything. "If I must be an outlaw, I'll be the best outlaw England has ever seen. I'll rob from those who have too much and give to those who have too little. And I'll make this greenwood my kingdom."</p>
        <p>And that is exactly what he did.</p>
