                                <p style="margin-bottom: 10px;"><strong>First person</strong> (I, me, we) — the narrator is a character in the story.<br><strong>Third person limited</strong> — the narrator knows one character's thoughts.<br><strong>Third person omniscient</strong> — the narrator knows everyone's thoughts.</p>
                                <p style="font-style: italic; color: #555;">Example: First: "I could feel the fear rising in my chest."<br>Third limited: "Victor felt the fear rising in his chest."<br>Third omniscient: "Victor felt afraid, while the creature felt hopeful."</p>
