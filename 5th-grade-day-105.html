            <p>Orpheus and Eurydice
A Tale from Ancient Greek Mythology
Orpheus was the greatest musician who ever lived, and the Greeks meant that without exaggeration.
His mother was a Muse. His father's line traced back to Apollo himself. He had inherited everything there was to inherit — and then gone further, reaching something that couldn't be taught or passed down. When Orpheus played his lyre, rivers stopped flowing to listen. Rocks and trees moved toward the sound. Wild animals lay down in the grass beside each other and forgot to be afraid. Stones wept. The wind changed direction to carry the music further.
He fell in love with a young woman named Eurydice, and they married in a ceremony full of joy — though the wedding torches burned wrong, sputtering smoke instead of flame, and everyone noticed and no one said anything.
The day after the wedding, Eurydice was walking in a meadow. A snake hidden in the grass bit her.
She died.
Orpheus couldn't eat. He couldn't sleep. He couldn't make music — the one thing that had always been his — because every song he tried to play was full of her and he could not get through it. He sat with his grief and his lyre and arrived, eventually, at a decision that anyone else would have called insane.
He would go to the underworld and bring her back.
He descended alive into the land of the dead through a cave at the edge of the world. He walked to the River Styx, where Charon the ferryman waited in his boat.
Charon did not carry the living. He said this flatly.
Orpheus sat down and played.
Charon forgot to row. He forgot why he'd been about to refuse. When the music stopped, he didn't say no again. He just moved to let Orpheus board.
On the other side, Cerberus guarded the gate — three-headed, enormous, never sleeping. Orpheus played. Cerberus laid all three of his heads down on his paws at once, which he had never done in all the years he'd stood guard.
In the great hall of Hades and Persephone, Orpheus played for the king and queen of the dead. The shades of every person who had ever died gathered to hear it. Tantalus, condemned to endless hunger, forgot to reach for the water. Sisyphus, condemned to roll his boulder forever up a hill, sat down on the boulder and listened. The Furies, who were not known for weeping, wept.
Hades and Persephone heard him out in silence. When the music stopped, Persephone looked at her husband.
Hades agreed to release Eurydice. One condition: she would follow Orpheus back up to the world of the living, and he could not look back at her until they were both fully out. If he looked back before that, she would return to the dead permanently.
Orpheus began the long walk up.
Eurydice followed behind him. He could not see her. He could not hear her — the dead make no sound. He could only walk forward into the darkness and believe she was there.
The walk was long. The passage was dark and narrow and went on and on, and the silence behind him was absolute. He walked and told himself she was there. He told himself she was there. He walked further and the silence was the same silence it had been since the beginning, no footstep, no breath, nothing but his own steps and the darkness and the silence.
He was almost out. The light from the upper world was visible ahead of him.
He turned around.
She was there. She was right behind him, her hand almost close enough to reach, her face — for one moment — real and present and there.
Then she was gone. A shadow sliding back into shadow, her lips forming his name without sound, her hand reaching toward him as the darkness took her.
"Again?" the ferryman said, when Orpheus stumbled back to the Styx.
Orpheus sat on the bank and played. Charon did not move his boat.
He sat there for seven days. The music he made in those seven days is the saddest music ever played, and the river heard all of it, and the reeds at the water's edge absorbed it, and that is why, the Greeks said, when the wind blows through reeds by a river, you can sometimes hear something that sounds like grief.
He went back to the world eventually. He lived alone in Thrace, playing his music, turning away from all human company. The music he made after that was different from anything before — not better or worse, but changed in some way that people who heard it couldn't describe, only feel.
The Greeks told Orpheus's story not as a failure but as the proof of something: that he had gone where no living person goes, and moved the unmovable, and almost — almost — brought her back.
He turned around.
Everyone who hears this story understands why. Nobody who hears it thinks they would have done differently.
That is the whole point.</p>
