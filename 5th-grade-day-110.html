A Tale from Ancient Greek Mythology
Every nine years, Athens sent fourteen young people to Crete to die.
Seven young men, seven young women — chosen by lot, sent to the island of Crete, placed in the <span class="vocab-highlight">Labyrinth</span> and hunted by the Minotaur: a creature half man and half bull, savage and enormous, living at the maze's impossible center. No one had ever found their way out of the <span class="vocab-highlight">Labyrinth</span>. That was the point of it.
This had been going on for a long time. The Athenians mourned every nine years, and hated every nine years, and had no choice every nine years, because Crete was powerful and Athens had lost a war.
Until Theseus.
Theseus was the prince of Athens — brave, strong, stubborn beyond reason, and entirely unwilling to watch other people die for a problem he could solve himself. When the <span class="vocab-highlight">tribute</span> ships came and the lots were being drawn, he stepped forward.
"I'll go," he said. "And I'll kill the Minotaur."
His father, King Aegeus, said all the things a father says when his child is about to do something that might get them killed. Theseus listened carefully and then said he was going anyway. This was a reliable quality of Theseus — he listened and then did what he'd already decided.
"The <span class="vocab-highlight">tribute</span> ship sails with black sails," he told his father. "If I succeed, I'll change them to white before I sail home. Watch for the white sails."
On Crete, King Minos received the Athenians with the cold efficiency of someone who has done this before. In the hall, watching from the side, was his daughter Ariadne. She looked at Theseus and made a decision on the spot.
That night she came to him with a ball of <span class="vocab-highlight">thread</span>.
"Tie one end at the entrance," she said. "Unroll it as you go. Follow it back when you're done." She was practical and direct and made it clear that she expected to leave Crete with him when he left — which was a reasonable thing to expect from someone who had just handed you the solution to an inescapable maze.
Theseus agreed.
He entered the <span class="vocab-highlight">Labyrinth</span> alone. Daedalus, who had built it, had built it to be impossible — passages that doubled back, junctions that looked identical, a design that systematically destroyed your sense of direction and left you wandering until you met the thing in the center.
The <span class="vocab-highlight">thread</span> held. He paid it out carefully, keeping it taut enough to follow, and went deeper.
He found the Minotaur in the center of the maze. The creature was enormous and savage, but it had lived in the <span class="vocab-highlight">Labyrinth</span> its whole life, and Theseus had spent his entire life training for exactly this kind of moment. The fight was not easy. It was not quick. But Theseus had something the Minotaur didn't: a reason to win and a way out.
He followed the <span class="vocab-highlight">thread</span> back to the entrance.
He found the other Athenians, took Ariadne, and they sailed for home. They stopped at the island of Naxos to rest. When they left the next morning, Ariadne was still on the island, asleep. Theseus sailed without her.
Why? The stories give different answers and none of them are entirely satisfying. He forgot. He was told to by a god. He didn't love her the way she loved him. The Greeks themselves weren't sure, and they told the story anyway, because sometimes the hero does a terrible thing and the story doesn't explain it and you have to sit with that.
Ariadne woke on Naxos alone.
Theseus was sailing toward Athens.
He forgot to change the sails.
His father, Aegeus, had been watching from the cliffs every day since his son left. He saw the black sails. He believed what they meant.
He threw himself into the sea. The sea that bears his name is called the Aegean.
Theseus arrived home to find he had sailed from one grief into another — his father dead, the throne his, a victory that felt like nothing it was supposed to feel like. He had killed the Minotaur. He had freed Athens from its <span class="vocab-highlight">tribute</span>. He had done the great thing he'd set out to do.
He had also forgotten to change the sails.
The Greeks told this story to their children without cleaning it up. Heroes make terrible mistakes. Great deeds and great failures can happen in the same story, sometimes the same day. Theseus became one of the great kings of Athens. He also let down everyone he should have protected most.
Both things are true. They don't cancel each other out.</p>
