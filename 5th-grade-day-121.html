            <p>The Greeks had Ares, and mostly found him alarming — chaotic, bloodthirsty, not the kind of divine presence you&#x27;d invite to a planning meeting. He was the god of the worst parts of war: the slaughter and the frenzy and the part where everything goes wrong at once. Even the other gods didn&#x27;t like him much.</p>
