A Tale from Norse Mythology
Everyone loved Baldur.
This sounds like the kind of thing people say about someone who's just died, rounding up to make them sound nicer than they were. But with Baldur it was literally true. He was the god of light and joy, and wherever he walked flowers opened and people found themselves in better moods without knowing why. He laughed easily. He was kind without trying. Even the things that should have found him annoying somehow didn't.
He was also having nightmares.
Bad ones. Night after night, the same visions — darkness, cold, something ending. He woke up sweating in his gold-roofed hall and couldn't sleep again. He told Odin. Odin took it seriously, because Odin took everything involving the future seriously, and rode Sleipnir all the way to Helheim to consult a dead prophetess who confirmed what the dreams were about.
Baldur was going to die.
Frigg — his mother, Odin's wife, the queen of the gods — heard this and did what any mother would do if she had the power to actually do something about it.
She went everywhere.
She traveled through all the nine worlds and asked every single thing in existence to swear an oath that it would never hurt Baldur. Fire. Water. Iron and copper and silver and gold. Stone and soil and every kind of wood. Every disease. Every poison. Every animal, bird, and creeping thing. She spoke to all of them personally and they all swore, because Baldur was Baldur and nobody wanted to be the thing that hurt him.
She came back to Asgard satisfied.
The gods, delighted, invented a game. They stood in a big circle and threw things at Baldur and watched everything bounce off. Spears. Arrows. Rocks. Swords. Everything harmlessly deflected off Baldur, who stood in the middle laughing, completely untouchable.
It was genuinely funny. Everyone was enjoying themselves.
Loki was watching.
Loki watched everything. It was his nature. He noticed things other people didn't notice, asked questions other people didn't ask, found the crack in every seemingly solid wall. He turned himself into an old woman and wandered over to where Frigg was sitting, watching her son bounce projectiles.
"Remarkable thing," said Loki-as-old-woman. "Nothing can hurt him?"
"Nothing," said Frigg, smiling.
"Everything swore?"
"Everything." Frigg paused. "Well. There was one little thing I didn't bother with — a tiny plant growing on a single oak tree east of Valhalla. Mistletoe. It was so small and so young, I didn't think it worth asking."
The old woman nodded pleasantly and wandered away.
Loki found the mistletoe. He carved a small dart from it. He walked back to where the gods were still throwing things at Baldur and found Baldur's brother Hodr standing at the edge, not participating because Hodr was blind and couldn't aim.
"Here," said Loki. "I'll guide your hand. Join in."
Hodr smiled, glad to be included. He took the dart. Loki pointed his arm. Hodr threw.
The dart hit Baldur.
Baldur fell.
The silence that followed was the most complete silence Asgard had ever heard. Then someone made a sound — not quite a word, just the beginning of understanding — and then the grief broke open across all of them at once.
Frigg, when she could speak, asked who would ride to Helheim and beg Hel for Baldur's return.
A god named Hermod stepped forward. He took Sleipnir — the eight-legged horse that could go anywhere — and rode for nine days and nine nights through worlds getting darker and colder, over a bridge that rang under the horse's hooves, past the gate guarded by a great hound, until he reached the hall of Hel herself.
Baldur was sitting in the seat of honor. Even in the land of the dead, people had given him the best seat.
Hermod made his case. Hel listened with the patience of someone who had heard many things and been moved by very few. Then she made her ruling.
"If every being in all the nine worlds weeps for Baldur," she said, "it will show me that he truly is as beloved as you say. Then I will let him go. If one single being refuses to weep — he stays."
Messengers went everywhere. Everything wept. The rocks wept. The trees wept. Animals and birds and the cold rivers all wept for Baldur.
In a cave at the edge of the world sat a giantess named Thokk. The messengers asked her to weep.
She looked at them without blinking. "I got nothing from Baldur," she said. "Let Hel keep him."
She was Loki. Every god in Asgard knew it. None of them could prove it.
Baldur stayed in Helheim.
The light went out of Asgard the way a candle goes out — not all at once, but the room was darker and everyone felt it, every day, and would keep feeling it.
He was still there, in the dark, in the seat of honor.
Waiting for the world to end so he could come back.</p>
