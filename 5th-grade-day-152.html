            <p>The Norse told many stories about cursed treasure, and archaeology reveals why: wealth was genuinely dangerous in Viking culture. A hoard of gold or silver could attract raiders, cause family feuds, or lead to murder. 'Cursed gold' was a way of expressing real risks.</p>
