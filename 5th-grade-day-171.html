                                <p style="margin-bottom: 15px;">The Nine Worlds of Yggdrasil
A Guide to the Norse Universe
Imagine a tree so enormous that its roots reach into three different worlds and its branches shelter six more. Imagine it has been growing since before time had a name. Imagine a squirrel running up and down its trunk all day carrying insults between a serpent at the roots and an eagle at the top, because even the cosmic World Tree needs a troublemaker.
This was Yggdrasil. This was the Norse universe.
Nine worlds, all connected by the tree. All real. All full of creatures who would very much like to either help you or eat you, and not always easy to tell which.
Asgard was at the top — the gleaming realm of the Aesir gods, perched above everything, connected to Midgard by the rainbow bridge Bifrost. If you'd looked up at Asgard from below, you would have seen the gold of Valhalla's roof and the light from Freyja's hall and the distant figure of Heimdall at the bridge, watching everything. It was beautiful and it was full of gods who were arguing about something.
Midgard was the middle — our world, the human world, set at the center of everything like the hearthstone of the universe. It was surrounded by the deep ocean where the Midgard Serpent Jormungand lay coiled around the whole of it, biting his own tail, waiting. Outside the ocean was Utgard, the realm of giants, and the wall made from Ymir's eyebrows was the only thing between you and them.
Jotunheim was where the giants lived — frost giants, mountain giants, giants who were sometimes wise and sometimes monstrous and sometimes both at once. The gods hated the giants but also borrowed things from them, married them occasionally, and visited them for wrestling competitions. The relationship was complicated.
Vanaheim was home to the Vanir — the other gods, older gods, gods of nature and the sea and the deep magic of living things. Freyr and Freyja were Vanir who had come to live in Asgard as part of a peace treaty, which is why the Aesir had a god of sunshine and a goddess of love, both of whom were sometimes useful.
Alfheim was home to the light elves — brilliant, graceful beings associated with light and beauty. The Norse didn't write many detailed stories about them, perhaps because beings who are purely graceful are less interesting to tell stories about than beings who make terrible decisions.
Svartalfheim was where the dwarves lived and worked — the master craftsmen of the nine worlds, small and often ill-tempered and capable of making anything. Mjolnir came from here. Gleipnir came from here. The Mead of Poetry's vessels, Odin's spear, Freyr's ship, Sif's golden hair. If it was extraordinary, a dwarf made it.
Niflheim was the oldest place — primal ice and darkness and the cold mist that had existed since before the world. The spring Hvergelmir was here, the source of eleven rivers that had started everything. Nidhogg the serpent gnawed at Yggdrasil's roots here, trying to bring the whole tree down, every day, failing, starting again tomorrow.
Helheim was where the dead went — most of the dead, the ones who hadn't died in battle. Hel governed it, cold and fair. It was vast and dim and quiet and the dead wandered it in something like their old lives, but less.
Muspelheim was fire. Just fire, always fire, roaring at the southern edge of everything. Surt was still there, still holding his sword, still waiting.
Between these nine worlds, Yggdrasil grew. Its roots were gnawed. Its branches sheltered. A deer ate its leaves. An eagle quarreled with a serpent through the medium of a very busy squirrel.
The tree endured.
It will endure, the Norse believed, right up until Ragnarok. When it won't.
And then a new world will grow from the old roots.
The tree is patient. Trees always are.</p>
