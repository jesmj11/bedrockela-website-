                                <p style="margin-bottom: 15px;">The Valkyries: Choosers of the Slain
A Tale from Norse Mythology
Above the battlefield, where the smoke was thickest and the noise loudest and no one could see much beyond the next few feet, the Valkyries rode.
You couldn't see them. Not unless they wanted you to. They moved through the air on armored horses, watching everything below with the focused attention of people who had an extremely important job and couldn't afford to miss anything.
Their job: choose.
Not who won. Odin decided who won, which was his domain. The Valkyries chose which of the dead were worthy of Valhalla, and there was a specific definition of worthy that had nothing to do with which side you were on or whether you'd been the best fighter on the field.
Worthy meant you had not flinched.
It meant that when everything was terrible and you were outnumbered and the situation was clearly hopeless, you had kept going anyway, and you had gone down with your sword in your hand and your face forward. That was what they were looking for. A warrior who died bravely on the losing side might be chosen. A warrior who survived by hiding in the back would not.
The Valkyries had names that burned: Brynhild meant bright battle. Gondul meant she-wolf. Skeggjold meant axe-age. Sigrdrifa meant victory-storm. They were not gentle beings. They were not soft. They were the divine agents of Odin's will on the battlefield, and they were as efficient as a sword.
When they chose a warrior, they came for him when he fell. They lifted him, still surprised to be dead, and carried him across Bifrost to Valhalla, where the door was open and the mead was flowing and the other einherjar were already asking what battle he'd come from.
The Valkyries also served in Valhalla — bringing the mead, moving through the hall, present at the feasts. This was part of the role too. They were not just choosers. They were part of the whole fabric of Odin's preparation for Ragnarok, keeping the einherjar ready, keeping the hall alive.
Some of them made choices that complicated their duties.
There was Brynhild — the greatest of the Valkyries, who gave victory to the wrong warrior during a battle Odin had decided differently. He put her to sleep on a mountain and surrounded her with fire as a punishment, and she woke up with the memory of the sky still in her and found herself on the ground, and the man who had ridden through the fire to wake her was Sigurd.
Choosing your own will over Odin's was a serious thing. The Valkyries who did it lost their wings, so to speak — they lost their powers and became mortal. The price for making a choice that was yours alone was that you had to live the rest of the life that came from it.
Brynhild's story ended badly, but it was hers.
Above the battlefield, the others still ride. They still watch every warrior with the same measuring attention. They still weigh every choice made under pressure.
The Norse warrior going into battle knew they were there. He couldn't see them. But he knew they were watching.
He fought accordingly.
In the middle of the noise and the chaos and the fear, somewhere in the back of his mind, a thought: fight the way they'd choose you.
It was enough.
It was more than enough.</p>
