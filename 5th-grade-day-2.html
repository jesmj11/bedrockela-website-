        <p>It was a golden afternoon in late summer when Robin Hood had his first great adventure as an outlaw. He had been living in Sherwood Forest for nearly a year, and his band of Merry Men had grown to a fine company of bold fellows who could shoot, fight, and vanish into the trees like woodland spirits. But Robin was restless. Camp life was comfortable enough — Much the Miller\'s Son kept them fed, the lean-tos were snug against the rain, and Alan-a-Dale\'s songs kept spirits high — but Robin Hood was not a man built for comfort. He needed excitement the way a fire needs air.</p>
