        <p>The Silk Road wasn't a single road — it was a network of trade routes stretching 4,000 miles from China to the Mediterranean Sea. Merchants rarely traveled the entire distance. Instead, goods passed through many hands: Chinese silk traveled to Central Asian traders, who sold it to Persian merchants, who sold it to Arabian caravans, who finally brought it to European markets.</p>
