      <h2>📰 Arabian Mathematics: The Gift of Algebra</h2>
      <div class="info-text">
        <p>In the 9th century, a Persian mathematician named Muhammad al-Khwarizmi worked in Baghdad's House of Wisdom. He wrote a book called 'The Compendious Book on Calculation by Completion and Balancing' — and that book changed mathematics forever. The Arabic word 'al-jabr' (meaning 'completion' or 'restoration') became our word 'algebra.'</p>

<p>His name gave us another word: 'algorithm.' When medieval European scholars translated his work, they called systematic problem-solving methods 'algorisms' after him. Today, computer programmers still use algorithms — step-by-step instructions for solving problems.</p>
