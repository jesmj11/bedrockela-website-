            <h3>Ancient Vampire Legends: Before Dracula</h3>
            <p>Vampires didn't start with Bram Stoker's Dracula. Legends of blood-drinking creatures have existed in nearly every culture throughout human history — long before anyone wrote them down in novels.</p><p>In ancient Mesopotamia (modern-day Iraq), around 4,000 years ago, people feared a demon called Lilitu who attacked sleeping people and drank their blood. Ancient Assyrian clay tablets describe rituals to protect against her. Similar creatures appear in Persian, Hebrew, and Greek mythology.</p><p>Eastern European folklore had the most developed vampire traditions. In places like Romania, Serbia, and Poland, people believed that certain dead people — those who died violently, committed suicide, or were buried improperly — could rise from their graves at night. These creatures were called different names: 'strigoi' in Romania, 'vrykolakas' in Greece, 'upir' in Russia.</p><p>These folklore vampires were quite different from Stoker's elegant Count Dracula. They were described as bloated, dark-skinned corpses with blood on their mouths. They didn't dress in fine clothes or live in castles. They returned to their own villages to attack family and neighbors, spreading disease and death.</p><p>To protect against vampires, people used garlic, holy symbols, and certain woods like hawthorn. They believed sunlight, running water, and religious faith could repel them. Some villages dug up suspected vampires and drove wooden stakes through their hearts, or cut off their heads, or burned the bodies — practices that seem shocking now but made sense in a time when people couldn't explain why plagues spread through communities.</p><p>Many vampire legends probably came from misunderstanding decomposition. Before people understood what happens to bodies after death, natural processes — gases causing bloating, blood around the mouth, skin darkening, nails appearing to grow — looked supernatural and frightening.</p><p>Other cases may have been rare diseases like porphyria (which causes sensitivity to sunlight) or rabies (which causes fear of water and aggressive behavior). Frightened communities, lacking scientific explanations, created stories to make sense of what they saw.</p><p>Stoker took these ancient, scattered folklore traditions and wove them into one compelling character: a vampire who was sophisticated, intelligent, powerful, and terrifying in a completely new way.</p>
