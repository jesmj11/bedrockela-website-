<p>Robin looked at his friend — at the worry etched into Little John\'s broad face, at the fear that the big man was trying to hide behind anger — and felt a wave of affection so strong it nearly overwhelmed the pain in his arm.</p>
<p>&quot;It was never about the arrow, John. You know that. It\'s about showing the Sheriff that no matter how many soldiers he sends, no matter how many traps he sets, no matter how many walls he builds — he cannot break us. He cannot make us afraid. And as long as the people see that, they won\'t be afraid either.&quot;</p>
<p>Little John was quiet for a long moment. Then he sighed — a sigh that carried the weight of years of friendship, years of worry, years of pulling Robin Hood out of situations that should have killed him.</p>
<p>&quot;You\'re impossible,&quot; Little John said. But he was smiling.</p>
<p>Robin leaned back against the trunk of an oak and closed his eyes. His arm throbbed, but he was alive, he was free, and he was home. The silver arrow was beautiful, but the real prize was simpler than silver: the knowledge that the Merry Men could walk into the lion\'s den and walk out again, laughing.</p>
<p>That was worth an arrow in the arm any day.</p>
      </div>
