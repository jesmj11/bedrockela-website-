            <h3>Medical Science in the 1890s: Dr. Seward's Asylum</h3>
            <p>In Dracula, Dr. John Seward runs a private asylum (a hospital for people with mental illness) right next door to Count Dracula's property at Carfax. This wasn't just a plot convenience — private asylums were common in Victorian England, and the treatment of mental illness was very different from today.</p><p>The 1890s was a transitional period in psychiatry (the medical study of mental illness). Doctors were beginning to view mental illness as a medical condition rather than moral failing or demonic possession, but treatment was still primitive and often harmful.</p><p>Dr. Seward uses a phonograph — a newly invented device that recorded sound onto wax cylinders — to keep his medical notes. This was cutting-edge technology in the 1890s! The phonograph had only been invented in 1877, and using it for medical records showed Dr. Seward as a modern, scientific practitioner.</p><p>However, Victorian asylum treatments would horrify us today. 'Restraint' (tying patients down or using straitjackets) was common. 'Hydrotherapy' involved shocking patients with ice-cold water or forcing them into long baths. Some doctors used medications like laudanum (liquid opium) or bromides (sedatives) liberally, often creating addiction.</p><p>The theory behind many treatments was that mental illness came from physical problems: 'bad blood,' inflammation of the brain, or imbalanced body chemistry. Some doctors performed bloodletting (deliberately removing blood) or prescribed purging (forced vomiting). Others tried experimental electrical treatments.</p><p>Asylums varied widely in quality. Wealthy patients in private asylums like Dr. Seward's might receive relatively humane care — comfortable rooms, good food, and gentle treatment. Poor patients in public asylums often faced overcrowding, neglect, and harsh conditions.</p><p>One of Dr. Seward's patients, Renfield, displays what we might today recognize as symptoms of psychosis — delusions, obsessive behaviors, and break from
