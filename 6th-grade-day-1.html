                        <div class="lesson-page-card content-page">
                            <h2>📖 Reading: The Adventures of Tom Sawyer</h2>
                            <h3 style="color: var(--book-color, #305853);">Chapter 1: CHAPTER I</h3>
                            
                            <div style="padding: 25px; background: #f9f9f9; border-radius: 12px; line-height: 1.8; font-size: 16px; margin-bottom: 25px;" class="reading-passage">
                                <p style="margin-bottom: 20px; line-height: 1.8;">CHAPTER I</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">No answer.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“TOM!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">No answer.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What’s gone with that boy, I wonder? You TOM!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">No answer.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The old lady pulled her spectacles down and looked over them about the
room; then she put them up and looked out under them. She seldom or
never looked _through_ them for so small a thing as a boy; they were
her state pair, the pride of her heart, and were built for “style,” not
service—she could have seen through a pair of stove-lids just as well.
She looked perplexed for a moment, and then said, not fiercely, but
still loud enough for the furniture to hear:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I lay if I get hold of you I’ll—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">She did not finish, for by this time she was bending down and punching
under the bed with the broom, and so she needed breath to punctuate the
punches with. She resurrected nothing but the cat.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I never did see the beat of that boy!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">She went to the open door and stood in it and looked out among the
tomato vines and “jimpson” weeds that constituted the garden. No Tom. So
she lifted up her voice at an angle calculated for distance and shouted:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Y-o-u-u TOM!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">There was a slight noise behind her and she turned just in time to seize
a small boy by the slack of his roundabout and arrest his flight.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“There! I might ’a’ thought of that closet. What you been doing in
there?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Nothing.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Nothing! Look at your hands. And look at your mouth. What _is_ that
truck?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I don’t know, aunt.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I know. It’s jam—that’s what it is. Forty times I’ve said if you
didn’t let that jam alone I’d skin you. Hand me that switch.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The switch hovered in the air—the peril was desperate—</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“My! Look behind you, aunt!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The old lady whirled round, and snatched her skirts out of danger.
The lad fled on the instant, scrambled up the high board-fence, and
disappeared over it.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">His aunt Polly stood surprised a moment, and then broke into a gentle
laugh.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Hang the boy, can’t I never learn anything? Ain’t he played me tricks
enough like that for me to be looking out for him by this time? But old
fools is the biggest fools there is. Can’t learn an old dog new tricks,
as the saying is. But my goodness, he never plays them alike, two days,
and how is a body to know what’s coming? He ’pears to know just how long
he can torment me before I get my dander up, and he knows if he can make
out to put me off for a minute or make me laugh, it’s all down again and
I can’t hit him a lick. I ain’t doing my duty by that boy, and that’s
the Lord’s truth, goodness knows. Spare the rod and spile the child, as
the Good Book says. I’m a laying up sin and suffering for us both, I
know. He’s full of the Old Scratch, but laws-a-me! he’s my own dead
sister’s boy, poor thing, and I ain’t got the heart to lash him,
somehow. Every time I let him off, my conscience does hurt me so, and
every time I hit him my old heart most breaks. Well-a-well, man that is
born of woman is of few days and full of trouble, as the Scripture says,
and I reckon it’s so. He’ll play hookey this evening,[*] and I’ll just
be obleeged to make him work, tomorrow, to punish him. It’s mighty hard
to make him work Saturdays, when all the boys is having holiday, but he
hates work more than he hates anything else, and I’ve _got_ to do some
of my duty by him, or I’ll be the ruination of the child.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">[*] Southwestern for “afternoon”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Tom did play hookey, and he had a very good time. He got back home
barely in season to help Jim, the small colored boy, saw next-day’s wood
and split the kindlings before supper—at least he was there in time
to tell his adventures to Jim while Jim did three-fourths of the work.
Tom’s younger brother (or rather half-brother) Sid was already through
with his part of the work (picking up chips), for he was a quiet boy,
and had no adventurous, trouble-some ways.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">While Tom was eating his supper, and stealing sugar as opportunity
offered, Aunt Polly asked him questions that were full of guile, and
very deep—for she wanted to trap him into damaging revealments. Like
many other simple-hearted souls, it was her pet vanity to believe she
was endowed with a talent for dark and mysterious diplomacy, and she
loved to contemplate her most transparent devices as marvels of low
cunning. Said she:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom, it was middling warm in school, warn’t it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes’m.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Powerful warm, warn’t it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes’m.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Didn’t you want to go in a-swimming, Tom?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">A bit of a scare shot through Tom—a touch of uncomfortable suspicion. He
searched Aunt Polly’s face, but it told him nothing. So he said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No’m—well, not very much.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The old lady reached out her hand and felt Tom’s shirt, and said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“But you ain’t too warm now, though.” And it flattered her to reflect
that she had discovered that the shirt was dry without anybody knowing
that that was what she had in her mind. But in spite of her, Tom knew
where the wind lay, now. So he forestalled what might be the next move:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Some of us pumped on our heads—mine’s damp yet. See?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Aunt Polly was vexed to think she had overlooked that bit of
circumstantial evidence, and missed a trick. Then she had a new
inspiration:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom, you didn’t have to undo your shirt collar where I sewed it, to
pump on your head, did you? Unbutton your jacket!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The trouble vanished out of Tom’s face. He opened his jacket. His shirt
collar was securely sewed.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Bother! Well, go ’long with you. I’d made sure you’d played hookey
and been a-swimming. But I forgive ye, Tom. I reckon you’re a kind of a
singed cat, as the saying is—better’n you look. _This_ time.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">She was half sorry her sagacity had miscarried, and half glad that Tom
had stumbled into obedient conduct for once.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">But Sidney said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, now, if I didn’t think you sewed his collar with white thread,
but it’s black.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, I did sew it with white! Tom!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">But Tom did not wait for the rest. As he went out at the door he said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Siddy, I’ll lick you for that.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">In a safe place Tom examined two large needles which were thrust into
the lapels of his jacket, and had thread bound about them—one needle
carried white thread and the other black. He said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“She’d never noticed if it hadn’t been for Sid. Confound it! sometimes
she sews it with white, and sometimes she sews it with black. I wish to
gee-miny she’d stick to one or t’other—I can’t keep the run of ’em. But
I bet you I’ll lam Sid for that. I’ll learn him!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">He was not the Model Boy of the village. He knew the model boy very well
though—and loathed him.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Within two minutes, or even less, he had forgotten all his troubles. Not
because his troubles were one whit less heavy and bitter to him than a
man’s are to a man, but because a new and powerful interest bore
them down and drove them out of his mind for the time—just as men’s
misfortunes are forgotten in the excitement of new enterprises. This new
interest was a valued novelty in whistling, which he had just acquired
from a negro, and he was suffering to practise it undisturbed. It
consisted in a peculiar bird-like turn, a sort of liquid warble,
produced by touching the tongue to the roof of the mouth at short
intervals in the midst of the music—the reader probably remembers how to
do it, if he has ever been a boy. Diligence and attention soon gave him
the knack of it, and he strode down the street with his mouth full of
harmony and his soul full of gratitude. He felt much as an astronomer
feels who has discovered a new planet—no doubt, as far as strong, deep,
unalloyed pleasure is concerned, the advantage was with the boy, not the
astronomer.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The summer evenings were long. It was not dark, yet. Presently Tom
checked his whistle. A stranger was before him—a boy a shade larger
than himself. A new-comer of any age or either sex was an impressive
curiosity in the poor little shabby village of St. Petersburg. This boy
was well dressed, too—well dressed on a week-day. This was simply
astounding. His cap was a dainty thing, his close-buttoned blue cloth
roundabout was new and natty, and so were his pantaloons. He had shoes
on—and it was only Friday. He even wore a necktie, a bright bit of
ribbon. He had a citified air about him that ate into Tom’s vitals. The
more Tom stared at the splendid marvel, the higher he turned up his nose
at his finery and the shabbier and shabbier his own outfit seemed to
him to grow. Neither boy spoke. If one moved, the other moved—but only
sidewise, in a circle; they kept face to face and eye to eye all the
time. Finally Tom said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I can lick you!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’d like to see you try it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I can do it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No you can’t, either.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes I can.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No you can’t.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I can.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You can’t.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Can!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Can’t!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">An uncomfortable pause. Then Tom said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What’s your name?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“’Tisn’t any of your business, maybe.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well I ’low I’ll _make_ it my business.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well why don’t you?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“If you say much, I will.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Much—much—_much_. There now.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, you think you’re mighty smart, _don’t_ you? I could lick you with
one hand tied behind me, if I wanted to.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well why don’t you _do_ it? You _say_ you can do it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well I _will_, if you fool with me.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh yes—I’ve seen whole families in the same fix.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Smarty! You think you’re _some_, now, _don’t_ you? Oh, what a hat!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You can lump that hat if you don’t like it. I dare you to knock it
off—and anybody that’ll take a dare will suck eggs.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You’re a liar!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You’re another.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You’re a fighting liar and dasn’t take it up.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Aw—take a walk!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Say—if you give me much more of your sass I’ll take and bounce a rock
off’n your head.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, of _course_ you will.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well I _will_.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well why don’t you _do_ it then? What do you keep _saying_ you will
for? Why don’t you _do_ it? It’s because you’re afraid.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I _ain’t_ afraid.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You are.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I ain’t.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You are.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Another pause, and more eying and sidling around each other. Presently
they were shoulder to shoulder. Tom said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Get away from here!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Go away yourself!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I won’t.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I won’t either.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">So they stood, each with a foot placed at an angle as a brace, and both
shoving with might and main, and glowering at each other with hate. But
neither could get an advantage. After struggling till both were hot and
flushed, each relaxed his strain with watchful caution, and Tom said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You’re a coward and a pup. I’ll tell my big brother on you, and he can
thrash you with his little finger, and I’ll make him do it, too.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What do I care for your big brother? I’ve got a brother that’s bigger
than he is—and what’s more, he can throw him over that fence, too.”
 [Both brothers were imaginary.]</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That’s a lie.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“_Your_ saying so don’t make it so.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Tom drew a line in the dust with his big toe, and said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I dare you to step over that, and I’ll lick you till you can’t stand
up. Anybody that’ll take a dare will steal sheep.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The new boy stepped over promptly, and said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Now you said you’d do it, now let’s see you do it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Don’t you crowd me now; you better look out.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, you _said_ you’d do it—why don’t you do it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“By jingo! for two cents I _will_ do it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The new boy took two broad coppers out of his pocket and held them out
with derision. Tom struck them to the ground. In an instant both boys
were rolling and tumbling in the dirt, gripped together like cats; and
for the space of a minute they tugged and tore at each other’s hair and
clothes, punched and scratched each other’s nose, and covered themselves
with dust and glory. Presently the confusion took form, and through the
fog of battle Tom appeared, seated astride the new boy, and pounding him
with his fists. “Holler ’nuff!” said he.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The boy only struggled to free himself. He was crying—mainly from rage.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Holler ’nuff!”—and the pounding went on.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">At last the stranger got out a smothered “’Nuff!” and Tom let him up and
said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Now that’ll learn you. Better look out who you’re fooling with next
time.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The new boy went off brushing the dust from his clothes, sobbing,
snuffling, and occasionally looking back and shaking his head and
threatening what he would do to Tom the “next time he caught him out.”
 To which Tom responded with jeers, and started off in high feather, and
as soon as his back was turned the new boy snatched up a stone, threw it
and hit him between the shoulders and then turned tail and ran like
an antelope. Tom chased the traitor home, and thus found out where he
lived. He then held a position at the gate for some time, daring the
enemy to come outside, but the enemy only made faces at him through the
window and declined. At last the enemy’s mother appeared, and called Tom
a bad, vicious, vulgar child, and ordered him away. So he went away; but
he said he “’lowed” to “lay” for that boy.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">He got home pretty late that night, and when he climbed cautiously in
at the window, he uncovered an ambuscade, in the person of his aunt; and
when she saw the state his clothes were in her resolution to turn his
Saturday holiday into captivity at hard labor became adamantine in its
firmness.</p>
