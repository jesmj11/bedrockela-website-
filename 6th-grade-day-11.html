                        <div class="lesson-page-card content-page">
                            <h2>📖 Reading: The Adventures of Tom Sawyer</h2>
                            <h3 style="color: var(--book-color, #305853);">Chapter 18: CHAPTER XVIII</h3>
                            
                            <div style="padding: 25px; background: #f9f9f9; border-radius: 12px; line-height: 1.8; font-size: 16px; margin-bottom: 25px;" class="reading-passage">
                                <p style="margin-bottom: 20px; line-height: 1.8;">CHAPTER XVIII</p>
<p style="margin-bottom: 20px; line-height: 1.8;">That was Tom’s great secret—the scheme to return home with his brother
pirates and attend their own funerals. They had paddled over to the
Missouri shore on a log, at dusk on Saturday, landing five or six miles
below the village; they had slept in the woods at the edge of the town
till nearly daylight, and had then crept through back lanes and alleys
and finished their sleep in the gallery of the church among a chaos of
invalided benches.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">At breakfast, Monday morning, Aunt Polly and Mary were very loving to
Tom, and very attentive to his wants. There was an unusual amount of
talk. In the course of it Aunt Polly said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, I don’t say it wasn’t a fine joke, Tom, to keep everybody
suffering ’most a week so you boys had a good time, but it is a pity you
could be so hard-hearted as to let me suffer so. If you could come over
on a log to go to your funeral, you could have come over and give me a
hint some way that you warn’t dead, but only run off.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, you could have done that, Tom,” said Mary; “and I believe you
would if you had thought of it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Would you, Tom?” said Aunt Polly, her face lighting wistfully. “Say,
now, would you, if you’d thought of it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I—well, I don’t know. ’Twould ’a’ spoiled everything.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom, I hoped you loved me that much,” said Aunt Polly, with a grieved
tone that discomforted the boy. “It would have been something if you’d
cared enough to _think_ of it, even if you didn’t _do_ it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Now, auntie, that ain’t any harm,” pleaded Mary; “it’s only Tom’s giddy
way—he is always in such a rush that he never thinks of anything.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“More’s the pity. Sid would have thought. And Sid would have come and
_done_ it, too. Tom, you’ll look back, some day, when it’s too late,
and wish you’d cared a little more for me when it would have cost you so
little.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Now, auntie, you know I do care for you,” said Tom.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’d know it better if you acted more like it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I wish now I’d thought,” said Tom, with a repentant tone; “but I dreamt
about you, anyway. That’s something, ain’t it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It ain’t much—a cat does that much—but it’s better than nothing. What
did you dream?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, Wednesday night I dreamt that you was sitting over there by the
bed, and Sid was sitting by the woodbox, and Mary next to him.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, so we did. So we always do. I’m glad your dreams could take even
that much trouble about us.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And I dreamt that Joe Harper’s mother was here.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, she was here! Did you dream any more?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, lots. But it’s so dim, now.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, try to recollect—can’t you?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Somehow it seems to me that the wind—the wind blowed the—the—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Try harder, Tom! The wind did blow something. Come!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Tom pressed his fingers on his forehead an anxious minute, and then
said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I’ve got it now! I’ve got it now! It blowed the candle!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Mercy on us! Go on, Tom—go on!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And it seems to me that you said, ‘Why, I believe that that door—’”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Go _on_, Tom!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Just let me study a moment—just a moment. Oh, yes—you said you believed
the door was open.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“As I’m sitting here, I did! Didn’t I, Mary! Go on!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And then—and then—well I won’t be certain, but it seems like as if you
made Sid go and—and—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well? Well? What did I make him do, Tom? What did I make him do?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You made him—you—Oh, you made him shut it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, for the land’s sake! I never heard the beat of that in all my
days! Don’t tell _me_ there ain’t anything in dreams, any more. Sereny
Harper shall know of this before I’m an hour older. I’d like to see her
get around _this_ with her rubbage ’bout superstition. Go on, Tom!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, it’s all getting just as bright as day, now. Next you said I warn’t
_bad_, only mischeevous and harum-scarum, and not any more responsible
than—than—I think it was a colt, or something.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And so it was! Well, goodness gracious! Go on, Tom!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And then you began to cry.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“So I did. So I did. Not the first time, neither. And then—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then Mrs. Harper she began to cry, and said Joe was just the same, and
she wished she hadn’t whipped him for taking cream when she’d throwed it
out her own self—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom! The sperrit was upon you! You was a prophesying—that’s what you
was doing! Land alive, go on, Tom!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then Sid he said—he said—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I don’t think I said anything,” said Sid.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes you did, Sid,” said Mary.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Shut your heads and let Tom go on! What did he say, Tom?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“He said—I _think_ he said he hoped I was better off where I was gone
to, but if I’d been better sometimes—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“_There_, d’you hear that! It was his very words!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And you shut him up sharp.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I lay I did! There must ’a’ been an angel there. There _was_ an angel
there, somewheres!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And Mrs. Harper told about Joe scaring her with a firecracker, and you
told about Peter and the Pain-killer—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Just as true as I live!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And then there was a whole lot of talk ’bout dragging the river for us,
and ’bout having the funeral Sunday, and then you and old Miss Harper
hugged and cried, and she went.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It happened just so! It happened just so, as sure as I’m a-sitting in
these very tracks. Tom, you couldn’t told it more like if you’d ’a’ seen
it! And then what? Go on, Tom!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Then I thought you prayed for me—and I could see you and hear every
word you said. And you went to bed, and I was so sorry that I took and
wrote on a piece of sycamore bark, ‘We ain’t dead—we are only off being
pirates,’ and put it on the table by the candle; and then you looked
so good, laying there asleep, that I thought I went and leaned over and
kissed you on the lips.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Did you, Tom, _did_ you! I just forgive you everything for that!” And
she seized the boy in a crushing embrace that made him feel like the
guiltiest of villains.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It was very kind, even though it was only a—dream,” Sid soliloquized
just audibly.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Shut up, Sid! A body does just the same in a dream as he’d do if he was
awake. Here’s a big Milum apple I’ve been saving for you, Tom, if you
was ever found again—now go ’long to school. I’m thankful to the good
God and Father of us all I’ve got you back, that’s long-suffering and
merciful to them that believe on Him and keep His word, though goodness
knows I’m unworthy of it, but if only the worthy ones got His blessings
and had His hand to help them over the rough places, there’s few enough
would smile here or ever enter into His rest when the long night comes.
Go ’long Sid, Mary, Tom—take yourselves off—you’ve hendered me long
enough.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The children left for school, and the old lady to call on Mrs. Harper
and vanquish her realism with Tom’s marvellous dream. Sid had better
judgment than to utter the thought that was in his mind as he left the
house. It was this: “Pretty thin—as long a dream as that, without any
mistakes in it!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">What a hero Tom was become, now! He did not go skipping and prancing,
but moved with a dignified swagger as became a pirate who felt that the
public eye was on him. And indeed it was; he tried not to seem to see
the looks or hear the remarks as he passed along, but they were food and
drink to him. Smaller boys than himself flocked at his heels, as proud
to be seen with him, and tolerated by him, as if he had been the drummer
at the head of a procession or the elephant leading a menagerie into
town. Boys of his own size pretended not to know he had been away at
all; but they were consuming with envy, nevertheless. They would have
given anything to have that swarthy sun-tanned skin of his, and his
glittering notoriety; and Tom would not have parted with either for a
circus.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">At school the children made so much of him and of Joe, and delivered
such eloquent admiration from their eyes, that the two heroes were
not long in becoming insufferably “stuck-up.” They began to tell their
adventures to hungry listeners—but they only began; it was not a
thing likely to have an end, with imaginations like theirs to furnish
material. And finally, when they got out their pipes and went serenely
puffing around, the very summit of glory was reached.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Tom decided that he could be independent of Becky Thatcher now. Glory
was sufficient. He would live for glory. Now that he was distinguished,
maybe she would be wanting to “make up.” Well, let her—she should see
that he could be as indifferent as some other people. Presently she
arrived. Tom pretended not to see her. He moved away and joined a group
of boys and girls and began to talk. Soon he observed that she was
tripping gayly back and forth with flushed face and dancing eyes,
pretending to be busy chasing schoolmates, and screaming with laughter
when she made a capture; but he noticed that she always made her
captures in his vicinity, and that she seemed to cast a conscious eye
in his direction at such times, too. It gratified all the vicious vanity
that was in him; and so, instead of winning him, it only “set him up”
 the more and made him the more diligent to avoid betraying that he
knew she was about. Presently she gave over skylarking, and moved
irresolutely about, sighing once or twice and glancing furtively and
wistfully toward Tom. Then she observed that now Tom was talking more
particularly to Amy Lawrence than to any one else. She felt a sharp pang
and grew disturbed and uneasy at once. She tried to go away, but her
feet were treacherous, and carried her to the group instead. She said to
a girl almost at Tom’s elbow—with sham vivacity:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, Mary Austin! you bad girl, why didn’t you come to Sunday-school?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I did come—didn’t you see me?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, no! Did you? Where did you sit?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I was in Miss Peters’ class, where I always go. I saw _you_.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Did you? Why, it’s funny I didn’t see you. I wanted to tell you about
the picnic.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, that’s jolly. Who’s going to give it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“My ma’s going to let me have one.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, goody; I hope she’ll let _me_ come.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, she will. The picnic’s for me. She’ll let anybody come that I
want, and I want you.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“That’s ever so nice. When is it going to be?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“By and by. Maybe about vacation.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, won’t it be fun! You going to have all the girls and boys?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes, every one that’s friends to me—or wants to be”; and she glanced
ever so furtively at Tom, but he talked right along to Amy Lawrence
about the terrible storm on the island, and how the lightning tore the
great sycamore tree “all to flinders” while he was “standing within
three feet of it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, may I come?” said Grace Miller.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And me?” said Sally Rogers.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And me, too?” said Susy Harper. “And Joe?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Yes.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">And so on, with clapping of joyful hands till all the group had begged
for invitations but Tom and Amy. Then Tom turned coolly away, still
talking, and took Amy with him. Becky’s lips trembled and the tears
came to her eyes; she hid these signs with a forced gayety and went on
chattering, but the life had gone out of the picnic, now, and out of
everything else; she got away as soon as she could and hid herself and
had what her sex call “a good cry.” Then she sat moody, with wounded
pride, till the bell rang. She roused up, now, with a vindictive cast
in her eye, and gave her plaited tails a shake and said she knew what
_she’d_ do.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">At recess Tom continued his flirtation with Amy with jubilant
self-satisfaction. And he kept drifting about to find Becky and lacerate
her with the performance. At last he spied her, but there was a sudden
falling of his mercury. She was sitting cosily on a little bench behind
the schoolhouse looking at a picture-book with Alfred Temple—and so
absorbed were they, and their heads so close together over the book,
that they did not seem to be conscious of anything in the world besides.
Jealousy ran red-hot through Tom’s veins. He began to hate himself for
throwing away the chance Becky had offered for a reconciliation. He
called himself a fool, and all the hard names he could think of. He
wanted to cry with vexation. Amy chatted happily along, as they walked,
for her heart was singing, but Tom’s tongue had lost its function. He
did not hear what Amy was saying, and whenever she paused expectantly
he could only stammer an awkward assent, which was as often misplaced
as otherwise. He kept drifting to the rear of the schoolhouse, again and
again, to sear his eyeballs with the hateful spectacle there. He could
not help it. And it maddened him to see, as he thought he saw, that
Becky Thatcher never once suspected that he was even in the land of the
living. But she did see, nevertheless; and she knew she was winning her
fight, too, and was glad to see him suffer as she had suffered.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Amy’s happy prattle became intolerable. Tom hinted at things he had
to attend to; things that must be done; and time was fleeting. But in
vain—the girl chirped on. Tom thought, “Oh, hang her, ain’t I ever going
to get rid of her?” At last he must be attending to those things—and she
said artlessly that she would be “around” when school let out. And he
hastened away, hating her for it.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Any other boy!” Tom thought, grating his teeth. “Any boy in the whole
town but that Saint Louis smarty that thinks he dresses so fine and is
aristocracy! Oh, all right, I licked you the first day you ever saw this
town, mister, and I’ll lick you again! You just wait till I catch you
out! I’ll just take and—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">And he went through the motions of thrashing an imaginary boy—pummelling
the air, and kicking and gouging. “Oh, you do, do you? You holler
’nough, do you? Now, then, let that learn you!” And so the imaginary
flogging was finished to his satisfaction.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Tom fled home at noon. His conscience could not endure any more of Amy’s
grateful happiness, and his jealousy could bear no more of the other
distress. Becky resumed her picture inspections with Alfred, but as the
minutes dragged along and no Tom came to suffer, her triumph began to
cloud and she lost interest; gravity and absentmindedness followed,
and then <span class="vocab-highlight" title="Vocabulary word: melancholy">melancholy</span>; two or three times she pricked up her ear at
a footstep, but it was a false hope; no Tom came. At last she grew
entirely miserable and wished she hadn’t carried it so far. When
poor Alfred, seeing that he was losing her, he did not know how, kept
exclaiming: “Oh, here’s a jolly one! look at this!” she lost patience at
last, and said, “Oh, don’t bother me! I don’t care for them!” and burst
into tears, and got up and walked away.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Alfred dropped alongside and was going to try to comfort her, but she
said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Go away and leave me alone, can’t you! I hate you!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">So the boy halted, wondering what he could have done—for she had said
she would look at pictures all through the nooning—and she walked on,
crying. Then Alfred went musing into the deserted schoolhouse. He was
humiliated and angry. He easily guessed his way to the truth—the girl
had simply made a convenience of him to vent her spite upon Tom Sawyer.
He was far from hating Tom the less when this thought occurred to him.
He wished there was some way to get that boy into trouble without much
risk to himself. Tom’s spelling-book fell under his eye. Here was his
opportunity. He gratefully opened to the lesson for the afternoon and
poured ink upon the page.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Becky, glancing in at a window behind him at the moment, saw the act,
and moved on, without discovering herself. She started homeward, now,
intending to find Tom and tell him; Tom would be thankful and their
troubles would be healed. Before she was half way home, however, she
had changed her mind. The thought of Tom’s treatment of her when she was
talking about her picnic came scorching back and filled her with shame.
She resolved to let him get whipped on the damaged spelling-book’s
account, and to hate him forever, into the bargain.</p>

<script>
window.BR = (() => {

  // ============================================================
  //  CONFIGURATION - Using Firebase Cloud Function backend
  // ============================================================
  const CONFIG = {
    apiEndpoint: 'https://us-central1-bedrockela-96dbd.cloudfunctions.net/billyChat',

    systemPrompt: `You are Billy, a cheerful, enthusiastic goat who is best friends with every student who visits. You are based on the story "The Three Billy Goats Gruff" and you LOVE learning and helping kids figure things out. You are warm, funny, encouraging, and genuinely excited to be here. Think of yourself as that cool older buddy who always makes things less scary and more fun.

Your personality:
- Energetic and upbeat — you are genuinely happy to help and it shows
- Warm and personal — use the student's words back to them, notice what they're working on, cheer them on
- Playful but not silly — you can make a little goat joke or say something like "Trip trap, let's go!" but you're also focused and helpful
- Patient and kind — if a student is frustrated or confused, you calm them down and make them feel like it's totally okay
- A buddy first, a teacher second — you are ON THEIR SIDE

Your one rule about answers:
You never just hand over the direct answer to a homework or assignment question. Not because you're mean — but because you genuinely want them to feel the awesome feeling of figuring it out themselves. You always help them get there by giving hints, asking one good guiding question, or breaking it into a smaller step. You make this feel like an adventure, not a punishment.

For everything else — explaining what a word means, what a concept is, how something works — go ahead and explain it fully and clearly! You are helpful and generous with knowledge.

Keep responses short and punchy: 2–4 sentences. Use simple, fun language. No emojis.

Examples:
- Student: "What's the answer to question 3?" → You: "Oh I love this one — I can't just give it to you, but I promise you already know more than you think! Read the question one more time and tell me: what is it actually asking you to find?"
- Student: "I don't get this at all, I give up." → You: "Hey, no giving up — you've got this, I promise! Let's slow down together. What part feels the most confusing right now? Just that one part."
- Student: "What is a metaphor?" → You: "Great question! A metaphor says one thing IS another thing to paint a picture — like 'the classroom was a zoo.' It doesn't use the words 'like' or 'as,' it just says it straight. Pretty cool, right?"
- Student: "I don't know how to start my paragraph." → You: "Starting is the hardest part — totally normal! Try this: just write one sentence about the main thing you want to say. Don't worry if it's perfect. What's the big idea you want your reader to know?"`
  };

  // ============================================================
  //  MINI DICTIONARY  — kid-friendly definitions
  // ============================================================
  const DICTIONARY = [
    // === FROM THE STORY ===
    { word: "Troll", type: "noun", cat: "story", def: "A made-up creature from fairy tales and folklore. Trolls are usually mean, scary, and not very smart. In stories, they often live under bridges and try to stop travelers from passing.", example: "The troll under the bridge threatened to eat the Billy Goats Gruff!" },
    { word: "Bridge", type: "noun", cat: "story", def: "A structure built over a river, road, or valley so people or animals can cross from one side to the other.", example: "The three goats had to cross the bridge to reach the green grass on the other side." },
    { word: "Gruff", type: "adj", cat: "story", def: "Sounding rough, low, and a little scary — like a growly voice. It can also mean someone who seems unfriendly at first.", example: "The big Billy Goat Gruff had a deep, gruff voice that frightened the troll." },
    { word: "Meadow", type: "noun", cat: "story", def: "An open field covered with grass and wildflowers — a beautiful place for animals to graze and rest.", example: "The goats wanted to cross the bridge so they could eat the sweet green grass in the meadow." },
    { word: "Graze", type: "verb", cat: "story", def: "When an animal eats grass by walking slowly and nibbling it right off the ground.", example: "The goats loved to graze on the hillside where the grass was tall and green." },
    { word: "Cunning", type: "adj", cat: "story", def: "Very clever — especially at tricking others or getting what you want through smart thinking.", example: "The littlest Billy Goat was cunning — he tricked the troll by saying his bigger brother was coming." },
    { word: "Threat", type: "noun", cat: "story", def: "When someone says they will do something bad to you if you don't do what they want. It's a way of trying to scare someone.", example: "The troll made a threat: 'I'm going to eat you up!'" },
    { word: "Deceive", type: "verb", cat: "story", def: "To trick someone into believing something that isn't true.", example: "The small goat deceived the troll by promising a bigger, tastier goat was coming." },
    { word: "Cowardly", type: "adj", cat: "story", def: "Being too scared to do the right thing — running away from problems instead of facing them.", example: "The troll was actually cowardly — when the big goat charged, the troll ran away!" },
    { word: "Brave", type: "adj", cat: "story", def: "Willing to do something scary or hard even when you feel afraid. It doesn't mean you're not scared — it means you do it anyway!", example: "The big Billy Goat Gruff was brave when he charged at the troll to protect his brothers." },
    { word: "Villain", type: "noun", cat: "story", def: "The bad character in a story — the one who causes trouble or tries to stop the hero.", example: "The troll is the villain of The Three Billy Goats Gruff." },
    { word: "Hero", type: "noun", cat: "story", def: "A character who does something brave or good to help others or solve the big problem in the story.", example: "The biggest Billy Goat becomes the hero when he defeats the troll." },
    { word: "Folklore", type: "noun", cat: "story", def: "Old stories, legends, and traditions passed down from grandparents to parents to children over many, many years.", example: "The Three Billy Goats Gruff is a piece of Norwegian folklore — it came from Norway long ago." },
    { word: "Fairy Tale", type: "noun", cat: "story", def: "A made-up story, often with magical creatures, that usually has a clear good side and a bad side — and often a happy ending.", example: "Cinderella, Jack and the Beanstalk, and The Three Billy Goats Gruff are all fairy tales." },
    { word: "Fable", type: "noun", cat: "story", def: "A short story — usually with talking animals — that teaches a lesson called a moral at the end.", example: "The Tortoise and the Hare is a fable. Its moral is: slow and steady wins the race." },
    { word: "Moral", type: "noun", cat: "story", def: "The lesson a story is trying to teach you — the big idea about how to live or act.", example: "The moral of The Three Billy Goats Gruff is that it's smart to work together and think before you act." },
    { word: "Antagonist", type: "noun", cat: "story", def: "The character who works against the main character and causes the main problem in the story. Often called 'the bad guy.'", example: "The troll is the antagonist — he blocks the goats' path and threatens them." },
    { word: "Protagonist", type: "noun", cat: "story", def: "The main character the story follows — the one we usually cheer for.", example: "The three Billy Goats are the protagonists of the story." },
    { word: "Repetition", type: "noun", cat: "story", def: "When something in a story happens again and again — like the same phrase or the same event repeating with small changes. It builds rhythm and excitement!", example: "Each goat crosses the bridge and faces the troll — the same thing happens three times, with the goats getting bigger each time." },
    { word: "Sequence", type: "noun", cat: "story", def: "The order that events happen in a story — first, then, next, finally.", example: "In sequence: small goat crosses, medium goat crosses, big goat crosses and defeats the troll." },
    { word: "Climax", type: "noun", cat: "story", def: "The most exciting moment in a story — the turning point where the big problem finally gets solved (or gets worse).", example: "The climax of the story is when the biggest Billy Goat charges the troll and tosses him into the river." },
    { word: "Resolution", type: "noun", cat: "story", def: "The part of the story after the climax where everything gets wrapped up and we find out how things end.", example: "The resolution is when all three goats finally reach the meadow and live happily ever after." },
    // === ELA ESSENTIALS ===
    { word: "Noun", type: "noun", cat: "ela", def: "A word that names a person, place, thing, or idea — anything you can point to or think about.", example: "Goat, bridge, troll, and courage are all nouns." },
    { word: "Verb", type: "verb", cat: "ela", def: "An action word — it tells what someone or something is doing.", example: "The goats trotted, crossed, and charged — those are all verbs." },
    { word: "Adjective", type: "adj", cat: "ela", def: "A word that describes a noun — it tells you what something looks, feels, sounds, or seems like.", example: "The small goat, the grumpy troll, and the green meadow all use adjectives." },
    { word: "Simile", type: "noun", cat: "ela", def: "A comparison using 'like' or 'as' to help readers picture something more clearly.", example: "The troll's voice was like thunder rumbling under the bridge." },
    { word: "Metaphor", type: "noun", cat: "ela", def: "A comparison that says one thing IS another — without using 'like' or 'as.'", example: "The bridge was a test — each goat had to prove their courage to cross it." },
    { word: "Inference", type: "noun", cat: "ela", def: "Using clues from the story plus what you already know to figure out something the author didn't say directly.", example: "We can infer the troll is not very smart because he keeps getting tricked by the goats." },
    { word: "Character", type: "noun", cat: "ela", def: "A person, animal, or creature in a story. Main characters are the ones the story is mostly about.", example: "The three goats and the troll are all characters in the story." },
    { word: "Setting", type: "noun", cat: "ela", def: "Where and when a story takes place — the time and place that make up the story's world.", example: "The setting is a hillside, a bridge over a rushing river, and a green meadow beyond it." },
    { word: "Theme", type: "noun", cat: "ela", def: "The big lesson or message of the story — the idea the author wants you to take away.", example: "One theme of The Three Billy Goats Gruff is that courage and cleverness can defeat a bully." },
    { word: "Conflict", type: "noun", cat: "ela", def: "The main problem in a story — the thing that creates all the tension and must be solved.", example: "The conflict is that a troll is blocking the bridge and threatening anyone who tries to cross." },
    { word: "Dialogue", type: "noun", cat: "ela", def: "The words that characters say to each other in a story — their conversations.", example: "'Who is that trip-trapping over my bridge?' said the troll. That's dialogue!" },
    { word: "Imagery", type: "noun", cat: "ela", def: "Words that paint a picture in your mind by describing what something looks, sounds, smells, feels, or tastes like.", example: "The rushing cold river below, the splintery old bridge, and the growling troll are all imagery." },
    { word: "Personification", type: "noun", cat: "ela", def: "Giving human feelings or actions to an animal or object.", example: "The river roared angrily beneath the bridge. Rivers can't really be angry — that's personification!" },
    { word: "Plot", type: "noun", cat: "ela", def: "All the events that happen in a story from beginning to end.", example: "The plot: goats want grass, troll blocks the bridge, goats outsmart the troll, goats reach the meadow." },
  ].sort((a, b) => a.word.localeCompare(b.word));

  // ============================================================
  //  STATE
  // ============================================================
  let isOpen = false;
  let isLoading = false;
  let currentTab = 'chat';
  const history = [];

  // Elements
  const launcher   = document.getElementById('br-launcher');
  const btn        = document.getElementById('br-btn');
  const win        = document.getElementById('br-window');
  const tooltip    = document.getElementById('br-tooltip');
  const messages   = document.getElementById('br-messages');
  const typing     = document.getElementById('br-typing');
  const inputEl    = document.getElementById('br-input');
  const sendBtn    = document.getElementById('br-send');
  const panelChat  = document.getElementById('br-panel-chat');
  const panelDict  = document.getElementById('br-panel-dict');
  const dictList   = document.getElementById('br-dict-list');
  const dictSearch = document.getElementById('br-dict-search');
  const dictEmpty  = document.getElementById('br-dict-empty');

  // ---- Init ----
  function init() {
    btn.addEventListener('click', toggle);
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
    });
    renderDict(DICTIONARY);
    // Hide tooltip after 5s
    setTimeout(() => tooltip.classList.add('hidden'), 5000);
  }

  function toggle() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
    tooltip.classList.add('hidden');
    if (isOpen && messages.children.length === 0) {
      addBotMsg("Hey! I'm Billy — your learning buddy! I'm here to help you figure things out and cheer you on. What are you working on today?");
    }
    if (isOpen) setTimeout(() => inputEl.focus(), 350);
  }

  // ---- Tab switching ----
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.br-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    panelChat.style.display = tab === 'chat' ? 'flex' : 'none';
    panelDict.style.display = tab === 'dict' ? 'flex' : 'none';
    if (tab === 'dict') setTimeout(() => dictSearch.focus(), 200);
  }

  // ---- Messages ----
  function addBotMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg bot';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg user';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    typing.classList.toggle('show', v);
    if (v) messages.scrollTop = messages.scrollHeight;
  }

  // ---- Send (calls secure Firebase backend) ----
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('br-suggestions').style.display = 'none';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    setLoading(true);
    try {
      const res = await fetch(CONFIG.apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: CONFIG.systemPrompt,
          messages: history
        })
      });
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        if (errorData.fallback) {
          throw new Error(errorData.fallback);
        }
        throw new Error(`Error ${res.status}`);
      }
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Hmm, I didn't catch that — could you try again?";
      history.push({ role: 'assistant', content: reply });
      setLoading(false);
      addBotMsg(reply);
    } catch(err) {
      setLoading(false);
      addBotMsg(`Whoops, something went wrong — even goats stumble sometimes! Try again in a second. (${err.message})`);
      console.error('Billy error:', err);
    }
  }

  function suggest(el) {
    inputEl.value = el.textContent;
    handleSend();
  }

  // ---- Dictionary ----
  function renderDict(entries) {
    dictList.querySelectorAll('.br-dict-entry').forEach(e => e.remove());
    dictEmpty.style.display = entries.length === 0 ? 'block' : 'none';
    const catLabel = { story: 'Story', ela: 'ELA' };
    entries.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'br-dict-entry';
      el.innerHTML = `
        <div class="br-dict-word" onclick="BR.toggleEntry(this.parentElement)">
          <span class="br-word-label">${entry.word}</span>
          <span class="br-word-cat ${entry.cat}">${catLabel[entry.cat] || entry.cat}</span>
          <span class="br-word-chevron">&#9660;</span>
        </div>
        <div class="br-dict-def">
          <div class="br-def-text">${entry.def}</div>
          ${entry.example ? `<div class="br-def-example">${entry.example}</div>` : ''}
        </div>`;
      dictList.appendChild(el);
    });
  }

  function toggleEntry(el) {
    const wasOpen = el.classList.contains('expanded');
    document.querySelectorAll('.br-dict-entry.expanded').forEach(e => e.classList.remove('expanded'));
    if (!wasOpen) el.classList.add('expanded');
  }

  function filterDict() {
    const q = dictSearch.value.toLowerCase().trim();
    const filtered = q
      ? DICTIONARY.filter(e =>
          e.word.toLowerCase().includes(q) ||
          e.def.toLowerCase().includes(q) ||
          (e.example && e.example.toLowerCase().includes(q)) ||
          (e.type && e.type.toLowerCase().includes(q)) ||
          (e.cat && e.cat.toLowerCase().includes(q))
        )
      : DICTIONARY;
    renderDict(filtered);
  }

  init();

  return { switchTab, suggest, toggleEntry, filterDict };
})();
</script>

</body>
