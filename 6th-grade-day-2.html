                                <p style="margin-bottom: 15px;">In Tom Sawyer, one of the most famous scenes involves Tom turning the chore of whitewashing a fence into an opportunity. But what exactly is whitewashing, and why was it so common in the 1800s?</p><p style="margin-bottom: 15px;">Whitewashing was a method of painting fences, walls, and buildings using a mixture of lime, water, and sometimes salt. The resulting paint was bright white and helped protect wood from weather and insects. It was inexpensive and easy to make, which is why it was so common in rural America.</p><p style="margin-bottom: 15px;">However, whitewashing was labor-intensive and had to be reapplied regularly—usually every year or two. A fence &quot;thirty yards long and nine feet high&quot; (as Aunt Polly describes Tom&#039;s task) would take hours of work. The paint had to be applied evenly, and any missed spots would be obvious.</p><p style="margin-bottom: 15px;">Tom&#039;s brilliant psychological manipulation of his friends reveals his understanding of human nature: people want what seems exclusive or difficult to obtain. By making whitewashing appear to be a privilege rather than a chore, Tom transforms work into play—a lesson that still resonates today.</p>
                            </div>
