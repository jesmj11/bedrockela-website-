                        <div class="lesson-page-card content-page">
                            <h2>📖 Reading: Twenty Thousand Leagues Under the Sea</h2>
                            <h3 style="color: var(--book-color, #305853);">Chapter 1: CHAPTER I. THE INDIAN OCEAN</h3>
                            
                            <div style="padding: 25px; background: #f9f9f9; border-radius: 12px; line-height: 1.8; font-size: 16px; margin-bottom: 25px;" class="reading-passage">
                                <p style="margin-bottom: 20px; line-height: 1.8;">CHAPTER I
THE INDIAN OCEAN


We now come to the second part of our journey under the sea. The first
ended with the moving scene in the coral cemetery which left such a
deep impression on my mind. Thus, in the midst of this great sea,
Captain Nemo’s life was passing, even to his grave, which he had
prepared in one of its deepest abysses. There, not one of the ocean’s
monsters could trouble the last sleep of the crew of the _Nautilus_, of
those friends riveted to each other in death as in life. “Nor any man,
either,” had added the Captain. Still the same fierce, implacable
defiance towards human society!

I could no longer content myself with the theory which satisfied
Conseil.

That worthy fellow persisted in seeing in the Commander of the
_Nautilus_ one of those unknown _savants_ who return mankind contempt
for indifference. For him, he was a misunderstood genius who, tired of
earth’s deceptions, had taken refuge in this inaccessible medium, where
he might follow his instincts freely. To my mind, this explains but one
side of Captain Nemo’s character. Indeed, the mystery of that last
night during which we had been chained in prison, the sleep, and the
precaution so violently taken by the Captain of snatching from my eyes
the glass I had raised to sweep the horizon, the mortal wound of the
man, due to an unaccountable shock of the _Nautilus_, all put me on a
new track. No; Captain Nemo was not satisfied with shunning man. His
formidable apparatus not only suited his instinct of freedom, but
perhaps also the design of some terrible retaliation.

At this moment nothing is clear to me; I catch but a glimpse of light
amidst all the darkness, and I must confine myself to writing as events
shall dictate.

That day, the 24th of January, 1868, at noon, the second officer came
to take the altitude of the sun. I mounted the platform, lit a cigar,
and watched the operation. It seemed to me that the man did not
understand French; for several times I made remarks in a loud voice,
which must have drawn from him some involuntary sign of attention, if
he had understood them; but he remained undisturbed and dumb.

As he was taking observations with the sextant, one of the sailors of
the _Nautilus_ (the strong man who had accompanied us on our first
submarine excursion to the Island of Crespo) came to clean the glasses
of the lantern. I examined the fittings of the apparatus, the strength
of which was increased a hundredfold by lenticular rings, placed
similar to those in a lighthouse, and which projected their brilliance
in a horizontal plane. The electric lamp was combined in such a way as
to give its most powerful light. Indeed, it was produced in vacuo,
which insured both its steadiness and its intensity. This vacuum
economised the graphite points between which the luminous arc was
developed—an important point of economy for Captain Nemo, who could not
easily have replaced them; and under these conditions their waste was
imperceptible. When the _Nautilus_ was ready to continue its submarine
journey, I went down to the saloon. The panel was closed, and the
course marked direct west.

We were furrowing the waters of the Indian Ocean, a vast liquid plain,
with a surface of 1,200,000,000 of acres, and whose waters are so clear
and transparent that any one leaning over them would turn giddy. The
_Nautilus_ usually floated between fifty and a hundred fathoms deep. We
went on so for some days. To any one but myself, who had a great love
for the sea, the hours would have seemed long and monotonous; but the
daily walks on the platform, when I steeped myself in the reviving air
of the ocean, the sight of the rich waters through the windows of the
saloon, the books in the library, the compiling of my memoirs, took up
all my time, and left me not a moment of ennui or weariness.

For some days we saw a great number of aquatic birds, sea-mews or
gulls. Some were cleverly killed and, prepared in a certain way, made
very acceptable water-game. Amongst large-winged birds, carried a long
distance from all lands and resting upon the waves from the fatigue of
their flight, I saw some magnificent albatrosses, uttering discordant
cries like the braying of an ass, and birds belonging to the family of
the long-wings.

As to the fish, they always provoked our admiration when we surprised
the secrets of their aquatic life through the open panels. I saw many
kinds which I never before had a chance of observing.

I shall notice chiefly ostracions peculiar to the Red Sea, the Indian
Ocean, and that part which washes the coast of tropical America. These
fishes, like the tortoise, the armadillo, the sea-hedgehog, and the
Crustacea, are protected by a breastplate which is neither chalky nor
stony, but real bone. In some it takes the form of a solid triangle, in
others of a solid quadrangle. Amongst the triangular I saw some an inch
and a half in length, with wholesome flesh and a delicious flavour;
they are brown at the tail, and yellow at the fins, and I recommend
their introduction into fresh water, to which a certain number of
sea-fish easily accustom themselves. I would also mention quadrangular
ostracions, having on the back four large tubercles; some dotted over
with white spots on the lower part of the body, and which may be tamed
like birds; trigons provided with spikes formed by the lengthening of
their bony shell, and which, from their strange gruntings, are called
“seapigs”; also dromedaries with large humps in the shape of a cone,
whose flesh is very tough and leathery.

I now borrow from the daily notes of Master Conseil. “Certain fish of
the genus petrodon peculiar to those seas, with red backs and white
chests, which are distinguished by three rows of longitudinal
filaments; and some electrical, seven inches long, decked in the
liveliest colours. Then, as specimens of other kinds, some ovoides,
resembling an egg of a dark brown colour, marked with white bands, and
without tails; diodons, real sea-porcupines, furnished with spikes, and
capable of swelling in such a way as to look like cushions bristling
with darts; hippocampi, common to every ocean; some pegasi with
lengthened snouts, which their pectoral fins, being much elongated and
formed in the shape of wings, allow, if not to fly, at least to shoot
into the air; pigeon spatulae, with tails covered with many rings of
shell; macrognathi with long jaws, an excellent fish, nine inches long,
and bright with most agreeable colours; pale-coloured calliomores, with
rugged heads; and plenty of chaetodons, with long and tubular muzzles,
which kill insects by shooting them, as from an air-gun, with a single
drop of water. These we may call the flycatchers of the seas.

“In the eighty-ninth genus of fishes, classed by Lacepede, belonging to
the second lower class of bony, characterised by opercules and
bronchial membranes, I remarked the scorpaena, the head of which is
furnished with spikes, and which has but one dorsal fin; these
creatures are covered, or not, with little shells, according to the
sub-class to which they belong. The second sub-class gives us specimens
of didactyles fourteen or fifteen inches in length, with yellow rays,
and heads of a most fantastic appearance. As to the first sub-class, it
gives several specimens of that singular looking fish appropriately
called a ‘seafrog,’ with large head, sometimes pierced with holes,
sometimes swollen with protuberances, bristling with spikes, and
covered with tubercles; it has irregular and hideous horns; its body
and tail are covered with callosities; its sting makes a dangerous
wound; it is both repugnant and horrible to look at.”

From the 21st to the 23rd of January the _Nautilus_ went at the rate of
two hundred and fifty leagues in twenty-four hours, being five hundred
and forty miles, or twenty-two miles an hour. If we recognised so many
different varieties of fish, it was because, attracted by the electric
light, they tried to follow us; the greater part, however, were soon
distanced by our speed, though some kept their place in the waters of
the _Nautilus_ for a time. The morning of the 24th, in 12° 5′ S. lat.,
and 94° 33′ long., we observed Keeling Island, a coral formation,
planted with magnificent cocos, and which had been visited by Mr.
Darwin and Captain Fitzroy. The _Nautilus_ skirted the shores of this
desert island for a little distance. Its nets brought up numerous
specimens of polypi and curious shells of mollusca. Some precious
productions of the species of delphinulae enriched the treasures of
Captain Nemo, to which I added an astraea punctifera, a kind of
parasite polypus often found fixed to a shell.

Soon Keeling Island disappeared from the horizon, and our course was
directed to the north-west in the direction of the Indian Peninsula.

From Keeling Island our course was slower and more variable, often
taking us into great depths. Several times they made use of the
inclined planes, which certain internal levers placed obliquely to the
waterline. In that way we went about two miles, but without ever
obtaining the greatest depths of the Indian Sea, which soundings of
seven thousand fathoms have never reached. As to the temperature of the
lower strata, the thermometer invariably indicated 4° above zero. I
only observed that in the upper regions the water was always colder in
the high levels than at the surface of the sea.

On the 25th of January the ocean was entirely deserted; the _Nautilus_
passed the day on the surface, beating the waves with its powerful
screw and making them rebound to a great height. Who under such
circumstances would not have taken it for a gigantic cetacean? Three
parts of this day I spent on the platform. I watched the sea. Nothing
on the horizon, till about four o’clock a steamer running west on our
counter. Her masts were visible for an instant, but she could not see
the _Nautilus_, being too low in the water. I fancied this steamboat
belonged to the P. O. Company, which runs from Ceylon to Sydney,
touching at King George’s Point and Melbourne.

At five o’clock in the evening, before that fleeting twilight which
binds night to day in tropical zones, Conseil and I were astonished by
a curious spectacle.

It was a shoal of argonauts travelling along on the surface of the
ocean. We could count several hundreds. They belonged to the tubercle
kind which are peculiar to the Indian seas.

These graceful molluscs moved backwards by means of their locomotive
tube, through which they propelled the water already drawn in. Of their
eight tentacles, six were elongated, and stretched out floating on the
water, whilst the other two, rolled up flat, were spread to the wing
like a light sail. I saw their spiral-shaped and fluted shells, which
Cuvier justly compares to an elegant skiff. A boat indeed! It bears the
creature which secretes it without its adhering to it.

For nearly an hour the _Nautilus_ floated in the midst of this shoal of
molluscs. Then I know not what sudden fright they took. But as if at a
signal every sail was furled, the arms folded, the body drawn in, the
shells turned over, changing their centre of gravity, and the whole
fleet disappeared under the waves. Never did the ships of a squadron
manœuvre with more unity.

At that moment night fell suddenly, and the reeds, scarcely raised by
the breeze, lay peaceably under the sides of the _Nautilus_.

The next day, 26th of January, we cut the equator at the eighty-second
meridian and entered the northern hemisphere. During the day a
formidable troop of sharks accompanied us, terrible creatures, which
multiply in these seas and make them very dangerous. They were
“cestracio philippi” sharks, with brown backs and whitish bellies,
armed with eleven rows of teeth—eyed sharks—their throat being marked
with a large black spot surrounded with white like an eye. There were
also some Isabella sharks, with rounded snouts marked with dark spots.
These powerful creatures often hurled themselves at the windows of the
saloon with such violence as to make us feel very insecure. At such
times Ned Land was no longer master of himself. He wanted to go to the
surface and harpoon the monsters, particularly certain smooth-hound
sharks, whose mouth is studded with teeth like a mosaic; and large
tiger-sharks nearly six yards long, the last named of which seemed to
excite him more particularly. But the _Nautilus_, accelerating her
speed, easily left the most rapid of them behind.

The 27th of January, at the entrance of the vast Bay of Bengal, we met
repeatedly a forbidding spectacle, dead bodies floating on the surface
of the water. They were the dead of the Indian villages, carried by the
Ganges to the level of the sea, and which the vultures, the only
undertakers of the country, had not been able to devour. But the sharks
did not fail to help them at their funeral work.

About seven o’clock in the evening, the _Nautilus_, half-immersed, was
sailing in a sea of milk. At first sight the ocean seemed lactified.
Was it the effect of the lunar rays? No; for the moon, scarcely two
days old, was still lying hidden under the horizon in the rays of the
sun. The whole sky, though lit by the sidereal rays, seemed black by
contrast with the whiteness of the waters.

Conseil could not believe his eyes, and questioned me as to the cause
of this strange phenomenon. Happily I was able to answer him.

“It is called a milk sea,” I explained. “A large extent of white
wavelets often to be seen on the coasts of Amboyna, and in these parts
of the sea.”

“But, sir,” said Conseil, “can you tell me what causes such an effect?
for I suppose the water is not really turned into milk.”

“No, my boy; and the whiteness which surprises you is caused only by
the presence of myriads of infusoria, a sort of luminous little worm,
gelatinous and without colour, of the thickness of a hair, and whose
length is not more than seven-thousandths of an inch. These insects
adhere to one another sometimes for several leagues.”

“Several leagues!” exclaimed Conseil.

“Yes, my boy; and you need not try to compute the number of these
infusoria. You will not be able, for, if I am not mistaken, ships have
floated on these milk seas for more than forty miles.”

Towards midnight the sea suddenly resumed its usual colour; but behind
us, even to the limits of the horizon, the sky reflected the whitened
waves, and for a long time seemed impregnated with the vague
glimmerings of an aurora borealis.</p>

<script>
window.BR = (() => {

  // ============================================================
  //  CONFIGURATION - Using Firebase Cloud Function backend
  // ============================================================
  const CONFIG = {
    apiEndpoint: 'https://us-central1-bedrockela-96dbd.cloudfunctions.net/billyChat',

    systemPrompt: `You are Billy, a cheerful, enthusiastic goat who is best friends with every student who visits. You are based on the story "The Three Billy Goats Gruff" and you LOVE learning and helping kids figure things out. You are warm, funny, encouraging, and genuinely excited to be here. Think of yourself as that cool older buddy who always makes things less scary and more fun.

Your personality:
- Energetic and upbeat — you are genuinely happy to help and it shows
- Warm and personal — use the student's words back to them, notice what they're working on, cheer them on
- Playful but not silly — you can make a little goat joke or say something like "Trip trap, let's go!" but you're also focused and helpful
- Patient and kind — if a student is frustrated or confused, you calm them down and make them feel like it's totally okay
- A buddy first, a teacher second — you are ON THEIR SIDE

Your one rule about answers:
You never just hand over the direct answer to a homework or assignment question. Not because you're mean — but because you genuinely want them to feel the awesome feeling of figuring it out themselves. You always help them get there by giving hints, asking one good guiding question, or breaking it into a smaller step. You make this feel like an adventure, not a punishment.

For everything else — explaining what a word means, what a concept is, how something works — go ahead and explain it fully and clearly! You are helpful and generous with knowledge.

Keep responses short and punchy: 2–4 sentences. Use simple, fun language. No emojis.

Examples:
- Student: "What's the answer to question 3?" → You: "Oh I love this one — I can't just give it to you, but I promise you already know more than you think! Read the question one more time and tell me: what is it actually asking you to find?"
- Student: "I don't get this at all, I give up." → You: "Hey, no giving up — you've got this, I promise! Let's slow down together. What part feels the most confusing right now? Just that one part."
- Student: "What is a metaphor?" → You: "Great question! A metaphor says one thing IS another thing to paint a picture — like 'the classroom was a zoo.' It doesn't use the words 'like' or 'as,' it just says it straight. Pretty cool, right?"
- Student: "I don't know how to start my paragraph." → You: "Starting is the hardest part — totally normal! Try this: just write one sentence about the main thing you want to say. Don't worry if it's perfect. What's the big idea you want your reader to know?"`
  };

  // ============================================================
  //  MINI DICTIONARY  — kid-friendly definitions
  // ============================================================
  const DICTIONARY = [
    // === FROM THE STORY ===
    { word: "Troll", type: "noun", cat: "story", def: "A made-up creature from fairy tales and folklore. Trolls are usually mean, scary, and not very smart. In stories, they often live under bridges and try to stop travelers from passing.", example: "The troll under the bridge threatened to eat the Billy Goats Gruff!" },
    { word: "Bridge", type: "noun", cat: "story", def: "A structure built over a river, road, or valley so people or animals can cross from one side to the other.", example: "The three goats had to cross the bridge to reach the green grass on the other side." },
    { word: "Gruff", type: "adj", cat: "story", def: "Sounding rough, low, and a little scary — like a growly voice. It can also mean someone who seems unfriendly at first.", example: "The big Billy Goat Gruff had a deep, gruff voice that frightened the troll." },
    { word: "Meadow", type: "noun", cat: "story", def: "An open field covered with grass and wildflowers — a beautiful place for animals to graze and rest.", example: "The goats wanted to cross the bridge so they could eat the sweet green grass in the meadow." },
    { word: "Graze", type: "verb", cat: "story", def: "When an animal eats grass by walking slowly and nibbling it right off the ground.", example: "The goats loved to graze on the hillside where the grass was tall and green." },
    { word: "Cunning", type: "adj", cat: "story", def: "Very clever — especially at tricking others or getting what you want through smart thinking.", example: "The littlest Billy Goat was cunning — he tricked the troll by saying his bigger brother was coming." },
    { word: "Threat", type: "noun", cat: "story", def: "When someone says they will do something bad to you if you don't do what they want. It's a way of trying to scare someone.", example: "The troll made a threat: 'I'm going to eat you up!'" },
    { word: "Deceive", type: "verb", cat: "story", def: "To trick someone into believing something that isn't true.", example: "The small goat deceived the troll by promising a bigger, tastier goat was coming." },
    { word: "Cowardly", type: "adj", cat: "story", def: "Being too scared to do the right thing — running away from problems instead of facing them.", example: "The troll was actually cowardly — when the big goat charged, the troll ran away!" },
    { word: "Brave", type: "adj", cat: "story", def: "Willing to do something scary or hard even when you feel afraid. It doesn't mean you're not scared — it means you do it anyway!", example: "The big Billy Goat Gruff was brave when he charged at the troll to protect his brothers." },
    { word: "Villain", type: "noun", cat: "story", def: "The bad character in a story — the one who causes trouble or tries to stop the hero.", example: "The troll is the villain of The Three Billy Goats Gruff." },
    { word: "Hero", type: "noun", cat: "story", def: "A character who does something brave or good to help others or solve the big problem in the story.", example: "The biggest Billy Goat becomes the hero when he defeats the troll." },
    { word: "Folklore", type: "noun", cat: "story", def: "Old stories, legends, and traditions passed down from grandparents to parents to children over many, many years.", example: "The Three Billy Goats Gruff is a piece of Norwegian folklore — it came from Norway long ago." },
    { word: "Fairy Tale", type: "noun", cat: "story", def: "A made-up story, often with magical creatures, that usually has a clear good side and a bad side — and often a happy ending.", example: "Cinderella, Jack and the Beanstalk, and The Three Billy Goats Gruff are all fairy tales." },
    { word: "Fable", type: "noun", cat: "story", def: "A short story — usually with talking animals — that teaches a lesson called a moral at the end.", example: "The Tortoise and the Hare is a fable. Its moral is: slow and steady wins the race." },
    { word: "Moral", type: "noun", cat: "story", def: "The lesson a story is trying to teach you — the big idea about how to live or act.", example: "The moral of The Three Billy Goats Gruff is that it's smart to work together and think before you act." },
    { word: "Antagonist", type: "noun", cat: "story", def: "The character who works against the main character and causes the main problem in the story. Often called 'the bad guy.'", example: "The troll is the antagonist — he blocks the goats' path and threatens them." },
    { word: "Protagonist", type: "noun", cat: "story", def: "The main character the story follows — the one we usually cheer for.", example: "The three Billy Goats are the protagonists of the story." },
    { word: "Repetition", type: "noun", cat: "story", def: "When something in a story happens again and again — like the same phrase or the same event repeating with small changes. It builds rhythm and excitement!", example: "Each goat crosses the bridge and faces the troll — the same thing happens three times, with the goats getting bigger each time." },
    { word: "Sequence", type: "noun", cat: "story", def: "The order that events happen in a story — first, then, next, finally.", example: "In sequence: small goat crosses, medium goat crosses, big goat crosses and defeats the troll." },
    { word: "Climax", type: "noun", cat: "story", def: "The most exciting moment in a story — the turning point where the big problem finally gets solved (or gets worse).", example: "The climax of the story is when the biggest Billy Goat charges the troll and tosses him into the river." },
    { word: "Resolution", type: "noun", cat: "story", def: "The part of the story after the climax where everything gets wrapped up and we find out how things end.", example: "The resolution is when all three goats finally reach the meadow and live happily ever after." },
    // === ELA ESSENTIALS ===
    { word: "Noun", type: "noun", cat: "ela", def: "A word that names a person, place, thing, or idea — anything you can point to or think about.", example: "Goat, bridge, troll, and courage are all nouns." },
    { word: "Verb", type: "verb", cat: "ela", def: "An action word — it tells what someone or something is doing.", example: "The goats trotted, crossed, and charged — those are all verbs." },
    { word: "Adjective", type: "adj", cat: "ela", def: "A word that describes a noun — it tells you what something looks, feels, sounds, or seems like.", example: "The small goat, the grumpy troll, and the green meadow all use adjectives." },
    { word: "Simile", type: "noun", cat: "ela", def: "A comparison using 'like' or 'as' to help readers picture something more clearly.", example: "The troll's voice was like thunder rumbling under the bridge." },
    { word: "Metaphor", type: "noun", cat: "ela", def: "A comparison that says one thing IS another — without using 'like' or 'as.'", example: "The bridge was a test — each goat had to prove their courage to cross it." },
    { word: "Inference", type: "noun", cat: "ela", def: "Using clues from the story plus what you already know to figure out something the author didn't say directly.", example: "We can infer the troll is not very smart because he keeps getting tricked by the goats." },
    { word: "Character", type: "noun", cat: "ela", def: "A person, animal, or creature in a story. Main characters are the ones the story is mostly about.", example: "The three goats and the troll are all characters in the story." },
    { word: "Setting", type: "noun", cat: "ela", def: "Where and when a story takes place — the time and place that make up the story's world.", example: "The setting is a hillside, a bridge over a rushing river, and a green meadow beyond it." },
    { word: "Theme", type: "noun", cat: "ela", def: "The big lesson or message of the story — the idea the author wants you to take away.", example: "One theme of The Three Billy Goats Gruff is that courage and cleverness can defeat a bully." },
    { word: "Conflict", type: "noun", cat: "ela", def: "The main problem in a story — the thing that creates all the tension and must be solved.", example: "The conflict is that a troll is blocking the bridge and threatening anyone who tries to cross." },
    { word: "Dialogue", type: "noun", cat: "ela", def: "The words that characters say to each other in a story — their conversations.", example: "'Who is that trip-trapping over my bridge?' said the troll. That's dialogue!" },
    { word: "Imagery", type: "noun", cat: "ela", def: "Words that paint a picture in your mind by describing what something looks, sounds, smells, feels, or tastes like.", example: "The rushing cold river below, the splintery old bridge, and the growling troll are all imagery." },
    { word: "Personification", type: "noun", cat: "ela", def: "Giving human feelings or actions to an animal or object.", example: "The river roared angrily beneath the bridge. Rivers can't really be angry — that's personification!" },
    { word: "Plot", type: "noun", cat: "ela", def: "All the events that happen in a story from beginning to end.", example: "The plot: goats want grass, troll blocks the bridge, goats outsmart the troll, goats reach the meadow." },
  ].sort((a, b) => a.word.localeCompare(b.word));

  // ============================================================
  //  STATE
  // ============================================================
  let isOpen = false;
  let isLoading = false;
  let currentTab = 'chat';
  const history = [];

  // Elements
  const launcher   = document.getElementById('br-launcher');
  const btn        = document.getElementById('br-btn');
  const win        = document.getElementById('br-window');
  const tooltip    = document.getElementById('br-tooltip');
  const messages   = document.getElementById('br-messages');
  const typing     = document.getElementById('br-typing');
  const inputEl    = document.getElementById('br-input');
  const sendBtn    = document.getElementById('br-send');
  const panelChat  = document.getElementById('br-panel-chat');
  const panelDict  = document.getElementById('br-panel-dict');
  const dictList   = document.getElementById('br-dict-list');
  const dictSearch = document.getElementById('br-dict-search');
  const dictEmpty  = document.getElementById('br-dict-empty');

  // ---- Init ----
  function init() {
    btn.addEventListener('click', toggle);
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
    });
    renderDict(DICTIONARY);
    // Hide tooltip after 5s
    setTimeout(() => tooltip.classList.add('hidden'), 5000);
  }

  function toggle() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
    tooltip.classList.add('hidden');
    if (isOpen && messages.children.length === 0) {
      addBotMsg("Hey! I'm Billy — your learning buddy! I'm here to help you figure things out and cheer you on. What are you working on today?");
    }
    if (isOpen) setTimeout(() => inputEl.focus(), 350);
  }

  // ---- Tab switching ----
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.br-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    panelChat.style.display = tab === 'chat' ? 'flex' : 'none';
    panelDict.style.display = tab === 'dict' ? 'flex' : 'none';
    if (tab === 'dict') setTimeout(() => dictSearch.focus(), 200);
  }

  // ---- Messages ----
  function addBotMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg bot';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg user';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    typing.classList.toggle('show', v);
    if (v) messages.scrollTop = messages.scrollHeight;
  }

  // ---- Send (calls secure Firebase backend) ----
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('br-suggestions').style.display = 'none';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    setLoading(true);
    try {
      const res = await fetch(CONFIG.apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: CONFIG.systemPrompt,
          messages: history
        })
      });
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        if (errorData.fallback) {
          throw new Error(errorData.fallback);
        }
        throw new Error(`Error ${res.status}`);
      }
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Hmm, I didn't catch that — could you try again?";
      history.push({ role: 'assistant', content: reply });
      setLoading(false);
      addBotMsg(reply);
    } catch(err) {
      setLoading(false);
      addBotMsg(`Whoops, something went wrong — even goats stumble sometimes! Try again in a second. (${err.message})`);
      console.error('Billy error:', err);
    }
  }

  function suggest(el) {
    inputEl.value = el.textContent;
    handleSend();
  }

  // ---- Dictionary ----
  function renderDict(entries) {
    dictList.querySelectorAll('.br-dict-entry').forEach(e => e.remove());
    dictEmpty.style.display = entries.length === 0 ? 'block' : 'none';
    const catLabel = { story: 'Story', ela: 'ELA' };
    entries.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'br-dict-entry';
      el.innerHTML = `
        <div class="br-dict-word" onclick="BR.toggleEntry(this.parentElement)">
          <span class="br-word-label">${entry.word}</span>
          <span class="br-word-cat ${entry.cat}">${catLabel[entry.cat] || entry.cat}</span>
          <span class="br-word-chevron">&#9660;</span>
        </div>
        <div class="br-dict-def">
          <div class="br-def-text">${entry.def}</div>
          ${entry.example ? `<div class="br-def-example">${entry.example}</div>` : ''}
        </div>`;
      dictList.appendChild(el);
    });
  }

  function toggleEntry(el) {
    const wasOpen = el.classList.contains('expanded');
    document.querySelectorAll('.br-dict-entry.expanded').forEach(e => e.classList.remove('expanded'));
    if (!wasOpen) el.classList.add('expanded');
  }

  function filterDict() {
    const q = dictSearch.value.toLowerCase().trim();
    const filtered = q
      ? DICTIONARY.filter(e =>
          e.word.toLowerCase().includes(q) ||
          e.def.toLowerCase().includes(q) ||
          (e.example && e.example.toLowerCase().includes(q)) ||
          (e.type && e.type.toLowerCase().includes(q)) ||
          (e.cat && e.cat.toLowerCase().includes(q))
        )
      : DICTIONARY;
    renderDict(filtered);
  }

  init();

  return { switchTab, suggest, toggleEntry, filterDict };
})();
</script>

</body>
</html>
