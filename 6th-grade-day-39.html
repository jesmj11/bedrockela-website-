                        <div class="lesson-page-card content-page">
                            <h2>📖 Reading: Twenty Thousand Leagues Under the Sea</h2>
                            <h3 style="color: var(--book-color, #305853);">Chapter 21: CHAPTER XXI. A HECATOMB</h3>
                            
                            <div style="padding: 25px; background: #f9f9f9; border-radius: 12px; line-height: 1.8; font-size: 16px; margin-bottom: 25px;" class="reading-passage">
                                <p style="margin-bottom: 20px; line-height: 1.8;">CHAPTER XXI
A HECATOMB


The way of describing this unlooked-for scene, the history of the
patriot ship, told at first so coldly, and the emotion with which this
strange man pronounced the last words, the name of the Avenger, the
significance of which could not escape me, all impressed itself deeply
on my mind. My eyes did not leave the Captain, who, with his hand
stretched out to sea, was watching with a glowing eye the glorious
wreck. Perhaps I was never to know who he was, from whence he came, or
where he was going to, but I saw the man move, and apart from the
_savant_. It was no common misanthropy which had shut Captain Nemo and
his companions within the _Nautilus_, but a hatred, either monstrous or
sublime, which time could never weaken. Did this hatred still seek for
vengeance? The future would soon teach me that. But the _Nautilus_ was
rising slowly to the surface of the sea, and the form of the Avenger
disappeared by degrees from my sight. Soon a slight rolling told me
that we were in the open air. At that moment a dull boom was heard. I
looked at the Captain. He did not move.

“Captain?” said I.

He did not answer. I left him and mounted the platform. Conseil and the
Canadian were already there.

“Where did that sound come from?” I asked.

“It was a gunshot,” replied Ned Land.

I looked in the direction of the vessel I had already seen. It was
nearing the _Nautilus_, and we could see that it was putting on steam.
It was within six miles of us.

“What is that ship, Ned?”

“By its rigging, and the height of its lower masts,” said the Canadian,
“I bet she is a ship-of-war. May it reach us; and, if necessary, sink
this cursed _Nautilus_.”

“Friend Ned,” replied Conseil, “what harm can it do to the _Nautilus?_
Can it attack it beneath the waves? Can its cannonade us at the bottom
of the sea?”

“Tell me, Ned,” said I, “can you recognise what country she belongs
to?”

The Canadian knitted his eyebrows, dropped his eyelids, and screwed up
the corners of his eyes, and for a few moments fixed a piercing look
upon the vessel.

“No, sir,” he replied; “I cannot tell what nation she belongs to, for
she shows no colours. But I can declare she is a man-of-war, for a long
pennant flutters from her main mast.”

For a quarter of an hour we watched the ship which was steaming towards
us. I could not, however, believe that she could see the _Nautilus_
from that distance; and still less that she could know what this
submarine engine was. Soon the Canadian informed me that she was a
large, armoured, two-decker ram. A thick black smoke was pouring from
her two funnels. Her closely-furled sails were stopped to her yards.
She hoisted no flag at her mizzen-peak. The distance prevented us from
distinguishing the colours of her pennant, which floated like a thin
ribbon. She advanced rapidly. If Captain Nemo allowed her to approach,
there was a chance of salvation for us.

“Sir,” said Ned Land, “if that vessel passes within a mile of us I
shall throw myself into the sea, and I should advise you to do the
same.”

I did not reply to the Canadian’s suggestion, but continued watching
the ship. Whether English, French, American, or Russian, she would be
sure to take us in if we could only reach her. Presently a white smoke
burst from the fore part of the vessel; some seconds after, the water,
agitated by the fall of a heavy body, splashed the stern of the
_Nautilus_, and shortly afterwards a loud explosion struck my ear.

“What! they are firing at us!” I exclaimed.

“So please you, sir,” said Ned, “they have recognised the unicorn, and
they are firing at us.”

“But,” I exclaimed, “surely they can see that there are men in the
case?”

“It is, perhaps, because of that,” replied Ned Land, looking at me.

A whole flood of light burst upon my mind. Doubtless they knew now how
to believe the stories of the pretended monster. No doubt, on board the
_Abraham Lincoln_, when the Canadian struck it with the harpoon,
Commander Farragut had recognised in the supposed narwhal a submarine
vessel, more dangerous than a supernatural cetacean. Yes, it must have
been so; and on every sea they were now seeking this engine of
destruction. Terrible indeed! if, as we supposed, Captain Nemo employed
the _Nautilus_ in works of vengeance. On the night when we were
imprisoned in that cell, in the midst of the Indian Ocean, had he not
attacked some vessel? The man buried in the coral cemetery, had he not
been a victim to the shock caused by the _Nautilus?_ Yes, I repeat it,
it must be so. One part of the mysterious existence of Captain Nemo had
been unveiled; and, if his identity had not been recognised, at least,
the nations united against him were no longer hunting a chimerical
creature, but a man who had vowed a deadly hatred against them. All the
formidable past rose before me. Instead of meeting friends on board the
approaching ship, we could only expect pitiless enemies. But the shot
rattled about us. Some of them struck the sea and ricochetted, losing
themselves in the distance. But none touched the _Nautilus_. The vessel
was not more than three miles from us. In spite of the serious
cannonade, Captain Nemo did not appear on the platform; but, if one of
the conical projectiles had struck the shell of the _Nautilus_, it
would have been fatal. The Canadian then said, “Sir, we must do all we
can to get out of this dilemma. Let us signal them. They will then,
perhaps, understand that we are honest folks.”

Ned Land took his handkerchief to wave in the air; but he had scarcely
displayed it, when he was struck down by an iron hand, and fell, in
spite of his great strength, upon the deck.

“Fool!” exclaimed the Captain, “do you wish to be pierced by the spur
of the _Nautilus_ before it is hurled at this vessel?”

Captain Nemo was terrible to hear; he was still more terrible to see.
His face was deadly pale, with a spasm at his heart. For an instant it
must have ceased to beat. His pupils were fearfully contracted. He did
not speak, he roared, as, with his body thrown forward, he wrung the
Canadian’s shoulders. Then, leaving him, and turning to the ship of
war, whose shot was still raining around him, he exclaimed, with a
powerful voice, “Ah, ship of an accursed nation, you know who I am! I
do not want your colours to know you by! Look! and I will show you
mine!”

And on the fore part of the platform Captain Nemo unfurled a black
flag, similar to the one he had placed at the South Pole. At that
moment a shot struck the shell of the _Nautilus_ obliquely, without
piercing it; and, rebounding near the Captain, was lost in the sea. He
shrugged his shoulders; and, addressing me, said shortly, “Go down, you
and your companions, go down!”

“Sir,” I cried, “are you going to attack this vessel?”

“Sir, I am going to sink it.”

“You will not do that?”

“I shall do it,” he replied coldly. “And I advise you not to judge me,
sir. Fate has shown you what you ought not to have seen. The attack has
begun; go down.”

“What is this vessel?”

“You do not know? Very well! so much the better! Its nationality to
you, at least, will be a secret. Go down!”

We could but obey. About fifteen of the sailors surrounded the Captain,
looking with implacable hatred at the vessel nearing them. One could
feel that the same desire of vengeance animated every soul. I went down
at the moment another projectile struck the _Nautilus_, and I heard the
Captain exclaim:

“Strike, mad vessel! Shower your useless shot! And then, you will not
escape the spur of the _Nautilus_. But it is not here that you shall
perish! I would not have your ruins mingle with those of the Avenger!”

I reached my room. The Captain and his second had remained on the
platform. The screw was set in motion, and the _Nautilus_, moving with
speed, was soon beyond the reach of the ship’s guns. But the pursuit
continued, and Captain Nemo contented himself with keeping his
distance.

About four in the afternoon, being no longer able to contain my
impatience, I went to the central staircase. The panel was open, and I
ventured on to the platform. The Captain was still walking up and down
with an agitated step. He was looking at the ship, which was five or
six miles to leeward.

He was going round it like a wild beast, and, drawing it eastward, he
allowed them to pursue. But he did not attack. Perhaps he still
hesitated? I wished to mediate once more. But I had scarcely spoken,
when Captain Nemo imposed silence, saying:

“I am the law, and I am the judge! I am the oppressed, and there is the
oppressor! Through him I have lost all that I loved, cherished, and
venerated—country, wife, children, father, and mother. I saw all
perish! All that I hate is there! Say no more!”

I cast a last look at the man-of-war, which was putting on steam, and
rejoined Ned and Conseil.

“We will fly!” I exclaimed.

“Good!” said Ned. “What is this vessel?”

“I do not know; but, whatever it is, it will be sunk before night. In
any case, it is better to perish with it, than be made accomplices in a
retaliation the justice of which we cannot judge.”

“That is my opinion too,” said Ned Land, coolly. “Let us wait for
night.”

Night arrived. Deep silence reigned on board. The compass showed that
the _Nautilus_ had not altered its course. It was on the surface,
rolling slightly. My companions and I resolved to fly when the vessel
should be near enough either to hear us or to see us; for the moon,
which would be full in two or three days, shone brightly. Once on board
the ship, if we could not prevent the blow which threatened it, we
could, at least we would, do all that circumstances would allow.
Several times I thought the _Nautilus_ was preparing for attack; but
Captain Nemo contented himself with allowing his adversary to approach,
and then fled once more before it.

Part of the night passed without any incident. We watched the
opportunity for action. We spoke little, for we were too much moved.
Ned Land would have thrown himself into the sea, but I forced him to
wait. According to my idea, the _Nautilus_ would attack the ship at her
waterline, and then it would not only be possible, but easy to fly.

At three in the morning, full of uneasiness, I mounted the platform.
Captain Nemo had not left it. He was standing at the fore part near his
flag, which a slight breeze displayed above his head. He did not take
his eyes from the vessel. The intensity of his look seemed to attract,
and fascinate, and draw it onward more surely than if he had been
towing it. The moon was then passing the meridian. Jupiter was rising
in the east. Amid this peaceful scene of nature, sky and ocean rivalled
each other in tranquillity, the sea offering to the orbs of night the
finest mirror they could ever have in which to reflect their image. As
I thought of the deep calm of these elements, compared with all those
passions brooding imperceptibly within the _Nautilus_, I shuddered.

The vessel was within two miles of us. It was ever nearing that
phosphorescent light which showed the presence of the _Nautilus_. I
could see its green and red lights, and its white lantern hanging from
the large foremast. An indistinct vibration quivered through its
rigging, showing that the furnaces were heated to the uttermost.
Sheaves of sparks and red ashes flew from the funnels, shining in the
atmosphere like stars.

I remained thus until six in the morning, without Captain Nemo noticing
me. The ship stood about a mile and a half from us, and with the first
dawn of day the firing began afresh. The moment could not be far off
when, the _Nautilus_ attacking its adversary, my companions and myself
should for ever leave this man. I was preparing to go down to remind
them, when the second mounted the platform, accompanied by several
sailors. Captain Nemo either did not or would not see them. Some steps
were taken which might be called the signal for action. They were very
simple. The iron balustrade around the platform was lowered, and the
lantern and pilot cages were pushed within the shell until they were
flush with the deck. The long surface of the steel cigar no longer
offered a single point to check its manœuvres. I returned to the
saloon. The _Nautilus_ still floated; some streaks of light were
filtering through the liquid beds. With the undulations of the waves
the windows were brightened by the red streaks of the rising sun, and
this dreadful day of the 2nd of June had dawned.

At five o’clock, the log showed that the speed of the _Nautilus_ was
slackening, and I knew that it was allowing them to draw nearer.
Besides, the reports were heard more distinctly, and the projectiles,
labouring through the ambient water, were extinguished with a strange
hissing noise.

“My friends,” said I, “the moment is come. One grasp of the hand, and
may God protect us!”

Ned Land was resolute, Conseil calm, myself so nervous that I knew not
how to contain myself. We all passed into the library; but the moment I
pushed the door opening on to the central staircase, I heard the upper
panel close sharply. The Canadian rushed on to the stairs, but I
stopped him. A well-known hissing noise told me that the water was
running into the reservoirs, and in a few minutes the _Nautilus_ was
some yards beneath the surface of the waves. I understood the manœuvre.
It was too late to act. The _Nautilus_ did not wish to strike at the
impenetrable cuirass, but below the water-line, where the metallic
covering no longer protected it.

We were again imprisoned, unwilling witnesses of the dreadful drama
that was preparing. We had scarcely time to reflect; taking refuge in
my room, we looked at each other without speaking. A deep stupor had
taken hold of my mind: thought seemed to stand still. I was in that
painful state of expectation preceding a dreadful report. I waited, I
listened, every sense was merged in that of hearing! The speed of the
_Nautilus_ was accelerated. It was preparing to rush. The whole ship
trembled. Suddenly I screamed. I felt the shock, but comparatively
light. I felt the penetrating power of the steel spur. I heard
rattlings and scrapings. But the _Nautilus_, carried along by its
propelling power, passed through the mass of the vessel like a needle
through sailcloth!

I could stand it no longer. Mad, out of my mind, I rushed from my room
into the saloon. Captain Nemo was there, mute, gloomy, implacable; he
was looking through the port panel. A large mass cast a shadow on the
water; and, that it might lose nothing of her agony, the _Nautilus_ was
going down into the abyss with her. Ten yards from me I saw the open
shell, through which the water was rushing with the noise of thunder,
then the double line of guns and the netting. The bridge was covered
with black, agitated shadows.

The water was rising. The poor creatures were crowding the ratlines,
clinging to the masts, struggling under the water. It was a human
ant-heap overtaken by the sea. Paralysed, stiffened with anguish, my
hair standing on end, with eyes wide open, panting, without breath, and
without voice, I too was watching! An irresistible attraction glued me
to the glass! Suddenly an explosion took place. The compressed air blew
up her decks, as if the magazines had caught fire. Then the unfortunate
vessel sank more rapidly. Her topmast, laden with victims, now
appeared; then her spars, bending under the weight of men; and, last of
all, the top of her mainmast. Then the dark mass disappeared, and with
it the dead crew, drawn down by the strong eddy.


[Illustration] The unfortunate vessel sank more rapidly


I turned to Captain Nemo. That terrible avenger, a perfect archangel of
hatred, was still looking. When all was over, he turned to his room,
opened the door, and entered. I followed him with my eyes. On the end
wall beneath his heroes, I saw the portrait of a woman, still young,
and two little children. Captain Nemo looked at them for some moments,
stretched his arms towards them, and, kneeling down, burst into deep
sobs.</p>

  #br-typing span:nth-child(2) { animation-delay: 0.18s; }
  #br-typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes br-bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }

  /* Suggestions */
  #br-suggestions {
    padding: 6px 14px 8px;

    flex-wrap: wrap;
    gap: 6px;

  /* Input */

    padding: 10px 14px 12px;

  /* ---- Dictionary Panel ---- */
  #br-dict-search-wrap {
    padding: 12px 14px 8px;

  #br-dict-search {
    flex: 1;
    border: 1.5px solid #cce0f5;

  #br-dict-search:focus { border-color: var(--br-blue); background: white; }

  #br-dict-list {

  .br-dict-entry {
    margin-bottom: 10px;

    border-radius: 14px;
    border: 1.5px solid #ddeeff;

  }
  .br-dict-entry:hover { box-shadow: 0 4px 16px rgba(45,106,159,0.1); }
  .br-dict-word {
    padding: 10px 14px 8px;

    align-items: center;
    gap: 8px;
    cursor: pointer;
    user-select: none;

  .br-word-label {
    font-size: 15px;
    font-weight: 800;
    color: var(--br-blue);
    flex: 1;

  .br-word-cat {
    font-size: 10px;
    font-weight: 700;
    color: white;
    border-radius: 8px;
    padding: 2px 7px;
    text-transform: uppercase;

  .br-word-cat.story { background: #7b5ea7; }
  .br-word-cat.ela   { background: #4a7c3f; }
  .br-word-chevron {

  .br-dict-entry.expanded .br-word-chevron { transform: rotate(180deg); }

  .br-dict-def {
    padding: 0 14px;

  .br-dict-entry.expanded .br-dict-def {

  #br-dict-empty {
    text-align: center;

    font-weight: 700;

  #br-dict-empty .br-empty-icon { font-size: 36px; margin-bottom: 8px; }

  /* Footer */
  #br-footer {

  @media (max-width: 420px) {
    #br-window { width: calc(100vw - 28px); right: 0; height: 520px; }

<script>
window.BR = (() => {

  // ============================================================
  //  CONFIGURATION - Using Firebase Cloud Function backend
  // ============================================================
  const CONFIG = {
    apiEndpoint: 'https://us-central1-bedrockela-96dbd.cloudfunctions.net/billyChat',

    systemPrompt: `You are Billy, a cheerful, enthusiastic goat who is best friends with every student who visits. You are based on the story "The Three Billy Goats Gruff" and you LOVE learning and helping kids figure things out. You are warm, funny, encouraging, and genuinely excited to be here. Think of yourself as that cool older buddy who always makes things less scary and more fun.

Your personality:
- Energetic and upbeat — you are genuinely happy to help and it shows
- Warm and personal — use the student's words back to them, notice what they're working on, cheer them on
- Playful but not silly — you can make a little goat joke or say something like "Trip trap, let's go!" but you're also focused and helpful
- Patient and kind — if a student is frustrated or confused, you calm them down and make them feel like it's totally okay
- A buddy first, a teacher second — you are ON THEIR SIDE

Your one rule about answers:
You never just hand over the direct answer to a homework or assignment question. Not because you're mean — but because you genuinely want them to feel the awesome feeling of figuring it out themselves. You always help them get there by giving hints, asking one good guiding question, or breaking it into a smaller step. You make this feel like an adventure, not a punishment.

For everything else — explaining what a word means, what a concept is, how something works — go ahead and explain it fully and clearly! You are helpful and generous with knowledge.

Keep responses short and punchy: 2–4 sentences. Use simple, fun language. No emojis.

Examples:
- Student: "What's the answer to question 3?" → You: "Oh I love this one — I can't just give it to you, but I promise you already know more than you think! Read the question one more time and tell me: what is it actually asking you to find?"
- Student: "I don't get this at all, I give up." → You: "Hey, no giving up — you've got this, I promise! Let's slow down together. What part feels the most confusing right now? Just that one part."
- Student: "What is a metaphor?" → You: "Great question! A metaphor says one thing IS another thing to paint a picture — like 'the classroom was a zoo.' It doesn't use the words 'like' or 'as,' it just says it straight. Pretty cool, right?"
- Student: "I don't know how to start my paragraph." → You: "Starting is the hardest part — totally normal! Try this: just write one sentence about the main thing you want to say. Don't worry if it's perfect. What's the big idea you want your reader to know?"`
  };

  // ============================================================
  //  MINI DICTIONARY  — kid-friendly definitions
  // ============================================================
  const DICTIONARY = [
    // === FROM THE STORY ===
    { word: "Troll", type: "noun", cat: "story", def: "A made-up creature from fairy tales and folklore. Trolls are usually mean, scary, and not very smart. In stories, they often live under bridges and try to stop travelers from passing.", example: "The troll under the bridge threatened to eat the Billy Goats Gruff!" },
    { word: "Bridge", type: "noun", cat: "story", def: "A structure built over a river, road, or valley so people or animals can cross from one side to the other.", example: "The three goats had to cross the bridge to reach the green grass on the other side." },
    { word: "Gruff", type: "adj", cat: "story", def: "Sounding rough, low, and a little scary — like a growly voice. It can also mean someone who seems unfriendly at first.", example: "The big Billy Goat Gruff had a deep, gruff voice that frightened the troll." },
    { word: "Meadow", type: "noun", cat: "story", def: "An open field covered with grass and wildflowers — a beautiful place for animals to graze and rest.", example: "The goats wanted to cross the bridge so they could eat the sweet green grass in the meadow." },
    { word: "Graze", type: "verb", cat: "story", def: "When an animal eats grass by walking slowly and nibbling it right off the ground.", example: "The goats loved to graze on the hillside where the grass was tall and green." },
    { word: "Cunning", type: "adj", cat: "story", def: "Very clever — especially at tricking others or getting what you want through smart thinking.", example: "The littlest Billy Goat was cunning — he tricked the troll by saying his bigger brother was coming." },
    { word: "Threat", type: "noun", cat: "story", def: "When someone says they will do something bad to you if you don't do what they want. It's a way of trying to scare someone.", example: "The troll made a threat: 'I'm going to eat you up!'" },
    { word: "Deceive", type: "verb", cat: "story", def: "To trick someone into believing something that isn't true.", example: "The small goat deceived the troll by promising a bigger, tastier goat was coming." },
    { word: "Cowardly", type: "adj", cat: "story", def: "Being too scared to do the right thing — running away from problems instead of facing them.", example: "The troll was actually cowardly — when the big goat charged, the troll ran away!" },
    { word: "Brave", type: "adj", cat: "story", def: "Willing to do something scary or hard even when you feel afraid. It doesn't mean you're not scared — it means you do it anyway!", example: "The big Billy Goat Gruff was brave when he charged at the troll to protect his brothers." },
    { word: "Villain", type: "noun", cat: "story", def: "The bad character in a story — the one who causes trouble or tries to stop the hero.", example: "The troll is the villain of The Three Billy Goats Gruff." },
    { word: "Hero", type: "noun", cat: "story", def: "A character who does something brave or good to help others or solve the big problem in the story.", example: "The biggest Billy Goat becomes the hero when he defeats the troll." },
    { word: "Folklore", type: "noun", cat: "story", def: "Old stories, legends, and traditions passed down from grandparents to parents to children over many, many years.", example: "The Three Billy Goats Gruff is a piece of Norwegian folklore — it came from Norway long ago." },
    { word: "Fairy Tale", type: "noun", cat: "story", def: "A made-up story, often with magical creatures, that usually has a clear good side and a bad side — and often a happy ending.", example: "Cinderella, Jack and the Beanstalk, and The Three Billy Goats Gruff are all fairy tales." },
    { word: "Fable", type: "noun", cat: "story", def: "A short story — usually with talking animals — that teaches a lesson called a moral at the end.", example: "The Tortoise and the Hare is a fable. Its moral is: slow and steady wins the race." },
    { word: "Moral", type: "noun", cat: "story", def: "The lesson a story is trying to teach you — the big idea about how to live or act.", example: "The moral of The Three Billy Goats Gruff is that it's smart to work together and think before you act." },
    { word: "Antagonist", type: "noun", cat: "story", def: "The character who works against the main character and causes the main problem in the story. Often called 'the bad guy.'", example: "The troll is the antagonist — he blocks the goats' path and threatens them." },
    { word: "Protagonist", type: "noun", cat: "story", def: "The main character the story follows — the one we usually cheer for.", example: "The three Billy Goats are the protagonists of the story." },
    { word: "Repetition", type: "noun", cat: "story", def: "When something in a story happens again and again — like the same phrase or the same event repeating with small changes. It builds rhythm and excitement!", example: "Each goat crosses the bridge and faces the troll — the same thing happens three times, with the goats getting bigger each time." },
    { word: "Sequence", type: "noun", cat: "story", def: "The order that events happen in a story — first, then, next, finally.", example: "In sequence: small goat crosses, medium goat crosses, big goat crosses and defeats the troll." },
    { word: "Climax", type: "noun", cat: "story", def: "The most exciting moment in a story — the turning point where the big problem finally gets solved (or gets worse).", example: "The climax of the story is when the biggest Billy Goat charges the troll and tosses him into the river." },
    { word: "Resolution", type: "noun", cat: "story", def: "The part of the story after the climax where everything gets wrapped up and we find out how things end.", example: "The resolution is when all three goats finally reach the meadow and live happily ever after." },
    // === ELA ESSENTIALS ===
    { word: "Noun", type: "noun", cat: "ela", def: "A word that names a person, place, thing, or idea — anything you can point to or think about.", example: "Goat, bridge, troll, and courage are all nouns." },
    { word: "Verb", type: "verb", cat: "ela", def: "An action word — it tells what someone or something is doing.", example: "The goats trotted, crossed, and charged — those are all verbs." },
    { word: "Adjective", type: "adj", cat: "ela", def: "A word that describes a noun — it tells you what something looks, feels, sounds, or seems like.", example: "The small goat, the grumpy troll, and the green meadow all use adjectives." },
    { word: "Simile", type: "noun", cat: "ela", def: "A comparison using 'like' or 'as' to help readers picture something more clearly.", example: "The troll's voice was like thunder rumbling under the bridge." },
    { word: "Metaphor", type: "noun", cat: "ela", def: "A comparison that says one thing IS another — without using 'like' or 'as.'", example: "The bridge was a test — each goat had to prove their courage to cross it." },
    { word: "Inference", type: "noun", cat: "ela", def: "Using clues from the story plus what you already know to figure out something the author didn't say directly.", example: "We can infer the troll is not very smart because he keeps getting tricked by the goats." },
    { word: "Character", type: "noun", cat: "ela", def: "A person, animal, or creature in a story. Main characters are the ones the story is mostly about.", example: "The three goats and the troll are all characters in the story." },
    { word: "Setting", type: "noun", cat: "ela", def: "Where and when a story takes place — the time and place that make up the story's world.", example: "The setting is a hillside, a bridge over a rushing river, and a green meadow beyond it." },
    { word: "Theme", type: "noun", cat: "ela", def: "The big lesson or message of the story — the idea the author wants you to take away.", example: "One theme of The Three Billy Goats Gruff is that courage and cleverness can defeat a bully." },
    { word: "Conflict", type: "noun", cat: "ela", def: "The main problem in a story — the thing that creates all the tension and must be solved.", example: "The conflict is that a troll is blocking the bridge and threatening anyone who tries to cross." },
    { word: "Dialogue", type: "noun", cat: "ela", def: "The words that characters say to each other in a story — their conversations.", example: "'Who is that trip-trapping over my bridge?' said the troll. That's dialogue!" },
    { word: "Imagery", type: "noun", cat: "ela", def: "Words that paint a picture in your mind by describing what something looks, sounds, smells, feels, or tastes like.", example: "The rushing cold river below, the splintery old bridge, and the growling troll are all imagery." },
    { word: "Personification", type: "noun", cat: "ela", def: "Giving human feelings or actions to an animal or object.", example: "The river roared angrily beneath the bridge. Rivers can't really be angry — that's personification!" },
    { word: "Plot", type: "noun", cat: "ela", def: "All the events that happen in a story from beginning to end.", example: "The plot: goats want grass, troll blocks the bridge, goats outsmart the troll, goats reach the meadow." },
  ].sort((a, b) => a.word.localeCompare(b.word));

  // ============================================================
  //  STATE
  // ============================================================
  let isOpen = false;
  let isLoading = false;
  let currentTab = 'chat';
  const history = [];

  // Elements
  const launcher   = document.getElementById('br-launcher');
  const btn        = document.getElementById('br-btn');
  const win        = document.getElementById('br-window');
  const tooltip    = document.getElementById('br-tooltip');
  const messages   = document.getElementById('br-messages');
  const typing     = document.getElementById('br-typing');
  const inputEl    = document.getElementById('br-input');
  const sendBtn    = document.getElementById('br-send');
  const panelChat  = document.getElementById('br-panel-chat');
  const panelDict  = document.getElementById('br-panel-dict');
  const dictList   = document.getElementById('br-dict-list');
  const dictSearch = document.getElementById('br-dict-search');
  const dictEmpty  = document.getElementById('br-dict-empty');

  // ---- Init ----
  function init() {
    btn.addEventListener('click', toggle);
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
    });
    renderDict(DICTIONARY);
    // Hide tooltip after 5s
    setTimeout(() => tooltip.classList.add('hidden'), 5000);
  }

  function toggle() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
    tooltip.classList.add('hidden');
    if (isOpen && messages.children.length === 0) {
      addBotMsg("Hey! I'm Billy — your learning buddy! I'm here to help you figure things out and cheer you on. What are you working on today?");
    }
    if (isOpen) setTimeout(() => inputEl.focus(), 350);
  }

  // ---- Tab switching ----
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.br-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    panelChat.style.display = tab === 'chat' ? 'flex' : 'none';
    panelDict.style.display = tab === 'dict' ? 'flex' : 'none';
    if (tab === 'dict') setTimeout(() => dictSearch.focus(), 200);
  }

  // ---- Messages ----
  function addBotMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg bot';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg user';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    typing.classList.toggle('show', v);
    if (v) messages.scrollTop = messages.scrollHeight;
  }

  // ---- Send (calls secure Firebase backend) ----
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('br-suggestions').style.display = 'none';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    setLoading(true);
    try {
      const res = await fetch(CONFIG.apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: CONFIG.systemPrompt,
          messages: history
        })
      });
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        if (errorData.fallback) {
          throw new Error(errorData.fallback);
        }
        throw new Error(`Error ${res.status}`);
      }
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Hmm, I didn't catch that — could you try again?";
      history.push({ role: 'assistant', content: reply });
      setLoading(false);
      addBotMsg(reply);
    } catch(err) {
      setLoading(false);
      addBotMsg(`Whoops, something went wrong — even goats stumble sometimes! Try again in a second. (${err.message})`);
      console.error('Billy error:', err);
    }
  }

  function suggest(el) {
    inputEl.value = el.textContent;
    handleSend();
  }

  // ---- Dictionary ----
  function renderDict(entries) {
    dictList.querySelectorAll('.br-dict-entry').forEach(e => e.remove());
    dictEmpty.style.display = entries.length === 0 ? 'block' : 'none';
    const catLabel = { story: 'Story', ela: 'ELA' };
    entries.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'br-dict-entry';
      el.innerHTML = `
        <div class="br-dict-word" onclick="BR.toggleEntry(this.parentElement)">
          <span class="br-word-label">${entry.word}</span>
          <span class="br-word-cat ${entry.cat}">${catLabel[entry.cat] || entry.cat}</span>
          <span class="br-word-chevron">&#9660;</span>
        </div>
        <div class="br-dict-def">
          <div class="br-def-text">${entry.def}</div>
          ${entry.example ? `<div class="br-def-example">${entry.example}</div>` : ''}
        </div>`;
      dictList.appendChild(el);
    });
  }

  function toggleEntry(el) {
    const wasOpen = el.classList.contains('expanded');
    document.querySelectorAll('.br-dict-entry.expanded').forEach(e => e.classList.remove('expanded'));
    if (!wasOpen) el.classList.add('expanded');
  }

  function filterDict() {
    const q = dictSearch.value.toLowerCase().trim();
    const filtered = q
      ? DICTIONARY.filter(e =>
          e.word.toLowerCase().includes(q) ||
          e.def.toLowerCase().includes(q) ||
          (e.example && e.example.toLowerCase().includes(q)) ||
          (e.type && e.type.toLowerCase().includes(q)) ||
          (e.cat && e.cat.toLowerCase().includes(q))
        )
      : DICTIONARY;
    renderDict(filtered);
  }

  init();

  return { switchTab, suggest, toggleEntry, filterDict };
})();
</script>

</body>
</html>
