                // Page 4: Literature Reading

                        <div class="lesson-page-card content-page">
                            <h2>📖 Reading: The Adventures of Tom Sawyer</h2>
                            <h3 style="color: var(--book-color, #305853);">Chapter 13: CHAPTER XIII</h3>
                            
                            <div style="padding: 25px; background: #f9f9f9; border-radius: 12px; line-height: 1.8; font-size: 16px; margin-bottom: 25px;" class="reading-passage">
                                <p style="margin-bottom: 20px; line-height: 1.8;">CHAPTER XIII</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Tom’s mind was made up now. He was gloomy and desperate. He was a
forsaken, friendless boy, he said; nobody loved him; when they found out
what they had driven him to, perhaps they would be sorry; he had tried
to do right and get along, but they would not let him; since nothing
would do them but to be rid of him, let it be so; and let them blame
_him_ for the consequences—why shouldn’t they? What right had the
friendless to complain? Yes, they had forced him to it at last: he would
lead a life of crime. There was no choice.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">By this time he was far down Meadow Lane, and the bell for school to
“take up” tinkled faintly upon his ear. He sobbed, now, to think he
should never, never hear that old familiar sound any more—it was very
hard, but it was forced on him; since he was driven out into the cold
world, he must submit—but he forgave them. Then the sobs came thick and
fast.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Just at this point he met his soul’s sworn comrade, Joe
Harper—hard-eyed, and with evidently a great and dismal purpose in his
heart. Plainly here were “two souls with but a single thought.” Tom,
wiping his eyes with his sleeve, began to blubber out something about
a resolution to escape from hard usage and lack of sympathy at home by
roaming abroad into the great world never to return; and ended by hoping
that Joe would not forget him.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">But it transpired that this was a request which Joe had just been going
to make of Tom, and had come to hunt him up for that purpose. His mother
had whipped him for drinking some cream which he had never tasted and
knew nothing about; it was plain that she was tired of him and wished
him to go; if she felt that way, there was nothing for him to do but
succumb; he hoped she would be happy, and never regret having driven her
poor boy out into the unfeeling world to suffer and die.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">As the two boys walked sorrowing along, they made a new compact to stand
by each other and be brothers and never separate till death relieved
them of their troubles. Then they began to lay their plans. Joe was for
being a hermit, and living on crusts in a remote cave, and dying,
some time, of cold and want and grief; but after listening to Tom, he
conceded that there were some conspicuous advantages about a life of
crime, and so he consented to be a pirate.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Three miles below St. Petersburg, at a point where the Mississippi River
was a trifle over a mile wide, there was a long, narrow, wooded island,
with a shallow bar at the head of it, and this offered well as a
rendezvous. It was not inhabited; it lay far over toward the further
shore, abreast a dense and almost wholly unpeopled forest. So Jackson’s
Island was chosen. Who were to be the subjects of their piracies was a
matter that did not occur to them. Then they hunted up Huckleberry Finn,
and he joined them promptly, for all careers were one to him; he was
indifferent. They presently separated to meet at a lonely spot on the
river-bank two miles above the village at the favorite hour—which was
midnight. There was a small log raft there which they meant to capture.
Each would bring hooks and lines, and such provision as he could steal
in the most dark and mysterious way—as became outlaws. And before the
afternoon was done, they had all managed to enjoy the sweet glory of
spreading the fact that pretty soon the town would “hear something.” All
who got this vague hint were cautioned to “be mum and wait.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">About midnight Tom arrived with a boiled ham and a few trifles,
and stopped in a dense undergrowth on a small bluff overlooking the
meeting-place. It was starlight, and very still. The mighty river lay
like an ocean at rest. Tom listened a moment, but no sound disturbed the
quiet. Then he gave a low, distinct whistle. It was answered from under
the bluff. Tom whistled twice more; these signals were answered in the
same way. Then a guarded voice said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Who goes there?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Tom Sawyer, the Black Avenger of the Spanish Main. Name your names.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Huck Finn the Red-Handed, and Joe Harper the Terror of the Seas.” Tom
had furnished these titles, from his favorite literature.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“’Tis well. Give the countersign.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Two hoarse whispers delivered the same awful word simultaneously to the
brooding night:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“_Blood_!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Then Tom tumbled his ham over the bluff and let himself down after it,
tearing both skin and clothes to some extent in the effort. There was
an easy, comfortable path along the shore under the bluff, but it lacked
the advantages of difficulty and danger so valued by a pirate.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Terror of the Seas had brought a side of bacon, and had about worn
himself out with getting it there. Finn the Red-Handed had stolen a
skillet and a quantity of half-cured leaf tobacco, and had also brought
a few corn-cobs to make pipes with. But none of the pirates smoked or
“chewed” but himself. The Black Avenger of the Spanish Main said it
would never do to start without some fire. That was a wise thought;
matches were hardly known there in that day. They saw a fire smouldering
upon a great raft a hundred yards above, and they went stealthily
thither and helped themselves to a chunk. They made an imposing
adventure of it, saying, “Hist!” every now and then, and suddenly
halting with finger on lip; moving with hands on imaginary dagger-hilts;
and giving orders in dismal whispers that if “the foe” stirred, to “let
him have it to the hilt,” because “dead men tell no tales.” They knew
well enough that the raftsmen were all down at the village laying
in stores or having a spree, but still that was no excuse for their
conducting this thing in an unpiratical way.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">They shoved off, presently, Tom in command, Huck at the after oar and
Joe at the forward. Tom stood amidships, gloomy-browed, and with folded
arms, and gave his orders in a low, stern whisper:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Luff, and bring her to the wind!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Aye-aye, sir!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Steady, steady-y-y-y!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Steady it is, sir!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Let her go off a point!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Point it is, sir!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">As the boys steadily and monotonously drove the raft toward mid-stream
it was no doubt understood that these orders were given only for
“style,” and were not intended to mean anything in particular.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What sail’s she carrying?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Courses, tops’ls, and flying-jib, sir.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Send the r’yals up! Lay out aloft, there, half a dozen of
ye—foretopmaststuns’l! Lively, now!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Aye-aye, sir!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Shake out that maintogalans’l! Sheets and braces! _now_ my hearties!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Aye-aye, sir!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Hellum-a-lee—hard a port! Stand by to meet her when she comes! Port,
port! _Now_, men! With a will! Stead-y-y-y!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Steady it is, sir!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The raft drew beyond the middle of the river; the boys pointed her head
right, and then lay on their oars. The river was not high, so there was
not more than a two or three mile current. Hardly a word was said during
the next three-quarters of an hour. Now the raft was passing before
the distant town. Two or three glimmering lights showed where it lay,
peacefully sleeping, beyond the vague vast sweep of star-gemmed water,
unconscious of the tremendous event that was happening. The Black
Avenger stood still with folded arms, “looking his last” upon the scene
of his former joys and his later sufferings, and wishing “she” could see
him now, abroad on the wild sea, facing peril and death with dauntless
heart, going to his doom with a grim smile on his lips. It was but
a small strain on his imagination to remove Jackson’s Island beyond
eye-shot of the village, and so he “looked his last” with a broken and
satisfied heart. The other pirates were looking their last, too; and
they all looked so long that they came near letting the current drift
them out of the range of the island. But they discovered the danger in
time, and made shift to avert it. About two o’clock in the morning the
raft grounded on the bar two hundred yards above the head of the island,
and they waded back and forth until they had landed their freight. Part
of the little raft’s belongings consisted of an old sail, and this they
spread over a nook in the bushes for a tent to shelter their provisions;
but they themselves would sleep in the open air in good weather, as
became outlaws.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">They built a fire against the side of a great log twenty or thirty steps
within the sombre depths of the forest, and then cooked some bacon in
the frying-pan for supper, and used up half of the corn “pone” stock
they had brought. It seemed glorious sport to be feasting in that wild,
free way in the virgin forest of an unexplored and uninhabited island,
far from the haunts of men, and they said they never would return to
civilization. The climbing fire lit up their faces and threw its ruddy
glare upon the pillared tree-trunks of their forest temple, and upon the
varnished foliage and festooning vines.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">When the last crisp slice of bacon was gone, and the last allowance
of corn pone devoured, the boys stretched themselves out on the grass,
filled with contentment. They could have found a cooler place, but
they would not deny themselves such a romantic feature as the roasting
campfire.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“_Ain’t_ it gay?” said Joe.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It’s _nuts_!” said Tom. “What would the boys say if they could see us?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Say? Well, they’d just die to be here—hey, Hucky!”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I reckon so,” said Huckleberry; “anyways, I’m suited. I don’t want
nothing better’n this. I don’t ever get enough to eat, gen’ally—and here
they can’t come and pick at a feller and bullyrag him so.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“It’s just the life for me,” said Tom. “You don’t have to get up,
mornings, and you don’t have to go to school, and wash, and all that
blame foolishness. You see a pirate don’t have to do _anything_, Joe,
when he’s ashore, but a hermit _he_ has to be praying considerable, and
then he don’t have any fun, anyway, all by himself that way.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh yes, that’s so,” said Joe, “but I hadn’t thought much about it, you
know. I’d a good deal rather be a pirate, now that I’ve tried it.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“You see,” said Tom, “people don’t go much on hermits, nowadays, like
they used to in old times, but a pirate’s always respected. And
a hermit’s got to sleep on the hardest place he can find, and put
sackcloth and ashes on his head, and stand out in the rain, and—”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What does he put sackcloth and ashes on his head for?” inquired Huck.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I dono. But they’ve _got_ to do it. Hermits always do. You’d have to do
that if you was a hermit.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Dern’d if I would,” said Huck.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Well, what would you do?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I dono. But I wouldn’t do that.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, Huck, you’d _have_ to. How’d you get around it?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, I just wouldn’t stand it. I’d run away.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Run away! Well, you _would_ be a nice old slouch of a hermit. You’d be
a disgrace.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">The Red-Handed made no response, being better employed. He had finished
gouging out a cob, and now he fitted a weed stem to it, loaded it with
tobacco, and was pressing a coal to the charge and blowing a cloud of
fragrant smoke—he was in the full bloom of luxurious contentment. The
other pirates envied him this majestic vice, and secretly resolved to
acquire it shortly. Presently Huck said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“What does pirates have to do?”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Tom said:</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Oh, they have just a bully time—take ships and burn them, and get the
money and bury it in awful places in their island where there’s ghosts
and things to watch it, and kill everybody in the ships—make ’em walk a
plank.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And they carry the women to the island,” said Joe; “they don’t kill the
women.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“No,” assented Tom, “they don’t kill the women—they’re too noble. And
the women’s always beautiful, too.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“And don’t they wear the bulliest clothes! Oh no! All gold and silver
and di’monds,” said Joe, with enthusiasm.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Who?” said Huck.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“Why, the pirates.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Huck scanned his own clothing forlornly.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">“I reckon I ain’t dressed fitten for a pirate,” said he, with a
regretful pathos in his voice; “but I ain’t got none but these.”</p>
<p style="margin-bottom: 20px; line-height: 1.8;">But the other boys told him the fine clothes would come fast enough,
after they should have begun their adventures. They made him understand
that his poor rags would do to begin with, though it was customary for
wealthy pirates to start with a proper wardrobe.</p>
<p style="margin-bottom: 20px; line-height: 1.8;">Gradually their talk died out and drowsiness began to steal upon the
eyelids of the little waifs. The pipe dropped from the fingers of the
Red-Handed, and he slept the sleep of the conscience-free and the weary.
The Terror of the Seas and the Black Avenger of the Spanish Main had
more difficulty in getting to sleep. They said their prayers inwardly,
and lying down, since there was nobody there with authority to make them
kneel and recite aloud; in truth, they had a mind not to say them at
all, but they were afraid to proceed to such lengths as that, lest they
might call down a sudden and special thunderbolt from heaven. Then at
once they reached and hovered upon the imminent verge of sleep—but an
intruder came, now, that would not “down.” It was conscience. They began
to feel a vague fear that they had been doing wrong to run away; and
next they thought of the stolen meat, and then the real torture came.
They tried to argue it away by reminding conscience that they had
purloined sweetmeats and apples scores of times; but conscience was not
to be appeased by such thin plausibilities; it seemed to them, in the
end, that there was no getting around the stubborn fact that taking
sweetmeats was only “hooking,” while taking bacon and hams and such
valuables was plain simple stealing—and there was a command against that
in the Bible. So they inwardly resolved that so long as they remained in
the business, their piracies should not again be sullied with the
crime of stealing. Then conscience granted a truce, and these curiously
inconsistent pirates fell peacefully to sleep.</p>

  .br-msg { max-width: 85%; animation: br-fadein 0.25s ease; }

  .br-bubble {
    padding: 10px 14px;

    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .br-msg.user { align-self: flex-end; }
  .br-msg.user .br-bubble {
    background: var(--br-bubble-user);

  /* Typing dots */

  /* Suggestions */

<script>
window.BR = (() => {

  // ============================================================
  //  CONFIGURATION - Using Firebase Cloud Function backend
  // ============================================================
  const CONFIG = {
    apiEndpoint: 'https://us-central1-bedrockela-96dbd.cloudfunctions.net/billyChat',

    systemPrompt: `You are Billy, a cheerful, enthusiastic goat who is best friends with every student who visits. You are based on the story "The Three Billy Goats Gruff" and you LOVE learning and helping kids figure things out. You are warm, funny, encouraging, and genuinely excited to be here. Think of yourself as that cool older buddy who always makes things less scary and more fun.

Your personality:
- Energetic and upbeat — you are genuinely happy to help and it shows
- Warm and personal — use the student's words back to them, notice what they're working on, cheer them on
- Playful but not silly — you can make a little goat joke or say something like "Trip trap, let's go!" but you're also focused and helpful
- Patient and kind — if a student is frustrated or confused, you calm them down and make them feel like it's totally okay
- A buddy first, a teacher second — you are ON THEIR SIDE

Your one rule about answers:
You never just hand over the direct answer to a homework or assignment question. Not because you're mean — but because you genuinely want them to feel the awesome feeling of figuring it out themselves. You always help them get there by giving hints, asking one good guiding question, or breaking it into a smaller step. You make this feel like an adventure, not a punishment.

For everything else — explaining what a word means, what a concept is, how something works — go ahead and explain it fully and clearly! You are helpful and generous with knowledge.

Keep responses short and punchy: 2–4 sentences. Use simple, fun language. No emojis.

Examples:
- Student: "What's the answer to question 3?" → You: "Oh I love this one — I can't just give it to you, but I promise you already know more than you think! Read the question one more time and tell me: what is it actually asking you to find?"
- Student: "I don't get this at all, I give up." → You: "Hey, no giving up — you've got this, I promise! Let's slow down together. What part feels the most confusing right now? Just that one part."
- Student: "What is a metaphor?" → You: "Great question! A metaphor says one thing IS another thing to paint a picture — like 'the classroom was a zoo.' It doesn't use the words 'like' or 'as,' it just says it straight. Pretty cool, right?"
- Student: "I don't know how to start my paragraph." → You: "Starting is the hardest part — totally normal! Try this: just write one sentence about the main thing you want to say. Don't worry if it's perfect. What's the big idea you want your reader to know?"`
  };

  // ============================================================
  //  MINI DICTIONARY  — kid-friendly definitions
  // ============================================================
  const DICTIONARY = [
    // === FROM THE STORY ===
    { word: "Troll", type: "noun", cat: "story", def: "A made-up creature from fairy tales and folklore. Trolls are usually mean, scary, and not very smart. In stories, they often live under bridges and try to stop travelers from passing.", example: "The troll under the bridge threatened to eat the Billy Goats Gruff!" },
    { word: "Bridge", type: "noun", cat: "story", def: "A structure built over a river, road, or valley so people or animals can cross from one side to the other.", example: "The three goats had to cross the bridge to reach the green grass on the other side." },
    { word: "Gruff", type: "adj", cat: "story", def: "Sounding rough, low, and a little scary — like a growly voice. It can also mean someone who seems unfriendly at first.", example: "The big Billy Goat Gruff had a deep, gruff voice that frightened the troll." },
    { word: "Meadow", type: "noun", cat: "story", def: "An open field covered with grass and wildflowers — a beautiful place for animals to graze and rest.", example: "The goats wanted to cross the bridge so they could eat the sweet green grass in the meadow." },
    { word: "Graze", type: "verb", cat: "story", def: "When an animal eats grass by walking slowly and nibbling it right off the ground.", example: "The goats loved to graze on the hillside where the grass was tall and green." },
    { word: "Cunning", type: "adj", cat: "story", def: "Very clever — especially at tricking others or getting what you want through smart thinking.", example: "The littlest Billy Goat was cunning — he tricked the troll by saying his bigger brother was coming." },
    { word: "Threat", type: "noun", cat: "story", def: "When someone says they will do something bad to you if you don't do what they want. It's a way of trying to scare someone.", example: "The troll made a threat: 'I'm going to eat you up!'" },
    { word: "Deceive", type: "verb", cat: "story", def: "To trick someone into believing something that isn't true.", example: "The small goat deceived the troll by promising a bigger, tastier goat was coming." },
    { word: "Cowardly", type: "adj", cat: "story", def: "Being too scared to do the right thing — running away from problems instead of facing them.", example: "The troll was actually cowardly — when the big goat charged, the troll ran away!" },
    { word: "Brave", type: "adj", cat: "story", def: "Willing to do something scary or hard even when you feel afraid. It doesn't mean you're not scared — it means you do it anyway!", example: "The big Billy Goat Gruff was brave when he charged at the troll to protect his brothers." },
    { word: "Villain", type: "noun", cat: "story", def: "The bad character in a story — the one who causes trouble or tries to stop the hero.", example: "The troll is the villain of The Three Billy Goats Gruff." },
    { word: "Hero", type: "noun", cat: "story", def: "A character who does something brave or good to help others or solve the big problem in the story.", example: "The biggest Billy Goat becomes the hero when he defeats the troll." },
    { word: "Folklore", type: "noun", cat: "story", def: "Old stories, legends, and traditions passed down from grandparents to parents to children over many, many years.", example: "The Three Billy Goats Gruff is a piece of Norwegian folklore — it came from Norway long ago." },
    { word: "Fairy Tale", type: "noun", cat: "story", def: "A made-up story, often with magical creatures, that usually has a clear good side and a bad side — and often a happy ending.", example: "Cinderella, Jack and the Beanstalk, and The Three Billy Goats Gruff are all fairy tales." },
    { word: "Fable", type: "noun", cat: "story", def: "A short story — usually with talking animals — that teaches a lesson called a moral at the end.", example: "The Tortoise and the Hare is a fable. Its moral is: slow and steady wins the race." },
    { word: "Moral", type: "noun", cat: "story", def: "The lesson a story is trying to teach you — the big idea about how to live or act.", example: "The moral of The Three Billy Goats Gruff is that it's smart to work together and think before you act." },
    { word: "Antagonist", type: "noun", cat: "story", def: "The character who works against the main character and causes the main problem in the story. Often called 'the bad guy.'", example: "The troll is the antagonist — he blocks the goats' path and threatens them." },
    { word: "Protagonist", type: "noun", cat: "story", def: "The main character the story follows — the one we usually cheer for.", example: "The three Billy Goats are the protagonists of the story." },
    { word: "Repetition", type: "noun", cat: "story", def: "When something in a story happens again and again — like the same phrase or the same event repeating with small changes. It builds rhythm and excitement!", example: "Each goat crosses the bridge and faces the troll — the same thing happens three times, with the goats getting bigger each time." },
    { word: "Sequence", type: "noun", cat: "story", def: "The order that events happen in a story — first, then, next, finally.", example: "In sequence: small goat crosses, medium goat crosses, big goat crosses and defeats the troll." },
    { word: "Climax", type: "noun", cat: "story", def: "The most exciting moment in a story — the turning point where the big problem finally gets solved (or gets worse).", example: "The climax of the story is when the biggest Billy Goat charges the troll and tosses him into the river." },
    { word: "Resolution", type: "noun", cat: "story", def: "The part of the story after the climax where everything gets wrapped up and we find out how things end.", example: "The resolution is when all three goats finally reach the meadow and live happily ever after." },
    // === ELA ESSENTIALS ===
    { word: "Noun", type: "noun", cat: "ela", def: "A word that names a person, place, thing, or idea — anything you can point to or think about.", example: "Goat, bridge, troll, and courage are all nouns." },
    { word: "Verb", type: "verb", cat: "ela", def: "An action word — it tells what someone or something is doing.", example: "The goats trotted, crossed, and charged — those are all verbs." },
    { word: "Adjective", type: "adj", cat: "ela", def: "A word that describes a noun — it tells you what something looks, feels, sounds, or seems like.", example: "The small goat, the grumpy troll, and the green meadow all use adjectives." },
    { word: "Simile", type: "noun", cat: "ela", def: "A comparison using 'like' or 'as' to help readers picture something more clearly.", example: "The troll's voice was like thunder rumbling under the bridge." },
    { word: "Metaphor", type: "noun", cat: "ela", def: "A comparison that says one thing IS another — without using 'like' or 'as.'", example: "The bridge was a test — each goat had to prove their courage to cross it." },
    { word: "Inference", type: "noun", cat: "ela", def: "Using clues from the story plus what you already know to figure out something the author didn't say directly.", example: "We can infer the troll is not very smart because he keeps getting tricked by the goats." },
    { word: "Character", type: "noun", cat: "ela", def: "A person, animal, or creature in a story. Main characters are the ones the story is mostly about.", example: "The three goats and the troll are all characters in the story." },
    { word: "Setting", type: "noun", cat: "ela", def: "Where and when a story takes place — the time and place that make up the story's world.", example: "The setting is a hillside, a bridge over a rushing river, and a green meadow beyond it." },
    { word: "Theme", type: "noun", cat: "ela", def: "The big lesson or message of the story — the idea the author wants you to take away.", example: "One theme of The Three Billy Goats Gruff is that courage and cleverness can defeat a bully." },
    { word: "Conflict", type: "noun", cat: "ela", def: "The main problem in a story — the thing that creates all the tension and must be solved.", example: "The conflict is that a troll is blocking the bridge and threatening anyone who tries to cross." },
    { word: "Dialogue", type: "noun", cat: "ela", def: "The words that characters say to each other in a story — their conversations.", example: "'Who is that trip-trapping over my bridge?' said the troll. That's dialogue!" },
    { word: "Imagery", type: "noun", cat: "ela", def: "Words that paint a picture in your mind by describing what something looks, sounds, smells, feels, or tastes like.", example: "The rushing cold river below, the splintery old bridge, and the growling troll are all imagery." },
    { word: "Personification", type: "noun", cat: "ela", def: "Giving human feelings or actions to an animal or object.", example: "The river roared angrily beneath the bridge. Rivers can't really be angry — that's personification!" },
    { word: "Plot", type: "noun", cat: "ela", def: "All the events that happen in a story from beginning to end.", example: "The plot: goats want grass, troll blocks the bridge, goats outsmart the troll, goats reach the meadow." },
  ].sort((a, b) => a.word.localeCompare(b.word));

  // ============================================================
  //  STATE
  // ============================================================
  let isOpen = false;
  let isLoading = false;
  let currentTab = 'chat';
  const history = [];

  // Elements
  const launcher   = document.getElementById('br-launcher');
  const btn        = document.getElementById('br-btn');
  const win        = document.getElementById('br-window');
  const tooltip    = document.getElementById('br-tooltip');
  const messages   = document.getElementById('br-messages');
  const typing     = document.getElementById('br-typing');
  const inputEl    = document.getElementById('br-input');
  const sendBtn    = document.getElementById('br-send');
  const panelChat  = document.getElementById('br-panel-chat');
  const panelDict  = document.getElementById('br-panel-dict');
  const dictList   = document.getElementById('br-dict-list');
  const dictSearch = document.getElementById('br-dict-search');
  const dictEmpty  = document.getElementById('br-dict-empty');

  // ---- Init ----
  function init() {
    btn.addEventListener('click', toggle);
    sendBtn.addEventListener('click', handleSend);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 80) + 'px';
    });
    renderDict(DICTIONARY);
    // Hide tooltip after 5s
    setTimeout(() => tooltip.classList.add('hidden'), 5000);
  }

  function toggle() {
    isOpen = !isOpen;
    win.classList.toggle('open', isOpen);
    btn.classList.toggle('open', isOpen);
    tooltip.classList.add('hidden');
    if (isOpen && messages.children.length === 0) {
      addBotMsg("Hey! I'm Billy — your learning buddy! I'm here to help you figure things out and cheer you on. What are you working on today?");
    }
    if (isOpen) setTimeout(() => inputEl.focus(), 350);
  }

  // ---- Tab switching ----
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.br-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    panelChat.style.display = tab === 'chat' ? 'flex' : 'none';
    panelDict.style.display = tab === 'dict' ? 'flex' : 'none';
    if (tab === 'dict') setTimeout(() => dictSearch.focus(), 200);
  }

  // ---- Messages ----
  function addBotMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg bot';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }
  function addUserMsg(text) {
    const d = document.createElement('div');
    d.className = 'br-msg user';
    d.innerHTML = `<div class="br-bubble">${text.replace(/\n/g,'<br>')}</div>`;
    messages.appendChild(d);
    messages.scrollTop = messages.scrollHeight;
  }

  function setLoading(v) {
    isLoading = v;
    sendBtn.disabled = v;
    typing.classList.toggle('show', v);
    if (v) messages.scrollTop = messages.scrollHeight;
  }

  // ---- Send (calls secure Firebase backend) ----
  async function handleSend() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    document.getElementById('br-suggestions').style.display = 'none';
    addUserMsg(text);
    history.push({ role: 'user', content: text });
    setLoading(true);
    try {
      const res = await fetch(CONFIG.apiEndpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: CONFIG.systemPrompt,
          messages: history
        })
      });
      if (!res.ok) {
        const errorData = await res.json().catch(() => ({}));
        if (errorData.fallback) {
          throw new Error(errorData.fallback);
        }
        throw new Error(`Error ${res.status}`);
      }
      const data = await res.json();
      const reply = data.content?.[0]?.text || "Hmm, I didn't catch that — could you try again?";
      history.push({ role: 'assistant', content: reply });
      setLoading(false);
      addBotMsg(reply);
    } catch(err) {
      setLoading(false);
      addBotMsg(`Whoops, something went wrong — even goats stumble sometimes! Try again in a second. (${err.message})`);
      console.error('Billy error:', err);
    }
  }

  function suggest(el) {
    inputEl.value = el.textContent;
    handleSend();
  }

  // ---- Dictionary ----
  function renderDict(entries) {
    dictList.querySelectorAll('.br-dict-entry').forEach(e => e.remove());
    dictEmpty.style.display = entries.length === 0 ? 'block' : 'none';
    const catLabel = { story: 'Story', ela: 'ELA' };
    entries.forEach((entry) => {
      const el = document.createElement('div');
      el.className = 'br-dict-entry';
      el.innerHTML = `
        <div class="br-dict-word" onclick="BR.toggleEntry(this.parentElement)">
          <span class="br-word-label">${entry.word}</span>
          <span class="br-word-cat ${entry.cat}">${catLabel[entry.cat] || entry.cat}</span>
          <span class="br-word-chevron">&#9660;</span>
        </div>
        <div class="br-dict-def">
          <div class="br-def-text">${entry.def}</div>
          ${entry.example ? `<div class="br-def-example">${entry.example}</div>` : ''}
        </div>`;
      dictList.appendChild(el);
    });
  }

  function toggleEntry(el) {
    const wasOpen = el.classList.contains('expanded');
    document.querySelectorAll('.br-dict-entry.expanded').forEach(e => e.classList.remove('expanded'));
    if (!wasOpen) el.classList.add('expanded');
  }

  function filterDict() {
    const q = dictSearch.value.toLowerCase().trim();
    const filtered = q
      ? DICTIONARY.filter(e =>
          e.word.toLowerCase().includes(q) ||
          e.def.toLowerCase().includes(q) ||
          (e.example && e.example.toLowerCase().includes(q)) ||
          (e.type && e.type.toLowerCase().includes(q)) ||
          (e.cat && e.cat.toLowerCase().includes(q))
        )
      : DICTIONARY;
    renderDict(filtered);
  }

  init();

  return { switchTab, suggest, toggleEntry, filterDict };
})();
</script>

</body>
</html>
