on.\"<br><br><br><br>The hall erupted in laughter and jeers. \"Impossible!\" someone shouted. \"Pure fantasy!\"<br><br><br><br>\"Is it?\" Challenger's voice rose above the chaos like a thunderclap. \"Young Mr. Malone of the *Daily Gazette* has volunteered to accompany the expedition as our chronicler.\"<br><br><br><br>Every head in the hall turned toward Malone. He felt his face burning as hundreds of eyes fixed on him. A reporter volunteering for what everyone assumed was a suicide mission.<br><br><br><br>\"Furthermore,\" Challenger continued, \"Professor Summerlee has agreed to join our party as scientific observer, to ensure that no trickery is involved.\"<br><br><br><br>\"I have done no such—\" Summerlee began, then stopped. To refuse now, in front of his peers, would make him look like a coward. His face went pale, then red, then pale again.\n                    </div>\n                "
