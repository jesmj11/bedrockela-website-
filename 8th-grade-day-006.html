iff and sobbed with relief.<br><br><br><br>\"That,\" he gasped, \"was the most terrifying experience of my life.\"<br><br><br><br>\"And we're not even at the top yet,\" Lord John pointed out cheerfully.<br><br><br><br>They climbed in grim silence after that, each man lost in his own thoughts about mortality and the price of adventure. The sun was beginning to sink toward the horizon when Malone noticed something that made his heart leap.<br><br><br><br>The cliff was getting less steep.<br><br><br><br>Not much, but enough that his hands weren't cramping quite so badly. Enough that he could actually see more than six inches in front of his face.\n                    </div>\n                "

ut the dying light. Vines hung like curtains between the massive columns, some of them thick enough to serve as bridges. Strange fungi glowed with phosphorescent light, painting the undergrowth in shades of green and blue that belonged in no earthly forest.<br><br><br><br>But it was the sounds that made Malone's skin crawl.<br><br><br><br>Calls and cries echoed through the twilight—some high and piercing, others deep enough to rattle his teeth. None of them sounded like any animal he'd ever heard. They were alien, primitive, touched with an intelligence that was both ancient and utterly inhuman.\n                    </div>\n                "

 coming toward them through the primeval forest. Something large enough to shake the ground with every step.<br><br><br><br>Lord John raised his rifle, but his hands were steady as stone. \"Whatever it is, it knows we're here.\"<br><br><br><br>The sound of breaking branches grew louder. Closer. A tree that must have been growing when Rome was young crashed to the ground somewhere in the mist, sending a flock of bat-like creatures into the air with shrill cries of alarm.<br><br><br><br>And then, through the swirling fog, they saw it.<br><br><br><br>*Through the swirling fog came a cry that no human throat could make. Ancient. Terrible. Hungry.*<br><br><br><br>---\n                    </div>\n                "
