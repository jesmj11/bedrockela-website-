e Stegosaurus saved his life.<br><br><br><br>The massive herbivore had been feeding peacefully just fifty yards away, but the pack's hunting calls had finally penetrated its simple consciousness. With a bellow of alarm that shook the trees, the twenty-ton giant crashed through the clearing, its spiked tail swinging like a medieval mace.<br><br><br><br>The Deinonychus pack scattered like leaves in a hurricane, their attention completely diverted from the small, pink creature they'd been stalking. Within seconds, Malone found himself alone in the chaos of a prehistoric stampede.<br><br><br><br>More herbivores were running now, fleeing from some unseen threat deeper in the forest. A herd of duck-billed dinosaurs thundered past, their honking calls adding to the din. Something with a sail on its back stumbled through the undergrowth, crashing into trees with sounds like breaking lumber.<br><br><br><br>Malone ran.<br><br><br><br>He sprinted through the alien forest, dodging massive tree trunks and leaping over fallen logs that could hide a dozen predators. Behind him, he could hear the pack reforming, their hunting calls echoing through the trees as they took up his trail again.<br><br><br><br>A root caught his foot and sent him sprawling. As he rolled to his feet, he came face to face with something that made him forget all about the pack behind him.\n                    </div>\n                "

hropological discovery of the century.\"<br><br><br><br>\"If we live to tell about it,\" Summerlee muttered.<br><br><br><br>But Malone was thinking about those intelligent eyes, that obvious cunning. The ape-men weren't just primitive savages. They were organized, territorial, and clearly considered the plateau their domain.<br><br><br><br>Which made the human expedition unwelcome invaders in a very dangerous land.<br><br><br><br>*The ape-man's war cry echoed across the plateau. Within minutes, the entire tribe would know intruders had arrived.*<br><br><br><br>---\n                    </div>\n                "
