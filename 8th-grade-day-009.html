 hunting, even basic strategy.\"<br><br><br><br>\"The question is,\" Summerlee gasped, struggling to keep up with the pace their captors set, \"what do they plan to do with us?\"<br><br><br><br>They soon found out.<br><br><br><br>The ape-men led them deeper into the plateau's interior, following paths that were invisible to human eyes but clearly well-known to their captors. They passed through groves of trees that belonged to no earthly forest, across streams where strange fish with too many fins swam in waters that glowed with phosphorescence.<br><br><br><br>And everywhere, signs of the ape-men's civilization.<br><br><br><br>These weren't just primitive hunters. They were builders, creators, organized into a complex society that had survived here for countless generations. Crude but effective bridges spanned the wider streams. Lookout posts had been built in the crowns of the tallest trees. Most impressive of all were the warning totems—carved wooden posts topped with the skulls of dinosaurs, positioned at regular intervals along their route.<br><br><br><br>\"They're marking territory,\" Lord John observed. \"And warning off threats.\"<br><br><br><br>\"Then what,\" Malone asked, \"are we?\"\n                    </div>\n                "

ions.\"<br><br><br><br>The ape-men had formed a circle around the pit's edge, their chanting growing louder and more frenzied with each passing moment. Their chief held a bone staff topped with the skull of some horned dinosaur, and as he raised it above his head, the chanting reached a crescendo that seemed to make the very air vibrate.<br><br><br><br>That's when they heard it—the sound that explained everything.<br><br><br><br>From far below in the darkness came an answering call, a roar that was part reptilian bellow, part something else entirely. Whatever lived in that pit was huge, hungry, and very much alive.\n                    </div>\n                "

nted on.<br><br><br><br>From the depths of the pit came a roar of rage that dwarfed every sound they'd heard so far. The thing below had been disturbed, and it was not pleased.<br><br><br><br>The ground began to shake as something enormous started climbing toward them.<br><br><br><br>*The ground began to vibrate. Far below in the darkness, something enormous was climbing toward them.*<br><br><br><br>---\n                    </div>\n                "
