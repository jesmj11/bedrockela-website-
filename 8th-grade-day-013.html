t a strange compulsion to step forward, to accept whatever transformation was being offered. Part of his mind whispered that this was the ultimate discovery—not just finding the Lost World, but becoming part of it.<br><br><br><br>But another part, the part that was still human, still individual, still *him*, rebelled against the idea of losing everything that made him unique.<br><br><br><br>\"No,\" he said, his voice growing stronger with each word. \"We didn't come here to become something else. We came to explore, to learn, to share what we found with the world.\"<br><br><br><br>White's enhanced features showed something that might have been disappointment—or pity.<br><br><br><br>\"The world you speak of is ending,\" he said. \"War is coming. Destruction on a scale you cannot imagine. Only here, only through transformation, can consciousness survive what is to come.\"<br><br><br><br>The evolved ape-creatures were moving closer now, their telepathic abilities creating a web of mental pressure that was almost impossible to resist. Malone could feel his will beginning to weaken, his sense of self starting to blur at the edges.\n                    </div>\n                "
