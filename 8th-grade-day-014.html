e causeway was ancient beyond measure, held together by engineering principles that belonged to no known civilization. But it was still intact, still their best hope of reaching the far side of the valley.<br><br><br><br>They were halfway across when they realized they weren't alone.<br><br><br><br>The original ape-men—the primitive tribe that had captured them—were fleeing across the same bridge from the opposite direction. The two groups met in the middle, with nowhere to go and no choice but to face each other.<br><br><br><br>The ape-men chief still carried his bone staff, but his eyes held no malice now—only the desperate fear of a creature whose world was ending in fire and chaos. When he spoke, his guttural words carried a meaning that transcended language.<br><br><br><br>*Help us.*<br><br><br><br>\"They're just trying to survive,\" Malone said, surprising himself with his compassion for the creatures who had nearly fed him to a dinosaur. \"Same as us.\"<br><br><br><br>The moment of understanding was shattered by a sound that made the bridge stones crack beneath their feet. The T-Rex had noticed their elevated position and was trying to reach them, its massive claws scrabbling for purchase on the ancient stonework.<br><br><br><br>\"The bridge won't hold,\" Lord John said grimly, watching hairline fractures spread through the ancient masonry. \"We need to get across. Now.\"<br><br><br><br>But there wasn't time.<br><br><br><br>With a grinding roar of failing stone, the center span of the bridge began to collapse.<br><br><br><br>*The bridge collapsed into flames behind them, but ahead lay only the thousand-foot cliff face and certain death.*<br><br><br><br>---<br><br><br><br>---<br><br><br><br>## Return to the World\n                    </div>\n                "
