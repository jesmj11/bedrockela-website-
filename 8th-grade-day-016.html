g.<br><br><br><br>Morrison fumbled for his notebook, trying to record everything he was seeing. Someone had to know. Someone had to warn them.<br><br><br><br>The walking machine paused at the crater's edge, its hood swiveling once again as if taking a final survey of its handiwork. For a moment that lasted forever, Morrison was certain it was looking directly at him.<br><br><br><br>*The machine's hood turned toward him. Something inside was watching.*<br><br><br><br>---\n                    </div>\n                "
