ht. For a moment, Morrison thought it was some kind of signaling apparatus.<br><br><br><br>Then the heat-ray fired.<br><br><br><br>The beam was invisible, but its effects were not. The railway bridge simply exploded into steam and fragments, taking forty feet of track with it. The locomotive hit the gap at full speed and plunged into the crater in a screaming cascade of metal and steam.<br><br><br><br>The passenger cars followed, each one adding to the growing pile of wreckage and death at the bottom of what had once been a peaceful stream.<br><br><br><br>Morrison vomited into the grass, his mind reeling from the casual efficiency of the slaughter. Hundreds of people—men and women heading to work, children going to visit grandparents, ordinary human beings living ordinary lives—wiped out in seconds by a technology beyond their understanding.<br><br><br><br>But this was just the beginning.<br><br><br><br>Even as he watched, more signals were flashing between the tripods in the crater. Light reflected off mirrors, patterns that might have been some form of communication. The machines were coordinating, planning their next move.\n                    </div>\n                "
