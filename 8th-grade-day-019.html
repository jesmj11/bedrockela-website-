n achievement.<br><br><br><br>\"We have to get off the roof,\" he said quietly. \"They're targeting anything tall.\"<br><br><br><br>As if to prove his point, the nearest tripod swiveled its heat-ray toward the dome of St. Paul's Cathedral. Christopher Wren's masterpiece—the symbol of London's indomitable spirit—lasted exactly as long as it took the Martian operator to notice it.<br><br><br><br>The dome collapsed inward with a roar that shook every building in the city.<br><br><br><br>Panic was spreading through the streets now as people finally understood what was happening. Crowds poured out of buildings, families fled with whatever they could carry, vehicles of every description clogged the roads leading away from the advancing machines.<br><br><br><br>But there was nowhere to run.<br><br><br><br>More tripods were approaching from the east and west, completing the encirclement of London. Heat-rays swept through the fleeing crowds like scythes through wheat, leaving nothing but shadows burned into the pavement where human beings had stood moments before.<br><br><br><br>Morrison and Henley scrambled down from the roof as the *Telegraph* building shuddered under a near miss from an alien weapon. Around them, the newsroom was in chaos—reporters shouting questions that had no answers, editors trying to compile stories about the end of the world, typewriters chattering with desperate final dispatches that would never be read.\n                    </div>\n                "

m Imperial College who'd been caught in the city when the attack began. Her dark eyes were sharp with intelligence despite the fear that gripped them all.<br><br><br><br>Morrison knew, though he didn't want to believe it. He'd seen the tripods deploying new equipment before the heat-rays had driven him underground—tanks and tubes and apparatus that looked disturbingly like spraying devices.<br><br><br><br>\"Chemical weapons,\" he said, his voice barely audible. \"They're gassing the city.\"\n                    </div>\n                "

ve way just as the black vapor reached the service tunnel behind them.<br><br><br><br>They tumbled into the Victorian sewers beneath London, splashing through water that had been running under the city since before Morrison was born. The tunnels were dark, foul-smelling, and absolutely beautiful because they were still free of alien gas.<br><br><br><br>Behind them, the service door slammed shut as the black death filled the spaces they'd just escaped.<br><br><br><br>\"How many more people are trapped up there?\" Sarah asked, her voice echoing off the brick walls.<br><br><br><br>Morrison didn't answer. Couldn't answer. Because the truth was that London—the greatest city in the world, home to eight million people—was being methodically exterminated by creatures from another world.<br><br><br><br>And they were powerless to stop it.<br><br><br><br>*Above them, metal feet walked on London's grave.*<br><br><br><br>---\n                    </div>\n                "
