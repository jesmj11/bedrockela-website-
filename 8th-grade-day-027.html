n livestock—was a wound that might never heal.<br><br><br><br>\"Any word from the other capitals?\" he asked.<br><br><br><br>Dr. Carey's expression darkened. \"Paris is gone. Berlin is mostly intact but completely depopulated. New York...\" She shrugged helplessly. \"The reports are still coming in, but it doesn't look good. We might be looking at a global population loss of fifty percent or more.\"<br><br><br><br>Fifty percent. Half of humanity, dead or missing in the space of a few weeks.<br><br><br><br>They made their way toward what had once been the Natural History Museum, now partially reclaimed by vegetation but still recognizably alien in its bio-mechanical architecture. This was where Morrison and Sarah had first witnessed the true scope of Martian plans for humanity, and it was here that they hoped to find answers to questions that kept the survivors awake at night.<br><br><br><br>What they found was worse than anything they'd imagined.\n                    </div>\n                "

 be carrying.\"<br><br><br><br>But Morrison was focused on something else entirely. The Martian's large, dark eyes were tracking their movements with obvious intelligence, and the bio-mechanical apparatus around its chamber was displaying patterns that looked disturbingly like language.<br><br><br><br>\"It's trying to tell us something,\" he said.\n                    </div>\n                "
