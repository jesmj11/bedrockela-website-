em is collapsing faster than their scientists anticipated.\"<br><br><br><br>She activated a projection system that displayed the data the dying Martian had shared—atmospheric readings, climate models, population statistics that painted a picture of a world in its final death throes.<br><br><br><br>\"According to these projections, Mars has maybe twenty years before its atmosphere becomes completely unbreathable. Their civilization is facing extinction, and Earth represents their only hope for survival.\"<br><br><br><br>The implications were staggering. The next Martian invasion wouldn't be a calculated colonization attempt—it would be the desperate last stand of an entire species facing extinction. They would come with everything they had, every weapon, every survivor, every technological advantage they could develop.<br><br><br><br>And they would fight to the death because death was the only alternative.<br><br><br><br>\"How many ships?\" General Morrison asked grimly.<br><br><br><br>Dr. Carey consulted the alien data. \"The communication logs suggest they're converting their entire industrial capacity to starship construction. Thousands of vessels, maybe tens of thousands. Their entire population, transported to Earth in one massive migration.\"<br><br><br><br>Morrison felt the weight of responsibility settling on his shoulders like a lead blanket. He was probably the only person in the room who had actually seen a Martian invasion in progress, who understood the true scale of their technological superiority. Humanity had survived the first attack through pure biological luck—bacteria that the aliens hadn't anticipated.<br><br><br><br>That luck wouldn't work twice.\n                    </div>\n                "
