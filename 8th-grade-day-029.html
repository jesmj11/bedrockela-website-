, and direct injection into areas where Martian scouts were operating.<br><br><br><br>The results were immediate and devastating.<br><br><br><br>Unlike the first invasion, where Martians had died slowly from unexpected bacterial infections, this time the alien scouts were killed by diseases specifically engineered to target their biology. Their protective suits, designed to filter out Earth's natural bacteria, were helpless against viruses that had been created in human laboratories for the specific purpose of Martian extermination.<br><br><br><br>But humanity's victory came at a cost that would haunt the survivors for generations.<br><br><br><br>\"Ninety-seven percent mortality rate among the advance scouts,\" Dr. Carey reported with clinical detachment that masked her own horror at what they'd unleashed. \"Complete biological system failure within six hours of exposure.\"<br><br><br><br>Morrison stared at the reports detailing humanity's first successful genocide. Somewhere on a dozen different landing sites, alien beings who'd come to Earth as scouts and explorers were dying in agony from diseases that existed for no purpose other than killing them.<br><br><br><br>\"Signal intercepts suggest the main fleet is altering course,\" Sarah added. \"They're not coming directly to Earth anymore. Looks like they're establishing a staging area in the asteroid belt.\"<br><br><br><br>The Martians were adapting again, learning from the failure of their advance scouts just as they'd learned from the failure of their first invasion. But this time, humanity was adapting too.<br><br><br><br>\"How long before they develop countermeasures to our biological weapons?\" General Morrison asked.<br><br><br><br>Dr. Carey consulted her research data. \"With their level of biotechnology? Maybe two years. Maybe less.\"<br><br><br><br>Two years to prepare for the final invasion. Two years to build defenses against an enemy that now knew humanity was capable of deliberate biological warfare. r><br><br>Dead. An entire world, with millions of years of evolution and thousands of years of civilization, reduced to a sterile rock because two species couldn't find a way to share the universe.<br><br><br><br>Morrison thought about the dying Martian he'd spoken to in the ruins of London, the creature that had shared its species' knowledge in what might have been an attempt at peace rather than conquest. Had there been other ways to resolve the conflict? Other solutions that didn't require the complete destruction of one civilization or the other?<br><br><br><br>But those were questions for philosophers and historians. Morrison was a journalist, and his job was to record what had happened, not to judge whether it should have happened.<br><br><br><br>\"Signal from Earth Command,\" the communication officer announced. \"Priority message for you, sir.\"<br><br><br><br>The message was brief and to the point: \"Return immediately. New radio signals detected from Alpha Centauri. Possible artificial origin.\"<br><br><br><br>Morrison stared at the message, understanding flooding through him with terrible clarity. Mars hadn't been the only world sending out colonization missions. Somewhere in the galaxy, other dying civilizations were looking for new homes, new worlds to colonize, new species to displace in the name of survival.<br><br><br><br>The war for Earth wasn't over.<br><br><br><br>It had just begun.\n                    </div>\n                "
