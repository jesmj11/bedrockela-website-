er, I am expecting several boxes to be delivered shortly. Scientific equipment that must be handled with extreme care. I trust your staff understands the importance of not disturbing a gentleman's research?\"<br><br><br><br>There was something in his tone that made Mrs. Hall's skin crawl—an undercurrent of threat that seemed completely at odds with his polite words. But gold was gold, and winter was hard on the inn's finances.<br><br><br><br>\"Of course, sir. We'll see that you're not bothered.\"<br><br><br><br>She led him upstairs to the inn's finest room, noting how he moved with obvious discomfort, as if every step caused him pain. Some kind of medical condition, perhaps—that would explain the bandages and the heavy clothes.<br><br><br><br>\"Will you be taking meals in the dining room, sir?\"\n                    </div>\n                "

sked Mrs. Bunting, the vicar's wife, with the avid interest of someone whose life was usually devoted to organizing church fêtes and worrying about the state of the rectory's roof. \"Was there an accident?\"<br><br><br><br>\"Must have been something terrible,\" Millie continued, enjoying her role as the bearer of exotic news. \"Mrs. Hall says he won't let anyone see his face. Takes all his meals alone, locks his door, and makes the most peculiar noises up there. Chemical smells, too—like the doctor's surgery but stronger.\"\n                    </div>\n                "
