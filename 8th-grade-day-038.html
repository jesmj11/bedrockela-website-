ences.\"<br><br><br><br>But even as Griffin threatened him, Marvel was calculating distances and timing. Three weeks of forced partnership had taught him Griffin's habits, his patterns, his moments of distraction. And Marvel had been planning his escape for days, waiting for the right opportunity.<br><br><br><br>\"You're right,\" Marvel gasped when the invisible hands released his throat. \"I'm sorry. I'll do whatever you want.\"<br><br><br><br>Griffin's laughter filled the barn with malevolent amusement. \"I knew you'd see reason eventually. Fear is such an effective teacher.\"<br><br><br><br>But Marvel was no longer listening to his invisible tormentor. He was focused on the bag containing Griffin's research notes—the scientific documents that proved how invisibility could be achieved. If those notes fell into the right hands, perhaps other scientists could develop countermeasures, ways to detect or even reverse the process.<br><br><br><br>Griffin had made one crucial mistake in his treatment of his accomplice. He'd assumed that a homeless vagrant couldn't possibly outsmart a brilliant scientist. He'd underestimated the survival instincts of someone who'd lived rough for twenty years.\n                    </div>\n                "

om various forms of mental breakdown.<br><br><br><br>But Marvel's terror was different—deeper and more genuine than anything Kemp had seen in fifteen years of medical practice.<br><br><br><br>\"Slow down,\" Kemp said gently. \"Start from the beginning. Who is chasing you, and why do you think he's invisible?\"\n                    </div>\n                "
