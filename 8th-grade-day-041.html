in had already moved somewhere else.<br><br><br><br>Kemp crouched behind his overturned desk, watching his home being destroyed by the battle between visible law enforcement and invisible criminal. Every broken piece of furniture, every shattered window, every bullet hole in his walls was evidence of Griffin's complete abandonment of rational thought.<br><br><br><br>The invisible man was no longer trying to escape or hide—he was fighting a hopeless battle against overwhelming odds simply because his megalomania wouldn't allow him to admit defeat.<br><br><br><br>\"You think you can capture me?\" Griffin shouted as he threw books and scientific instruments at the police officers brave enough to enter the house. \"I'm invisible! I'm untouchable! I'm beyond your petty laws and crude weapons!\"<br><br><br><br>But invisibility, Kemp realized, wasn't the same thing as invulnerability. Griffin still needed to breathe, still needed to eat, still needed to sleep. His power made him dangerous, but it didn't make him immortal.<br><br><br><br>*Griffin was loose again, and now he was murderous.*<br><br><br><br>---\n                    </div>\n                "
