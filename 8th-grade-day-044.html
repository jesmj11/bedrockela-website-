ted tactics that made his invisibility less effective.<br><br><br><br>\"There!\" someone shouted as Griffin's passage through a cloud of flour revealed his position. \"Northeast corner, moving toward the stairs!\"<br><br><br><br>Griffin felt something he hadn't experienced since his transformation—genuine fear of capture or death. These people weren't the panicked villagers he'd terrorized at Iping. They were trained, organized, and absolutely determined to stop him.<br><br><br><br>But Griffin's greatest tactical mistake was his inability to abandon his obsession with killing Kemp. Even as the search teams closed in around him, even as his escape routes were systematically eliminated, he kept returning to his plan for personal vengeance against the colleague who'd betrayed him.<br><br><br><br>That obsession led him back to Kemp's study door one final time, where Morrison's best marksman was waiting with a rifle loaded with specially prepared ammunition.<br><br><br><br>The shot that finally brought down the invisible man was fired at point-blank range into what appeared to be empty air—but the powder flash revealed Griffin's outline for just long enough to confirm that the bullet had found its mark.<br><br><br><br>Griffin's scream of pain and rage was the first genuine human sound he'd made since declaring war on visible humanity.<br><br><br><br>*At last, the invisible man was visible.*<br><br><br><br>---<br><br><br><br>---\n                    </div>\n                "

le to capture after weeks of invisible terrorism?<br><br>10. What is the significance of Griffin's final request to destroy his research?<br><br>11. Why is the ending both hopeful and ominous?<br><br><br><br>**Week 3 Assessment Topics:**<br><br>- Complete character arc: From sympathetic scientist to inhuman monster<br><br>- Power and corruption: How invisibility destroys Griffin's humanity<br><br>- Community response: How ordinary people unite against extraordinary evil<br><br>- Scientific responsibility: The ethics of dangerous discoveries<br><br>- Moral complexity: Unintended consequences of doing the right thing<br><br><br><br>**Series Connection to Book 4 (Mysterious Island):**<br><br>The Invisible Man shows science without moral constraints destroying the scientist. Next, we'll see science WITH moral purpose helping people survive impossible challenges.<br><br><br><br>---<br><br><br><br>**PSYCHOLOGICAL THRILLER STATUS: COMPLETE!**<br><br><br><br>Students will be simultaneously horrified by Griffin's transformation and relieved by his downfall—while understanding that the cycle could begin again!\n                    </div>\n                "
