od news is we're moving fast—maybe forty miles per hour. Bad news is there's a storm front building ahead of us.\"<br><br><br><br>Harbert looked in the direction Pencroff was pointing and felt his stomach drop. Massive black clouds were towering on the horizon, shot through with lightning and obviously carrying winds that could tear their balloon apart.<br><br><br><br>\"Can we avoid it?\" Cyrus Smith asked. The engineer had taken position at the balloon's controls, using his knowledge of mechanical systems to maintain their altitude and direction.<br><br><br><br>\"Not unless we can change the laws of physics,\" Pencroff replied grimly. \"That storm's covering hundreds of miles. We go through it or we go down.\"<br><br><br><br>Nab was distributing the meager supplies they'd managed to grab during their escape—a few pieces of bread, a canteen of water, some rope and tools that might prove useful if they survived to reach land.<br><br><br><br>\"How long can we stay aloft?\" Nab asked Smith.<br><br><br><br>Smith studied the balloon's gas bag, calculating their rate of climb against the inevitable loss of lifting gas through the fabric. \"Six hours, maybe eight if we're careful with the ballast. But that storm is going to test every seam and rope in this contraption.\"<br><br><br><br>As if summoned by his words, the first gusts of wind from the approaching storm front struck the balloon with enough force to send all five men scrambling for handholds. The wicker basket tilted at a crazy angle, spinning them around as the balloon was caught between competing air currents.\n                    </div>\n                "
