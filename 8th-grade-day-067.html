phone as if he's waiting for permission to make an important call.\"</p><p>Holmes's investigation of their immediate circumstances revealed that Moriarty had been preparing for weeks to ensure that their final confrontation would occur under conditions completely favorable to his purposes.</p><p>\"Local guides,\" Holmes discovered, \"have been approached by someone offering substantial payment for information about trails leading to isolated locations where 'geological research' could be conducted without disturbance.\"</p>\n                </div>\n            </div>\n        "
