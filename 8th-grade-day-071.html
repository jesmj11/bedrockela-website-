al criminal activity and affected national welfare.</p><p>\"The document was stolen from a locked safe,\" Hope continued, \"in circumstances that suggest either extraordinary criminal skill or access by someone with intimate knowledge of security procedures.\"</p><p>The investigation that followed required Holmes to apply his detective methods to political rather than criminal psychology, analyzing the motivations and capabilities of people whose actions were driven by international rather than personal interests.</p>\n                </div>\n            </div>\n        "
