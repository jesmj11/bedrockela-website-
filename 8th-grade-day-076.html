x that extended for miles beneath the garden surface was a marvel of engineering that surpassed anything the Victorian age had imagined—power generation systems that drew energy from the Earth's core, manufacturing facilities that produced everything necessary for maintaining their civilization, transportation networks that connected distant regions of their underground empire.\n\nBut perhaps most sophisticated was the agricultural system that the Morlocks had developed for managing their relationship with the surface-dwelling Eloi, whom they regarded not as fellow humans but as livestock whose welfare was important only insofar as it affected their ultimate utility.\n\n\"The breeding programs have succeeded beyond our original projections,\" reported the head of agricultural operations as he reviewed data about Eloi population management, \"producing specimens whose beauty and docility exceed anything we achieved during the early generations of our selective development program.\"\n\nThe historical records that the Morlocks maintained in their underground archives told the story of how this relationship had evolved over thousands of years from the class divisions that had characterized human society during the industrial age."
