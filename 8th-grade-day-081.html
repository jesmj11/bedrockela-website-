r industrial age began concentrating workers in underground facilities,\" the Morlock continued, \"those who performed physical labor gradually adapted to subterranean existence, while those who lived in luxury gradually lost the capabilities that survival required.\"\n\nThe evolutionary process that had created separate human species was explained with scientific precision that showed how environmental pressures had modified both populations in ways that eventually made them incapable of interbreeding or sharing common social arrangements.\n\n\"Thousands of years of separation,\" the Morlock observed, \"created physiological and mental adaptations that made surface dwellers dependent on our industrial support, while making us capable of survival that no longer required their leadership or management.\"\n\nBut perhaps most disturbing was the recognition that this separation had been gradual enough to seem natural to both populations, with each group adapting to circumstances that appeared to represent mutual benefit rather than systematic exploitation.\n\n\"They live in comfort,\" the Morlock explained, \"protected from every hardship that might threaten their beautiful existence, while we maintain the technology that provides everything they need for the paradise that their nature now requires.\""
