 needs.\"\n\nThe ocean that covered most of Earth's surface was a sea of ice where only the most basic forms of life could survive the cold that resulted from reduced solar radiation, while atmospheric conditions had changed in ways that made the planet increasingly inhospitable to organic existence.\n\n\"The air itself grows thin,\" he observed as he felt the effects of an atmosphere that could no longer support the complex chemistry that advanced life forms required, \"while temperatures approach absolute zero that will eventually eliminate even these final remnants of evolutionary development.\"\n\nBut perhaps most disturbing was recognition that these creatures showed no awareness of their condition, no memory of their species' previous achievements, and no aspiration toward anything beyond the immediate requirements that their reduced existence imposed.\n\n\"They have no knowledge,\" the Time Traveller concluded as he watched humanity's last descendants move through their dying world without apparent consciousness of their situation, \"of what their ancestors achieved during the brief period when Earth's conditions permitted complex civilization, and they possess no capacity for understanding what their existence represents in the broader context of cosmic development.\""
