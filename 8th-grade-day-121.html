        "html": "\n            <div class=\"page-card story-page\">\n                <h2>📖 Story (Part 1 of 3)</h2>\n                <div class=\"story-content\">\n                    <p>The ice that held Captain Robert Walton's ship prisoner in the Arctic wastes seemed to stretch endlessly in every direction, but nothing in those frozen desolations had prepared him for the sight that would haunt his dreams for the rest of his life.</p><p>Walton had come to the Arctic in pursuit of scientific glory—seeking a northern passage to the Pacific that would revolutionize global commerce and establish his reputation as one of history's greatest explorers. But on this July morning in 1794, surrounded by ice mountains that towered above his ship like frozen cathedrals, he discovered that some forms of knowledge came at too high a price for human civilization to bear.</p><p>\"Captain!\" called his first mate from the ship's bow, his voice carrying across the ice-locked deck with urgent alarm. \"There's something moving on the ice, sir! Something impossible!\"</p><p>Walton raised his telescope and focused on the distant figure that his crewman had spotted crossing the frozen wasteland that extended beyond the reach of normal human vision.</p><p>What he observed through his lens challenged every assumption he had ever made about the limits of human endurance and the relationship between scientific advancement and moral responsibility.</p><p>A sledge was moving across the ice at impossible speed, pulled by dogs that seemed driven by supernatural terror rather than normal animal obedience. But it was the figure controlling the sledge that made Walton question his own sanity.</p><p>The driver was enormous—at least eight feet tall, with proportions that suggested immense physical power combined with agility that no normal human being could possess. Even at a distance of several miles, Walton could see that the creature moved with purpose and intelligence that indicated consciousness rather than mere animal instinct.</p><p>\"What in God's name is that thing?\" Walton whispered as he watched the mysterious sledge disappear into the ice formations that marked the northern horizon.</p><p>But his question would be answered sooner than he expected, in ways that would challenge everything he thought he understood about the relationship between scientific curiosity and human responsibility.</p><p>The following morning, Walton's crew spotted a second sledge approaching their trapped ship—this one carrying a single human figure who appeared to be in desperate pursuit of whatever had crossed the ice the previous day.</p><p>\"Ahoy there!\" Walton called across the ice as the sledge approached within speaking distance. \"Do you need assistance?\"</p><p>The man who looked up from his exhausted position behind the remaining sled dog was clearly European, probably in his twenties, but aged by experiences that had pushed human endurance beyond its normal limits.</p><p>\"I am pursuing someone,\" the stranger replied in accented English that suggested education and social refinement. \"Someone who has destroyed everything I ever loved, and who will continue destroying innocent lives until I stop him.\"</p><p>The rescue that followed brought aboard Walton's ship a young man who introduced himself as Victor Frankenstein, a Swiss scientist whose story would provide the most terrifying warning about unchecked scientific ambition that any explorer had ever received.</p><p>\"Captain Walton,\" Victor said as the ship's doctor worked to restore his circulation and treat the frostbite that marked weeks of Arctic pursuit, \"you seem like a man who values scientific achievement above personal comfort or social convention.\"</p>\n                </div>\n            </div>\n        "

        "html": "\n            <div class=\"page-card story-page\">\n                <h2>📖 Story (Part 2 of 3)</h2>\n                <div class=\"story-content\">\n                    <p>\"Indeed,\" Walton replied, recognizing a kindred spirit whose dedication to knowledge matched his own ambitious goals. \"I have risked everything—my fortune, my crew, my very life—to achieve discoveries that will advance human understanding of the natural world.\"</p><p>Victor's expression became haunted as he processed Walton's familiar words about the relationship between risk and scientific advancement.</p><p>\"Then you are in mortal danger,\" Victor said with intensity that carried conviction born from terrible experience. \"And I am perhaps the only person alive who can warn you about the true cost of pursuing knowledge without accepting responsibility for its consequences.\"</p><p>The confession that Victor began that evening, as arctic storms raged around Walton's ice-locked ship, would reveal how brilliant scientific minds could create horrors that exceeded anything found in the natural world.</p><p>\"Captain,\" Victor said as he prepared to share the story that would change Walton's understanding of the relationship between human ambition and moral obligation, \"I have created a demon whose fury knows no bounds, and I am pursuing him across the world's end because I alone bear responsibility for every innocent life he has destroyed.\"</p><p>*I have created a demon whose fury knows no bounds.*</p><p>---</p><p>The story that Victor Frankenstein told during the long Arctic night revealed how even the most loving family circumstances could produce scientific ambition that would ultimately destroy everything it was meant to protect.</p><p>\"I was born into happiness,\" Victor began, his voice carrying the weight of someone who understood exactly how much he had lost through his own choices. \"My parents were devoted to each other and to their children, creating a household where love, learning, and moral development flourished in perfect harmony.\"</p><p>Victor's childhood in Geneva had provided every advantage that wealth, education, and family affection could offer. His father, Alphonse Frankenstein, was a respected magistrate whose humanitarian principles guided both his professional decisions and his approach to raising children who would contribute positively to human society.</p><p>\"My father believed,\" Victor continued, \"that proper education involved not just intellectual development but moral formation that would ensure his children used their capabilities to benefit others rather than simply to advance their own interests.\"</p><p>The Frankenstein household included not just Victor and his younger brother William, but also Elizabeth Lavenza, an orphaned cousin who had been adopted into their family when Victor was five years old.</p><p>\"Elizabeth,\" Victor said with obvious pain at mentioning her name, \"represented everything that was pure and good about human nature. She possessed beauty, intelligence, and moral sensitivity that made everyone who met her understand what humanity could achieve at its finest development.\"</p><p>But it was Victor's early fascination with natural philosophy that would ultimately lead him away from the family values that had shaped his childhood toward scientific pursuits that would corrupt everything he had been taught to cherish.</p><p>\"I discovered the works of ancient alchemists,\" Victor explained to Captain Walton, \"writers like Cornelius Agrippa, Paracelsus, and Albertus Magnus, who claimed that human knowledge could unlock the fundamental secrets of life, death, and natural transformation.\"</p>\n                </div>\n            </div>\n        "

ty's transformative power convinced Victor that dedicated scientific research could achieve results that would revolutionize human understanding of life itself.</p><p>\"I began to believe,\" Victor said, \"that the boundary between life and death was not absolute, but represented a natural process that could be understood, controlled, and potentially reversed through proper application of scientific knowledge.\"</p><p>As Victor prepared to leave home for university education that would provide him with the advanced training needed to pursue his scientific ambitions, he understood that he was embarking on research that could change the world.</p><p>But he had no understanding of the moral responsibilities that accompanied such power, or the terrible consequences that awaited scientists who pursued knowledge without accepting accountability for what their discoveries might create.</p><p>\"I left Geneva,\" Victor concluded, \"believing that scientific advancement was always beneficial, and that any knowledge gained through systematic experimentation would ultimately serve humanitarian purposes.\"</p><p>*Nature's secrets called to him like forbidden knowledge.*</p><p>---</p>\n                </div>\n            </div>\n        "
