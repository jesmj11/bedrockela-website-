 because of the psychological destruction that resulted from having his hopes for acceptance brutally crushed.</p><p>\"I understood,\" the creature said, \"that no amount of intellectual development, moral behavior, or peaceful intention could ever overcome the barrier created by my appearance. I was condemned to isolation not because of who I was, but because of what I looked like.\"</p><p>The transformation that occurred during the creature's flight from the De Lacey cottage was as complete and irreversible as Victor's original act of creation had been.</p><p>\"I left their clearing,\" the creature concluded, \"as a different being than I had been when I approached their door. Hope had been replaced by rage, loneliness by hatred, and desire for acceptance by determination to make the world pay for rejecting what it had no right to judge.\"</p><p>*If he could not have love, he would have revenge.*</p><p>---</p>\n                </div>\n            </div>\n        "
