ictor chose for his second creation was deliberately remote from both his family and normal human society—an isolated island off the Scottish coast where his work could proceed without endangering innocent people or attracting unwanted attention.</p><p>\"I established a laboratory,\" Victor continued, \"in an abandoned cottage that provided adequate space for the technical requirements of artificial creation while ensuring that any disasters would affect only myself rather than populations that bore no responsibility for my scientific choices.\"</p><p>But the psychological experience of beginning work on a second creature was fundamentally different from Victor's original experimentation, because he now understood the moral implications and potential consequences of success.</p><p>\"I could not approach this work,\" Victor admitted, \"with the excitement and intellectual curiosity that had characterized my original research. Every step of the process reminded me of the suffering that my first creation had already caused and the additional dangers that success might unleash.\"</p>\n                </div>\n            </div>\n        "
