d that human ears could detect.</p><p>The warriors who slept in the hall after their evening of celebration had no warning of the evil that stalked toward them, no chance to reach for weapons or call for help before death arrived with claws sharper than any sword.</p><p>The great wooden doors of Heorot, built to withstand the attacks of enemy armies and reinforced with iron bands that could turn aside spear-points and ax-blades, snapped like kindling when Grendel's supernatural strength struck them.</p><p>The first warrior to die never had time to scream—one moment he was sleeping peacefully beside his companions, dreaming perhaps of home and family, and the next his body was torn apart by claws that could rend mail-shirts and helmets as easily as cloth.</p><p>The sounds that followed filled the night with horror that would haunt the survivors for the rest of their lives—the wet tearing of flesh, the splintering of bones, the dying gasps of men who had faced human enemies without fear but who could not comprehend the evil that was destroying them.</p>\n                </div>\n            </div>\n        "

ies and the weapons of heroes whose deeds had earned them permanent places of honor.</p><p>\"This will be the heart of our kingdom,\" Hrothgar had said during the hall's dedication ceremony, \"the place where we celebrate our victories, remember our honored dead, and plan for the future prosperity of our children and their children.\"</p><p>For twelve years, Heorot had fulfilled every expectation its builders had hoped for—it became the center of Danish cultural life, the destination for travelers from distant lands, and the symbol of everything that human courage and wisdom could achieve.</p>\n                </div>\n            </div>\n        "

derstood that something beyond human evil had discovered his kingdom and that all his wealth and wisdom and military strength might not be sufficient to protect his people from a enemy that was not bound by the limitations that governed mortal warfare.</p><p>*The demon that haunted them was beyond mortal strength to defeat.*</p><p>---</p>\n                </div>\n            </div>\n        "
