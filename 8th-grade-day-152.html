 evil and human civilization.</p><p>\"God helps those who help themselves,\" observed Father Hrethric, the hall's chaplain, \"but perhaps He expects us to find among ourselves the courage and strength that this battle will require.\"</p><p>The appeals that had been sent to neighboring kingdoms had produced expressions of sympathy and offers of normal military assistance, but no ruler possessed warriors capable of facing an enemy that human weapons could not harm.</p><p>\"King Hygelac of the Geats,\" reported the messenger who had returned from that distant court, \"sends word that his heart grieves for Denmark's suffering, but his army is composed of mortal men who would be slaughtered as easily as our own warriors have been.\"</p><p>But among the responses that reached Hrothgar's court was one message that offered hope different from the conventional military aid that other kingdoms could provide.</p>\n                </div>\n            </div>\n        "
