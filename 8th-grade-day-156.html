splayed as he prepared for a confrontation that had destroyed every other warrior brave enough to attempt it—his demeanor suggested complete certainty about the outcome of a battle that seemed impossible to win.</p><p>\"Rest easy, my friends,\" Beowulf told his companions as they settled into positions around the hall, \"for either we will greet the dawn as victors who have freed Denmark from twelve years of terror, or we will wake in the presence of our Lord, having died in service of a cause worthy of Christian warriors.\"</p><p>The hours that passed between the end of the feast and the arrival of supernatural terror were filled with a tension unlike anything the Geats had experienced during their previous battles against human enemies.</p><p>The darkness outside Heorot seemed deeper and more threatening than natural night, while the silence was broken only by sounds that suggested movement of something larger and more dangerous than any creature that belonged to the world of normal human experience.</p><p>\"He comes,\" whispered Wiglaf as the very air in the hall seemed to thicken with the presence of evil that made brave men's hearts race with fear that had nothing to do with ordinary concern for personal safety.</p><p>The approach of Grendel was felt rather than heard—a supernatural dread that filled the hall like poisonous fog, making every warrior understand that they were about to witness a confrontation between forces that exceeded anything normally associated with human conflict.</p>\n                </div>\n            </div>\n        "

e to cleanse this hall of the evil that has defiled it and to restore peace to people who have suffered long enough under your tyranny.\"</p><p>The collision between supernatural hero and supernatural monster shook the very foundations of Heorot, as two forms of strength that exceeded normal human limitations met in combat that would determine whether good or evil would triumph in the eternal struggle between light and darkness.</p><p>Grendel's claws, which had torn through the finest armor that Danish smiths could forge, met flesh that seemed harder than iron and found for the first time in his existence an opponent whose body could not be shredded by his supernatural weapons.</p>\n                </div>\n            </div>\n        "
