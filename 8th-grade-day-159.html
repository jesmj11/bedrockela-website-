at exceeds their mere material properties.\"</p><p>The moment of entry into the cursed waters was witnessed by all the assembled warriors, who understood they were observing something that would become legendary regardless of its outcome—either the greatest heroic deed in northern history or the most noble failure ever attempted by mortal man.</p><p>The descent through supernatural waters revealed depths that seemed to extend beyond anything that natural lakes could contain, while creatures that had never been seen in the upper world surrounded the descending hero with malevolent attention.</p><p>Sea-serpents whose length exceeded the greatest ships attacked with fangs that could pierce normal armor, but Beowulf's mail-shirt turned aside their assault while his strength allowed him to fight them even in their own element.</p><p>\"God protects those who serve His purpose,\" Beowulf reflected as he battled through increasingly dangerous depths, \"and grants strength sufficient to overcome any evil that threatens the innocent, regardless of how impossible victory might appear to mortal understanding.\"</p><p>The pressure of supernatural waters and the attacks of cursed creatures would have destroyed ordinary men within moments of beginning such a descent, but divine favor sustained the hero whose purpose exceeded personal glory or earthly reward.</p>\n                </div>\n            </div>\n        "

e will be tested against wisdom that was ancient when your ancestors first learned to forge iron.\"</p><p>The appearance of Beowulf's enemy revealed why ordinary weapons had proven useless against her son—she was larger and stronger than Grendel had been, while her hide showed scars from countless battles that proved her survival of conflicts that had destroyed every opponent she had ever faced.</p><p>But perhaps most disturbing was the intelligence that gleamed in her eyes—where Grendel had been driven by envious rage that clouded his judgment, his mother possessed the calculated wisdom that made her infinitely more dangerous than mere supernatural strength could explain.</p><p>\"You killed my child,\" she continued with grief that was matched by fury that had been building in intensity since she discovered Grendel's mangled remains, \"and now you will learn that maternal love is stronger than heroic courage, and that a mother's vengeance exceeds any protection that divine favor might provide.\"</p>\n                </div>\n            </div>\n        "
