en the greatest heroes must prepare their people for leadership transitions that would test the strength of institutions that individual courage had created.</p><p>\"I have no sons,\" Beowulf acknowledged with regret that was tempered by confidence in the young warriors who had proven their loyalty and capability, \"but I have trained kinsmen whose courage and wisdom qualify them to continue the protection that our people deserve.\"</p><p>The peaceful prosperity that characterized the aging king's realm was about to be shattered by a threat that would test whether supernatural heroism could triumph over supernatural evil when divine favor was no longer strengthened by youthful vigor.</p>\n                </div>\n            </div>\n        "

esistance.</p><p>\"Let fire consume their halls,\" the dragon declared as it surveyed the peaceful kingdom where men had dared to harbor thieves who violated treasures protected by supernatural power, \"and let smoke blacken their skies until they understand that some crimes against ancient authority cannot be forgiven or forgotten.\"</p><p>*The dragon's fury would consume everything in fire and smoke.*</p><p>---</p>\n                </div>\n            </div>\n        "
