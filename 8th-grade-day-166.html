 witnessed the final act of a supernatural bargain that had allowed beauty to mask the most corrupted soul in England.</p><p>How had eternal youth become eternal damnation? The answer lay in a story that began decades earlier, when a brilliant young artist became obsessed with painting the perfect portrait of the most beautiful man he had ever seen.</p><p>*How had eternal youth become eternal damnation?*</p>\n                </div>\n            </div>\n        "
