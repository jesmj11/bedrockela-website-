on that characterized Dorian's relationships was systematic and deliberate—he sought out innocent or vulnerable people whose corruption would provide him with entertainment while demonstrating his power to influence others.</p><p>\"He has a talent,\" observed Dr. Geoffrey Clouston, \"for identifying people's weaknesses and encouraging them to indulge those weaknesses until they become destructive obsessions.\"</p><p>The artistic community that had originally embraced Dorian because of Basil Hallward's championship had become wary of his influence after several young painters and writers had suffered career destruction following their friendship with him.</p><p>\"He destroys people,\" concluded the critic Philip Wayne, \"not through direct cruelty but through sophisticated encouragement of their worst impulses. He makes vice seem artistic and corruption appear sophisticated.\"</p><p>But perhaps most disturbing was Dorian's growing collection of beautiful objects that he acquired through methods that often involved the financial ruin or social disgrace of their previous owners.</p>\n                </div>\n            </div>\n        "

e to enhance my stage presence.\"</p><p>But the guidance that Dorian provided was designed to corrupt Catherine's artistic integrity while creating psychological dependence that would make her vulnerable to increasingly destructive forms of influence.</p><p>\"You shouldn't waste your talent on conventional roles,\" Dorian suggested during one of their private meetings in his elaborately decorated study. \"Someone with your beauty and intelligence should be pursuing experiences that ordinary actresses could never handle.\"</p><p>The transformation of Catherine's career from legitimate artistic development into something approaching scandal was accomplished through Dorian's sophisticated understanding of how to make corruption appear to be artistic advancement.</p>\n                </div>\n            </div>\n        "
