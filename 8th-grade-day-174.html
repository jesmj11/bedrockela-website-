        "html": "\n            <div class=\"page-card story-page\">\n                <h2>📖 Story (Part 1 of 3)</h2>\n                <div class=\"story-content\">\n                    <p>The moment when Dorian Gray was forced to confront the full extent of his moral corruption came during a private viewing of the portrait that had been bearing the burden of his sins for over two decades.</p><p>\"I haven't looked at it for months,\" Dorian admitted to himself as he stood before the locked door of the room where his supernatural secret was hidden. \"I've been afraid to see what twenty years of systematic corruption might have done to the painted image of my soul.\"</p><p>The key that unlocked the door seemed heavier in his hand than it had during his previous visits, as if the weight of accumulated guilt was affecting even his physical relationship with the mechanisms that protected his terrible secret.</p><p>The portrait that confronted Dorian when he finally found the courage to look upon it exceeded even his worst expectations of what moral decay might produce when given visible form.</p><p>The painted figure that had once captured the perfect beauty of innocent youth now showed a creature so hideous, so completely corrupted by evil, that it seemed to represent everything monstrous about human nature concentrated in a single image.</p><p>\"My God,\" Dorian whispered as he studied features that had been transformed by decades of cruel choices into something that belonged in nightmares rather than artistic representation. \"Is this really what I've become?\"</p><p>The face in the portrait showed not just age and decay, but active malevolence—the eyes glittered with pleasure in others' suffering, the mouth was twisted with contempt for human feelings, and the entire countenance radiated the kind of evil that corrupted everything it touched.</p><p>But perhaps most horrifying was Dorian's recognition that the changes shown in the portrait were not exaggerated or symbolic representations of moral decay, but accurate reflections of choices he had made deliberately and systematically over twenty years of supernatural preservation.</p><p>\"Every cruel word,\" Dorian reflected with growing self-awareness, \"every manipulative action, every moment when I chose my pleasure over someone else's welfare—all of it is recorded here with perfect honesty.\"</p><p>The hands shown in the portrait were stained with blood that seemed to glow with supernatural malevolence, representing not just the direct violence he had committed but the indirect destruction he had caused through corruption of others.</p><p>\"How many people have I destroyed?\" Dorian wondered as he studied the accumulated evidence of his moral choices. \"Sibyl, Catherine, Alan, and how many others whose names I've forgotten because their suffering provided only temporary entertainment?\"</p><p>The clothing depicted in the portrait was rich and beautiful, but somehow obscene in its combination of aesthetic perfection with moral corruption—as if beauty itself had been perverted into an instrument for evil rather than a source of inspiration.</p>\n                </div>\n            </div>\n        "

        "html": "\n            <div class=\"page-card story-page\">\n                <h2>📖 Story (Part 2 of 3)</h2>\n                <div class=\"story-content\">\n                    <p>But the most disturbing aspect of the portrait was Dorian's growing recognition that he felt no genuine remorse for what he had become—only irritation that his corruption had been recorded so accurately and fear that others might somehow discover his supernatural secret.</p><p>\"I should feel guilty,\" Dorian admitted, \"but instead I feel only annoyance that my actions have consequences that interfere with my ability to maintain appearances. Even confronted with clear evidence of what I've become, I care more about protecting my reputation than about the people I've harmed.\"</p><p>*The painting had become a window into his damned soul.*</p><p>---</p><p>The conversation that would determine whether Dorian Gray retained any capacity for redemption occurred when Basil Hallward made one final attempt to save the soul of the young man whose beauty had inspired his greatest artistic achievement.</p><p>\"I've heard terrible things about you, Dorian,\" Basil said as he confronted his former friend in the elegantly appointed study where they had once discussed art and philosophy with genuine mutual affection. \"Stories about your influence on young men, rumors about the people who've been ruined through association with you.\"</p><p>The artist who had once been captivated by Dorian's innocent beauty now faced someone whose preserved appearance masked decades of systematic moral corruption, and Basil's distress was evident as he struggled to reconcile his memories with present reality.</p><p>\"I don't believe the worst of what people say,\" Basil continued, \"but I need to hear from you directly what's happened to the pure young man I once knew and painted with such love.\"</p><p>Dorian's initial response was the sophisticated deflection he had perfected through years of avoiding responsibility for his actions and their consequences.</p><p>\"My dear Basil,\" Dorian replied with the charming manner that had once made their friendship seem intellectually stimulating, \"you shouldn't listen to gossip from people who are jealous of beauty and success they can't achieve themselves.\"</p><p>But Basil's persistence revealed that he had come prepared for such evasion and was determined to force a confrontation that would reveal the truth about what his artistic creation had enabled.</p><p>\"I'm not talking about jealousy or gossip,\" Basil insisted. \"I'm talking about specific people whose lives have been destroyed through their association with you. Young men who were promising before they became your friends and who are now ruined beyond redemption.\"</p>\n                </div>\n            </div>\n        "

e, without visible consequences. Every person I've destroyed, every soul I've corrupted—all of it was made possible by your artistic skill.\"</p><p>*The artist would pay for creating such terrible beauty.*</p><p>---</p>\n                </div>\n            </div>\n        "
