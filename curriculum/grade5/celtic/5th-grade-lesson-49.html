            <p>The hall went completely silent. The kind of silent where even the fire seems to stop crackling.</p>

            <p>"No one?" the head said. "Truly? The greatest warriors in Ireland and not one will take this bargain?"</p>

            <div class="story-text">
                <p>Cú Chulainn is one of the greatest heroes in Irish mythology, similar to how Hercules is famous in Greek myths or King Arthur in British legends. His name means 'Hound of Culann,' earned when he killed a fierce guard dog as a child and offered to take its place protecting the blacksmith's home. The stories say he was born with extraordinary gifts — he could go into a 'battle frenzy' where his strength multiplied, his body transformed, and he could fight entire armies alone. He defended Ulster (northern Ireland) against invading armies when he was only seventeen years old. His most famous feat was single-handedly holding off the armies of Queen Medb for months while Ulster's warriors were under a curse.</p>
