                <p>In Celtic mythology, wisdom was often hidden in animals, trees, and natural places rather than in books or schools. The Salmon of Knowledge came from hazelnuts that fell into the River Boyne from nine sacred hazel trees. Hazelnuts represented wisdom in Celtic culture, and salmon were considered the wisest of all creatures because they traveled between fresh water and the sea, symbolically between different worlds. The Celts believed that true knowledge came from nature and required patience — Finnegas waited seven years, which represents the sacred number seven appearing throughout Celtic stories. Other Celtic tales feature wisdom hidden in wells, springs, ancient trees, and sacred groves. Druids (Celtic priests and scholars) spent up to twenty years studying before they were considered wise.</p>
