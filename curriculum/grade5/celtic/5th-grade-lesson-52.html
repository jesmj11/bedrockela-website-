            <h3>The Celtic Otherworld</h3>
            <div class="story-text">
                <p>The Celtic Otherworld (called Annwn in Welsh mythology and Tír na nÓg in Irish stories) was not heaven or hell, but a parallel realm where time moved differently, everything was more beautiful, and magical beings lived. Unlike the Christian afterlife that came later, the Celtic Otherworld was a place living people could visit and return from — though time there worked strangely. A person might spend what felt like a year in the Otherworld and return to find a hundred years had passed in the normal world, or the reverse. The Otherworld existed alongside the regular world, separated by thin places: mist, lakes, caves, ancient mounds, or the moment between sunset and full dark. Celtic kings and heroes sometimes married Otherworld women or made bargains with Otherworld lords, as Pwyll did.</p>
                <p>The idea of swapping places with someone appears in many stories worldwide — it's called the 'prince and the pauper' motif when a rich person and poor person trade places, but Pwyll's story is different. He and Arawn were equals trading roles as a test of honor, not to learn about different social classes. The Otherworld in Celtic myths represented a place of truth — you couldn't lie there, illusions didn't work, and your real character showed through. When Pwyll refused to strike Hafgan a second time even though Hafgan begged him to, he was following the exact letter of his promise, which Otherworld beings valued highly. Breaking your word to an Otherworld lord could have terrible consequences, but keeping it — even when difficult — earned their eternal friendship. This story taught medieval Welsh listeners that honor matters more when no one from your own world is watching.</p>
