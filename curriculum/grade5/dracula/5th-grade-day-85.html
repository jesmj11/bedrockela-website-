            <h3>The Epistolary Novel: Storytelling Through Letters</h3>
            <p>Dracula is written in an unusual format called an 'epistolary novel' — a story told entirely through documents like letters, diary entries, newspaper clippings, and telegrams. Instead of a traditional narrator describing events, readers piece together the story from the characters' own words.</p><p>This wasn't a new technique. The epistolary format had been popular since the 1700s. Famous examples include Samuel Richardson's 'Pamela' (1740) and 'Clarissa' (1748). The format was especially popular for romance novels and novels about social manners, where personal feelings and private thoughts were central to the story.</p><p>But Stoker used the epistolary format brilliantly for horror. By having multiple characters record their experiences separately, he created a puzzle that readers had to assemble. Jonathan Harker's journal from Transylvania seems disconnected from Mina's diary in England — until the pieces come together and readers realize the same evil threatens both.</p><p>The format also creates dramatic irony: readers often know more than individual characters do. When Jonathan is trapped in Castle Dracula writing desperate journal entries, readers later see how Mina worries about his silence, not knowing what's happening to him. This creates tension and emotional investment.</p><p>Stoker included an impressive variety of documents: personal diaries, business letters, newspaper articles, doctor's notes, ship's logs, phonograph recordings (a new technology!), and telegrams. This variety makes the story feel more real — like actual evidence gathered after real events.</p><p>The format also made the story feel modern and immediate. Victorians were living in an age of information — newspapers, telegrams, mail delivery, recorded sound. Stoker's novel mirrors this information-rich world, showing educated, professional people using modern communication to fight ancient evil.</p><p>There's one more clever effect: the epistolary format makes the supernatural feel more believable. We're not just told that vampires exist — we read multiple witnesses' accounts, medical observations, and documented evidence. It's as if Stoker is saying, 'Don't just trust me as the author. Read the evidence yourself and decide.'</p><p>Modern horror movies often use a similar technique called 'found footage,' where the movie pretends to be recovered video recordings. The Blair Witch Project and Paranormal Activity work the same way Dracula does — presenting fiction as if it were real documentation of real events.</p>
