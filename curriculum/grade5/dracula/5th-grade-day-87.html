            <p>Dracula's two main female characters — Mina Murray and Lucy Westenra — represent different aspects of Victorian womanhood, and their contrasting fates reflect Victorian society's complex attitudes toward women.</p><p>Lucy is beautiful, wealthy, and social. She's playful and affectionate, writing letters about her three marriage proposals in one day. She represents the Victorian ideal of decorative femininity — pretty, charming, and focused on romance. But she's also portrayed as somewhat passive, needing to be protected and saved.</p><p>Mina, in contrast, is practical, intelligent, and hardworking. She's learned shorthand and typing — professional skills that were just becoming available to women in the 1890s. She works as a teacher. She organizes information, keeps records, and actively contributes to the group's fight against Dracula. Professor Van Helsing calls her 'one of God's women' with a 'man's brain.'</p><p>This compliment, which sounds strange to modern readers, reflects Victorian assumptions: intelligence was considered primarily masculine, so praising a smart woman meant comparing her to a man. Stoker seems to admire Mina's capabilities, but he still describes them using Victorian gender stereotypes.</p><p>The 1890s was a time of changing roles for women. The 'New Woman' movement argued for education, property rights, and professional opportunities. Women were entering universities, demanding the right to vote, and challenging the idea that they should be confined to home and family.</p><p>Conservative Victorians found this threatening. They worried that educated, independent women would destroy traditional family structures. This anxiety appears in Dracula: Lucy, the traditional beauty, becomes a vampire — transformed into something monstrous and sexually aggressive, needing to be destroyed. Some scholars read this as reflecting Victorian fears about women's changing roles.</p><p>But Mina, who combines traditional virtue with modern capabilities, survives. She's loyal to her husband but also intellectually valuable to the group. She represents perhaps Stoker's ideal: a woman who uses modern skills while maintaining Victorian values.</p><p>Real Victorian women's lives varied enormously by class. Wealthy women like Lucy might never work for pay and had servants managing their households. Working-class women worked in factories, as domestic servants, or in shops — often in difficult conditions for low pay. Middle-class women like Mina, who worked as teachers or typists, were navigating new territory, creating professional roles that hadn't existed for women before.</p><p>The suffragette movement was growing throughout this period. Women wouldn't get the vote in Britain until 1918 (and then only women over 30; full voting equality came in 1928). Dracula was published right in the middle of this long struggle for women's rights.</p>
