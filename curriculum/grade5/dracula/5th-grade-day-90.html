            <h3>The Power of Superstition: Why People Believed</h3>
            <p>In Dracula, characters use garlic, crucifixes, holy water, and wooden stakes to fight vampires. These methods come from real Eastern European folklore — beliefs that people genuinely held and acted on for centuries. But why did so many people across different cultures believe in supernatural protections?</p><p>Before modern science explained disease, death, and natural phenomena, people created explanations based on what they observed. When plague swept through a village, killing seemingly at random, it seemed like an invisible evil force. When someone died unexpectedly and others in the family sickened soon after, it looked like the dead person was somehow attacking the living.</p><p>Garlic has natural antibacterial properties and a strong smell. While it doesn't actually repel vampires, it may have helped prevent some diseases from spreading, giving people a reason to believe it had protective power. Similarly, the practice of burning bodies or exhuming and staking suspected vampires may have stopped disease spread by preventing contact with infected corpses.</p><p>Religious symbols like crucifixes represented faith, community, and moral order — powerful psychological weapons against fear. When frightened people held religious objects, they felt protected, which gave them courage to face danger. The protection was psychological rather than supernatural, but that didn't make it less real or less useful.</p><p>Running water appears in vampire folklore because decomposing bodies release gases that make them float. Superstitious observers believed corpses that moved or floated were undead, but they noted that flowing water carried them away. Thus, the belief that vampires couldn't cross running water.</p><p>Invitations also appear in vampire lore: vampires supposedly couldn't enter homes uninvited. This belief probably came from the idea that your home was your protected space, under your control. Inviting someone in meant accepting them into your private world — a significant act in closely-knit communities where strangers were rare and potentially dangerous.</p><p>These superstitions weren't stupidity — they were humans trying to understand and control a frightening, unpredictable world with the knowledge available to them. Many folk beliefs contained kernels of practical wisdom, even if the supernatural explanations were incorrect.</p><p>Today, we have scientific explanations for disease, decomposition, and death. Yet people still carry good-luck charms, avoid walking under ladders, knock on wood, or follow sports rituals. The human need to feel some control over unpredictable events hasn't disappeared — it just takes different forms.</p>
