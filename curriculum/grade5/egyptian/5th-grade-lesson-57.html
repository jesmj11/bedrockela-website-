                <p>Isis's restoration of Osiris became the model for Egyptian mummification. When the Egyptians embalmed their dead, they were recreating what Isis did for Osiris — preserving the body so the soul could use it in the afterlife. The process took seventy days and involved removing internal organs (except the heart, which was needed for judgment), drying the body with natron salt, wrapping it in linen, and performing ritual magic spells. The brain was removed through the nose and discarded because Egyptians thought thinking happened in the heart. Rich Egyptians were buried with food, furniture, servants' statues (shabtis), and detailed instructions (the Book of the Dead) to help them navigate the underworld. Poor Egyptians received simpler burials but still followed the same basic principles.</p>
