            <p>The Twelve Olympians
A Guide to the Gods of Ancient Greece
On the highest mountain in Greece — Mount Olympus, whose peak was always hidden in clouds — lived the twelve greatest gods of the Greek world. They were not always kind. They were not always wise. They argued and competed and played favorites and made mistakes that affected every human below them. But they were what the Greeks had, and the Greeks studied them carefully for thousands of years and built up a very detailed picture of who each one was.
Here is what you need to know.
Zeus was the king — ruler of the sky, lord of the thunderbolt, the final word on Olympus. He was decisive and powerful and had a strong sense of justice, which he did not always apply to himself. He had a lot of children, many of whom became heroes or caused problems or both. Every king on earth was supposed to rule in his image, which tells you something about how the Greeks understood authority: impressive, necessary, and not entirely trustworthy.
Hera was his wife and queen — goddess of marriage and family. She was fierce, long-memoried, and not someone who let things go. The myths often reduce her to jealousy, but that's too simple. She was a queen who had been treated badly and found her power in what she could control. She was <span class="vocab-highlight">formidable</span>, and she meant to be.
Poseidon ruled the sea — all of it, including earthquakes and the creatures in the deep. He was passionate and proud and competitive with his brother Zeus, and he remembered every slight. Sailors prayed to him before every voyage. It was the wise thing to do.
Demeter governed the growing things of the earth — grain, harvest, the turning of the seasons. She was patient and generous when all was well. When her daughter was taken, she showed everyone what happened when the goddess of the harvest stopped caring whether anything grew.
Athena was born fully armored from Zeus's own head — goddess of wisdom and strategy and craft. She was a warrior, but her battles were always planned and purposeful. She was the <span class="vocab-highlight">patron</span> of Athens, the city that bears her name, and she gave it everything: law, weaving, pottery, the olive tree. She was serious and brilliant and did not suffer fools.
Apollo was the god of the sun, of music and poetry, of medicine and prophecy. His Oracle at Delphi was the most important religious site in Greece. He was generous and brilliant and capable of terrible coldness when his pride was wounded. His twin sister was Artemis, and between the two of them they covered most of what people needed to be afraid of.
Artemis was the goddess of the hunt and the moon — protector of wild animals and of girls not yet grown. She was independent and skilled and did not tolerate anyone who disrespected the creatures she protected or the freedom she embodied. She asked for and needed nothing from anyone.
Ares was the god of war — the wild, bloody, chaotic part of it. He was not a planner. He was a force. He loved battle for its own sake, which the Greeks admired and feared in roughly equal measure.
Aphrodite was the goddess of love and beauty, born from the sea foam and fully herself from the first moment. She was powerful in the way that desire is powerful — you don't always choose when it arrives or what it does to you. She was not always gentle about this.
Hephaestus was the divine craftsman — god of the forge, of fire, of everything made by skilled hands. He was the only Olympian who worked, which made the others slightly uncomfortable. He made the thunderbolts for Zeus, the armor for heroes, the impossible things that no ordinary hand could shape. He was lame and considered unglamorous, which the other gods had opinions about. He kept working anyway.
Hermes was the messenger of the gods — quick, clever, a little tricky, the god of travelers and thieves and commerce and language. He could go anywhere, including the underworld, and he escorted souls of the dead on their final journey. He was everybody's favorite, which is its own kind of power.
Dionysus was the god of wine and theater and ecstasy — of the moments when ordinary life breaks open and something larger comes through. He was the newest of the Olympians and the most disruptive. His festivals were when the rules loosened. He reminded everyone that joy is also a divine thing.
Twelve gods on one mountain. A great deal of history came out of what happened when they didn't agree.</p>
