A Tale from Ancient Greek Mythology
Atalanta was abandoned on a mountainside as a baby because her father had wanted a son.
She was found and raised by a she-bear, and later by hunters who recognized quickly that the wild girl running through their forest could outrun, out-hunt, and out-shoot any of them. She moved through the world like something that had always lived in it, her feet barely touching the ground.
She could outrun anyone in the world. Not as a boast — as a measurable fact that had been tested repeatedly, by people who had been very sure they were fast and discovered they were wrong.
She became famous. She was the first to wound the great Calydonian Boar, a monster that had been ravaging the countryside — she put an arrow in it before any of the gathered heroes had gotten close enough to try. Some of those heroes were annoyed about this. She did not pay much attention to their feelings on the matter.
Then her father found her.
This was the same man who had left her on a mountainside as a baby, now that she was famous and he could claim her as his daughter. He wanted her back. He also wanted her to marry, which the Greeks considered the appropriate next step for a young woman of accomplishment.
Atalanta was not interested in marrying. She had lived free her whole life and could not see a compelling reason to stop.
She made a condition: she would marry any man who could outrun her in a footrace. Anyone who tried and lost would pay with his life. Hard terms. Her terms. Her father — who needed her more than she needed him — agreed.
Many young men tried. None were fast enough. The trying ended badly for all of them, and you'd think that would have discouraged further attempts, but hope is persistent and young men were confident.
Then a young man named Hippomenes came to watch one of the races. He had come to mock the whole business — what kind of man needed to race a woman for a wife?
He watched Atalanta run.
He forgot what he'd come to say. He asked to race her.
He was not the fastest man alive. He knew this. He also knew he couldn't give up the idea now that he'd seen her, which is not the most rational position but is a deeply human one. He prayed to Aphrodite, and Aphrodite — who had strong opinions about races being run for love — gave him three golden apples and told him what to do with them.
The race began. Atalanta pulled ahead immediately, as she always did. Hippomenes dropped the first apple. It hit the track rolling, golden and gleaming.
Atalanta paused.
She shouldn't have, and she knew it — but it was extraordinary, and curiosity is its own kind of pull. She stopped to pick it up. Hippomenes took the lead.
She caught him easily. He dropped the second apple, off to the side of the track. She hesitated a moment longer before collecting it — she was ahead again in moments, but the hesitation cost her.
The third apple he threw far to the side, at the edge of the course, and she went after it, and this time the moment it took was the moment that mattered. Hippomenes crossed the finish line first.
He had won. She had let him.
The Greeks were clear-eyed about this. Atalanta was faster. She could have ignored the apples. She chose, consciously or not, not to. What Aphrodite had understood was not that Hippomenes needed a trick to win — but that Atalanta needed a reason to lose.
She married him. She was not unhappy about it.
Hippomenes forgot to thank Aphrodite, which was a significant oversight. The goddess was offended. There were consequences, and they were turned into lions, which was not ideal.
