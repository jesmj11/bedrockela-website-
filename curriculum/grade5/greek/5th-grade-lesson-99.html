            <p>The Creation of the World
A Tale from Ancient Greek Mythology
In the beginning there was nothing but Chaos.
Not chaos like a messy room or a loud argument — Chaos like the complete absence of everything. No light, no dark, no up, no down. No time yet to measure how long it had been this way. Just an enormous, formless, swirling not-yet-anything that simply was.
And then, because nothingness apparently has its limits, things began to emerge from it.
Gaia came first — the earth, stretching herself wide and solid and real, becoming the foundation everything else would stand on. Then Tartarus, the deep abyss far below the earth, dark beyond measuring. Then Eros, the force of love that would draw all living things toward each other, which the Greeks considered as fundamental as the ground itself. Then Erebus, the deep darkness, and Nyx, the night.
From Nyx and Erebus came Hemera, the day, and Aether, the bright upper air where the gods would eventually live. And from Gaia herself — with no partner, entirely on her own — came Uranus, the sky, who arched above her like a vast blue dome and looked down at her with all his stars.
Gaia and Uranus had children together: the twelve Titans, enormous and powerful beyond anything that came after. They also had the Cyclopes — three brothers with a single eye each in the center of their foreheads — and the Hecatoncheires, three creatures of unimaginable size, each with a hundred hands and fifty heads.
Uranus looked at his stranger children and felt afraid of them. So he pushed them back — down into Gaia's body, back into the earth, where they couldn't threaten him. He kept pushing them back down every time they tried to emerge.
Gaia was furious. She went to her Titan children and asked which of them would stand against their father and free their trapped siblings. Eleven of the twelve looked at the sky and said nothing.
The youngest Titan, Cronus, said yes.
Gaia gave him an adamantine sickle. He did what needed to be done. Uranus fell, and as he fell, drops of his blood hit the sea and from the foam that formed rose Aphrodite, goddess of love — stepping ashore on Cyprus, fully formed, as if beauty had simply been waiting for the right moment to appear.
Cronus became king of the gods. Then he heard the <span class="vocab-highlight">prophecy</span> that would shape everything that followed: one day, a child of his would overthrow him, exactly as he had overthrown his own father.
He thought about this problem and arrived at what seemed to him like a solution.
Every time his wife Rhea gave birth, he swallowed the baby.
Five children disappeared this way: Hestia, Demeter, Hera, Hades, Poseidon. Five gods, growing up in their father's stomach, which was not, by any standard, a good situation.
When the sixth was born, Rhea had had enough. She wrapped a stone in baby blankets and handed it to Cronus, who swallowed it without looking closely. The real baby — she named him Zeus — she sent to Crete, to be hidden in a cave and raised by a goat named Amalthea and the nymphs of the mountain.
Zeus grew up strong and clever and full of the particular focus of someone who has known, his whole life, exactly what he was going to do. When he was old enough, he went to his father's palace in disguise. He slipped something into Cronus's drink that made him violently ill. Cronus vomited up the stone first, and then — one after another — five fully grown gods, each one furious and ready to fight.
The war that followed lasted ten years. Zeus freed the Cyclopes and the Hecatoncheires from their prison, and in gratitude the Cyclopes gave him the thunderbolt: crackling with lightning, perfectly aimed, the most powerful weapon in the world. The Titans were defeated and sealed in Tartarus.
Zeus and his brothers divided what was left. Zeus took the sky. Poseidon took the sea. Hades took the underworld. The earth and Mount Olympus they shared.
Then Zeus made human beings. He gave them the earth, the seasons, the sun. He gave them minds capable of wonder and hands capable of making things, and he watched them move across the face of the world — small and busy and endlessly surprising.
This was the beginning.
Everything that follows grew considerably more complicated from here.</p>
