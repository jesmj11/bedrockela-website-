        <p>In the days when Britain was a wild and broken land, torn apart by warring kings and petty lords who fought over every hill and river, there lived a boy named Arthur who did not know he was special. He did not know he was destined for anything at all, which is perhaps the best way to begin a story about greatness — with someone who hasn\'t the faintest idea it\'s coming.</p>
<p>Arthur was fifteen years old, tall for his age but thin, with a mop of dark hair that refused to behave and gray eyes that were always watching, always noticing things that other people missed. He lived in the household of Sir Ector, a kind and honest knight who owned a modest estate in the rolling green countryside. Arthur had lived there for as long as he could remember, raised alongside Sir Ector\'s son, Kay, who was three years older and never let Arthur forget it.</p>

<p>Arthur\'s life was simple. He helped in the stables, trained with a sword when Kay allowed it, read whatever books Sir Ector\'s small library contained, and spent his free hours wandering the fields and forests around the estate. He was not unhappy, exactly, but there was a restlessness inside him — a feeling that he was waiting for something, though he couldn\'t have said what.</p>

<p>Arthur didn\'t think about prophecies or kings or <span class="vocab-highlight">destiny</span>. He didn\'t think about the hundreds of powerful men who had tried and failed. He thought only that Kay needed a sword, and here was one, and maybe — just maybe — he could borrow it.</p>
