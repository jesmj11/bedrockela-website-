        <p>The days that followed Arthur\'s drawing of the sword were the most confusing of his young life. One moment he had been a nobody — a squire, a servant, a boy without a family name — and the next, half of England was calling him king and the other half was calling him a fraud.</p>

<p>The rebel kings attacked on a gray March morning, their combined army sweeping down from the north like a dark tide. Arthur\'s forces were outnumbered, but they had two advantages: they were fighting for a cause they believed in, and they had Merlin.</p>
