        <p>Mordred had been at Camelot for three years, and in that time he had become everything Arthur had hoped for and everything Merlin had feared.</p>
<p>On the surface, Mordred was an exemplary knight. He was skilled in combat, eloquent in council, and popular with the younger members of the court. He sat at the Round Table with quiet dignity, spoke only when he had something worth saying, and never openly defied the king. He was courteous. He was competent. He was, by every visible measure, a credit to his father.</p>

<p>Mordred had come to Camelot intending to hate his father. The problem was that Arthur made it very difficult to hate him. The king was kind, generous, and genuinely delighted to have his son at court. He included Mordred in everything — councils, hunts, private dinners, long walks in the garden where they talked about philosophy and kingship and the meaning of justice. Arthur loved Mordred, openly and without reservation, and that love was like a hammer striking the wall of resentment that Morgan had built.</p>

      <div class="story-text">
        <p>The wall cracked. But it did not fall.</p>
<p>Because Mordred had inherited something from his mother\'s teachings that was harder to uproot than hatred: ambition. Not the healthy ambition of a young knight seeking to prove himself, but a cold, calculating hunger for power that sat in his chest like a stone. He wanted the throne. Not because he believed he would be a better king than Arthur — in his private moments, he suspected he wouldn\'t — but because he had been told, his entire life, that it was his. And Mordred had learned, from Morgan, that what is yours by right must be taken by force.</p>
<p>The cracks in Camelot gave him his opportunity.</p>
<p>The Grail quest had weakened the Round Table. Many knights had not returned. Those who had were changed — quieter, more contemplative, less interested in the day-to-day business of governance. Lancelot in particular had withdrawn into himself, spending long hours alone, haunted by whatever he had experienced on the quest.</p>
<p>And there were whispers — dangerous whispers that Mordred was careful to encourage without being seen to encourage them — about Lancelot and Queen Guinevere. The queen and the champion knight had grown close over the years, bound by genuine affection and respect, and in a court full of ambitious men and bored nobles, closeness between a queen and a knight was fertile ground for gossip.</p>
<p>Mordred fanned the flames with surgical precision. A word here. A raised eyebrow there. He never made an accusation directly — he was far too clever for that. He simply ensured that the right people heard the right rumors at the right time.</p>

<p>Arthur, who was neither as blind nor as trusting as Mordred believed, was aware of the tensions. He saw the factions forming. He saw his son\'s growing influence among the restless younger knights. And he carried the weight of Merlin\'s warning like a stone in his heart.</p>
<p>&quot;Mordred is plotting something,&quot; Sir Gawain warned bluntly, during a private meeting in Arthur\'s chambers. &quot;I can smell it. He\'s too quiet, too patient. He\'s building alliances. He\'s positioning himself.&quot;</p>

<p>Arthur was silent for a long time. &quot;I see him, Gawain. I see everything. But I cannot punish a man for what he might do. Only for what he has done. If I move against Mordred before he acts, I become the tyrant that Morgan always said I was. And then she wins.&quot;</p>

<p>He declared Arthur dead — killed in battle, he told the court, a tragic loss, a terrible blow. Before anyone could verify the claim, Mordred had himself crowned king in the great hall of Camelot, sitting on Arthur\'s throne with Arthur\'s crown on his head and Morgan le Fay\'s smile on his lips.</p>
