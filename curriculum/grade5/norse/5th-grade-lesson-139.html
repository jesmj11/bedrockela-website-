            <p>The creation story you just read wasn't written down until the 1200s — more than 200 years AFTER most Vikings had converted to Christianity! So how did these myths survive?</p>
            <p>For centuries, Norse myths were passed down orally. Poets called 'skalds' memorized thousands of lines of poetry and recited them at feasts, ceremonies, and gatherings. They were the living libraries of Viking culture, preserving history, religion, and stories through careful repetition.</p>
