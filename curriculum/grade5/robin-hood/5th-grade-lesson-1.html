        <p>In the days of good King Henry the Second, when England was still wild with thick forests and long stretches of untamed land, there lived a young man named Robin Hood in the town of Locksley, in Nottinghamshire. He was eighteen years old, tall and strong, with sharp eyes the color of a summer sky and hair as brown as an oak leaf in autumn. He could shoot an arrow straighter than any man in the county, and he walked through the greenwood as quietly as a deer.</p>
<p>Robin lived a simple life with his father, a forester who served the king by tending the royal deer in Sherwood Forest. From his father, Robin had learned to love the woods — the way sunlight fell in golden patches through the canopy, the rustle of creatures in the underbrush, the sweet smell of moss after a rain. He knew every path and every stream for miles around, and by the time he was fifteen, there was no better archer in all of England.</p>

<p>&quot;I\'ll take any wager you care to make,&quot; Robin said, his voice steady and cool despite the fire in his chest. &quot;Name your target.&quot;</p>
