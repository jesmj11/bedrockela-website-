<p>As they climbed out of the river, dripping and bruised and grinning like fools, Robin asked the question that had been nagging at him. &quot;Tuck — why did you make me carry you back and forth so many times? You knew who I was from the start, didn\'t you?&quot;</p>
<p>Tuck smiled mysteriously and patted his round belly. &quot;I had my suspicions. But I wanted to see what kind of man you were. Any fool can shoot an arrow or swing a sword. But a man who will carry a three-hundred-pound <span class="vocab-highlight">friar</span> across a river five times without complaining — well, that\'s a man I can follow.&quot;</p>
<p>&quot;I complained,&quot; Robin pointed out.</p>
<p>&quot;Not as much as most would have. That\'s the point.&quot;</p>
<p><span class="vocab-highlight">Friar</span> Tuck became one of the most beloved members of Robin\'s band. He said prayers over their meals, tended their wounds with surprising gentleness, performed wedding ceremonies for those who needed them, settled arguments with wisdom and humor, and ate roughly twice as much as any other man in camp. He also turned out to be one of the finest fighters in the group — his <span class="vocab-highlight">broadsword</span> work was exceptional, and his bare-knuckle boxing was even better.</p>
<p>His three dogs — Fury, Beauty, and Fangs — became the unofficial guardians of the camp. Fury was fierce and territorial. Beauty was sweet and gentle, unless you threatened her master, in which case she transformed into a snarling fury that would make her namesake proud. And Fangs was old and mostly deaf but had an uncanny ability to find anyone trying to sneak into camp, usually by falling asleep on top of them.</p>
<p>As for the river crossing, it became one of the most popular stories in camp. The Merry Men never tired of hearing how Robin Hood had been outsmarted by a fat <span class="vocab-highlight">friar</span> with a meat pie and a <span class="vocab-highlight">broadsword</span>. Robin bore the teasing with good grace, because he knew that the best stories are the ones where the hero doesn\'t always win.</p>
<p>And whenever anyone asked <span class="vocab-highlight">Friar</span> Tuck why he\'d made Robin carry him back and forth so many times, Tuck would simply smile, pat his belly, and say, &quot;A little <span class="vocab-highlight">humility</span> is good for the soul. Even Robin Hood\'s soul.&quot;</p>
<p>Especially Robin Hood\'s soul.</p>
      </div>
