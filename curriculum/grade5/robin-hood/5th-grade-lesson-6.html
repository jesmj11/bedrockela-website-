        <p>Not all of Robin Hood\'s adventures ended in laughter. There came a dark day when one of his dearest friends was nearly lost forever, and it taught every man in Sherwood Forest that the life of an outlaw, for all its freedom and merriment, carried a price that could be paid in blood.</p>
<p>Will Stutely had been with Robin from the very beginning — one of the first men to seek him out in Sherwood Forest after Robin became an outlaw. He was a lean, quick-witted man with a fox-sharp face, hair the color of a copper penny, and a tongue that could cut deeper than his sword. He was clever, he was brave, and he was utterly loyal to Robin Hood. He served as Robin\'s chief scout, the man who went ahead to spy out the roads, who kept watch when the camp slept, and who could disappear into the forest like a shadow melting into darkness.</p>
