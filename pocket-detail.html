<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pocket Curriculum - Tessory ELA</title>
    <link rel="stylesheet" href="/css/tessory.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="Main navigation">
            <a class="brand" href="/">Tessory ELA</a>
            <div class="nav-links">
                <a href="/founding-library.html">Founding Library</a>
                <a href="/pocket-framework.html">Pocket Framework</a>
                <a href="/writing-paths.html">Writing Paths</a>
                <a href="/build-tessory.html">Build Your Tessory</a>
            </div>
        </nav>
    </header>

    <main id="detail" class="container"></main>

    <script type="module">
        import { FOUNDING_LIBRARY, POCKET_FRAMEWORK } from './js/tessory-data.js';

        const id = new URLSearchParams(window.location.search).get('id');
        const book = FOUNDING_LIBRARY.find(item => item.id === id) || FOUNDING_LIBRARY[0];
        document.title = `${book.title} - Tessory ELA`;

        function escapeHtml(value) {
            return String(value || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function list(items) {
            return `<ul class="list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
        }

        function paragraphs(items) {
            return items.map(item => `<p class="small">${escapeHtml(item)}</p>`).join('');
        }

        function orderedQuestions(items) {
            return `<ol class="list">${items.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ol>`;
        }

        function branchPreview(path) {
            return `
                <ol class="list">
                    <li>Launch</li>
                    <li>Foundations</li>
                    <li>Notebook 1, then ${path} Branch 1</li>
                    <li>Notebook 2, then ${path} Branch 2</li>
                    <li>Notebook 3, then ${path} Branch 3</li>
                    <li>Discovery Expedition after approximately every six Notebooks</li>
                    <li>Reflection</li>
                </ol>
            `;
        }

        document.getElementById('detail').innerHTML = `
            <section class="section-head">
                <div>
                    <div class="eyebrow">Pocket Curriculum Detail</div>
                    <h1>${book.title}</h1>
                    <p>${book.author} • Grade ${book.gradeBand} • ${book.category}</p>
                </div>
            </section>
            <section class="detail-grid">
                <article class="detail-panel">
                    <h2>Overview</h2>
                    <p class="lead" style="font-size:1rem;">${book.overview}</p>
                    <h2>Essential Question</h2>
                    <p class="lead" style="font-size:1rem;">${book.essentialQuestion}</p>
                    <h2>Why It Earned Its Place</h2>
                    <p class="lead" style="font-size:1rem;">${book.whyItEarnedItsPlace}</p>
                    <h2>Major Themes</h2>
                    ${list(book.themes)}
                    <h2>Writing Possibilities</h2>
                    ${list(book.writingPossibilities)}
                    <h2>Pocket Architecture</h2>
                    <p class="lead" style="font-size:1rem;">${POCKET_FRAMEWORK.principle}</p>
                    <h3>Core Flow</h3>
                    ${list(POCKET_FRAMEWORK.sections.map(section => `${section.name}: ${section.description}`))}
                    <h3>Notebook Order</h3>
                    ${list(POCKET_FRAMEWORK.notebookOrder.map(item => `${item}: ${POCKET_FRAMEWORK.notebookDetails[item]}`))}
                    <h3>Selected Branch Preview</h3>
                    <p class="small">A parent chooses either ${book.primaryPath} or ${book.secondaryPath}. The unused branch is hidden from the student.</p>
                    ${branchPreview(book.primaryPath)}
                    <section id="pocketContent"></section>
                    <h2>Discussion Possibilities</h2>
                    ${list(book.discussionPossibilities)}
                    <h2>Cross-Curricular Connections</h2>
                    ${list(book.crossCurricularConnections)}
                </article>
                <aside class="detail-panel">
                    <div class="badges">
                        <span class="badge">${book.primaryPath}</span>
                        <span class="badge secondary">${book.secondaryPath}</span>
                        <span class="badge status">${book.status}</span>
                    </div>
                    <h3>Supported Writing Branches</h3>
                    ${list(book.pocketArchitecture.supportedPaths)}
                    <h3>Branch Rule</h3>
                    <p class="small">${book.pocketArchitecture.generatorRule}</p>
                    <h3>Discovery Expedition Cadence</h3>
                    <p class="small">${book.pocketArchitecture.discoveryExpeditionCadence}</p>
                    <h3>CCSS Alignment</h3>
                    <p class="small">${book.ccssAlignment}</p>
                    <h3>Content Notes</h3>
                    <p class="small">${book.contentNotes}</p>
                    <h3>Development Status</h3>
                    <p class="small">${book.status}</p>
                    <a class="button primary" style="display:inline-block;margin-top:18px;" href="/build-tessory.html">Add from Builder</a>
                </aside>
            </section>
        `;

        function renderNotebook(notebook, selectedBranch) {
            const branch = notebook.branches[selectedBranch];
            return `
                <details class="notebook-card">
                    <summary>
                        <span>Notebook ${notebook.number}</span>
                        <small>Chapters ${escapeHtml(notebook.chapters)}</small>
                    </summary>
                    <div class="notebook-body">
                        <h3>Focus Question</h3>
                        <p class="lead compact">${escapeHtml(notebook.focusQuestion)}</p>
                        ${paragraphs(notebook.introduction)}
                        <h3>Narrate</h3>
                        <p class="small">${escapeHtml(notebook.narrate.instructions)}</p>
                        ${orderedQuestions(notebook.narrate.questions)}
                        <h3>Think</h3>
                        <p class="small">${escapeHtml(notebook.think.instructions)}</p>
                        ${orderedQuestions(notebook.think.questions)}
                        <h3>Connect</h3>
                        ${paragraphs(notebook.connect)}
                        <h3>Quick Write</h3>
                        ${paragraphs(notebook.quickWrite)}
                        <h3>Keep Reading</h3>
                        ${paragraphs(notebook.keepReading)}
                        <div class="branch-panel">
                            <div class="eyebrow">${escapeHtml(selectedBranch)} Branch</div>
                            <h3>Lesson ${branch.lessonNumber}: ${escapeHtml(branch.title)}</h3>
                            ${paragraphs(branch.content)}
                        </div>
                    </div>
                </details>
            `;
        }

        function renderPocketContent(pocket, selectedBranch) {
            const content = document.getElementById('pocketContent');
            content.innerHTML = `
                <div class="pocket-content-head">
                    <div>
                        <h2>Complete Pocket Curriculum</h2>
                        <p class="small">${pocket.notebooks.length} Notebooks loaded. Select the writing branch the parent wants generated for the student.</p>
                    </div>
                    <label class="branch-select">
                        <span>Writing Branch</span>
                        <select id="selectedBranch">
                            ${pocket.pocketArchitecture?.supportedPaths?.map(path => `<option ${path === selectedBranch ? 'selected' : ''}>${path}</option>`).join('') || [pocket.primaryPath, pocket.secondaryPath].map(path => `<option ${path === selectedBranch ? 'selected' : ''}>${path}</option>`).join('')}
                        </select>
                    </label>
                </div>
                <p class="small"><strong>Essential Question:</strong> ${escapeHtml(pocket.essentialQuestion)}</p>
                <p class="small"><strong>Generator rule:</strong> ${escapeHtml(pocket.branchRule)}</p>
                <div class="notebook-list">
                    ${pocket.notebooks.map(notebook => renderNotebook(notebook, selectedBranch)).join('')}
                </div>
                <div class="branch-panel">
                    <div class="eyebrow">Reflection</div>
                    <h3>Final Reflection</h3>
                    ${paragraphs(pocket.reflection || [])}
                </div>
            `;
            document.getElementById('selectedBranch').addEventListener('change', event => {
                renderPocketContent(pocket, event.target.value);
            });
        }

        if (book.pocketContentPath) {
            fetch(book.pocketContentPath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Pocket content failed to load: ${response.status}`);
                    }
                    return response.json();
                })
                .then(pocket => renderPocketContent(pocket, book.primaryPath))
                .catch(error => {
                    document.getElementById('pocketContent').innerHTML = `<p class="small">Pocket content could not be loaded yet. ${escapeHtml(error.message)}</p>`;
                });
        }
    </script>
</body>
</html>
