<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Progress - BedrockELA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #E0F2F1 0%, #B2DFDB 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .back-btn {
            background: #305853;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .back-btn:hover {
            background: #254540;
        }
        
        .student-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .student-name {
            font-size: 2rem;
            color: #305853;
        }
        
        .grade-badge {
            background: #B06821;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: bold;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .stat-card {
            background: rgba(48,88,83,0.05);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: bold;
            color: #305853;
        }
        
        .stat-label {
            color: #666;
            margin-top: 5px;
        }
        
        .section {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .section-title {
            font-size: 1.5rem;
            color: #305853;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .timeline {
            position: relative;
            padding-left: 30px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 3px;
            background: #305853;
        }
        
        .timeline-item {
            margin-bottom: 30px;
            position: relative;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -35px;
            top: 5px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #B06821;
            border: 3px solid white;
            box-shadow: 0 0 0 3px #B06821;
        }
        
        .lesson-card {
            background: rgba(48,88,83,0.05);
            padding: 20px;
            border-radius: 15px;
            border-left: 4px solid #B06821;
        }
        
        .lesson-title {
            font-weight: bold;
            color: #305853;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        
        .lesson-meta {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
        
        .answer-preview {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: #333;
        }
        
        .view-details-btn {
            background: #305853;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            margin-top: 10px;
        }
        
        .view-details-btn:hover {
            background: #254540;
        }
        
        .week-selector {
            display: flex;
            gap: 10px;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .week-btn {
            background: white;
            border: 2px solid #305853;
            color: #305853;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .week-btn.active {
            background: #305853;
            color: white;
        }
        
        .week-label {
            font-size: 1.2rem;
            font-weight: bold;
            color: #305853;
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="window.location.href='parent-dashboard-firebase.html'">← Back to Dashboard</button>
        
        <div class="header">
            <div class="student-header">
                <div>
                    <h1 class="student-name" id="studentName">Loading...</h1>
                </div>
                <span class="grade-badge" id="gradeBadge">Grade</span>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number" id="lessonsThisWeek">0</div>
                    <div class="stat-label">Lessons This Week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalLessons">0</div>
                    <div class="stat-label">Total Completed</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="timeSpent">0h</div>
                    <div class="stat-label">Time This Week</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="currentStreak">0</div>
                    <div class="stat-label">Day Streak</div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="week-selector">
                <button class="week-btn" onclick="changeWeek(-1)">← Previous Week</button>
                <span class="week-label" id="weekLabel">This Week</span>
                <button class="week-btn" onclick="changeWeek(1)" disabled>Next Week →</button>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">Weekly Progress</h2>
            <div class="timeline" id="weeklyTimeline">
                <p style="color: #666;">Loading lessons...</p>
            </div>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>
    
    <script>
        let currentWeekOffset = 0;
        let studentId = new URLSearchParams(window.location.search).get('student');
        
        async function loadStudentData() {
            if (!studentId) {
                alert('No student selected');
                window.location.href = 'parent-dashboard-firebase.html';
                return;
            }
            
            const db = firebase.firestore();
            
            try {
                // Get student info
                const studentDoc = await db.collection('students').doc(studentId).get();
                if (!studentDoc.exists) {
                    alert('Student not found');
                    return;
                }
                
                const student = studentDoc.data();
                document.getElementById('studentName').textContent = student.name;
                document.getElementById('gradeBadge').textContent = student.gradeLevel || 'Grade';
                
                // Get completed lessons
                const completedLessons = student.completedLessons || [];
                document.getElementById('totalLessons').textContent = completedLessons.length;
                
                // Calculate week range
                const now = new Date();
                const weekStart = new Date(now);
                weekStart.setDate(now.getDate() - now.getDay() + (currentWeekOffset * 7));
                weekStart.setHours(0, 0, 0, 0);
                
                const weekEnd = new Date(weekStart);
                weekEnd.setDate(weekStart.getDate() + 6);
                weekEnd.setHours(23, 59, 59, 999);
                
                // Update week label
                if (currentWeekOffset === 0) {
                    document.getElementById('weekLabel').textContent = 'This Week';
                } else if (currentWeekOffset === -1) {
                    document.getElementById('weekLabel').textContent = 'Last Week';
                } else {
                    document.getElementById('weekLabel').textContent = `${weekStart.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} - ${weekEnd.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })}`;
                }
                
                // Get lesson progress for the week
                const progressSnapshot = await db.collection('lessonProgress')
                    .where('studentId', '==', studentId)
                    .where('lastUpdated', '>=', weekStart.toISOString())
                    .where('lastUpdated', '<=', weekEnd.toISOString())
                    .orderBy('lastUpdated', 'desc')
                    .get();
                
                const weeklyLessons = [];
                progressSnapshot.forEach(doc => {
                    weeklyLessons.push({ id: doc.id, ...doc.data() });
                });
                
                document.getElementById('lessonsThisWeek').textContent = weeklyLessons.length;
                
                // Estimate time (5-10 min per page average)
                const totalPages = weeklyLessons.reduce((sum, l) => sum + (l.current_page || 0), 0);
                const estimatedMinutes = totalPages * 7;
                const hours = Math.floor(estimatedMinutes / 60);
                const minutes = estimatedMinutes % 60;
                document.getElementById('timeSpent').textContent = hours > 0 ? `${hours}h ${minutes}m` : `${minutes}m`;
                
                // Render timeline
                renderWeeklyTimeline(weeklyLessons);
                
            } catch (error) {
                console.error('Error loading student data:', error);
                alert('Error loading data: ' + error.message);
            }
        }
        
        function renderWeeklyTimeline(lessons) {
            const timeline = document.getElementById('weeklyTimeline');
            
            if (lessons.length === 0) {
                timeline.innerHTML = '<p style="color: #666; text-align: center;">No lessons completed this week</p>';
                return;
            }
            
            timeline.innerHTML = lessons.map(lesson => {
                const date = new Date(lesson.lastUpdated);
                const dayName = date.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' });
                const time = date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
                
                return `
                    <div class="timeline-item">
                        <div class="lesson-card">
                            <div class="lesson-title">${lesson.lessonId || 'Lesson'}</div>
                            <div class="lesson-meta">${dayName} at ${time} • Page ${lesson.current_page || 0} of ${lesson.total_pages || '?'}</div>
                            <div style="background: rgba(48,88,83,0.1); padding: 10px; border-radius: 8px; margin-top: 10px;">
                                <strong>Progress:</strong> ${Math.round(((lesson.current_page || 0) / (lesson.total_pages || 1)) * 100)}% complete
                            </div>
                            <button class="view-details-btn" onclick="viewLessonDetails('${lesson.id}')">View Answers</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function changeWeek(offset) {
            currentWeekOffset += offset;
            loadStudentData();
        }
        
        function viewLessonDetails(progressId) {
            // Navigate to detailed answer view
            window.location.href = `lesson-answers.html?progress=${progressId}&student=${studentId}`;
        }
        
        // Load on page load
        firebase.auth().onAuthStateChanged(user => {
            if (!user) {
                window.location.href = 'parent-login-firebase.html';
            } else {
                loadStudentData();
            }
        });
    </script>
</body>
</html>
