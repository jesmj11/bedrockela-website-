<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Writing Paths - Tessory ELA</title>
    <link rel="stylesheet" href="/css/tessory.css">
</head>
<body>
    <header class="site-header">
        <nav class="nav" aria-label="Main navigation">
            <a class="brand" href="/">Tessory ELA</a>
            <div class="nav-links">
                <a href="/founding-library.html">Founding Library</a>
                <a class="active" href="/writing-paths.html">Writing Paths</a>
                <a href="/build-tessory.html">Build Your Tessory</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="section-head">
            <div>
                <div class="eyebrow">Six ways students think and write</div>
                <h1>Writing Paths</h1>
                <p>Every Pocket Curriculum belongs to one Primary Path and one Secondary Path so a Tessory can stay flexible while still covering the major ELA skills.</p>
            </div>
        </section>
        <section id="paths" class="path-grid"></section>
    </main>

    <script type="module">
        import { WRITING_PATHS } from './js/tessory-data.js';

        document.getElementById('paths').innerHTML = WRITING_PATHS.map(path => `
            <article class="path-card">
                <h2>${path.name}</h2>
                <p class="lead" style="font-size:1rem; margin-bottom:0;">${path.description}</p>
            </article>
        `).join('');
    </script>
</body>
</html>
